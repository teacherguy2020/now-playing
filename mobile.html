<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mobile Controller Builder</title>
  <style>
    :root{--bg:#0b1322;--card:#121d32;--line:#2a3a58;--text:#e7eefc;--muted:#9fb1d9;--accent:#7dd3fc}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font:14px/1.35 Inter,system-ui}
    .wrap{padding:12px;display:grid;grid-template-columns:360px 1fr;gap:12px}
    @media (max-width: 1200px){
      .wrap{grid-template-columns:1fr}
      .previewHost{justify-content:flex-start}
    }
    @media (max-width: 720px){
      .screen{width:100%;max-width:390px;height:70vh}
    }
    .card{background:var(--card);border:0;border-radius:12px;padding:12px}
    h2{margin:0 0 10px;font-size:16px}
    label{display:block;margin:8px 0 4px;color:var(--muted)}
    select,input{width:100%;padding:8px;border-radius:8px;border:1px solid var(--line);background:#0b1528;color:var(--text)}
    input[type="checkbox"],input[type="radio"]{width:auto !important;padding:0 !important;accent-color:#4aa8ff}
    .row{display:flex;gap:8px;align-items:center}
    .chk{display:flex;gap:8px;align-items:center;margin:8px 0;color:var(--text)}
    .chk span{min-width:0;word-break:break-word}
    .btn{padding:8px 10px;border:1px solid var(--line);background:#10203a;color:var(--text);border-radius:8px;cursor:pointer;transition:filter .15s ease, transform .08s ease, background-color .2s ease}
    .btn.busy{opacity:.85;cursor:progress}
    .btn.done{background:#1f5d33;border-color:#45b26f;color:#eafff1}
    .btn.fail{background:#5a1f2a;border-color:#b2455a;color:#ffeef2}
    .colorRow{display:flex;gap:8px;align-items:center}
    .colorRow input[type="color"]{flex:1}
    .dots{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
    .dot{width:22px;height:22px;border-radius:999px;border:2px solid rgba(255,255,255,.28);cursor:pointer;box-shadow:0 0 0 1px rgba(0,0,0,.25) inset;padding:0;display:inline-block;appearance:none;-webkit-appearance:none}
    .dot[data-preset="ocean"]{background:#4aa8ff !important}
    .dot[data-preset="violet"]{background:#a78bfa !important}
    .dot[data-preset="mint"]{background:#34d399 !important}
    .dot[data-preset="amber"]{background:#fbbf24 !important}
    .dot[data-preset="black"]{background:#0a0a0a !important}
    .dot[data-preset="orange"]{background:#ff7a1a !important}
    .dot.active{outline:2px solid #fff;outline-offset:2px}
    .previewHost{display:flex;align-items:flex-start;justify-content:flex-start}
    .device{background:#0a0f17;border:1px solid #29364d;border-radius:28px;padding:14px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
    .screen{width:390px;height:844px;border-radius:22px;overflow:hidden;border:1px solid #1f2b40;background:#000}
    iframe{width:100%;height:100%;border:0;display:block}
    .jsonModal{position:fixed;inset:0;display:none;align-items:flex-start;justify-content:center;padding-top:18px;background:rgba(0,0,0,.45);z-index:9999}
    .jsonModal.open{display:flex}
    .jsonCard{width:min(760px,94vw);max-height:86vh;overflow:auto;background:#0e1830;border:1px solid var(--line);border-radius:12px;padding:10px}
    .jsonCard textarea{width:100%;min-height:260px;background:#0b1328;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px;font:12px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace}
    .jsonActions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>Mobile Builder (v1)</h2>
      <label>Device preset</label>
      <select id="devicePreset">
        <option value="iphone17" selected>iPhone 17</option>
        <option value="ipadpro11">iPad Pro 11” (Portrait)</option>
        <option value="ipadpro11-landscape">iPad Pro 11” (Landscape)</option>
      </select>
      <label>Primary Theme Color</label><div class="colorRow"><input id="primaryThemeColor" type="color" value="#0b111c" /></div>
      <label>Secondary Theme Color</label><div class="colorRow"><input id="secondaryThemeColor" type="color" value="#1f2a3d" /></div>
      <label>Primary Text Color</label><div class="colorRow"><input id="primaryTextColor" type="color" value="#f3f6ff" /></div>
      <label>Secondary Text Color</label><div class="colorRow"><input id="secondaryTextColor" type="color" value="#9eb3d6" /></div>
      <label>JSON Presets</label>
      <div class="row">
        <select id="presetSel" style="flex:1"></select>
        <button class="btn" id="savePresetBtn" type="button">Save</button>
        <button class="btn" id="deletePresetBtn" type="button">Delete</button>
      </div>
      <div class="row" style="margin-top:8px">
        <button class="btn" id="exportPresetBtn" type="button">Export</button>
        <button class="btn" id="importPresetBtn" type="button">Import</button>
      </div>
      <label>Recent card count</label>
      <input id="recentCount" type="number" min="6" max="30" value="18" />
      <div class="row" style="margin-top:10px">
        <button class="btn" id="applyBtn">Push</button>
        <button class="btn" id="resetBtn">Reset</button>
      </div>
      <p style="margin-top:10px;color:var(--muted)">Push saves the current controller profile to server and generates a URL you can open on phone.</p>
      <label>Pushed URL</label>
      <div class="row"><input id="pushedUrl" type="text" readonly style="flex:1" /><button class="btn" id="copyPushedUrlBtn" type="button">Copy URL</button><button class="btn" id="copySnapshotUrlBtn" type="button">Copy Snapshot URL</button></div>
    </div>
    <div class="card previewHost">
      <div class="device">
        <div class="screen"><iframe id="controllerPreview" src="controller-iphone.html?preview=1"></iframe></div>
      </div>
    </div>
  </div>
  <div class="jsonModal" id="exportModal" aria-hidden="true">
    <div class="jsonCard">
      <div style="font-weight:700;margin-bottom:6px">Export Preset JSON</div>
      <textarea id="exportJson" readonly></textarea>
      <div class="jsonActions">
        <button id="selectExportBtn" class="btn" type="button">Select All</button>
        <button id="copyExportBtn" class="btn" type="button">Copy</button>
        <button id="closeExportBtn" class="btn" type="button">Close</button>
      </div>
    </div>
  </div>
  <script>
    const $ = (id)=>document.getElementById(id);
    const KEY='nowplaying.mobile.profile.v1';
    const PRESETS_KEY='nowplaying.mobile.custom-presets.v1';
    const BUILTIN_PRESETS={
      'Deep Ocean':{primaryThemeColor:'#0b111c',secondaryThemeColor:'#1f2a3d',primaryTextColor:'#f3f6ff',secondaryTextColor:'#9eb3d6'},
      'Blue Horizon':{primaryThemeColor:'#0b1730',secondaryThemeColor:'#1d4ed8',primaryTextColor:'#eaf2ff',secondaryTextColor:'#a9c2ff'},
      'Sunset Glow':{primaryThemeColor:'#1b110d',secondaryThemeColor:'#5b3a2d',primaryTextColor:'#fff1e8',secondaryTextColor:'#f0b089'},
      'Crimson Bloom':{primaryThemeColor:'#fffbfa',secondaryThemeColor:'#fa233b',primaryTextColor:'#4d0200',secondaryTextColor:'#ff9aa1'},
      'Rose Noir':{primaryThemeColor:'#1a0d14',secondaryThemeColor:'#5b2b3f',primaryTextColor:'#ffeef5',secondaryTextColor:'#d9a8bc'},
      'Mono Contrast':{primaryThemeColor:'#0b0b0b',secondaryThemeColor:'#2d2d2d',primaryTextColor:'#f2f2f2',secondaryTextColor:'#b8b8b8'},
      'Lavender Mist':{primaryThemeColor:'#120d1e',secondaryThemeColor:'#3d3158',primaryTextColor:'#f2ecff',secondaryTextColor:'#c9b8f2'},
      'Emerald Glass':{primaryThemeColor:'#081511',secondaryThemeColor:'#1f4a3e',primaryTextColor:'#e8fff6',secondaryTextColor:'#9ed9c3'}
    };
    const defaults={devicePreset:'iphone17',theme:'auto',layout:'home-rail',showRecent:true,recentSource:'albums',colorPreset:'ocean',recentCount:18,customColors:{primaryThemeColor:'#0b111c',secondaryThemeColor:'#1f2a3d',primaryTextColor:'#f3f6ff',secondaryTextColor:'#9eb3d6'}};
    const API_BASE = (()=>{ try { const h=location.hostname||'10.0.0.233'; const p=location.protocol||'http:'; return `${p}//${h}:3101`; } catch { return 'http://10.0.0.233:3101'; } })();
    function read(){try{return {...defaults,...JSON.parse(localStorage.getItem(KEY)||'{}')}}catch{return {...defaults}}}
    function write(p){localStorage.setItem(KEY,JSON.stringify(p));}
    async function ensureKey(){
      try {
        const r=await fetch(`${API_BASE}/config/runtime`,{cache:'no-store'});
        const j=await r.json().catch(()=>({}));
        return String(j?.config?.trackKey||'').trim();
      } catch { return ''; }
    }
    async function loadServerProfile(){
      try {
        const r=await fetch(`${API_BASE}/config/controller-profile`,{cache:'no-store'});
        const j=await r.json().catch(()=>({}));
        if (j?.ok && j?.profile) return {...defaults,...j.profile};
      } catch {}
      return null;
    }
    async function saveServerProfile(p){
      try {
        const key=await ensureKey();
        const r = await fetch(`${API_BASE}/config/controller-profile`,{
          method:'POST',
          headers:{'content-type':'application/json', ...(key?{'x-track-key':key}:{})},
          body:JSON.stringify({profile:p})
        });
        return !!r.ok;
      } catch { return false; }
    }
    function getPresets(){
      try {
        const custom = JSON.parse(localStorage.getItem(PRESETS_KEY) || '{}') || {};
        return {...BUILTIN_PRESETS, ...custom};
      } catch { return {...BUILTIN_PRESETS}; }
    }
    function setPresets(v){ try { localStorage.setItem(PRESETS_KEY, JSON.stringify(v||{})); } catch {} }
    function refreshPresetList(){
      const sel=$('presetSel'); if(!sel) return;
      const map=getPresets();
      const names=Object.keys(map).sort((a,b)=>a.localeCompare(b));
      sel.innerHTML='<option value="">(select preset)</option>' + names.map((n)=>`<option value="${n}">${n}</option>`).join('');
    }
    function syncSwatches(){}
    function applyDeviceChrome(p){
      const preset=String(p?.devicePreset||'iphone17').toLowerCase();
      const screen=document.querySelector('.screen');
      const device=document.querySelector('.device');
      if(!screen||!device) return;
      if(preset==='ipadpro11'){
        screen.style.width='834px';
        screen.style.maxWidth='none';
        screen.style.height='1194px';
        screen.style.borderRadius='20px';
        device.style.borderRadius='24px';
        device.style.transform='scale(0.6)';
        device.style.transformOrigin='top left';
      } else if (preset==='ipadpro11-landscape') {
        // Calibrated to match Safari in-field layout density for current iPad landscape target.
        screen.style.width='1366px';
        screen.style.maxWidth='none';
        screen.style.height='1024px';
        screen.style.borderRadius='20px';
        device.style.borderRadius='24px';
        device.style.transform='scale(0.5)';
        device.style.transformOrigin='top left';
      } else {
        screen.style.width='390px';
        screen.style.maxWidth='390px';
        screen.style.height='844px';
        screen.style.borderRadius='22px';
        device.style.borderRadius='28px';
        device.style.transform='scale(1)';
        device.style.transformOrigin='top center';
      }
    }
    function ui(p){
      $('devicePreset').value=p.devicePreset;
      $('recentCount').value=String(p.recentCount||18);
      const c={...(defaults.customColors||{}),...((p&&p.customColors)||{})};
      $('primaryThemeColor').value=String(c.primaryThemeColor||'#0b111c');
      $('secondaryThemeColor').value=String(c.secondaryThemeColor||'#1f2a3d');
      $('primaryTextColor').value=String(c.primaryTextColor||'#f3f6ff');
      $('secondaryTextColor').value=String(c.secondaryTextColor||'#9eb3d6');
      refreshPresetList();
      syncSwatches();
      applyDeviceChrome(p);
    }
    function collect(){
      return {
        devicePreset:$('devicePreset').value,
        theme:'auto',
        layout:'home-rail',
        showRecent:true,
        recentSource:'albums',
        colorPreset:'ocean',
        recentCount:Number($('recentCount').value||18),
        customColors:{
          primaryThemeColor:String($('primaryThemeColor').value||'#0b111c'),
          secondaryThemeColor:String($('secondaryThemeColor').value||'#1f2a3d'),
          primaryTextColor:String($('primaryTextColor').value||'#f3f6ff'),
          secondaryTextColor:String($('secondaryTextColor').value||'#9eb3d6'),
        }
      };
    }
    function profileToken(p){ return btoa(unescape(encodeURIComponent(JSON.stringify(p)))); }
    async function runBtnAction(btn, fn, opts={}){
      if (!btn) return fn();
      const idle=btn.dataset.idleText||btn.textContent;
      btn.dataset.idleText=idle;
      const busy=opts.busyText||'Working…';
      btn.disabled=true; btn.classList.remove('done','fail'); btn.classList.add('busy'); btn.textContent=busy;
      try {
        const out = await fn();
        btn.classList.remove('busy'); btn.classList.add('done');
        btn.textContent=opts.doneText||'✓ Done';
        setTimeout(()=>{ btn.classList.remove('done'); btn.textContent=idle; btn.disabled=false; }, 900);
        return out;
      } catch (e) {
        btn.classList.remove('busy'); btn.classList.add('fail');
        btn.textContent='✕ Failed';
        setTimeout(()=>{ btn.classList.remove('fail'); btn.textContent=idle; btn.disabled=false; }, 1200);
        throw e;
      }
    }
    function postLiveTheme(){
      const customColors={
        primaryThemeColor:String($('primaryThemeColor')?.value||'#0b111c'),
        secondaryThemeColor:String($('secondaryThemeColor')?.value||'#1f2a3d'),
        primaryTextColor:String($('primaryTextColor')?.value||'#f3f6ff'),
        secondaryTextColor:String($('secondaryTextColor')?.value||'#9eb3d6'),
      };
      try { $('controllerPreview')?.contentWindow?.postMessage({ type:'np-live-theme-update', customColors }, '*'); } catch {}
    }
    let lastSnapshotUrl='';
    async function apply(){
      const p=collect();
      write(p);

      const preset=String(p.devicePreset||'iphone17').toLowerCase();
      const targetPage = preset.startsWith('ipadpro11') ? 'controller-ipad.html' : 'controller-iphone.html';

      // Update preview immediately (don't wait on API save round-trip).
      const qp=new URLSearchParams({preview:'1',profile:profileToken(p),devicePreset:String(p.devicePreset||'iphone17'),sw:String(Date.now())});
      $('controllerPreview').src=targetPage+'?'+qp.toString();

      // Default pushed URL: short canonical route (+ minimal preset so layout is deterministic).
      const pushed=`${location.protocol}//${location.hostname||'10.0.0.4'}:8101/${targetPage}?devicePreset=${encodeURIComponent(String(p.devicePreset||'iphone17'))}`;
      if ($('pushedUrl')) $('pushedUrl').value = pushed;

      // Optional exact snapshot URL.
      const q=new URLSearchParams({profile:profileToken(p),devicePreset:String(p.devicePreset||'iphone17')});
      lastSnapshotUrl = `${location.protocol}//${location.hostname||'10.0.0.4'}:8101/${targetPage}?${q.toString()}`;

      // Persist server-side in background.
      await saveServerProfile(p);
    }
    $('applyBtn').addEventListener('click',()=>runBtnAction($('applyBtn'), apply, {busyText:'Pushing…', doneText:'✓ Pushed'}).catch(()=>null));
    $('copyPushedUrlBtn')?.addEventListener('click', ()=>runBtnAction($('copyPushedUrlBtn'), async ()=>{
      const txt=String($('pushedUrl')?.value||''); if(!txt) throw new Error('empty');
      let ok=false;
      try { await navigator.clipboard.writeText(txt); ok=true; } catch {}
      if (!ok) {
        try { $('pushedUrl')?.focus(); $('pushedUrl')?.select(); ok=!!document.execCommand('copy'); } catch {}
      }
      if (!ok) throw new Error('copy-failed');
    },{busyText:'Copying…',doneText:'✓ Copied'}).catch(()=>alert('Copy URL failed.')));
    $('copySnapshotUrlBtn')?.addEventListener('click', ()=>runBtnAction($('copySnapshotUrlBtn'), async ()=>{
      const txt=String(lastSnapshotUrl||''); if(!txt) throw new Error('empty');
      let ok=false;
      try { await navigator.clipboard.writeText(txt); ok=true; } catch {}
      if (!ok) {
        try { ok=!!document.execCommand('copy'); } catch {}
      }
      if (!ok) throw new Error('copy-failed');
    },{busyText:'Copying…',doneText:'✓ Snapshot copied'}).catch(()=>alert('Copy Snapshot URL failed.')));
    $('resetBtn').addEventListener('click',()=>runBtnAction($('resetBtn'), async ()=>{write({...defaults});ui(defaults);await apply();},{busyText:'Resetting…',doneText:'✓ Reset'}).catch(()=>null));
    ['devicePreset','recentCount'].forEach((id)=>{
      const el=$(id); if(!el) return;
      el.addEventListener('change', ()=>{ syncSwatches(); apply(); });
      el.addEventListener('input', ()=>{ syncSwatches(); apply(); });
    });
    ['primaryThemeColor','secondaryThemeColor','primaryTextColor','secondaryTextColor'].forEach((id)=>{
      const el=$(id); if(!el) return;
      const onLive=async()=>{ syncSwatches(); const p=collect(); write(p); await saveServerProfile(p); postLiveTheme(); };
      el.addEventListener('change', onLive);
      el.addEventListener('input', onLive);
    });
    $('savePresetBtn')?.addEventListener('click', ()=>runBtnAction($('savePresetBtn'), async ()=>{
      const name=prompt('Preset name?');
      if(!name) return;
      const map=getPresets();
      map[String(name).trim()]=collect().customColors;
      setPresets(map); refreshPresetList(); $('presetSel').value=String(name).trim();
    },{busyText:'Saving…',doneText:'✓ Saved'}).catch(()=>null));
    $('deletePresetBtn')?.addEventListener('click', ()=>runBtnAction($('deletePresetBtn'), async ()=>{
      const sel=$('presetSel'); const n=String(sel?.value||'').trim(); if(!n) return;
      if (Object.prototype.hasOwnProperty.call(BUILTIN_PRESETS, n)) { alert('Built-in presets cannot be deleted.'); return; }
      let custom={}; try{ custom=JSON.parse(localStorage.getItem(PRESETS_KEY)||'{}')||{}; }catch{}
      delete custom[n]; setPresets(custom); refreshPresetList(); await apply();
    },{busyText:'Deleting…',doneText:'✓ Deleted'}).catch(()=>null));
    $('presetSel')?.addEventListener('change', async ()=>{
      const n=String($('presetSel').value||'').trim(); if(!n) return;
      const map=getPresets(); const c=map[n]; if(!c) return;
      $('primaryThemeColor').value=String(c.primaryThemeColor||'#0b111c');
      $('secondaryThemeColor').value=String(c.secondaryThemeColor||'#1f2a3d');
      $('primaryTextColor').value=String(c.primaryTextColor||'#f3f6ff');
      $('secondaryTextColor').value=String(c.secondaryTextColor||'#9eb3d6');
      syncSwatches();
      const p=collect(); write(p); await saveServerProfile(p); postLiveTheme();
    });
    const exportModal=$('exportModal');
    const exportJson=$('exportJson');
    $('exportPresetBtn')?.addEventListener('click', ()=>runBtnAction($('exportPresetBtn'), async ()=>{
      const presetName=String($('presetSel')?.value||'').trim() || 'Custom';
      const payload=JSON.stringify({name:presetName,customColors:collect().customColors},null,2);
      if (exportJson) exportJson.value=payload;
      exportModal?.classList.add('open');
      setTimeout(()=>{ try { const txt=String(exportJson?.value||''); exportJson?.focus(); exportJson?.select(); exportJson?.setSelectionRange(0, txt.length); } catch {} }, 0);
    },{busyText:'Opening…',doneText:'✓ Ready'}).catch(()=>null));
    const selectExportAll=()=>{
      try {
        const txt=String(exportJson?.value||'');
        exportJson?.focus();
        exportJson?.select();
        exportJson?.setSelectionRange(0, txt.length);
        return true;
      } catch { return false; }
    };
    $('selectExportBtn')?.addEventListener('click', ()=>{ selectExportAll(); });
    $('copyExportBtn')?.addEventListener('click', ()=>runBtnAction($('copyExportBtn'), async ()=>{
      const txt=String(exportJson?.value||'');
      selectExportAll();
      let ok=false;
      try { await navigator.clipboard.writeText(txt); ok=true; } catch {}
      if (!ok) {
        try { ok = !!document.execCommand('copy'); } catch {}
      }
      if (!ok) throw new Error('copy-failed');
    },{busyText:'Copying…',doneText:'✓ Copied'}).catch(()=>alert('Copy failed. Use Select All then Copy (⌘C / Ctrl+C).')));
    $('closeExportBtn')?.addEventListener('click', ()=>exportModal?.classList.remove('open'));
    exportModal?.addEventListener('click',(ev)=>{ if(ev.target===exportModal) exportModal.classList.remove('open'); });
    $('importPresetBtn')?.addEventListener('click', ()=>runBtnAction($('importPresetBtn'), async ()=>{
      const txt=prompt('Paste preset JSON'); if(!txt) throw new Error('cancel');
      try {
        const j=JSON.parse(txt); const c=j?.customColors||j;
        $('primaryThemeColor').value=String(c.primaryThemeColor||'#0b111c');
        $('secondaryThemeColor').value=String(c.secondaryThemeColor||'#1f2a3d');
        $('primaryTextColor').value=String(c.primaryTextColor||'#f3f6ff');
        $('secondaryTextColor').value=String(c.secondaryTextColor||'#9eb3d6');
        syncSwatches();
        const p=collect(); write(p); await saveServerProfile(p); postLiveTheme();
      } catch { throw new Error('invalid-json'); }
    },{busyText:'Importing…',doneText:'✓ Imported'}).catch((e)=>{ if(!String(e?.message||'').includes('cancel')) alert('Invalid JSON'); }));
    (async ()=>{
      const local = read();
      const server = await loadServerProfile();
      const p = server
        ? {
            ...server,
            ...local,
            // keep explicitly selected local preset unless missing
            devicePreset: (local?.devicePreset ?? server?.devicePreset ?? defaults.devicePreset),
            recentSource: (local?.recentSource ?? server?.recentSource ?? defaults.recentSource),
          }
        : local;
      write(p);
      ui(p);
      await apply();
    })();
  </script>
</body>
</html>

      write(p);
      ui(p);
      await apply();
    })();
  </script>
</body>
