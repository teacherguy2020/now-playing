      async function refreshPeppyAlsaPill(baseOverride = ''){
        const hint = document.getElementById('peppyAlsaHint');
        const host = location.hostname || '10.0.0.233';
        const base = baseOverride || `${location.protocol}//${host}:3101`;
        try {
          if (!runtimeTrackKey) {
            const rr = await fetch(`${base}/config/runtime`, { cache:'no-store' });
            const rj = await rr.json().catch(() => ({}));
            runtimeTrackKey = String(rj?.config?.trackKey || '').trim();
          }
          const [{ r, j }, meter] = await Promise.all([
            fetchJsonWithTimeout(`${base}/config/moode/peppyalsa/status`, {
              headers: { ...(runtimeTrackKey ? { 'x-track-key': runtimeTrackKey } : {}) },
              cache: 'no-store',
            }, 9000),
            fetchJsonWithTimeout(`${base}/peppy/vumeter`, { cache: 'no-store' }, 5000).catch(() => ({ r: { ok: false }, j: null })),
          ]);

          const on = !!(r.ok && j?.ok && j?.enabled === true);
          const fresh = !!(meter?.r?.ok && meter?.j?.ok && meter?.j?.fresh === true);
          const ageMs = Number(meter?.j?.ageMs || 0);

          if (on && fresh) {
            if (hint) hint.textContent = 'on';
            setPillState('peppyAlsaPill', 'ok');
          } else if (on && !fresh) {
            if (hint) hint.textContent = ageMs > 0 ? `stale ${Math.round(ageMs/1000)}s` : 'stale';
            setPillState('peppyAlsaPill', 'warn');

            const now = Date.now();
            const onPeppyPage = String(currentShellPage || '') === 'peppy.html';
            if (onPeppyPage && (now - peppyHealLastAt > 8000)) {
              peppyHealLastAt = now;
              ensurePeppyAlsa(base, 'peppyalsa-stale-heal').catch(() => null);
              fetchJsonWithTimeout(`${base}/config/moode/peppymeter/start`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', ...(runtimeTrackKey ? { 'x-track-key': runtimeTrackKey } : {}) },
                body: JSON.stringify({ reason: 'peppyalsa-stale-heal' }),
              }, 12000).catch(() => null);
            }
          } else {
            if (hint) hint.textContent = 'off';
            setPillState('peppyAlsaPill', 'warn');
          }
          return;
        } catch {}
        if (hint) hint.textContent = 'unknown';
        setPillState('peppyAlsaPill', 'warn');
      }

      async function pushPeppyToMoode(profileOverride = null){
        const host = location.hostname || '10.0.0.233';
        const base = `${location.protocol}//${host}:3101`;
        const targetUrl = `${location.protocol}//${host}:8101/display.html?kiosk=1`;
        const refreshUrl = `${targetUrl}&sw=${Date.now()}`;
        let s = String(lastPeppyProfile?.skin || '').trim();
        let t = String(lastPeppyProfile?.theme || '').trim();
        let mt = String(lastPeppyProfile?.meterType || '').trim();
        let fm = String(lastPeppyProfile?.fontMode || '').trim();
        let fz = String(lastPeppyProfile?.fontSize || '').trim();
        let lsMode = String(lastPeppyProfile?.linearStyle || '').trim();
        let lzMode = String(lastPeppyProfile?.linearSize || '').trim();
        let mm = String(lastPeppyProfile?.meterMode || '').trim();
        let cm = String(lastPeppyProfile?.colorMode || '').trim();

        if (profileOverride && typeof profileOverride === 'object') {
          const po = profileOverride || {};
          if (po.skin) s = String(po.skin).trim();
          if (po.theme) t = String(po.theme).trim();
          if (po.meterType) mt = String(po.meterType).trim();
          if (po.fontMode) fm = String(po.fontMode).trim();
          if (po.fontSize) fz = String(po.fontSize).trim();
          if (po.linearStyle) lsMode = String(po.linearStyle).trim();
          if (po.linearSize) lzMode = String(po.linearSize).trim();
          if (po.meterMode) mm = String(po.meterMode).trim();
          if (po.colorMode) cm = String(po.colorMode).trim();
        }
        try {
          const readLive = () => {
            const f = document.getElementById('appFrame');
            const w = f?.contentWindow;
            const d = w?.document;
            return {
              w,
              s: String(d?.getElementById('skinName')?.value || '').trim(),
              t: String(d?.getElementById('themeName')?.value || '').trim(),
              mt: (d?.getElementById('meterTypeLinear')?.checked ? 'linear' : (d?.getElementById('meterTypeCircular')?.checked ? 'circular' : '')).trim(),
              fm: String(d?.getElementById('fontMode')?.value || '').trim(),
              fz: String(d?.getElementById('fontSize')?.value || '').trim(),
              lsMode: String(d?.getElementById('linearStyle')?.value || '').trim(),
              lzMode: String(d?.getElementById('linearSize')?.value || '').trim(),
            };
          };
          const a = readLive();
          if (a.s) s = a.s;
          if (a.t) t = a.t;
          if (a.mt) mt = a.mt;
          if (a.fm) fm = a.fm;
          if (a.fz) fz = a.fz;
          if (a.lsMode) lsMode = a.lsMode;
          if (a.lzMode) lzMode = a.lzMode;
          // Preset apply can be one tick behind visible UI. Sample once more after a short micro-delay.
          await new Promise((r) => setTimeout(r, 90));
          const b = readLive();
          if (b.s) s = b.s;
          if (b.t) t = b.t;
          if (b.mt) mt = b.mt;
          if (b.fm) fm = b.fm;
          if (b.fz) fz = b.fz;
          if (b.lsMode) lsMode = b.lsMode;
          if (b.lzMode) lzMode = b.lzMode;
          const ls = b.w?.localStorage || a.w?.localStorage;
          if (!s) s = String(ls?.getItem('peppy.skin') || '').trim();
          if (!t) t = String(ls?.getItem('peppy.theme') || '').trim();
          if (!mt) mt = String(ls?.getItem('peppy.meterType') || '').trim();
          if (!fm) fm = String(ls?.getItem('peppy.fontMode') || '').trim();
          if (!fz) fz = String(ls?.getItem('peppy.fontSize') || '').trim();
          if (!lsMode) lsMode = String(ls?.getItem('peppy.linearStyle') || '').trim();
          if (!lzMode) lzMode = String(ls?.getItem('peppy.linearSize') || '').trim();
          if (!mm) mm = String(ls?.getItem('peppy.meterMode') || '').trim();
          if (!cm) cm = String(ls?.getItem('peppy.colorMode') || '').trim();
        } catch {}
        if (!s) s = 'blue-1280';
        if (!t) t = 'midnight-blue';
        if (!mt) mt = 'circular';
        if (!fm) fm = 'ui-sans';
        if (!fz) fz = 'm';
        if (!lsMode) lsMode = 'continuous';
        if (!lzMode) lzMode = 'm';
        // Linear style is the source of truth for pushed linear rendering semantics.
        mm = (lsMode === 'cassette') ? 'segmented' : 'continuous';
        cm = (lsMode === 'continuous-theme') ? 'theme' : 'classic';
        lastPeppyProfile = { ...lastPeppyProfile, skin:s, theme:t, meterType:mt, fontMode:fm, fontSize:fz, linearStyle:lsMode, linearSize:lzMode, meterMode:mm, colorMode:cm, displayMode:'peppy', ts: Date.now() };
        setPushPeppyBusy(true);
        try {
          if (!runtimeTrackKey) {
            const rr = await fetch(`${base}/config/runtime`, { cache:'no-store' });
            const rj = await rr.json().catch(() => ({}));
            runtimeTrackKey = String(rj?.config?.trackKey || '').trim();
          }
          // Persist last pushed profile explicitly (for bare /peppy.html?kiosk=1 resolution).
          await fetchJsonWithTimeout(`${base}/peppy/last-profile`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...(runtimeTrackKey ? { 'x-track-key': runtimeTrackKey } : {}) },
            body: JSON.stringify({
              url: targetUrl,
              skin: s,
              theme: t,
              meterType: mt,
              fontMode: fm,
              fontSize: fz,
              linearStyle: lsMode,
              linearSize: lzMode,
              meterMode: mm,
              colorMode: cm,
              normalization: Number(lastPeppyProfile?.normalization || 100) || 100,
              displayMode: 'peppy',
              playerSize: String(localStorage.getItem('player.profile.size') || '1280x400').trim() || '1280x400',
            }),

          // Ensure peppymeter engine is running so skin VU meters are alive even

          await fetchJsonWithTimeout(`${base}/config/moode/peppymeter/start`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...(runtimeTrackKey ? { 'x-track-key': runtimeTrackKey } : {}) },
            body: JSON.stringify({ reason: 'push-peppy' }),
          }, 12000).catch(() => null);

          // Defensive: keep PeppyALSA enabled for meter data path.
          await fetchJsonWithTimeout(`${base}/config/moode/peppyalsa/ensure`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...(runtimeTrackKey ? { 'x-track-key': runtimeTrackKey } : {}) },
            body: JSON.stringify({ reason: 'push-peppy' }),
          }, 12000).catch(() => null);

          const { r, j } = await fetchJsonWithTimeout(`${base}/config/moode/browser-url`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...(runtimeTrackKey ? { 'x-track-key': runtimeTrackKey } : {}) },
            body: JSON.stringify({ url: refreshUrl }),
          }, 14000);
          if (!r.ok || !j?.ok) throw new Error(j?.error || `HTTP ${r.status}`);
          const btn = document.getElementById('pushPeppyBtn');

            btn.title = String(j?.effectiveUrl || targetUrl);
            setTimeout(() => { try { btn.textContent = 'Push skin to moOde'; } catch {} }, 2200);
          }
          // Keep current editor surface intact after push.

          if (!j?.verified) console.warn('push verification failed', j?.verify || '', j?.verifyErr || '');
        } catch (e) {

          if (btn) {

            setTimeout(() => { try { btn.textContent = 'Push skin to moOde'; } catch {} }, 1800);

        }

        } catch {
          setPillState('apiPill','bad');
          setPillState('webPill','warn');
          setPillState('alexaPill','warn');
          setPillState('moodePill','warn');
          const ap = document.getElementById('alexaPill');
          if (ap) ap.style.display = 'none';
          await refreshPeppyPill();
          await refreshPeppyAlsaPill();
          refreshScreenPill();
          scrobbleControlsEnabled = false;
          const sp = document.getElementById('scrobblePill');
          if (sp) sp.style.display = 'none';
          const np = document.getElementById('notifyPill');
          if (np) np.style.display = 'none';
        }
      }

      function getPageFromUrl() {
        const u = new URL(location.href);
        const p = String(u.searchParams.get('page') || 'config.html').trim();
        if (!moodeDisplayTakeoverEnabled && (p === 'peppy.html' || p === 'player.html')) return 'config.html';
        return VALID.has(p) ? p : 'config.html';
      }

      function setActive(page){
        tabs.forEach((a) => a.classList.toggle('active', a.dataset.page === page));
      }

      function peppyProfileFromActivePreset(){
        try {
          return {
            skin: String(localStorage.getItem('peppy.skin') || '').trim(),
            theme: String(localStorage.getItem('peppy.theme') || '').trim(),
          };
        } catch { return { skin:'', theme:'' }; }
      }

      function dockPeppyTechRow(enabled){
        const dock = document.getElementById('peppyTechDock');
        const anchor = document.getElementById('peppyTechAnchor');
        const actionAnchor = document.getElementById('peppyActionAnchor');
        const adv = document.getElementById('displayAdvanced');
        const hint = document.getElementById('targetUrlHint');
        const pills = document.getElementById('statusInline');
        const controlsRow = document.getElementById('peppyTechControlsRow');
        const pillsRow = document.getElementById('peppyTechPillsRow');
        const moodeBtn = document.getElementById('showMoodeUiBtn');
        const playerBtn = document.getElementById('showPlayerBtn');
        const refBtn = document.getElementById('refreshDisplayBtn');
        if (!dock || !anchor || !adv || !hint || !pills || !actionAnchor || !controlsRow || !pillsRow) return;

        if (enabled) {
          dock.style.display = 'flex';
          if (moodeBtn && moodeBtn.parentElement !== controlsRow) controlsRow.appendChild(moodeBtn);
          if (playerBtn && playerBtn.parentElement !== controlsRow) controlsRow.appendChild(playerBtn);
          if (refBtn && refBtn.parentElement !== controlsRow) controlsRow.appendChild(refBtn);
          if (adv.parentElement !== controlsRow) controlsRow.appendChild(adv);
          if (hint.parentElement !== controlsRow) controlsRow.appendChild(hint);
          if (pills.parentElement !== pillsRow) pillsRow.appendChild(pills);
          adv.style.marginLeft = '0';
          hint.style.marginLeft = '0';
        } else {
          dock.style.display = 'none';
          const parent = actionAnchor.parentElement;
          if (moodeBtn && moodeBtn.parentElement !== parent) parent.insertBefore(moodeBtn, actionAnchor);
          if (playerBtn && playerBtn.parentElement !== parent) parent.insertBefore(playerBtn, actionAnchor);
          if (refBtn && refBtn.parentElement !== parent) parent.insertBefore(refBtn, actionAnchor);
          if (adv.parentElement !== anchor.parentElement) anchor.parentElement.insertBefore(adv, anchor.nextSibling);
          if (hint.parentElement !== anchor.parentElement) anchor.parentElement.insertBefore(hint, adv.nextSibling);
          if (pills.parentElement !== anchor.parentElement) anchor.parentElement.appendChild(pills);
          adv.style.marginLeft = '8px';
          hint.style.marginLeft = '8px';
        }
      }

      function refreshPushPeppyVisibility(){ 
        const page = String(currentShellPage || '');
        const peppyPage = (page === 'peppy.html');
        const show = moodeDisplayTakeoverEnabled && (page === 'player.html');
        const btn = document.getElementById('pushPeppyBtn');
        const moodeBtn = document.getElementById('showMoodeUiBtn');
        const playerBtn = document.getElementById('showPlayerBtn');
        const refBtn = document.getElementById('refreshDisplayBtn');
        const adv = document.getElementById('displayAdvanced');
        const fixBtn = document.getElementById('fixTargetBtn');
        const natBtn = document.getElementById('nativePeppyBtn');
        if (btn) btn.style.display = 'none';
        if (moodeBtn) moodeBtn.style.display = show ? '' : 'none';
        if (playerBtn) playerBtn.style.display = 'none';
        if (refBtn) refBtn.style.display = show ? '' : 'none';
        if (adv) adv.style.display = show ? '' : 'none';
        if (fixBtn) fixBtn.style.display = show ? '' : 'none';
        if (natBtn) natBtn.style.display = show ? '' : 'none';
        dockPeppyTechRow(false);
      }

      function applyHeroQuickSearchToQueueWizard(qRaw = '') {
        try {
          if (!frame || String(currentShellPage || '') !== 'queue-wizard.html') return false;
          const doc = frame.contentDocument;
          if (!doc) return false;
          const inp = doc.getElementById('filterQuickSearch');
          if (!inp) return false;
          inp.value = String(qRaw || '');
          inp.dispatchEvent(new Event('input', { bubbles: true }));
          return true;
        } catch {
          return false;
        }
      }

      function escHtml(s = '') {
        return String(s).replace(/[&<>'"]/g, (ch) => ({ '&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;' }[ch] || ch));
      }

      function ensureHeroQuickPortal() {
        if (!heroQuickSearchResults) return;
        if (heroQuickSearchResults.parentElement !== document.body) {
          document.body.appendChild(heroQuickSearchResults);
        }
      }

      function positionHeroQuickResults() {
        if (!heroQuickSearchResults || !heroQuickSearch) return;
        ensureHeroQuickPortal();
        const r = heroQuickSearch.getBoundingClientRect();
        heroQuickSearchResults.style.left = `${Math.round(r.left)}px`;
        heroQuickSearchResults.style.top = `${Math.round(r.bottom + 6)}px`;
        heroQuickSearchResults.style.width = `${Math.round(r.width)}px`;
      }

      function hideHeroQuickResults() {
        if (!heroQuickSearchResults) return;
        heroQuickSearchResults.style.display = 'none';
        heroQuickSearchResults.innerHTML = '';
      }

      async function loadHeroQuickIndex(force = false) {
        const now = Date.now();
        if (!force && heroQuickIndex.length && (now - heroQuickLoadedAt) < 5 * 60 * 1000) return;
        const host = location.hostname || '10.0.0.233';
        const base = `${location.protocol}//${host}:3101`;
        try {
          if (!runtimeTrackKey) {
            const rr = await fetch(`${base}/config/runtime`, { cache:'no-store' });
            const rj = await rr.json().catch(() => ({}));
            runtimeTrackKey = String(rj?.config?.trackKey || '').trim();
          }
          const headers = runtimeTrackKey ? { 'x-track-key': runtimeTrackKey } : {};
          const [optR, plR] = await Promise.all([
            fetch(`${base}/config/queue-wizard/options`, { headers, cache:'no-store' }),
            fetch(`${base}/config/queue-wizard/playlists`, { headers, cache:'no-store' }),
          ]);
          const optJ = await optR.json().catch(() => ({}));
          const plJ = await plR.json().catch(() => ({}));
          if (!optR.ok || !optJ?.ok) throw new Error(optJ?.error || `HTTP ${optR.status}`);

          const pack = (arr, type) => (Array.isArray(arr) ? arr : []).map((v) => {
            const isObj = !!v && typeof v === 'object';
            const value = String(isObj ? (v.value ?? v.label ?? '') : (v ?? '')).trim();
            const label = String(isObj ? (v.label ?? v.value ?? '') : (v ?? '')).trim();
            const text = label || value;
            return { type, value, label: text, lower: text.toLowerCase() };
          }).filter((x) => x.value && x.label);

          heroQuickIndex = [
            ...pack(optJ.genres, 'Genre'),
            ...pack(optJ.artists, 'Artist'),
            ...pack(optJ.albums, 'Album'),
            ...pack(optJ.genres, 'Exclude genre'),
            ...pack(plJ.playlists, 'Playlist'),
          ];
          heroQuickLoadedAt = Date.now();
        } catch {
          heroQuickIndex = [];
        }
      }

      function heroQuickMapKey(type){
        const t = String(type || '');
        if (t === 'Genre') return 'genres';
        if (t === 'Artist') return 'artists';
        if (t === 'Album') return 'albums';
        if (t === 'Exclude genre') return 'excludeGenres';
        if (t === 'Playlist') return 'playlist';
        return '';
      }

      function isHeroQuickSelected(type, value){
        const k = heroQuickMapKey(type);
        const v = String(value || '');
        if (!k || !v) return false;
        if (k === 'playlist') return String(heroQuickSelected.playlist || '') === v;
        const s = heroQuickSelected[k];
        return !!(s && s.has && s.has(v));
      }

      function toggleHeroQuickSelection(type, value){
        const k = heroQuickMapKey(type);
        const v = String(value || '');
        if (!k || !v) return;
        if (k === 'playlist') {
          heroQuickSelected.playlist = (String(heroQuickSelected.playlist || '') === v) ? '' : v;
          return;
        }
        const s = heroQuickSelected[k];
        if (!s || !s.has) return;
        if (s.has(v)) s.delete(v);
        else s.add(v);
      }

      function applyQuickPickInQueueWizard(type, value) {
        try {
          if (!frame || String(currentShellPage || '') !== 'queue-wizard.html') return false;
          const doc = frame.contentDocument;
          if (!doc) return false;
          const map = {
            'Genre': 'genres',
            'Artist': 'artists',
            'Album': 'albums',
            'Exclude genre': 'excludeGenres',
            'Playlist': 'existingPlaylists',
          };
          const id = map[String(type || '')];
          if (!id) return false;
          const sel = doc.getElementById(id);
          if (!sel) return false;

          if (String(type) === 'Playlist') {
            sel.value = String(value || '');
            sel.dispatchEvent(new Event('change', { bubbles: true }));
            return true;
          }

          let matched = false;
          Array.from(sel.options || []).forEach((o) => {
            if (String(o.value || '') === String(value || '')) {
              o.selected = true;
              matched = true;
            }
          });
          if (matched) sel.dispatchEvent(new Event('change', { bubbles: true }));
          return matched;
        } catch {
          return false;
        }
      }

      function heroQuickPreviewBody(type, value) {
        const t = String(type || '');
        const v = String(value || '').trim();
        const body = {
          genres: Array.from(heroQuickSelected.genres || []),
          artists: Array.from(heroQuickSelected.artists || []),
          albums: Array.from(heroQuickSelected.albums || []),
          excludeGenres: Array.from(heroQuickSelected.excludeGenres || []),
          minRating: 0,
          maxTracks: 200,
        };
        if (!v) return body;
        if (t === 'Genre' && !body.genres.includes(v)) body.genres.push(v);
        else if (t === 'Artist' && !body.artists.includes(v)) body.artists.push(v);
        else if (t === 'Album' && !body.albums.includes(v)) body.albums.push(v);
        else if (t === 'Exclude genre' && !body.excludeGenres.includes(v)) body.excludeGenres.push(v);
        return body;
      }

      async function runHeroQuickAction(type, value, action = 'add') {
        const host = location.hostname || '10.0.0.233';
        const base = `${location.protocol}//${host}:3101`;
        try {
          if (!runtimeTrackKey) {
            const rr = await fetch(`${base}/config/runtime`, { cache:'no-store' });
            const rj = await rr.json().catch(() => ({}));
            runtimeTrackKey = String(rj?.config?.trackKey || '').trim();
          }
          const headers = { 'Content-Type': 'application/json', ...(runtimeTrackKey ? { 'x-track-key': runtimeTrackKey } : {}) };

          let tracks = [];
          if (String(type || '') === 'Playlist') {
            const pr = await fetch(`${base}/config/queue-wizard/playlist-preview?playlist=${encodeURIComponent(String(value || ''))}`, { headers: runtimeTrackKey ? { 'x-track-key': runtimeTrackKey } : {}, cache:'no-store' });
            const pj = await pr.json().catch(() => ({}));
            if (!pr.ok || !pj?.ok) throw new Error(pj?.error || `HTTP ${pr.status}`);
            tracks = Array.isArray(pj.tracks) ? pj.tracks : [];
          } else {
            const previewBody = heroQuickPreviewBody(type, value);
            const pr = await fetch(`${base}/config/queue-wizard/preview`, { method:'POST', headers, body: JSON.stringify(previewBody) });
            const pj = await pr.json().catch(() => ({}));
            if (!pr.ok || !pj?.ok) throw new Error(pj?.error || `HTTP ${pr.status}`);
            tracks = Array.isArray(pj.tracks) ? pj.tracks.map((t) => String(t?.file || '').trim()).filter(Boolean) : [];
          }
          if (!tracks.length) throw new Error('No tracks found');

          const replace = String(action) === 'play';
          const ar = await fetch(`${base}/config/queue-wizard/apply`, {
            method:'POST',
            headers,
            body: JSON.stringify({
              mode: replace ? 'replace' : 'append',
              keepNowPlaying: false,
              tracks,
              shuffle: false,
              forceRandomOff: true,
              fastStart: replace,
            })
          });
          const aj = await ar.json().catch(() => ({}));
          if (!ar.ok || !aj?.ok) throw new Error(aj?.error || `HTTP ${ar.status}`);
          try { syncHeroQueue(); } catch {}
        } catch (e) {
          console.warn('hero quick action failed', e?.message || e);
        }
      }

      function renderHeroQuickResults(qRaw = '') {
        if (!heroQuickSearchResults) return;
        const q = String(qRaw || '').trim().toLowerCase();
        if (!q) { hideHeroQuickResults(); return; }

        const typeOrder = ['Genre', 'Artist', 'Album', 'Playlist', 'Exclude genre'];
        const typeColor = {
          'Genre': 'rgba(56,189,248,.20)',
          'Artist': 'rgba(34,197,94,.20)',
          'Album': 'rgba(168,85,247,.22)',
          'Playlist': 'rgba(244,114,182,.22)',
          'Exclude genre': 'rgba(245,158,11,.20)',
        };

        const scored = heroQuickIndex.map((x) => {
          const i = x.lower.indexOf(q);
          if (i < 0) return null;
          const score = (i === 0 ? 0 : 10) + i;
          return { ...x, score };
        }).filter(Boolean).sort((a,b) => a.score - b.score).slice(0, 120);

        if (!scored.length) {
          positionHeroQuickResults();
          heroQuickSearchResults.style.display = 'block';
          heroQuickSearchResults.innerHTML = '<div class="muted" style="padding:6px 8px;">No matches.</div>';
          return;
        }

        const byType = new Map();
        for (const t of typeOrder) byType.set(t, []);
        for (const row of scored) {
          if (!byType.has(row.type)) byType.set(row.type, []);
          byType.get(row.type).push(row);
        }

        const chunks = [];
        for (const t of typeOrder) {
          const rows = (byType.get(t) || []).slice(0, 12);
          if (!rows.length) continue;
          const pillBg = typeColor[t] || 'rgba(148,163,184,.2)';
          chunks.push(`<div style="padding:4px 6px 6px;"><div style="font-size:12px;font-weight:700;color:var(--theme-text);margin:2px 0 6px;"><span style="display:inline-block;padding:2px 8px;border-radius:999px;background:${pillBg};border:1px solid #2a3a58;">${escHtml(t)}</span></div>`
            + rows.map((x) => {
                const selected = isHeroQuickSelected(x.type, x.value);
                return `<div style="display:flex;align-items:center;gap:6px;">`
                  + `<button type="button" data-hero-quick-type="${escHtml(x.type)}" data-hero-quick-value="${escHtml(x.value)}" style="flex:1 1 auto;min-width:0;display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 10px;border:0;background:${selected ? 'rgba(34,197,94,.10)' : 'transparent'};color:var(--theme-text);text-align:left;border-radius:8px;cursor:pointer;">`
                  + `<span style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(x.label)}</span>`
                  + `<span style="font-size:11px;white-space:nowrap;opacity:.88;padding:1px 6px;border-radius:999px;background:${pillBg};">${escHtml(x.type)}</span>`
                  + `</button>`
                  + `<button type="button" data-hero-quick-add="1" data-hero-quick-type="${escHtml(x.type)}" data-hero-quick-value="${escHtml(x.value)}" title="Add filter" style="flex:0 0 auto;width:30px;height:30px;border-radius:8px;border:1px solid ${selected ? 'rgba(34,197,94,.7)' : '#2a3a58'};background:${selected ? 'rgba(34,197,94,.22)' : pillBg};color:${selected ? '#22c55e' : 'var(--theme-text)'};cursor:pointer;font-weight:700;line-height:1;">${selected ? '✓' : '+'}</button>`
                  + `<button type="button" data-hero-quick-action="play" data-hero-quick-type="${escHtml(x.type)}" data-hero-quick-value="${escHtml(x.value)}" title="Replace queue and play" style="flex:0 0 auto;width:30px;height:30px;border-radius:8px;border:1px solid #2a3a58;background:rgba(59,130,246,.18);color:#dbeafe;cursor:pointer;font-weight:700;line-height:1;">▶</button>`
                  + `<button type="button" data-hero-quick-action="add" data-hero-quick-type="${escHtml(x.type)}" data-hero-quick-value="${escHtml(x.value)}" title="Add to queue" style="flex:0 0 auto;width:30px;height:30px;border-radius:8px;border:1px solid #2a3a58;background:rgba(34,197,94,.18);color:#dcfce7;cursor:pointer;font-weight:700;line-height:1;">＋</button>`
                + `</div>`;
              }).join('')
            + `</div>`);
        }

        heroQuickSearchResults.innerHTML = chunks.join('');
        positionHeroQuickResults();
        heroQuickSearchResults.style.display = 'block';
      }

      function syncHeroQuickSearchHint() {
        if (!heroQuickSearch) return;
        heroQuickSearch.title = (String(currentShellPage || '') === 'queue-wizard.html')
          ? 'Quick search in Queue Wizard'
          : 'Press Enter to open Queue Wizard and search';
      }

      function navigate(page, push = true){
        const safe = VALID.has(page) ? page : 'config.html';
        try { window.scrollTo({ top: 0, left: 0, behavior: 'instant' }); } catch { try { window.scrollTo(0,0); } catch {} }
        currentShellPage = safe;
        try { document.body.classList.toggle('peppy-shell', safe === 'peppy.html'); } catch {}
        setActive(safe);
        refreshPushPeppyVisibility();
        syncHeroQuickSearchHint();
        updateSavePresetsButtonVisibility();
        if (safe === 'peppy.html') {
          setTimeout(() => { checkMoodeTargetUrl().catch(() => {}); }, 150);
          setTimeout(() => { ensurePeppyAlsa('', 'peppy-tab-open').then(() => refreshPeppyAlsaPill()).catch(() => {}); }, 220);
          setTimeout(() => { refreshPeppyAlsaPill().catch(() => {}); }, 1800);
        }
        if (!NO_IFRAME_MODE && frame) {
          let src = `${safe}${safe.includes('?') ? '&' : '?'}shellts=${Date.now()}`;
          if (safe === 'peppy.html') {
            const p = peppyProfileFromActivePreset();
            const q = new URLSearchParams();
            q.set('shellts', String(Date.now()));
            if (p.skin) q.set('skin', p.skin);
            if (p.theme) q.set('theme', p.theme);
            src = `peppy.html?${q.toString()}`;
            enforcePeppyFrameFit();
          } else {
            // Leaving Peppy: clear hard clamps so other pages can size naturally.
            frame.style.removeProperty('max-height');
            frame.style.removeProperty('min-height');
            frame.style.removeProperty('height');
          }
          frame.setAttribute('src', src);
          setTimeout(requestFrameHeightSync, 120);
          setTimeout(requestFrameHeightSync, 500);
          if (safe === 'queue-wizard.html' && heroQuickSearch && String(heroQuickSearch.value || '').trim()) {
            const q = String(heroQuickSearch.value || '').trim();
            setTimeout(() => { try { applyHeroQuickSearchToQueueWizard(q); } catch {} }, 260);
            setTimeout(() => { try { applyHeroQuickSearchToQueueWizard(q); } catch {} }, 700);
          }
        }
        if (push) {
          const u = new URL(location.href);
          u.searchParams.set('page', safe);
          if (NO_IFRAME_MODE) u.searchParams.set('noiframe', '1');
          history.pushState({ page: safe }, '', u);
        }
      }

      tabs.forEach((a) => a.addEventListener('click', (ev) => {
        ev.preventDefault();
        navigate(a.dataset.page || 'config.html', true);
      }));

      heroQuickSearch?.addEventListener('focus', async () => {
        await loadHeroQuickIndex(false);
        renderHeroQuickResults(String(heroQuickSearch.value || ''));
      });

      heroQuickSearch?.addEventListener('input', async () => {
        const q = String(heroQuickSearch.value || '');
        await loadHeroQuickIndex(false);
        renderHeroQuickResults(q);
        if (String(currentShellPage || '') === 'queue-wizard.html') {
          applyHeroQuickSearchToQueueWizard(q);
        }
      });

      heroQuickSearchResults?.addEventListener('click', (ev) => {
        ev.stopPropagation();
        const btn = ev.target instanceof Element ? ev.target.closest('button[data-hero-quick-type][data-hero-quick-value]') : null;
        if (!btn) return;
        const type = String(btn.getAttribute('data-hero-quick-type') || '');
        const value = String(btn.getAttribute('data-hero-quick-value') || '');
        const action = String(btn.getAttribute('data-hero-quick-action') || '').trim().toLowerCase();
        const isAddFilter = btn.hasAttribute('data-hero-quick-add');
        if (heroQuickSearch) heroQuickSearch.value = value;

        if (isAddFilter) {
          toggleHeroQuickSelection(type, value);
          if (String(currentShellPage || '') === 'queue-wizard.html') applyQuickPickInQueueWizard(type, value);
          renderHeroQuickResults(String(heroQuickSearch?.value || ''));
          return;
        }

        if (action === 'play' || action === 'add') {
          runHeroQuickAction(type, value, action);
          renderHeroQuickResults(String(heroQuickSearch?.value || ''));
          return;
        }

        toggleHeroQuickSelection(type, value);
        if (String(currentShellPage || '') === 'queue-wizard.html') {
          applyQuickPickInQueueWizard(type, value);
        }
        renderHeroQuickResults(String(heroQuickSearch?.value || ''));
      });

      document.addEventListener('click', (ev) => {
        const t = ev.target instanceof Element ? ev.target : null;
        if (!t) return;
        if (t.closest('#heroQuickSearch') || t.closest('#heroQuickSearchResults')) return;
        if (heroQuickSearch) heroQuickSearch.value = '';
        hideHeroQuickResults();
      });
      window.addEventListener('resize', () => {
        if (heroQuickSearchResults && heroQuickSearchResults.style.display === 'block') positionHeroQuickResults();
      });
      window.addEventListener('scroll', () => {
        if (heroQuickSearchResults && heroQuickSearchResults.style.display === 'block') positionHeroQuickResults();
      }, { passive:true });

      heroQuickSearch?.addEventListener('keydown', (ev) => {
        if (ev.key !== 'Enter') return;
        ev.preventDefault();
        const q = String(heroQuickSearch.value || '').trim();
        if (!q) return;
        if (String(currentShellPage || '') === 'queue-wizard.html') {
          applyHeroQuickSearchToQueueWizard(q);
        }
      });

      syncHeroQuickSearchHint();

      let heroNowPlayingIframeMoode = false;
      let heroNowPlayingMoodeFallbackTimer = null;
      let heroNowPlayingMoodeFrameLoaded = false;
      document.getElementById('heroNowPlayingTitle')?.addEventListener('click', (ev) => {
        ev.preventDefault();
        const moodeUrl = 'http://moode.local/index.php';
        if (NO_IFRAME_MODE || !frame) {
          window.location.href = moodeUrl;
          return;
        }
        if (!heroNowPlayingIframeMoode) {
          heroNowPlayingMoodeFrameLoaded = false;
          if (heroNowPlayingMoodeFallbackTimer) clearTimeout(heroNowPlayingMoodeFallbackTimer);
          // moOde UI needs native iframe scrolling for large library views (Album/Artist lists).
          frame.setAttribute('scrolling', 'yes');
          frame.style.height = 'calc(100vh - 220px)';
          frame.style.minHeight = '680px';
          frame.setAttribute('src', moodeUrl);
          heroNowPlayingIframeMoode = true;
          heroNowPlayingMoodeFallbackTimer = setTimeout(() => {
            if (heroNowPlayingIframeMoode && !heroNowPlayingMoodeFrameLoaded) {
              window.location.href = moodeUrl;
            }
          }, 2200);
          return;
        }
        if (heroNowPlayingMoodeFallbackTimer) clearTimeout(heroNowPlayingMoodeFallbackTimer);
        heroNowPlayingMoodeFallbackTimer = null;
        heroNowPlayingMoodeFrameLoaded = false;
        heroNowPlayingIframeMoode = false;
        frame.setAttribute('scrolling', 'no');
        frame.style.height = '1400px';
        frame.style.minHeight = '0';
        navigate(currentShellPage || getPageFromUrl(), false);
      });

      document.getElementById('apiPill')?.addEventListener('click', (ev) => {
        ev.preventDefault();
        restartApiFromPill();
      });

      document.getElementById('webPill')?.addEventListener('click', (ev) => {
        ev.preventDefault();
        restartWebFromPill();
      });

      document.getElementById('alexaPill')?.addEventListener('click', (ev) => {
        ev.preventDefault();
        toggleAlexaPause();

      async function openQueueTrackMetaModal({ title = '', artist = '', album = '', art = '', file = '', genre = '', date = '', track = '', time = '', rating = 0, personnel = '', bitrate = '', samplerate = '', bitdepth = '', codec = '' } = {}){
        if (!queueAlbumModal || !queueAlbumBody) return;
        const t = String(title || '').trim() || '(unknown title)';
        const a = String(artist || '').trim() || '(unknown artist)';
        const alb = String(album || '').trim();
        const artUrl = String(art || '').trim();
        const f = String(file || '').trim();
        let g = String(genre || '').trim();
        let d = String(date || '').trim();
        let tr = String(track || '').trim();
        let tm = String(time || '').trim();
        let ppl = String(personnel || '').trim();
        let br = String(bitrate || '').trim();
        let sr = String(samplerate || '').trim();
        let bd = String(bitdepth || '').trim();
        let co = String(codec || '').trim();
        const r = Math.max(0, Math.min(5, Number(rating || 0) || 0));

        if (f) {
          try {
            const j = await sendHeroPlayback('trackmeta', { file: f });
            const m = j?.meta || {};
            if (!g) g = String(m.genre || '').trim();
            if (!d) d = String(m.date || '').trim();
            if (!tr) tr = String(m.track || '').trim();
            if (!tm) tm = String(m.time || '').trim();
            if (!ppl) ppl = String(m.personnel || '').trim() || [String(m.performer || '').trim(), String(m.composer || '').trim()].filter(Boolean).join(' • ');
            const ai = m.audioInfo || {};
            if (!co) co = String(ai.codec || '').trim();
            if (!sr) {
              const v = String(ai.sample_rate || '').trim();
              if (v) sr = Number(v) > 2000 ? `${Math.round(Number(v)/1000)} kHz` : v;
            }
            if (!bd) {
              const v = String(ai.bits || '').trim();
              if (v) bd = `${v}-bit`;
            }
            if (!br) {
              const v = String(ai.bit_rate || '').trim();
              if (v) br = v;
            }
            const aud = String(m.audio || '').trim();
            if (aud && !co && !bd && !sr && !br) {
              const mm = aud.match(/(\d+)\s*:\s*(\d+)\s*:\s*(\d+)/);
              if (mm) {
                if (!sr) sr = `${mm[1]} Hz`;
                if (!bd) bd = `${mm[2]}-bit`;
                if (!co) co = `ch ${mm[3]}`;
              } else if (!co) {
                co = aud;
              }
            }
          } catch {}
        }

        queueAlbumBody.innerHTML =
          `${artUrl ? `<img src="${artUrl}" alt="">` : '<div style="width:120px;height:120px;border-radius:10px;border:1px solid #334;background:#0a1222"></div>'}` +
          `<div class="queueAlbumMeta">` +
            `<div class="queueAlbumTitle">${t}</div>` +
            `<div class="queueAlbumSub"><b>Track metadata</b> · Source: MPD lookup</div>` +
            `<div class="queueAlbumSub">Artist: ${a}</div>` +
            `<div class="queueAlbumSub">Album: ${alb ? `<button type="button" class="queueAlbumLineBtn" data-queue-album="${encodeURIComponent(alb)}" data-queue-artist="${encodeURIComponent(a)}" data-queue-title="${encodeURIComponent(t)}" data-queue-art="${encodeURIComponent(artUrl)}">${alb}</button>` : '—'}</div>` +
            `<div class="queueAlbumSub">Rating: ${'★'.repeat(r)}${'☆'.repeat(5-r)}</div>` +
            `<div class="queueAlbumSub">Track #: ${tr || '—'}</div>` +
            `<div class="queueAlbumSub">Year/Date: ${d || '—'}</div>` +
            `<div class="queueAlbumSub">Genre: ${g || '—'}</div>` +
            `<div class="queueAlbumSub">Length: ${tm || '—'}</div>` +
            `<div class="queueAlbumSub" style="white-space:normal;">Personnel:</div>` +
            `${ppl
              ? `<div class="queueAlbumSub" style="white-space:normal;max-height:130px;overflow:auto;padding:8px 10px;border:1px solid color-mix(in oklab,var(--theme-tab-border) 70%, transparent);border-radius:10px;background:color-mix(in oklab,var(--theme-tab-bg) 70%, transparent);">${String(ppl).split(/\s*(?:•|;|\|)\s*/).filter(Boolean).map((s)=>`<div style="margin:0 0 4px 0;">• ${s}</div>`).join('')}</div>`
              : `<div class="queueAlbumSub">—</div>`}` +
            `<div class="queueAlbumSub">Audio: ${[co, (bd&&sr)?`${bd}/${sr}`:(bd||sr), br?`${br} kbps`:'' ].filter(Boolean).join(' • ') || '—'}</div>` +
            `<div class="queueAlbumSub" style="word-break:break-all;">File: ${f || '—'}</div>` +
          `</div>`;

        queueAlbumModal.classList.add('open');
        queueAlbumModal.setAttribute('aria-hidden', 'false');
      }

        const trk = el.closest('button[data-track-action][data-track-file]');
        if (trk) {

        const artistAction = el.closest('button[data-artist-action][data-artist]');
        if (artistAction) {
          const artist = decodeURIComponent(String(artistAction.getAttribute('data-artist') || ''));

            setTimeout(() => setQueueExpandLoading(false), 650);
            setTimeout(() => { try { syncHeroQueue(); } catch {} }, 0);
            setTimeout(() => { try { syncHeroQueue(); } catch {} }, 260);
          } catch {}
          return;
        }

        if (d.type === 'np-theme-export') {
          const json = String(d.json || '').trim();
          const fileName = String(d.fileName || 'now-playing-theme.json').trim() || 'now-playing-theme.json';
          if (!json) return;
          (async () => {
            try {
              if (navigator.share) {
                try {
                  const file = new File([json], fileName, { type: 'application/json' });
                  if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ title:'Now Playing Theme', text:'Theme export JSON', files:[file] });
                    return;
                  }
                  await navigator.share({ title:'Now Playing Theme', text: json });
                  return;
                } catch (e) {
                  if (String(e?.name || '') === 'AbortError') return;
                }
              }
              try { await navigator.clipboard.writeText(json); } catch {}
            } catch {}
          })();
          return;
        }

        if (d.type === 'np-frame-height') {
          const isTheme = String(currentShellPage || '') === 'theme.html';
          const minH = isTheme ? 220 : 480;
          const h = Math.max(minH, Number(d.height || 0) + (isTheme ? 2 : 14));
          if (Number.isFinite(h) && h > 0) {
            const cur = Math.max(0, parseInt(String(frame.style.height || '0'), 10) || 0);
            if (Math.abs(cur - h) > 4) frame.style.height = `${h}px`;
          }
          return;
        }

        if (d.type === 'np-theme-updated') {
          try {
            if (Date.now() < suppressThemeUpdateUntil) return;
            const tokens = d.tokens && typeof d.tokens === 'object' ? d.tokens : {};
            localStorage.setItem(THEME_TOKENS_KEY, JSON.stringify(tokens));
            applyThemeTokens(tokens);
            refreshQuickThemeSelect();
            syncMatrixFx();
            const m = String(d.mode || '').toLowerCase();
            if (m === 'light' || m === 'dark') {
              const isLight = (m === 'light');
              document.body.classList.toggle('theme-light', isLight);
              try { localStorage.setItem('np-theme', isLight ? 'light' : 'dark'); } catch {}
            }
            syncThemeToFrame();
          } catch {}
          return;
        }
      });

      if (NO_IFRAME_MODE) {
        try {
          const allFrames = Array.from(document.querySelectorAll('iframe'));
          allFrames.forEach((fr) => {
            try { fr.removeAttribute('src'); } catch {}
            try { fr.removeAttribute('srcdoc'); } catch {}
            try { fr.style.display = 'none'; } catch {}
            try { fr.remove(); } catch {}
          });
        } catch {}
      }
      syncFrameWidth();
      hydratePeppyProfileFromLastPush().catch(() => {});
      navigate(getPageFromUrl(), false);
      syncPills();
      // Prioritize transport controls/hero paint first; queue can load just after.
      setTimeout(() => { if (!document.hidden) syncHeroQueue(); }, 650);
      setInterval(() => { if (!document.hidden) syncPills(); }, 30000);
      setInterval(() => {
        if (document.hidden) return;
        if (String(currentShellPage || '') !== 'peppy.html') return;
        refreshPeppyAlsaPill().catch(() => {});
      }, 5000);
      setInterval(() => { if (!document.hidden) syncHeroQueue(); }, 7000);
      // Fallback safety net; primary sizing is ResizeObserver/MutationObserver based.
      if (!NO_IFRAME_MODE) setInterval(() => { if (!document.hidden) requestFrameHeightSync(); }, 8000);
    })();
  </script>
</body>
</html>
