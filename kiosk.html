<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kiosk</title>
  <style>html,body{margin:0;background:#060b16;height:100%}</style>
</head>
<body>
  <script>
    (()=>{
      const src = new URL(location.href);
      const dst = new URL('controller.html', location.href);
      const KIOSK_PROFILE_KEY = 'nowplaying.kiosk.profile.v1';

      const incoming = {
        theme: String(src.searchParams.get('theme') || '').trim(),
        colorPreset: String(src.searchParams.get('colorPreset') || '').trim(),
        recentSource: String(src.searchParams.get('recentSource') || '').trim(),
        primaryThemeColor: String(src.searchParams.get('primaryThemeColor') || '').trim(),
        secondaryThemeColor: String(src.searchParams.get('secondaryThemeColor') || '').trim(),
        primaryTextColor: String(src.searchParams.get('primaryTextColor') || '').trim(),
        secondaryTextColor: String(src.searchParams.get('secondaryTextColor') || '').trim(),
      };

      let saved = {};
      try { saved = JSON.parse(localStorage.getItem(KIOSK_PROFILE_KEY) || '{}') || {}; } catch {}

      const resolved = {
        theme: incoming.theme || String(saved.theme || '').trim(),
        colorPreset: incoming.colorPreset || String(saved.colorPreset || '').trim(),
        recentSource: incoming.recentSource || String(saved.recentSource || '').trim(),
        primaryThemeColor: incoming.primaryThemeColor || String(saved?.customColors?.primaryThemeColor || '').trim(),
        secondaryThemeColor: incoming.secondaryThemeColor || String(saved?.customColors?.secondaryThemeColor || '').trim(),
        primaryTextColor: incoming.primaryTextColor || String(saved?.customColors?.primaryTextColor || '').trim(),
        secondaryTextColor: incoming.secondaryTextColor || String(saved?.customColors?.secondaryTextColor || '').trim(),
      };

      try {
        const effective = {
          theme: resolved.theme || 'dark',
          colorPreset: resolved.colorPreset || 'ocean',
          recentSource: resolved.recentSource || 'albums',
          customColors: {
            primaryThemeColor: resolved.primaryThemeColor || '#0b111c',
            secondaryThemeColor: resolved.secondaryThemeColor || '#1f2a3d',
            primaryTextColor: resolved.primaryTextColor || '#f3f6ff',
            secondaryTextColor: resolved.secondaryTextColor || '#9eb3d6',
          },
          ts: Date.now(),
        };
        localStorage.setItem(KIOSK_PROFILE_KEY, JSON.stringify(effective));
        // Keep controller/mobile profile in sync so all kiosk internal pages inherit theme/palette.
        localStorage.setItem('nowplaying.mobile.profile.v1', JSON.stringify({
          devicePreset:'iphone17',
          theme: effective.theme,
          layout:'home-rail',
          showRecent:true,
          recentSource: effective.recentSource,
          colorPreset: effective.colorPreset,
          recentCount:18,
          customColors: effective.customColors
        }));
      } catch {}

      dst.searchParams.set('kiosk','1');
      dst.searchParams.set('preview','1');
      // Cache-bust controller shell on moOde so kiosk nav fixes apply immediately.
      dst.searchParams.set('rev','20260320-visualizer-pane-fix');
      if (resolved.theme) dst.searchParams.set('theme', resolved.theme);
      if (resolved.colorPreset) dst.searchParams.set('colorPreset', resolved.colorPreset);
      if (resolved.recentSource) dst.searchParams.set('recentSource', resolved.recentSource);
      if (resolved.primaryThemeColor) dst.searchParams.set('primaryThemeColor', resolved.primaryThemeColor);
      if (resolved.secondaryThemeColor) dst.searchParams.set('secondaryThemeColor', resolved.secondaryThemeColor);
      if (resolved.primaryTextColor) dst.searchParams.set('primaryTextColor', resolved.primaryTextColor);
      if (resolved.secondaryTextColor) dst.searchParams.set('secondaryTextColor', resolved.secondaryTextColor);

      location.replace(dst.toString());
    })();
  </script>
</body>
</html>
