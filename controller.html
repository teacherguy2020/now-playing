<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Controller Router</title>
  <style>
    html,body{margin:0;height:100%;background:#0b111c;color:#eaf1ff;font:16px/1.35 -apple-system,Inter,system-ui;display:grid;place-items:center}
    .muted{opacity:.78;font-size:13px}
  </style>
</head>
<body>
  <div>
    <div>Routing to controller layout…</div>
    <div class="muted">If this takes more than a second, refresh.</div>
  </div>
  <script>
    (function(){
      try {
        const u = new URL(location.href);
        const force = String(u.searchParams.get('layout') || u.searchParams.get('devicePreset') || '').toLowerCase();
        const w = Math.max(0, Number(window.innerWidth || 0));
        const h = Math.max(0, Number(window.innerHeight || 0));
        const shortSide = Math.min(w, h);
        const ua = String(navigator.userAgent || '').toLowerCase();
        const isIpadUA = /ipad/.test(ua);
        const isIpadDesktopMode = /macintosh/.test(ua) && Number(navigator.maxTouchPoints || 0) > 1;
        const isTabletViewport = shortSide >= 760;
        const isIpadLike = isIpadUA || isIpadDesktopMode || isTabletViewport;

        const target = (force.includes('ipad') || force === 'landscape' || (force === '' && isIpadLike))
          ? 'controller-ipad.html?devicePreset=ipadpro11-landscape'
          : 'controller-iphone.html?devicePreset=iphone17';

        u.pathname = u.pathname.replace(/\/controller\.html$/i, '/' + target);
        location.replace(u.toString());
      } catch {
        location.replace('controller-ipad.html');
      }
    })();
  </script>
</body>
</html>
