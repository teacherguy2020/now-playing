<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Theme</title>
  <style>
    body{margin:0;background:#071021;color:#e7eefc;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    .wrap{max-width:1100px;margin:14px auto;padding:0 10px 16px}
    .card{background:#0f1a31;border:1px solid #2a3a58;border-radius:12px;padding:12px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
    #pickerCardsWrap{background:var(--editor-card-bg);border:1px solid var(--editor-border);border-radius:12px;padding:10px;display:grid;gap:10px;margin-top:10px;}
    #pickerCardsWrap .token{background:var(--editor-picker-card-bg,#30436b) !important;}
    .token{display:grid;gap:6px;padding:10px;border:1px solid #2a3a58;border-radius:10px;background:#0a1222}
    .row{display:flex;align-items:center;gap:8px}
    .swWrap{position:relative;width:28px;height:28px;flex:0 0 28px}
    .sw{width:28px;height:28px;border-radius:8px;border:1px solid rgba(255,255,255,.35);cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.18)}
    .colorNative{position:absolute;inset:0;opacity:0;pointer-events:auto;width:100%;height:100%;cursor:pointer}
    input[type="text"]{flex:1;background:#0f1a31;color:#e7eefc;border:1px solid #334;border-radius:8px;padding:6px 8px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    button{padding:8px 10px;border-radius:9px;border:1px solid var(--editor-border);background:var(--editor-token-bg);color:var(--editor-input-text);cursor:pointer}
    button.primary{border-color:var(--editor-border);background:var(--editor-token-bg);color:var(--editor-input-text)}
    .muted{opacity:.8;font-size:12px}
    .status{margin-top:8px;font-size:12px;opacity:.85;color:#9fd2ff;min-height:1.2em}
    #presetSelect,#modeSelect{-webkit-appearance:none;appearance:none;background:var(--editor-token-bg) !important;color:var(--editor-input-text) !important;border:1px solid var(--editor-border) !important;border-radius:10px !important}

    :root{
      --editor-bg:#071021;
      --editor-text:#e7eefc;
      --editor-border:#334;
      --editor-card-bg:#0f1a31;
      --editor-token-bg:#0a1222;
      --editor-input-bg:#0f1a31;
      --editor-input-text:#e7eefc;
    }
    body{background:var(--editor-bg);color:var(--editor-text)}
    .card{background:var(--editor-bg) !important;border-color:var(--editor-border)}
    .token{background:var(--editor-token-bg);border-color:var(--editor-border)}
    select,button,input[type="text"]{color:var(--editor-input-text);border-color:var(--editor-border)}
    select,input[type="text"]{background:var(--editor-input-bg)}
    button:hover{filter:brightness(1.06)}
  
    /* Unified token mapping (phase 1) */
    :root{
      --np-bg:var(--npb-bg,#0c1526);
      --np-rail-bg:var(--npb-rail-bg,#0b1426);
      --np-text:var(--npb-text,#e7eefc);
      --np-text-secondary:var(--npb-text-secondary,#9fb1d9);
      --np-card-bg:var(--npb-card-bg,rgba(10,18,34,.45));
      --np-card-border:var(--npb-card-border,#2a3a58);
      --np-tab-bg:var(--npb-tab-bg,#0f1a31);
      --np-tab-text:var(--npb-tab-text,#e7eefc);
      --np-tab-border:var(--npb-tab-border,#2a3a58);
      --np-tab-hover:var(--npb-tab-hover-bg,#2f4f93);
      --np-tab-active-bg:var(--npb-tab-active-bg,#3357d6);
      --np-tab-active-text:var(--npb-tab-active-text,#ffffff);
    }
    html,body{background:var(--np-bg) !important;color:var(--np-text) !important;}
    .card,.cfgCard,.panel,.section,.subsShell,.stationCluster,.stationCard{background:var(--np-card-bg) !important;border-color:var(--np-card-border) !important;color:var(--np-text) !important;}
    .topTabs a{background:var(--np-tab-bg) !important;color:var(--np-tab-text) !important;border-color:var(--np-tab-border) !important;}
    .topTabs a:hover{background:var(--np-tab-hover) !important;}
    .topTabs a.active,.topTabs a[aria-current="page"]{background:var(--np-tab-active-bg) !important;color:var(--np-tab-active-text) !important;border-color:var(--np-tab-border) !important;}
    input,select,textarea,button,.stationAction,.clusterToggle{background:var(--np-tab-bg) !important;color:var(--np-text) !important;border-color:var(--np-tab-border) !important;}
    .btnPrimary,.primary{background:var(--np-tab-active-bg) !important;color:var(--np-text) !important;border-color:var(--np-tab-border) !important;}
    button:hover,.stationAction:hover,.clusterToggle:hover{background:var(--np-tab-hover) !important;}
    .muted,.mutedSm,label,.stationMeta{color:var(--np-text-secondary) !important;opacity:.95;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h3 style="margin:0 0 6px">Theme</h3>
      <div class="muted">Edit core shell colors. Changes apply live in app shell.</div>
      <div id="pickerCardsWrap"><div id="tokenGrid" class="grid"></div></div>
      <div class="actions" style="margin-bottom:6px">
        <select id="presetSelect" style="min-width:220px;padding:7px 8px"></select>
        <button id="loadPresetBtn" type="button">Load preset</button>
        <button id="savePresetBtn" type="button">Save as preset</button>
        <button id="deletePresetBtn" type="button">Delete preset</button>
        <select id="modeSelect" style="display:none">
          <option value="dark" selected>Editing</option>
        </select>
      </div>
      <div class="actions">
        <button id="applyBtn" class="primary" type="button">Apply</button>
        <button id="saveBtn" type="button">Save</button>
        <button id="exportBtn" type="button">Export theme</button>
        <button id="importBtn" type="button">Import theme</button>
        <button id="resetBtn" type="button">Reset defaults</button>
      </div>
      <div id="statusMsg" class="status"></div>
    </div>
  </div>

<script>
(() => {
  const KEY='nowplaying.themeTokens.v1';
  const PRESETS_KEY='nowplaying.themePresets.v1';
  const ACTIVE_KEY='nowplaying.themeActivePreset.v1';
  const defaults={
    // Shell
    '--theme-bg':'#0c1526',
    '--theme-text':'#e7eefc',
    '--theme-text-secondary':'#9fb1d9',
    '--theme-rail-bg':'#0b1426',
    '--theme-frame-fill':'#0c1526',
    '--theme-rail-border':'#2a3a58',

    // Tabs
    '--theme-tab-bg':'#0f1a31',
    '--theme-tab-text':'#e7eefc',
    '--theme-tab-border':'#2a3a58',
    '--theme-tab-hover-bg':'#2f4f93',
    '--theme-tab-active-bg':'#3357d6',
    '--theme-tab-active-text':'#ffffff',

    // Cards
    '--theme-hero-card-bg':'#0a122273',
    '--theme-hero-card-border':'#2a3a58','--theme-picker-card-bg':'#30436b',

    // Pills
    '--theme-pill-border':'#94a3b873',
    '--theme-pill-glow':'#7dd3fc57',
  };
  const labels={
    '--theme-bg':'App background',
    '--theme-text':'Primary text',
    '--theme-text-secondary':'Secondary text',
    '--theme-rail-bg':'Surface Tint',
    '--theme-frame-fill':'Frame fill',
    '--theme-rail-border':'Shell + frame border',

    '--theme-tab-bg':'Inactive tabs',
    '--theme-tab-text':'Tab text',
    '--theme-tab-border':'Tab border',
    '--theme-tab-hover-bg':'Tab hover background',
    '--theme-tab-active-bg':'Tab active background',
    '--theme-tab-active-text':'Tab active text',

    '--theme-hero-card-bg':'Card background',
    '--theme-hero-card-border':'Card border',
    '--theme-picker-card-bg':'Picker card background',
    '--theme-picker-card-bg':'Picker card background',
    '--theme-progress-fill':'Progress bar fill',

    '--theme-pill-border':'Stars',
    '--theme-pill-glow':'Pill hover glow',
  };

  function load(){
    try { return { ...defaults, ...(JSON.parse(localStorage.getItem(KEY)||'{}')||{}) }; }
    catch { return { ...defaults }; }
  }
  let state = load();
  let forcedUiMode = ''; // 'light' | 'dark' (from shell toggle)

  function loadPresets(){
    try { return JSON.parse(localStorage.getItem(PRESETS_KEY) || '{}') || {}; }
    catch { return {}; }
  }
  function savePresets(p){ try { localStorage.setItem(PRESETS_KEY, JSON.stringify(p || {})); } catch {} }
  function normalizePreset(v){
    if (!v) return null;
    if (v.tokens && typeof v.tokens === 'object') return { tokens: v.tokens };
    if (typeof v === 'object') return { tokens: v };
    return null;
  }
  const grid = document.getElementById('tokenGrid');
  const presetSelect = document.getElementById('presetSelect');
  const modeSelect = document.getElementById('modeSelect');
  function render(){
    updateEditorChrome();
    grid.innerHTML='';
    Object.keys(defaults).forEach((k)=>{
      const v = String(state[k] || defaults[k]);
      const item = document.createElement('div'); item.className='token';
      const label = document.createElement('div'); label.textContent = labels[k] || k;
      const row = document.createElement('div'); row.className='row';
      const swWrap = document.createElement('div'); swWrap.className='swWrap';
      const sw = document.createElement('div'); sw.className='sw'; sw.style.background=v;
      const c = document.createElement('input'); c.type='color'; c.className='colorNative'; c.value = toHex(v) || '#000000';
      const t = document.createElement('input'); t.type='text'; t.value=v;
      sw.title = 'Pick color';
      c.addEventListener('input', ()=>{
        t.value=c.value;
        sw.style.background=c.value;
        state[k]=c.value;
        updateEditorChrome();
        applyThemeEditorZones();
        push(); // live preview while picker is open/dragging
      });
      t.addEventListener('input', ()=>{
        state[k]=t.value;
        sw.style.background=t.value;
        const hx=toHex(t.value);
        if (hx) c.value=hx;
        updateEditorChrome();
        applyThemeEditorZones();
        push(); // live preview while typing hex
      });
      swWrap.append(sw,c);
      row.append(swWrap,t); item.append(label,row); grid.append(item);
    });
  }

  function toHex(v){
    if (!v) return '';
    const s = String(v).trim();
    if (/^#[0-9a-fA-F]{6}$/.test(s)) return s;
    if (/^#[0-9a-fA-F]{3}$/.test(s)) return '#'+s.slice(1).split('').map(ch=>ch+ch).join('');
    return '';
  }

  const statusMsg = document.getElementById('statusMsg');
  function flash(msg){
    if (!statusMsg) return;
    statusMsg.textContent = msg;
    clearTimeout(flash._t);
    flash._t = setTimeout(()=>{ statusMsg.textContent = ''; }, 1600);
  }

  function withLinkedTokens(tokens){
    const t = { ...(tokens || {}) };
    const railBorder = String(t['--theme-rail-border'] || defaults['--theme-rail-border'] || '#2a3a58');
    t['--theme-frame-border'] = railBorder;
    return t;
  }

  function push(){
    try {
      window.parent?.postMessage({
        type:'np-theme-updated',
        tokens: withLinkedTokens(state)
      }, '*');
    } catch {}
  }

  function sameTokens(a={}, b={}){
    const keys = Array.from(new Set([...Object.keys(defaults), ...Object.keys(a||{}), ...Object.keys(b||{})]));
    return keys.every((k)=> String((a||{})[k] ?? defaults[k] ?? '') === String((b||{})[k] ?? defaults[k] ?? ''));
  }

  function inferActivePresetName(presets, selected=''){
    try {
      const explicit = String(selected || localStorage.getItem(ACTIVE_KEY) || '').trim();
      if (explicit && presets && presets[explicit]) return explicit;
      for (const [name, val] of Object.entries(presets || {})) {
        const p = normalizePreset(val);
        if (!p?.tokens) continue;
        if (sameTokens(state, p.tokens)) return name;
      }
    } catch {}
    return '';
  }

  function renderPresetOptions(selected=''){
    if (!presetSelect) return;
    const presets = loadPresets();
    const names = Object.keys(presets).sort((a,b)=>a.localeCompare(b));
    const activeName = inferActivePresetName(presets, selected);
    presetSelect.innerHTML = `<option value="">(select preset)</option>` + names.map(n=>{
      const label = String(n);
      return `<option value="${n.replace(/"/g,'&quot;')}">${label}</option>`;
    }).join('');
    if (activeName) {
      presetSelect.value = activeName;
      try { localStorage.setItem(ACTIVE_KEY, activeName); } catch {}
    }
  }

  document.getElementById('loadPresetBtn')?.addEventListener('click', ()=>{
    const name = String(presetSelect?.value || '').trim();
    if (!name) return flash('Pick a preset');
    const presets = loadPresets();
    const p = normalizePreset(presets[name]);
    if (!p) return flash('Preset missing');
    state = { ...defaults, ...(p.tokens || {}) };
    try { localStorage.setItem(ACTIVE_KEY, name); } catch {}
    render();
    push();
    flash(`Loaded: ${name}`);
  });

  document.getElementById('savePresetBtn')?.addEventListener('click', ()=>{
    const suggested = String(presetSelect?.value || '').trim();
    const name = String(prompt('Preset name:', suggested || '') || '').trim();
    if (!name) return;
    const presets = loadPresets();
    presets[name] = { tokens: withLinkedTokens(state) };
    savePresets(presets);
    try { localStorage.setItem(ACTIVE_KEY, name); } catch {}
    renderPresetOptions(name);
    flash(`Preset saved: ${name}`);
  });

  document.getElementById('deletePresetBtn')?.addEventListener('click', ()=>{
    const name = String(presetSelect?.value || '').trim();
    if (!name) return flash('Pick a preset');
    if (!confirm(`Delete preset "${name}"?`)) return;
    const presets = loadPresets();
    delete presets[name];
    savePresets(presets);
    renderPresetOptions('');
    flash(`Deleted: ${name}`);
  });

  document.getElementById('applyBtn').addEventListener('click', ()=>{ push(); flash('Applied'); });
  document.getElementById('saveBtn').addEventListener('click', ()=>{
    try{ localStorage.setItem(KEY, JSON.stringify(withLinkedTokens(state))); }catch{}
    syncPickerCardBgVar();
    push();
    flash('Saved');
  });

  document.getElementById('exportBtn')?.addEventListener('click', async ()=>{
    try {
      const activePresetName = String(presetSelect?.value || localStorage.getItem(ACTIVE_KEY) || '').trim();
      const payload = {
        version: 1,
        exportedAt: new Date().toISOString(),
        name: activePresetName || '',
        tokens: withLinkedTokens(state),
      };
      const json = JSON.stringify(payload, null, 2);
      const fileName = `now-playing-theme.json`;

      // Prefer parent shell share (top-level user gesture context on iOS/Safari)
      try {
        window.parent?.postMessage({ type:'np-theme-export', json, fileName, payload }, '*');
      } catch {}

      if (navigator.share) {
        try {
          const file = new File([json], fileName, { type: 'application/json' });
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ title: 'Now Playing Theme', text: 'Theme export JSON', files: [file] });
            flash('Theme shared');
            return;
          }
          await navigator.share({ title: 'Now Playing Theme', text: json });
          flash('Theme shared');
          return;
        } catch (e) {
          if (String(e?.name || '') === 'AbortError') return;
        }
      }

      try {
        await navigator.clipboard.writeText(json);
        flash('Theme JSON copied');
      } catch {
        prompt('Copy theme JSON:', json);
      }
    } catch {
      flash('Export failed');
    }
  });

  document.getElementById('importBtn')?.addEventListener('click', ()=>{
    try {
      const raw = prompt('Paste theme JSON:', '');
      if (!raw) return;
      let parsed = null;
      try { parsed = JSON.parse(String(raw)); } catch { flash('Invalid JSON'); return; }

      const incomingName = String(parsed?.name || '').trim();
      const incomingTokens = (parsed && typeof parsed === 'object' && parsed.tokens && typeof parsed.tokens === 'object')
        ? parsed.tokens
        : (parsed && typeof parsed === 'object' ? parsed : null);
      if (!incomingTokens) { flash('No tokens found'); return; }

      state = { ...defaults, ...incomingTokens };

      const linked = withLinkedTokens(state);
      try { localStorage.setItem(KEY, JSON.stringify(linked)); } catch {}

      let appliedName = '';
      if (incomingName) {
        const presets = loadPresets();
        presets[incomingName] = { tokens: linked };
        savePresets(presets);
        appliedName = incomingName;
        try { localStorage.setItem(ACTIVE_KEY, incomingName); } catch {}
      } else {
        try { localStorage.removeItem(ACTIVE_KEY); } catch {}
      }

      render();
      renderPresetOptions(appliedName);
      push();
      flash(appliedName ? `Theme imported: ${appliedName}` : 'Theme imported');
    } catch {
      flash('Import failed');
    }
  });

  document.getElementById('resetBtn').addEventListener('click', ()=>{
    state={...defaults};
    try{ localStorage.setItem(KEY, JSON.stringify(withLinkedTokens(state))); }catch{}
    try{ localStorage.removeItem(ACTIVE_KEY); }catch{}
    render();
    push();
    flash('Reset to defaults');
  });

  window.addEventListener('message', (ev) => {
    try {
      const d = ev?.data || {};
      if (d.type === 'np-theme-sync') {
        const m = String(d.theme || '').toLowerCase();
        forcedUiMode = (m === 'light' || m === 'dark') ? m : '';
        updateEditorChrome();
      }
    } catch {}
  });

  function loadPresetByName(name=''){
    const n = String(name || '').trim();
    if (!n) return false;
    const all = loadPresets();
    const p = normalizePreset(all[n]);
    if (!p?.tokens) return false;
    state = { ...defaults, ...p.tokens };
    try { localStorage.setItem(KEY, JSON.stringify(withLinkedTokens(state))); } catch {}
    try { localStorage.setItem(ACTIVE_KEY, n); } catch {}
    render();
    renderPresetOptions(n);
    push();
    return true;
  }

  window.addEventListener('message', (ev)=>{
    const d = ev?.data || {};
    if (!d || typeof d !== 'object') return;
    if (d.type === 'np-theme-load-preset') {
      loadPresetByName(String(d.name || ''));
    }
  });

  function applyThemeEditorZones(){
    try {
      const card = document.querySelector('.wrap > .card');
      const outer = String(state['--theme-rail-bg'] || defaults['--theme-rail-bg'] || '#0b1426');
      if (card) {
        card.style.setProperty('background', outer, 'important');
        card.style.setProperty('background-color', outer, 'important');
      }
      const wrap = document.getElementById('pickerCardsWrap');
      const inner = String(state['--theme-hero-card-bg'] || defaults['--theme-hero-card-bg'] || '#0a122273');
      if (wrap) {
        wrap.style.setProperty('background', inner, 'important');
        wrap.style.setProperty('background-color', inner, 'important');
      }
    } catch {}
  }

  function applyPickerTileBg(){
    try {
      const c = String(state['--theme-picker-card-bg'] || '#30436b');
      document.querySelectorAll('#pickerCardsWrap .token').forEach((el)=>{
        el.style.setProperty('background', c, 'important');
        el.style.setProperty('background-color', c, 'important');
      });
    } catch {}
  }

  const _render = render;
  render = function(){
    _render();
    applyThemeEditorZones();
    applyPickerTileBg();
  };

  render();
  applyThemeEditorZones();
  renderPresetOptions();
})();
</script>
</body>
</html>
