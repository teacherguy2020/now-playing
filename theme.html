<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Theme</title>
  <style>
    body{margin:0;background:#071021;color:#e7eefc;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    .wrap{max-width:1100px;margin:14px auto;padding:0 10px 16px}
    .card{background:#0f1a31;border:1px solid #2a3a58;border-radius:12px;padding:12px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,220px));gap:10px;justify-content:space-between}
    #pickerCardsWrap{background:var(--editor-card-bg);border:1px solid var(--editor-border);border-radius:12px;padding:10px;display:grid;gap:10px;margin-top:10px;}
    #pickerCardsWrap .token{background:var(--editor-picker-card-bg,#30436b) !important;}
    .token{display:grid;gap:6px;padding:10px;border:1px solid #2a3a58;border-radius:10px;background:#0a1222}
    .row{display:flex;align-items:center;gap:8px}
    .swWrap{position:relative;width:28px;height:28px;flex:0 0 28px}
    .sw{width:28px;height:28px;border-radius:8px;border:1px solid rgba(255,255,255,.35);cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.18)}
    .colorNative{position:absolute;inset:0;opacity:0;pointer-events:auto;width:100%;height:100%;cursor:pointer}
    input[type="text"]{flex:1;background:#0f1a31;color:#e7eefc;border:1px solid #334;border-radius:8px;padding:6px 8px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .actionPanel{margin-top:10px;display:grid;gap:8px;padding:10px;border:1px solid var(--editor-border);border-radius:12px;background:color-mix(in oklab, var(--editor-bg) 82%, #000 18%)}
    .actionRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .actionLabel{font-size:11px;letter-spacing:.04em;text-transform:uppercase;opacity:.78}
    .actionRow > button{min-height:36px}
    #presetSelect{min-height:36px;min-width:280px}
    button{padding:8px 10px;border-radius:9px;border:1px solid var(--editor-border);background:var(--editor-token-bg);color:var(--editor-input-text);cursor:pointer}
    button.primary{border-color:var(--editor-border);background:var(--editor-token-bg);color:var(--editor-input-text)}
    .muted{opacity:.8;font-size:12px}
    .status{margin-top:8px;font-size:12px;opacity:.85;color:#9fd2ff;min-height:1.2em}
    #presetSelect{-webkit-appearance:none;appearance:none;background:var(--editor-token-bg) !important;color:var(--editor-input-text) !important;border:1px solid var(--editor-border) !important;border-radius:10px !important}
    .exportModal{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;background:rgba(2,6,12,.68);padding:16px}
    .exportModal.open{display:flex}
    .exportModalCard{width:min(920px,96vw);max-height:85vh;display:grid;grid-template-rows:auto 1fr auto;gap:10px;background:#000 !important;border:1px solid #1a3f2a !important;border-radius:12px;padding:12px;box-shadow:0 0 0 1px rgba(20,255,120,.12) inset}
    .exportModalTitle{font-size:14px;font-weight:700;opacity:.95;color:#5dff89 !important}
    .exportModalPre{margin:0;white-space:pre;word-break:normal;overflow:auto;max-height:60vh;background:#000 !important;color:#5dff89 !important;border:1px solid #1a3f2a !important;border-radius:10px;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.35;resize:vertical;width:100%;min-height:280px;box-sizing:border-box}
    .exportModalPre::selection{background:#1d4f2d;color:#b9ffd0}
    .exportModalActions{display:flex;gap:8px;justify-content:flex-end}
    .exportModalActions button{background:#07120b !important;color:#7bff9f !important;border:1px solid #1a3f2a !important}

    :root{
      --editor-bg:#071021;
      --editor-text:#e7eefc;
      --editor-border:#334;
      --editor-card-bg:#0f1a31;
      --editor-token-bg:#0a1222;
      --editor-input-bg:#0f1a31;
      --editor-input-text:#e7eefc;
    }
    body{background:var(--editor-bg);color:var(--editor-text)}
    .card{background:var(--editor-bg) !important;border-color:var(--editor-border)}
    .token{background:var(--editor-token-bg);border-color:var(--editor-border)}
    select,button,input[type="text"]{color:var(--editor-input-text);border-color:var(--editor-border)}
    select,input[type="text"]{background:var(--editor-input-bg)}
    button:hover{filter:brightness(1.06)}
  
    /* Unified token mapping (phase 1) */
    :root{
      --np-bg:var(--npb-bg,#0c1526);
      --np-rail-bg:var(--npb-rail-bg,#0b1426);
      --np-text:var(--npb-text,#e7eefc);
      --np-text-secondary:var(--npb-text-secondary,#9fb1d9);
      --np-card-bg:var(--npb-card-bg,rgba(10,18,34,.45));
      --np-card-border:var(--npb-card-border,#2a3a58);
      --np-tab-bg:var(--npb-tab-bg,#0f1a31);
      --np-tab-text:var(--npb-tab-text,#e7eefc);
      --np-tab-border:var(--npb-tab-border,#2a3a58);
      --np-tab-hover:var(--npb-tab-hover-bg,#2f4f93);
      --np-tab-active-bg:var(--npb-tab-active-bg,#3357d6);
      --np-tab-active-text:var(--npb-tab-active-text,#ffffff);
    }
    html,body{background:var(--np-bg) !important;color:var(--np-text) !important;}
    .card,.cfgCard,.panel,.section,.subsShell,.stationCluster,.stationCard{background:var(--np-card-bg) !important;border-color:var(--np-card-border) !important;color:var(--np-text) !important;}
    .topTabs a{background:var(--np-tab-bg) !important;color:var(--np-tab-text) !important;border-color:var(--np-tab-border) !important;}
    .topTabs a:hover{background:var(--np-tab-hover) !important;}
    .topTabs a.active,.topTabs a[aria-current="page"]{background:var(--np-tab-active-bg) !important;color:var(--np-tab-active-text) !important;border-color:var(--np-tab-border) !important;}
    input,select,textarea,button,.stationAction,.clusterToggle{background:var(--np-tab-bg) !important;color:var(--np-text) !important;border-color:var(--np-tab-border) !important;}
    .btnPrimary,.primary{background:var(--np-tab-active-bg) !important;color:var(--np-text) !important;border-color:var(--np-tab-border) !important;}
    button:hover,.stationAction:hover,.clusterToggle:hover{background:var(--np-tab-hover) !important;}
    .muted,.mutedSm,label,.stationMeta{color:var(--np-text-secondary) !important;opacity:.95;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h3 style="margin:0 0 6px">Theme</h3>
      <div class="muted">Edit core shell colors. Changes apply live in app shell.</div>
      <div id="pickerCardsWrap"><div id="tokenGrid" class="grid"></div></div>

      <div class="actionPanel">
        <div class="actionLabel">Preset</div>
        <div class="actionRow">
          <select id="presetSelect" style="padding:7px 8px"></select>
          <button id="savePresetBtn" type="button">Save as preset</button>
          <button id="deletePresetBtn" type="button">Delete preset</button>
        </div>

        <div class="actionLabel">Theme I/O</div>
        <div class="actionRow">
          <button id="importBtn" type="button">Import theme</button>
          <button id="exportBtn" type="button">Export theme</button>
        </div>

        <div class="actionLabel">State</div>
        <div class="actionRow">
          <button id="saveBtn" type="button">Save</button>
          <button id="resetBtn" type="button">Reset to Slate Medium</button>
        </div>
      </div>
      <div id="statusMsg" class="status"></div>
    </div>
  </div>

  <div id="exportModal" class="exportModal" aria-hidden="true">
    <div class="exportModalCard" role="dialog" aria-modal="true" aria-label="Exported theme JSON">
      <div class="exportModalTitle">Theme JSON</div>
      <textarea id="exportJsonText" class="exportModalPre" spellcheck="false"></textarea>
      <div class="exportModalActions">
        <button id="exportCopyBtn" type="button">Copy to clipboard</button>
        <button id="exportCloseBtn" type="button">Close</button>
      </div>
    </div>
  </div>

<script>
(() => {
  const KEY='nowplaying.themeTokens.v1';
  const PRESETS_KEY='nowplaying.themePresets.v1';
  const ACTIVE_KEY='nowplaying.themeActivePreset.v1';
  const THEME_FORMAT_VERSION = 2;
  const defaults={
    // Shell
    '--theme-bg':'#0c1526',
    '--theme-text':'#e7eefc',
    '--theme-text-secondary':'#9fb1d9',
    '--theme-rail-bg':'#0b1426',
    '--theme-frame-fill':'#0c1526',
    '--theme-rail-border':'#2a3a58',

    // Tabs
    '--theme-tab-bg':'#0f1a31',
    '--theme-tab-text':'#e7eefc',
    '--theme-tab-border':'#2a3a58',
    '--theme-tab-hover-bg':'#2f4f93',
    '--theme-tab-active-bg':'#3357d6',
    '--theme-tab-active-text':'#ffffff',

    // Cards
    '--theme-hero-card-bg':'#0a122273',
    '--theme-hero-card-border':'#2a3a58','--theme-picker-card-bg':'#30436b',

    // Pills
    '--theme-pill-border':'#94a3b873',
    '--theme-pill-glow':'#7dd3fc57',
  };
  const labels={
    '--theme-bg':'App background',
    '--theme-text':'Primary text',
    '--theme-text-secondary':'Secondary text',
    '--theme-rail-bg':'Surface Tint',
    '--theme-frame-fill':'Frame fill',
    '--theme-rail-border':'Shell + frame border',

    '--theme-tab-bg':'Inactive tabs',
    '--theme-tab-text':'Tab text',
    '--theme-tab-border':'Tab border',
    '--theme-tab-hover-bg':'Tab hover background',
    '--theme-tab-active-bg':'Tab active background',
    '--theme-tab-active-text':'Tab active text',

    '--theme-hero-card-bg':'Card background',
    '--theme-hero-card-border':'Card border',
    '--theme-picker-card-bg':'Picker card background',
    '--theme-picker-card-bg':'Picker card background',
    '--theme-progress-fill':'Progress bar fill',

    '--theme-pill-border':'Stars',
    '--theme-pill-glow':'Pill hover glow',
  };

  function normalizeThemePayload(input){
    try {
      const p = (input && typeof input === 'object') ? input : {};
      const name = String(p.name || '').trim();
      const tokens = (p.tokens && typeof p.tokens === 'object') ? p.tokens : (p && typeof p === 'object' ? p : {});
      return {
        version: THEME_FORMAT_VERSION,
        name,
        tokens: { ...defaults, ...(tokens || {}) },
      };
    } catch {
      return { version: THEME_FORMAT_VERSION, name: '', tokens: { ...defaults } };
    }
  }

  function buildThemePayload(tokens, name=''){
    const n = String(name || '').trim();
    return {
      version: THEME_FORMAT_VERSION,
      name: n,
      exportedAt: new Date().toISOString(),
      tokens: { ...defaults, ...(tokens || {}) },
    };
  }

  function load(){
    try { return { ...defaults, ...(JSON.parse(localStorage.getItem(KEY)||'{}')||{}) }; }
    catch { return { ...defaults }; }
  }
  let state = load();
  let forcedUiMode = ''; // 'light' | 'dark' (from shell toggle)
  let importBusy = false;


  const STARTER_PRESETS = {
    'Slate Medium': { tokens: { '--theme-bg':'#121820','--theme-text':'#e8edf4','--theme-text-secondary':'#a5b0bf','--theme-rail-bg':'#1d2632','--theme-frame-fill':'#17202b','--theme-rail-border':'#5f6e82','--theme-tab-bg':'#2a3a4d','--theme-tab-text':'#e7eefc','--theme-tab-border':'#7b8ea8','--theme-tab-hover-bg':'#3b516a','--theme-tab-active-bg':'#4a6280','--theme-tab-active-text':'#ffffff','--theme-hero-card-bg':'#243244','--theme-hero-card-border':'#7b8ea8','--theme-picker-card-bg':'#314257','--theme-pill-border':'#f2c14e','--theme-pill-glow':'#35b36a','--theme-card-secondary-fill':'#3a4c62','--theme-progress-fill':'#8ea6c7','--theme-frame-border':'#5f6e82' } },
    'Chill Blue': { tokens: { '--theme-bg':'#0b141d','--theme-text':'#e7f0fb','--theme-text-secondary':'#9fb6cf','--theme-rail-bg':'#142434','--theme-frame-fill':'#10202f','--theme-rail-border':'#4f6f90','--theme-tab-bg':'#1f3a57','--theme-tab-text':'#e9f3ff','--theme-tab-border':'#7fa5ce','--theme-tab-hover-bg':'#2d4f76','--theme-tab-active-bg':'#3f6898','--theme-tab-active-text':'#ffffff','--theme-hero-card-bg':'#1a3149','--theme-hero-card-border':'#7fa5ce','--theme-picker-card-bg':'#274864','--theme-pill-border':'#ffd166','--theme-pill-glow':'#37a86a','--theme-card-secondary-fill':'#345a7d','--theme-progress-fill':'#98bce4','--theme-frame-border':'#4f6f90' } },
    'Monotone Gray': { tokens: { '--theme-bg':'#121212','--theme-text':'#ededed','--theme-text-secondary':'#b3b3b3','--theme-rail-bg':'#1c1c1c','--theme-frame-fill':'#181818','--theme-rail-border':'#5e5e5e','--theme-tab-bg':'#2b2b2b','--theme-tab-text':'#efefef','--theme-tab-border':'#8a8a8a','--theme-tab-hover-bg':'#393939','--theme-tab-active-bg':'#4a4a4a','--theme-tab-active-text':'#ffffff','--theme-hero-card-bg':'#232323','--theme-hero-card-border':'#8a8a8a','--theme-picker-card-bg':'#343434','--theme-pill-border':'#c9c9c9','--theme-pill-glow':'#7f7f7f','--theme-card-secondary-fill':'#3f3f3f','--theme-progress-fill':'#a0a0a0','--theme-frame-border':'#5e5e5e' } },
    'Warm Parchment': { tokens: { '--theme-bg':'#f3ece2','--theme-text':'#2f2a24','--theme-text-secondary':'#6e6458','--theme-rail-bg':'#e8dccb','--theme-frame-fill':'#efe5d7','--theme-rail-border':'#b8a893','--theme-tab-bg':'#d9c8b2','--theme-tab-text':'#332c24','--theme-tab-border':'#a89278','--theme-tab-hover-bg':'#ceb99f','--theme-tab-active-bg':'#8d7358','--theme-tab-active-text':'#fffaf4','--theme-hero-card-bg':'#e1d2be','--theme-hero-card-border':'#a89278','--theme-picker-card-bg':'#cbb79e','--theme-pill-border':'#b8860b','--theme-pill-glow':'#3f8f4e','--theme-card-secondary-fill':'#d2c1aa','--theme-progress-fill':'#9f876a','--theme-frame-border':'#b8a893' } },
    'Muted Merlot': { tokens: { '--theme-bg':'#1a1315','--theme-text':'#f0e7e8','--theme-text-secondary':'#b7a4a8','--theme-rail-bg':'#24181b','--theme-frame-fill':'#201517','--theme-rail-border':'#6e5258','--theme-tab-bg':'#3a2329','--theme-tab-text':'#f2e9ea','--theme-tab-border':'#8a646d','--theme-tab-hover-bg':'#4a2d34','--theme-tab-active-bg':'#6a3f49','--theme-tab-active-text':'#fff7f8','--theme-hero-card-bg':'#2f1d22','--theme-hero-card-border':'#8a646d','--theme-picker-card-bg':'#452a31','--theme-pill-border':'#d6a24a','--theme-pill-glow':'#4f9b62','--theme-card-secondary-fill':'#56353d','--theme-progress-fill':'#a6757f','--theme-frame-border':'#6e5258' } },
    'Abyss Graphite': { tokens: { '--theme-bg':'#020306','--theme-text':'#e4ebf7','--theme-text-secondary':'#8f9db1','--theme-rail-bg':'#070c14','--theme-frame-fill':'#040912','--theme-rail-border':'#3f4b5d','--theme-tab-bg':'#0f1825','--theme-tab-text':'#dfe8f7','--theme-tab-border':'#5a6a82','--theme-tab-hover-bg':'#1a2739','--theme-tab-active-bg':'#24364d','--theme-tab-active-text':'#ffffff','--theme-hero-card-bg':'#0b1422','--theme-hero-card-border':'#5a6a82','--theme-picker-card-bg':'#111f33','--theme-pill-border':'#ffbf3f','--theme-pill-glow':'#2ea85f','--theme-card-secondary-fill':'#18263a','--theme-progress-fill':'#6f86a9','--theme-frame-border':'#3f4b5d' } },
    'Matrix': { tokens: { '--theme-bg':'#000000','--theme-text':'#8cff66','--theme-text-secondary':'#57c84d','--theme-rail-bg':'#020702','--theme-frame-fill':'#000000','--theme-rail-border':'#1f5f1f','--theme-tab-bg':'#031003','--theme-tab-text':'#8cff66','--theme-tab-border':'#2f8f2f','--theme-tab-hover-bg':'#0b220b','--theme-tab-active-bg':'#145214','--theme-tab-active-text':'#d8ffcf','--theme-hero-card-bg':'#041404','--theme-hero-card-border':'#2f8f2f','--theme-picker-card-bg':'#071b07','--theme-pill-border':'#8cff66','--theme-pill-glow':'#39ff14','--theme-card-secondary-fill':'#0f2b0f','--theme-progress-fill':'#39ff14','--theme-frame-border':'#1f5f1f' } },
    'Blue Neon': { tokens: { '--theme-bg':'#000000','--theme-text':'#7fd3ff','--theme-text-secondary':'#58a9d8','--theme-rail-bg':'#01060d','--theme-frame-fill':'#000000','--theme-rail-border':'#1b4f73','--theme-tab-bg':'#031326','--theme-tab-text':'#7fd3ff','--theme-tab-border':'#2f7fb6','--theme-tab-hover-bg':'#0b2340','--theme-tab-active-bg':'#144a7a','--theme-tab-active-text':'#d9f3ff','--theme-hero-card-bg':'#041a2f','--theme-hero-card-border':'#2f7fb6','--theme-picker-card-bg':'#07243f','--theme-pill-border':'#7fd3ff','--theme-pill-glow':'#00a7ff','--theme-card-secondary-fill':'#0e2e4d','--theme-progress-fill':'#00a7ff','--theme-frame-border':'#1b4f73' } },
    'Red Neon': { tokens: { '--theme-bg':'#000000','--theme-text':'#ff8a8a','--theme-text-secondary':'#d86b6b','--theme-rail-bg':'#0d0101','--theme-frame-fill':'#000000','--theme-rail-border':'#7a1f1f','--theme-tab-bg':'#260303','--theme-tab-text':'#ff8a8a','--theme-tab-border':'#b62f2f','--theme-tab-hover-bg':'#400b0b','--theme-tab-active-bg':'#7a1414','--theme-tab-active-text':'#ffdede','--theme-hero-card-bg':'#2f0404','--theme-hero-card-border':'#b62f2f','--theme-picker-card-bg':'#3f0707','--theme-pill-border':'#ff8a8a','--theme-pill-glow':'#ff2d2d','--theme-card-secondary-fill':'#4d0e0e','--theme-progress-fill':'#ff2d2d','--theme-frame-border':'#7a1f1f' } }
  };

  function loadPresets(){
    try {
      const raw = JSON.parse(localStorage.getItem(PRESETS_KEY) || '{}') || {};
      const merged = { ...STARTER_PRESETS, ...raw };
      // Backfill starter presets into localStorage without overriding user presets.
      try {
        const rawKeys = Object.keys(raw || {});
        const mergedKeys = Object.keys(merged || {});
        if (mergedKeys.length !== rawKeys.length) {
          localStorage.setItem(PRESETS_KEY, JSON.stringify(merged));
        }
      } catch {}
      return merged;
    } catch {
      return { ...STARTER_PRESETS };
    }
  }
  function savePresets(p){ try { localStorage.setItem(PRESETS_KEY, JSON.stringify(p || {})); } catch {} }
  function normalizePreset(v){
    if (!v) return null;
    if (v.tokens && typeof v.tokens === 'object') return { tokens: v.tokens };
    if (typeof v === 'object') return { tokens: v };
    return null;
  }
  function parseColorToRgb(v){
    const s = String(v || '').trim();
    if (!s) return null;
    const hx = toHex(s);
    if (hx) {
      const n = hx.slice(1);
      return { r: parseInt(n.slice(0,2),16), g: parseInt(n.slice(2,4),16), b: parseInt(n.slice(4,6),16) };
    }
    const m = s.match(/^rgba?\(([^)]+)\)$/i);
    if (m) {
      const p = m[1].split(',').map(x=>Number(String(x).trim()));
      if (p.length >= 3 && p.every(Number.isFinite)) return { r:p[0], g:p[1], b:p[2] };
    }
    return null;
  }
  function clamp255(n){ return Math.max(0, Math.min(255, Math.round(n))); }
  function shiftRgb(c, amt){ return { r: clamp255(c.r + amt), g: clamp255(c.g + amt), b: clamp255(c.b + amt) }; }
  function rgbToHex(c){ return `#${[c.r,c.g,c.b].map(v=>clamp255(v).toString(16).padStart(2,'0')).join('')}`; }
  function updateEditorChrome(){
    const bg = parseColorToRgb(state['--theme-rail-bg'] || defaults['--theme-rail-bg'] || state['--theme-bg'] || defaults['--theme-bg']) || {r:12,g:21,b:38};
    const heroCardBgRaw = String(state['--theme-hero-card-bg'] || defaults['--theme-hero-card-bg'] || '').trim();
    const heroCardBgRgb = parseColorToRgb(heroCardBgRaw) || bg;
    const heroCardBorder = state['--theme-hero-card-border'] || defaults['--theme-hero-card-border'] || '#334';

    const l = relLum(bg);
    const isLight = (forcedUiMode === 'light') ? true : (forcedUiMode === 'dark' ? false : (l > 0.5));
    const tabBgRaw = String(state['--theme-tab-bg'] || defaults['--theme-tab-bg'] || '#0f1a31').trim();
    const tabBgRgb = parseColorToRgb(tabBgRaw) || { r:15, g:26, b:49 };
    const tabTextRaw = String(state['--theme-tab-text'] || defaults['--theme-tab-text'] || pickReadableText(rgbToHex(tabBgRgb))).trim();

    document.documentElement.style.setProperty('--editor-bg', rgbToHex(bg));
    document.documentElement.style.setProperty('--editor-text', pickReadableText(rgbToHex(bg)));
    // Main container tracks hero card style
    document.documentElement.style.setProperty('--editor-card-bg', (forcedUiMode ? rgbToHex(heroCardBgRgb) : (heroCardBgRaw || rgbToHex(heroCardBgRgb))));
    document.documentElement.style.setProperty('--editor-border', String(heroCardBorder));

    // Individual token cards now tie directly to frame/hero border color.
    document.documentElement.style.setProperty('--editor-token-bg', String(heroCardBorder));
    // Hex input fields follow Inactive tabs fill/text.
    document.documentElement.style.setProperty('--editor-input-bg', tabBgRaw || rgbToHex(tabBgRgb));
    document.documentElement.style.setProperty('--editor-input-text', tabTextRaw || pickReadableText(tabBgRaw || rgbToHex(tabBgRgb)));
  }
  function relLum({r,g,b}){
    const t = [r,g,b].map(v=>{
      const x = v/255;
      return x <= 0.03928 ? x/12.92 : Math.pow((x+0.055)/1.055, 2.4);
    });
    return 0.2126*t[0] + 0.7152*t[1] + 0.0722*t[2];
  }
  function pickReadableText(bg){
    const rgb = parseColorToRgb(bg) || { r:12, g:21, b:38 };
    const Lbg = relLum(rgb);
    const Lw = 1.0;
    const Lb = 0.0;
    const cw = (Math.max(Lbg,Lw)+0.05)/(Math.min(Lbg,Lw)+0.05);
    const cb = (Math.max(Lbg,Lb)+0.05)/(Math.min(Lbg,Lb)+0.05);
    return cw >= cb ? '#f3f7ff' : '#141821';
  }
  const grid = document.getElementById('tokenGrid');
  const presetSelect = document.getElementById('presetSelect');

  function render(){
    updateEditorChrome();
    grid.innerHTML='';
    Object.keys(defaults).forEach((k)=>{
      const v = String(state[k] || defaults[k]);
      const item = document.createElement('div'); item.className='token';
      const label = document.createElement('div'); label.textContent = labels[k] || k;
      const row = document.createElement('div'); row.className='row';
      const swWrap = document.createElement('div'); swWrap.className='swWrap';
      const sw = document.createElement('div'); sw.className='sw'; sw.style.background=v;
      const c = document.createElement('input'); c.type='color'; c.className='colorNative'; c.value = toHex(v) || '#000000';
      const t = document.createElement('input'); t.type='text'; t.value=v;
      sw.title = 'Pick color';
      c.addEventListener('input', ()=>{
        t.value=c.value;
        sw.style.background=c.value;
        state[k]=c.value;
        updateEditorChrome();
        applyThemeEditorZones();
        push(); // live preview while picker is open/dragging
      });
      t.addEventListener('input', ()=>{
        state[k]=t.value;
        sw.style.background=t.value;
        const hx=toHex(t.value);
        if (hx) c.value=hx;
        updateEditorChrome();
        applyThemeEditorZones();
        push(); // live preview while typing hex
      });
      swWrap.append(sw,c);
      row.append(swWrap,t); item.append(label,row); grid.append(item);
    });
  }

  function toHex(v){
    if (!v) return '';
    const s = String(v).trim();
    if (/^#[0-9a-fA-F]{6}$/.test(s)) return s;
    if (/^#[0-9a-fA-F]{3}$/.test(s)) return '#'+s.slice(1).split('').map(ch=>ch+ch).join('');
    return '';
  }

  const statusMsg = document.getElementById('statusMsg');
  function flash(msg){
    if (!statusMsg) return;
    statusMsg.textContent = msg;
    clearTimeout(flash._t);
    flash._t = setTimeout(()=>{ statusMsg.textContent = ''; }, 1600);
  }

  function withLinkedTokens(tokens){
    const t = { ...(tokens || {}) };
    const railBorder = String(t['--theme-rail-border'] || defaults['--theme-rail-border'] || '#2a3a58');
    t['--theme-frame-border'] = railBorder;
    return t;
  }

  function push(){
    try {
      window.parent?.postMessage({
        type:'np-theme-updated',
        tokens: withLinkedTokens(state)
      }, '*');
    } catch {}
  }

  function sameTokens(a={}, b={}){
    const keys = Array.from(new Set([...Object.keys(defaults), ...Object.keys(a||{}), ...Object.keys(b||{})]));
    return keys.every((k)=> String((a||{})[k] ?? defaults[k] ?? '') === String((b||{})[k] ?? defaults[k] ?? ''));
  }

  function inferActivePresetName(presets, selected=''){
    try {
      const explicit = String(selected || localStorage.getItem(ACTIVE_KEY) || '').trim();
      if (explicit && presets && presets[explicit]) return explicit;
      for (const [name, val] of Object.entries(presets || {})) {
        const p = normalizePreset(val);
        if (!p?.tokens) continue;
        if (sameTokens(state, p.tokens)) return name;
      }
    } catch {}
    return '';
  }

  function renderPresetOptions(selected=''){
    if (!presetSelect) return;
    const presets = loadPresets();
    const names = Object.keys(presets).sort((a,b)=>a.localeCompare(b));
    const activeName = inferActivePresetName(presets, selected);
    presetSelect.innerHTML = `<option value="">(select preset)</option>` + names.map(n=>{
      const label = String(n);
      return `<option value="${n.replace(/"/g,'&quot;')}">${label}</option>`;
    }).join('');
    if (activeName) {
      presetSelect.value = activeName;
      try { localStorage.setItem(ACTIVE_KEY, activeName); } catch {}
    }
  }

  presetSelect?.addEventListener('change', ()=>{
    const name = String(presetSelect?.value || '').trim();
    if (!name) return;
    const presets = loadPresets();
    const p = normalizePreset(presets[name]);
    if (!p) return flash('Preset missing');
    state = { ...defaults, ...(p.tokens || {}) };
    try { localStorage.setItem(ACTIVE_KEY, name); } catch {}
    render();
    push();
    flash(`Loaded: ${name}`);
  });

  document.getElementById('savePresetBtn')?.addEventListener('click', ()=>{
    const suggested = String(presetSelect?.value || '').trim();
    const name = String(prompt('Preset name:', suggested || '') || '').trim();
    if (!name) return;
    const presets = loadPresets();
    presets[name] = { tokens: withLinkedTokens(state) };
    savePresets(presets);
    try { localStorage.setItem(ACTIVE_KEY, name); } catch {}
    renderPresetOptions(name);
    flash(`Preset saved: ${name}`);
  });

  document.getElementById('deletePresetBtn')?.addEventListener('click', ()=>{
    const name = String(presetSelect?.value || '').trim();
    if (!name) return flash('Pick a preset');
    if (!confirm(`Delete preset "${name}"?`)) return;
    const presets = loadPresets();
    delete presets[name];
    savePresets(presets);
    renderPresetOptions('');
    flash(`Deleted: ${name}`);
  });

  document.getElementById('saveBtn').addEventListener('click', ()=>{
    try{ localStorage.setItem(KEY, JSON.stringify(withLinkedTokens(state))); }catch{}
    syncPickerCardBgVar();
    push();
    flash('Saved');
  });

  const exportModal = document.getElementById('exportModal');
  const exportJsonText = document.getElementById('exportJsonText');
  const exportCopyBtn = document.getElementById('exportCopyBtn');
  const exportCloseBtn = document.getElementById('exportCloseBtn');
  let lastExportJson = '';

  function closeExportModal(){
    if (!exportModal) return;
    exportModal.classList.remove('open');
    exportModal.setAttribute('aria-hidden', 'true');
  }

  function openExportModal(json){
    if (!exportModal || !exportJsonText) return;
    lastExportJson = String(json || '');
    exportJsonText.value = lastExportJson;
    exportModal.classList.add('open');
    exportModal.setAttribute('aria-hidden', 'false');
  }

  exportCloseBtn?.addEventListener('click', closeExportModal);
  exportModal?.addEventListener('click', (e)=>{ if (e.target === exportModal) closeExportModal(); });
  document.addEventListener('keydown', (e)=>{ if (e.key === 'Escape') closeExportModal(); });

  exportCopyBtn?.addEventListener('click', async ()=>{
    const json = String(exportJsonText?.value || lastExportJson || '').trim();
    if (!json) return;
    const statusEl = document.getElementById('statusMsg');
    try {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(json);
        closeExportModal();
        if (statusEl) statusEl.textContent = 'Theme JSON copied to clipboard.';
        return;
      }
    } catch {}

    try {
      // iOS/Safari fallback: select editable textarea + execCommand copy.
      exportJsonText?.focus();
      exportJsonText?.select();
      const ok = document.execCommand('copy');
      if (ok) {
        try { exportJsonText.setSelectionRange(0, 0); } catch {}
        closeExportModal();
        if (statusEl) statusEl.textContent = 'Theme JSON copied to clipboard.';
        return;
      }
    } catch {}

    if (statusEl) statusEl.textContent = 'Select all and copy JSON manually.';
  });

  document.getElementById('exportBtn')?.addEventListener('click', ()=>{
    try {
      const activePresetName = String(presetSelect?.value || localStorage.getItem(ACTIVE_KEY) || '').trim();
      const payload = buildThemePayload(withLinkedTokens(state), activePresetName);
      const json = JSON.stringify(payload, null, 2);
      openExportModal(json);
    } catch {
      flash('Export failed');
    }
  });

  document.getElementById('importBtn')?.addEventListener('click', ()=>{
    if (importBusy) return;
    importBusy = true;
    try {
      const raw = prompt('Paste theme JSON:', '');
      if (!raw) return;
      let parsed = null;
      try { parsed = JSON.parse(String(raw)); } catch { flash('Invalid JSON'); return; }

      const normalized = normalizeThemePayload(parsed);
      state = { ...defaults, ...(normalized.tokens || {}) };
      const linked = withLinkedTokens(state);
      try { localStorage.setItem(KEY, JSON.stringify(linked)); } catch {}

      let appliedName = String(normalized.name || '').trim();
      if (appliedName) {
        const presets = loadPresets();
        presets[appliedName] = { tokens: linked };
        savePresets(presets);
        try { localStorage.setItem(ACTIVE_KEY, appliedName); } catch {}
      } else {
        try { localStorage.removeItem(ACTIVE_KEY); } catch {}
      }

      render();
      renderPresetOptions(appliedName);
      push();
      flash(appliedName ? `Theme imported: ${appliedName}` : 'Theme imported');
    } catch {
      flash('Import failed');
    } finally {
      importBusy = false;
    }
  });

  document.getElementById('resetBtn').addEventListener('click', ()=>{
    const slate = normalizePreset(loadPresets()['Slate Medium']);
    state = { ...defaults, ...(slate?.tokens || defaults) };
    try{ localStorage.setItem(KEY, JSON.stringify(withLinkedTokens(state))); }catch{}
    try{ localStorage.setItem(ACTIVE_KEY, 'Slate Medium'); }catch{}
    render();
    renderPresetOptions('Slate Medium');
    push();
    flash('Loaded default: Slate Medium');
  });

  window.addEventListener('message', (ev) => {
    try {
      const d = ev?.data || {};
      if (d.type === 'np-theme-sync') {
        const m = String(d.theme || '').toLowerCase();
        forcedUiMode = (m === 'light' || m === 'dark') ? m : '';
        updateEditorChrome();
      }
    } catch {}
  });


  function loadPresetByName(name=''){
    const n = String(name || '').trim();
    if (!n) return false;
    const all = loadPresets();
    const p = normalizePreset(all[n]);
    if (!p?.tokens) return false;
    state = { ...defaults, ...p.tokens };
    try { localStorage.setItem(KEY, JSON.stringify(withLinkedTokens(state))); } catch {}
    try { localStorage.setItem(ACTIVE_KEY, n); } catch {}
    render();
    renderPresetOptions(n);
    push();
    return true;
  }

  window.addEventListener('message', (ev)=>{
    const d = ev?.data || {};
    if (!d || typeof d !== 'object') return;
    if (d.type === 'np-theme-load-preset') {
      loadPresetByName(String(d.name || ''));
    }
  });

  function applyThemeEditorZones(){
    try {
      const card = document.querySelector('.wrap > .card');
      const outer = String(state['--theme-rail-bg'] || defaults['--theme-rail-bg'] || '#0b1426');
      if (card) {
        card.style.setProperty('background', outer, 'important');
        card.style.setProperty('background-color', outer, 'important');
      }
      const wrap = document.getElementById('pickerCardsWrap');
      const inner = String(state['--theme-hero-card-bg'] || defaults['--theme-hero-card-bg'] || '#0a122273');
      if (wrap) {
        wrap.style.setProperty('background', inner, 'important');
        wrap.style.setProperty('background-color', inner, 'important');
      }
    } catch {}
  }

  function applyPickerTileBg(){
    try {
      const c = String(state['--theme-picker-card-bg'] || '#30436b');
      document.querySelectorAll('#pickerCardsWrap .token').forEach((el)=>{
        el.style.setProperty('background', c, 'important');
        el.style.setProperty('background-color', c, 'important');
      });
    } catch {}
  }

  const _render = render;
  render = function(){
    _render();
    applyThemeEditorZones();
    applyPickerTileBg();
  };

  render();
  applyThemeEditorZones();
  renderPresetOptions();
})();
</script>
</body>
</html>
