  <script>
    // Fallbacks for embedded preview mode.
    window.addEventListener('DOMContentLoaded', () => {
      try {
        const embedded = (window.top !== window.self);
        if (embedded) {
          const host = location.hostname || '10.0.0.233';
          const proto = location.protocol || 'http:';
          const b = document.body;
          const c = document.getElementById('content');
          const bgA = document.getElementById('background-a');
          const bgB = document.getElementById('background-b');

          // Ensure background layers are actually visible in iframe context.
          if (b) b.style.background = 'transparent';
          if (c) { c.style.position = 'relative'; c.style.zIndex = '1'; }
          if (bgA) { bgA.style.zIndex = '0'; bgA.style.opacity = '1'; }
          if (bgB) { bgB.style.zIndex = '0'; bgB.style.opacity = '0'; }

          // Use current art and let CSS blur/filter create the backdrop.
          if (bgA && !bgA.style.backgroundImage) {
            bgA.style.backgroundImage = `url(${proto}//${host}:3101/art/current.jpg?t=${Date.now()})`;
          }
        }
      } catch (_) {}

      // If boot JS errors, don't leave preview on a blank/white boot screen.
      setTimeout(() => {
        try {
          const b = document.body;
          if (b && b.classList.contains('booting')) {
            b.classList.remove('booting');
            b.classList.add('ready');
          }
        } catch (_) {}
      }, 1800);
    });
  </script>

  <script>
    // Prime background immediately so top/bottom browser UI areas are covered at first paint.
    (function(){
      try {
        const host = location.hostname || '10.0.0.233';
        const proto = location.protocol || 'http:';
        const url = `${proto}//${host}:3101/art/current_bg_640_blur.jpg`;
        const a = document.getElementById('background-a');
        const b = document.getElementById('background-b');
        try {
          const root = document.documentElement;
          if (root) {
            root.style.backgroundImage = `url(${url})`;
            root.style.backgroundSize = 'cover';
            root.style.backgroundPosition = 'center center';
            root.style.backgroundRepeat = 'no-repeat';
            root.style.backgroundAttachment = 'fixed';
          }
          const body = document.body;
          if (body) {
            body.style.backgroundImage = `url(${url})`;
            body.style.backgroundSize = 'cover';
            body.style.backgroundPosition = 'center center';
            body.style.backgroundRepeat = 'no-repeat';
            body.style.backgroundAttachment = 'fixed';
          }
        } catch {}
        if (a && !a.style.backgroundImage) a.style.backgroundImage = `url(${url})`;
        if (a) a.style.opacity = '1';
        if (b) b.style.opacity = '0';

      } catch {}
    })();
  </script>

    <script>
    // Pull-to-refresh (controller pages)
    (function enablePullToRefresh(){
      if (window.__npPullRefreshBound) return;
      window.__npPullRefreshBound = true;
      let startY = 0;
      let tracking = false;
      let armed = false;
      const THRESH = 80;

      const topScrollable = () => {
        const el = document.scrollingElement || document.documentElement || document.body;
        return (el?.scrollTop || window.pageYOffset || 0) <= 0;
      };

      window.addEventListener('touchstart', (e) => {
        if (!e.touches || e.touches.length !== 1) return;
        if (!topScrollable()) return;
        startY = e.touches[0].clientY;
        tracking = true;
        armed = false;
      }, { passive: true });

      window.addEventListener('touchmove', (e) => {
        if (!tracking || !e.touches || e.touches.length !== 1) return;
        const dy = e.touches[0].clientY - startY;
        if (dy > THRESH && topScrollable()) armed = true;
      }, { passive: true });

      window.addEventListener('touchend', () => {
        if (tracking && armed) location.reload();
        tracking = false;
        armed = false;
      }, { passive: true });
    })();

    // Ensure overlays don't persist when returning via history/BFCache
    (function resetOverlaysOnReturn(){
      function closeAll(){
        try { document.getElementById('npAlbumModal')?.classList.remove('open'); } catch {}
        try {
          const mo = document.getElementById('modalOverlay');
          mo?.classList.remove('open');
          mo?.setAttribute('aria-hidden','true');
        } catch {}
        try {
          const ad = document.getElementById('artist-details-container');
          if (ad) ad.style.display = 'none';
        } catch {}
        try { document.body.classList.remove('modal-open'); } catch {}
      }
      window.addEventListener('pageshow', closeAll);
      document.addEventListener('visibilitychange', ()=>{ if (!document.hidden) closeAll(); });
    })();

    // Local-track album tap -> same album card/actions as controller home
    (function bindAlbumCardFromAlbumLink(){
      const base = `${location.protocol}//${location.hostname||'10.0.0.233'}:3101`;
      let runtimeTrackKey='';
      let ctx={album:'',artist:'',art:'',tracks:[]};
      const albumLink=document.getElementById('album-link');
      const modal=document.getElementById('npAlbumModal');
      const tracksHost=document.getElementById('npAlbumTracks');
      if(!albumLink||!modal||!tracksHost) return;

      async function ensureKey(){
        if (runtimeTrackKey) return runtimeTrackKey;
        try { const r=await fetch(`${base}/config/runtime`,{cache:'no-store'}); const j=await r.json().catch(()=>({})); runtimeTrackKey=String(j?.config?.trackKey||'').trim(); } catch {}
        return runtimeTrackKey;
      }
      function reqHeaders(json=true){ return Object.assign({}, json?{'Content-Type':'application/json'}:{}, runtimeTrackKey?{'x-track-key':runtimeTrackKey}:{}); }
      async function sendPlayback(action, extra={}){ await ensureKey(); await fetch(`${base}/config/diagnostics/playback`,{method:'POST',headers:reqHeaders(true),body:JSON.stringify(Object.assign({action},extra||{}))}).catch(()=>null); }

      function open(){ modal.classList.add('open'); }
      function close(){ modal.classList.remove('open'); }
      function render(){
        document.getElementById('npAlbumTitle').textContent = ctx.album || '(album)';
        const metaEl = document.getElementById('npAlbumMeta');
        if (metaEl) {
          const a = String(ctx.artist||'').trim();
          metaEl.innerHTML = a ? `<button type="button" class="artistLink" id="npAlbumArtistLink" title="Open artist">${a}</button>` : '';
        }
        document.getElementById('npAlbumArt').src = ctx.art || `${base}/art/current.jpg`;
        tracksHost.innerHTML = (ctx.tracks||[]).map((t,i)=>{ const nm=String(t.title||t.file||'').trim()||'(track)'; const f=encodeURIComponent(String(t.file||'')); return `<li><span>${i+1}. ${nm}</span><span class='trackBtns'><button title='Play now' aria-label='Play now' data-track-action='play' data-track-file='${f}'>▶</button><button title='Add to queue' aria-label='Add to queue' data-track-action='add' data-track-file='${f}'>＋</button></span></li>`; }).join('') || '<li>No tracks found</li>';
      }

      async function fetchAlbumTracks(album, artist){
        await ensureKey();
        async function fetchPreviewTracks(body){
          const r=await fetch(`${base}/config/queue-wizard/preview`,{method:'POST',headers:reqHeaders(true),body:JSON.stringify(body)});
          const j=await r.json().catch(()=>({}));
          return (r.ok && j?.ok && Array.isArray(j.tracks)) ? j.tracks : [];
        }
        let tracks = await fetchPreviewTracks({genres:[],artists:artist?[artist]:[],albums:album?[album]:[],excludeGenres:[],minRating:0,maxTracks:2000});
        if (!tracks.length && album) tracks = await fetchPreviewTracks({genres:[],artists:[],albums:[album],excludeGenres:[],minRating:0,maxTracks:2000});
        if (!tracks.length && artist) tracks = await fetchPreviewTracks({genres:[],artists:[artist],albums:[],excludeGenres:[],minRating:0,maxTracks:2000});
        if (album && tracks.length) {
          const aLower = album.toLowerCase();
          const narrowed = tracks.filter((t)=>String(t?.album||'').trim().toLowerCase()===aLower);
          if (narrowed.length) tracks = narrowed;
        }
        return tracks;
      }

      let __albumTapBusy = false;
      async function onAlbumTap(ev){
        if (ev) {
          ev.preventDefault();
          ev.stopPropagation();
          if (typeof ev.stopImmediatePropagation==='function') ev.stopImmediatePropagation();
        }
        if (__albumTapBusy) return;
        const d = (window.lastNowPlayingData || {});
        const isLocal = !(d?.isStream===true) && !(d?.isAirplay===true) && !(d?.isUpnp===true);
        if (!isLocal) return;
        __albumTapBusy = true;
        try {
          ctx = { album:String(d?.album||'').trim(), artist:String(d?.artist||'').trim(), art:String(d?.albumArtUrl||d?.altArtUrl||'').trim(), tracks:[] };
          render();
          tracksHost.innerHTML = '<li>Loading album tracks…</li>';
          open();
          try { ctx.tracks = await fetchAlbumTracks(ctx.album, ctx.artist); } catch { ctx.tracks = []; }
          if (modal.classList.contains('open')) render();
        } finally {
          setTimeout(()=>{ __albumTapBusy = false; }, 120);
        }
      }

      function syncAlbumTapState(){
        const d = (window.lastNowPlayingData || {});
        const isLocal = !(d?.isStream===true) && !(d?.isAirplay===true) && !(d?.isUpnp===true);
        if (isLocal) {
          albumLink.style.pointerEvents = 'auto';
          albumLink.style.cursor = 'pointer';
          albumLink.title = 'Open album details';
        }
      }
      setInterval(syncAlbumTapState, 900);
      syncAlbumTapState();

      albumLink.addEventListener('pointerdown', onAlbumTap, {capture:true, passive:false});
      albumLink.addEventListener('click', onAlbumTap, {capture:true, passive:false});

      document.getElementById('npAlbumCloseBtn')?.addEventListener('click', close);
      modal.addEventListener('click', (ev)=>{
        if(ev.target===modal) { close(); return; }
        const artistBtn = ev.target.closest('#npAlbumArtistLink');
        if (artistBtn) {
          const artist = String(ctx.artist||'').trim();
          if (artist) {
            const album = String(ctx.album||'').trim();
            const q = new URLSearchParams({ artist });
            if (album) q.set('album', album);
            location.href = `controller-artists.html?${q.toString()}`;
          }
        }
      });
      document.getElementById('npAlbumAppendBtn')?.addEventListener('click', async ()=>{ await sendPlayback('addalbum',{mode:'append',album:ctx.album,artist:ctx.artist||''}); close(); });
      document.getElementById('npAlbumCropBtn')?.addEventListener('click', async ()=>{ await sendPlayback('addalbum',{mode:'crop',album:ctx.album,artist:ctx.artist||''}); close(); });
      document.getElementById('npAlbumReplaceBtn')?.addEventListener('click', async ()=>{ await sendPlayback('addalbum',{mode:'replace',album:ctx.album,artist:ctx.artist||''}); close(); });
      tracksHost.addEventListener('click', async (ev)=>{ const b=ev.target.closest('button[data-track-action][data-track-file]'); if(!b) return; let file=''; try{file=decodeURIComponent(String(b.getAttribute('data-track-file')||''));}catch{file=String(b.getAttribute('data-track-file')||'')} if(!file) return; const a=String(b.getAttribute('data-track-action')||''); if(a==='play'){ await sendPlayback('playfile',{file}); close(); } else { await sendPlayback('addfile',{file}); } });
    })();
</script>
