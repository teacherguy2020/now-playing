  <style>
    html,body{color:#111;min-height:100dvh;overflow:auto;background-color:rgba(0,0,0,.56) !important;background-image:url('http://10.0.0.233:3101/art/current_bg_640_blur.jpg') !important;background-size:cover !important;background-position:center top !important;background-repeat:no-repeat !important;background-attachment:fixed !important;background-blend-mode:multiply !important;}
    body::before{content:none !important;display:none !important}
    #content{min-height:100dvh !important;}

    #background-a,#background-b{display:none !important;opacity:0 !important}
    #content{position:relative;z-index:1}
  </style>
  <script>
    // Fallbacks for embedded preview mode.
    window.addEventListener('DOMContentLoaded', () => {
      try {
        const embedded = (window.top !== window.self);
        if (embedded) {
          const host = location.hostname || '10.0.0.233';
          const proto = location.protocol || 'http:';
          const b = document.body;
          const c = document.getElementById('content');
          const bgA = document.getElementById('background-a');
          const bgB = document.getElementById('background-b');

          // Ensure background layers are actually visible in iframe context.
          if (b) b.style.background = 'transparent';
          if (c) { c.style.position = 'relative'; c.style.zIndex = '1'; }
          if (bgA) { bgA.style.zIndex = '0'; bgA.style.opacity = '1'; }
          if (bgB) { bgB.style.zIndex = '0'; bgB.style.opacity = '0'; }

          // Use current art and let CSS blur/filter create the backdrop.
          if (bgA && !bgA.style.backgroundImage) {
            bgA.style.backgroundImage = `url(${proto}//${host}:3101/art/current.jpg?t=${Date.now()})`;
          }
        }
      } catch (_) {}

      // If boot JS errors, don't leave preview on a blank/white boot screen.
      setTimeout(() => {
        try {
          const b = document.body;
          if (b && b.classList.contains('booting')) {
            b.classList.remove('booting');
            b.classList.add('ready');
          }
        } catch (_) {}
      }, 1800);

    });
  </script>

  <style>
    #cnpBack{grid-area:back;position:relative;justify-self:end;align-self:start;z-index:20;border:1px solid rgba(255,255,255,.28);background:rgba(8,14,24,.66);color:#e9f1ff;border-radius:999px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:20px;text-decoration:none;backdrop-filter:blur(8px);transform:translateY(28px)}

    body.phone-ui{overflow:auto !important;-webkit-overflow-scrolling:touch;--artSize:min(85vw,420px)}

    @media (max-width: 900px){
      body{--artSize:min(85vw,420px)}

      position:relative;

      min-height: calc(100dvh + 520px) !important;

    }

    body.phone-ui #artist-name{grid-area:artist;justify-self:center;text-align:center;width:100%;margin-top:-10px}

    body.phone-ui #file-info{grid-area:file;justify-self:center;text-align:center;width:100%;margin-top:-10px}
    body.phone-ui #next-up{grid-area:nextup;position:relative !important;left:auto !important;right:auto !important;top:auto !important;bottom:auto !important;transform:none !important;z-index:5600 !important;pointer-events:auto !important;opacity:1 !important;visibility:visible !important;justify-self:stretch;margin-top:-10px}
    body.phone-ui #progress-bar-wrapper{grid-area:progress;position:relative !important;left:auto !important;right:auto !important;top:auto !important;bottom:auto !important;transform:none !important;width:min(calc(92vw - 40px), calc(var(--artSize, 640px) - 40px)) !important;justify-self:center}
    body.phone-ui #phone-controls{grid-area:controls;display:flex !important;position:relative !important;left:auto !important;right:auto !important;top:auto !important;bottom:auto !important;transform:none !important;z-index:5590 !important;margin-top:-7px !important;justify-self:center;width:100%;gap:6px !important}
    body.phone-ui #phone-controls.has-podcast-seek{gap:6px !important}
    body.phone-ui #phone-controls .ctl.seek-ctl{display:none !important}
    body.phone-ui #phone-controls .ctl.big{width:calc(var(--ctlBigFinal) * 0.97) !important;height:calc(var(--ctlBigFinal) * 0.97) !important;border-radius:16px !important}
    body.phone-ui #phone-controls #btn-play{margin-left:6px !important; margin-right:6px !important;}
    body.phone-ui #phone-controls .ctl.seek-ctl .seekLbl{font-size:13px;font-weight:700;letter-spacing:.01em;line-height:1}
    body.phone-ui .podSeekInline{display:none;align-items:center;justify-content:center;border:1px solid rgba(255,224,130,.5);background:rgba(30,20,8,.38);color:#f8e7b0;border-radius:999px;min-width:36px;height:26px;padding:0 8px;font-size:12px;font-weight:700;line-height:1;letter-spacing:.01em;vertical-align:middle}
    body.phone-ui #btn-seek-back-inline{padding-right:12px;margin-right:8px}
    body.phone-ui.is-podcast .podSeekInline{display:inline-flex}
    /* Brass-ring control treatment */
    body.phone-ui #phone-controls .ctl{
      position:relative;
      flex:0 0 auto !important;
      width:calc(var(--ctlFinal) * 0.97) !important;
      height:calc(var(--ctlFinal) * 0.97) !important;
      aspect-ratio:1 / 1;
      border-radius:16px !important;
      padding:0 !important;
      position:relative;
      border:2px solid transparent !important;
      background:
        linear-gradient(rgba(16,22,34,.52), rgba(16,22,34,.52)) padding-box,
        linear-gradient(135deg, rgba(255,230,150,.95) 0%, rgba(255,244,198,.82) 32%, rgba(246,194,86,.96) 60%, rgba(191,130,26,.92) 100%) border-box !important;
      box-shadow:
        0 0 0 1px rgba(255,241,188,.34) inset,
        0 1px 0 rgba(255,255,255,.10) inset;
      overflow:hidden;
    }
    body.phone-ui #phone-controls .ctl::before{
      content:'';
      position:absolute;
      inset:2px;
      border-radius:inherit;
      pointer-events:none;
      background:
        radial-gradient(120% 80% at 18% 8%, rgba(255,255,255,.34), rgba(255,255,255,0) 44%),
        linear-gradient(180deg, rgba(255,250,220,.10), rgba(0,0,0,0));
      mix-blend-mode:screen;
    }
    body.phone-ui #phone-controls #btn-play::after{
      content:'';
      position:absolute;
      inset:-2px;
      border-radius:inherit;
      pointer-events:none;
      opacity:0;
      /* ring-only sweep: transparent center so icon/body do not appear to rotate */
      background:
        conic-gradient(from 0deg, rgba(255,235,170,0) 0deg, rgba(255,245,210,.92) 24deg, rgba(255,235,170,0) 58deg, rgba(255,235,170,0) 360deg),
        radial-gradient(circle at center, transparent 62%, rgba(0,0,0,.98) 63%);
      -webkit-mask:
        radial-gradient(circle at center, transparent 61.5%, #000 64.5%);
      mask:
        radial-gradient(circle at center, transparent 61.5%, #000 64.5%);
      mix-blend-mode:screen;
      transform-origin:50% 50%;
    }
    body.phone-ui #phone-controls .ctl:active{
      box-shadow:
        0 0 14px 3px rgba(255,193,44,.36),
        0 0 0 1px rgba(255,243,194,.42) inset,
        0 1px 0 rgba(255,255,255,.14) inset;
    }
    body.phone-ui #phone-controls .ctl.tapPulse{
      box-shadow:
        0 0 26px 7px rgba(255,193,44,.52),
        0 0 0 1px rgba(255,243,194,.46) inset,
        0 1px 0 rgba(255,255,255,.16) inset !important;
    }
    @media (hover:hover) {
      body.phone-ui #phone-controls .ctl:hover{
        box-shadow:
          0 0 22px 5px rgba(255,193,44,.46),
          0 0 0 1px rgba(255,243,194,.42) inset,
          0 1px 0 rgba(255,255,255,.14) inset;
      }
    }
    body.phone-ui #phone-controls .ctl:focus-visible{
      box-shadow:
        0 0 0 1px rgba(255,243,194,.42) inset,
        0 1px 0 rgba(255,255,255,.14) inset;
    }
    /* Keep play icon green while preserving brass ring aesthetic */
    /* Neutralize sticky .on glow from base theme; keep polished brass */
    body.phone-ui #phone-controls .ctl.on,
    body.phone-ui #phone-controls .ctl.big.on{
      background:
        linear-gradient(rgba(16,22,34,.52), rgba(16,22,34,.52)) padding-box,
        linear-gradient(135deg, rgba(255,230,150,.95) 0%, rgba(255,244,198,.82) 32%, rgba(246,194,86,.96) 60%, rgba(191,130,26,.92) 100%) border-box !important;
      box-shadow:
        0 0 0 1px rgba(255,241,188,.34) inset,
        0 1px 0 rgba(255,255,255,.10) inset !important;
      color:inherit;
    }
    body.phone-ui #phone-controls #btn-play.on{
      color:#22c55e !important;
      background:
        linear-gradient(rgba(16,22,34,.52), rgba(16,22,34,.52)) padding-box,
        linear-gradient(135deg, rgba(255,230,150,.95) 0%, rgba(255,244,198,.82) 32%, rgba(246,194,86,.96) 60%, rgba(191,130,26,.92) 100%) border-box !important;
      box-shadow:
        0 0 0 1px rgba(255,241,188,.34) inset,
        0 1px 0 rgba(255,255,255,.10) inset,
        0 0 12px rgba(34,197,94,.22);
    }
    body.phone-ui #phone-controls #btn-play.on::after{
      opacity:0;
      animation:none;
    }
    @keyframes brassSweep { to { transform: rotate(360deg); } }

    /* Golden active indicator ring (play/pause control lane) */
    body.phone-ui #phone-controls{ position:relative; isolation:isolate; }
    body.phone-ui #phone-controls::before{
      content:''; position:absolute; inset:-10px -8px; pointer-events:none; z-index:0;
      background:radial-gradient(65% 85% at 50% 45%, rgba(232,175,72,.12), rgba(232,175,72,0) 72%);
      filter: blur(8px);
    }
    body.phone-ui #phone-controls::after{
      content:''; position:absolute; inset:0; pointer-events:none; z-index:0; opacity:.045;
      background-image: radial-gradient(rgba(255,255,255,.72) .45px, transparent .45px);
      background-size: 3px 3px;
      mix-blend-mode: soft-light;
    }
    body.phone-ui #phone-controls .ctl{ z-index:1; }
    body.phone-ui #phone-controls #btn-play svg{ opacity:0; }
    body.phone-ui #activeCtlRing{
      position:absolute; top:0; left:0; width:0; height:0; transform:translate3d(0,0,0);
      transition: transform 420ms cubic-bezier(0.34, 1.2, 0.64, 1), width 280ms ease, height 280ms ease;
      pointer-events:none; z-index:4;
    }
    body.phone-ui #activeCtlRing .glow{
      position:absolute; inset:0; border-radius:18px; filter:blur(8px); opacity:.15; background:#e8af48;
    }
    body.phone-ui #activeCtlRing .clip{
      position:absolute; inset:0; border-radius:18px; overflow:hidden;
    }
    body.phone-ui #activeCtlRing .spin{
      position:absolute; inset:0;
      padding:2px;
      box-sizing:border-box;
      border-radius:18px;
      animation: goldSpin 4.5s linear infinite;
      background: conic-gradient(
        from 0deg,
        #533517 0% 10.5%, #c49746 10.5% 27%, #feeaa5 27% 35%,
        #ffffff 35% 38%, #ffc0cb 38% 39.5%, #8ec5ff 39.5% 41%, #c49746 41% 50%,
        #533517 50% 60.5%, #c49746 60.5% 77%, #feeaa5 77% 85%,
        #ffffff 85% 88%, #ffc0cb 88% 89.5%, #8ec5ff 89.5% 91%, #c49746 91% 100%
      ) border-box;
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }
    @keyframes goldSpin { to { transform:rotate(360deg); } }
    body.phone-ui #activeCtlRing .plate{
      position:absolute; inset:2px; border-radius:16px;
      background:
        radial-gradient(120% 80% at 18% 8%, rgba(255,255,255,.34), rgba(255,255,255,0) 44%),
        linear-gradient(180deg, rgba(255,250,220,.10), rgba(0,0,0,0)),
        linear-gradient(rgba(16,22,34,.60), rgba(16,22,34,.60));
      border:1px solid rgba(255,255,255,.12);
      box-shadow: 0 1px 0 rgba(255,255,255,.10) inset;
    }
    body.phone-ui #activeCtlSymbol{
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      color:#e9eef6; font-size:22px; line-height:1; font-weight:700; letter-spacing:.02em;
      text-shadow:0 1px 8px rgba(0,0,0,.45);
      transform:translateX(1px);
      transition:opacity 180ms ease;
      z-index:2;
    }

    body.phone-ui #mode-logo{display:none !important}

    /* Landscape phone tuning: keep art anchored full-left and scale everything sanely */
    @media (orientation: landscape) and (max-height: 520px) {
      body.phone-ui { --artSize: min(85vw, 420px); }
      body.phone-ui #content{
        grid-template-columns: 48% minmax(0, 1fr);
        grid-template-areas:
          "back back"
          "art artist"
          "art title"
          "art stars"
          "art album"
          "art file"
          "art controls"
          "art progress"
          "art nextup";
        column-gap: 14px;
        row-gap: 8px;
      }
      body.phone-ui #album-art-wrapper{justify-self:start;margin-top:8px !important}
      body.phone-ui #progress-bar-wrapper{justify-self:stretch;width:100% !important;margin-top:2px}
      body.phone-ui #phone-controls{justify-self:stretch;width:100%}
      body.phone-ui #phone-controls .ctl{flex:0 0 auto !important;width:calc(var(--ctlFinal) * 0.97) !important;height:calc(var(--ctlFinal) * 0.97) !important;border-radius:16px !important}
      body.phone-ui #phone-controls .ctl.big{width:calc(var(--ctlBigFinal) * 0.97) !important;height:calc(var(--ctlBigFinal) * 0.97) !important;border-radius:16px !important}
      body.phone-ui #next-up{margin-top:2px;justify-self:stretch;width:100%}
      #cnpBack{justify-self:start;transform:none !important}
    }
    @media (orientation: landscape) and (max-height: 520px) and (display-mode: standalone) {
      body.phone-ui #content{padding-left:calc(var(--padSide) + 40px) !important}
    }
    #ratingStars .loading{opacity:1;color:#d4af37;display:inline-block;animation:ratingSpin 1s linear infinite;transform-origin:50% 54%}
    @keyframes ratingSpin{to{transform:rotate(360deg)}}
    /* Remove extra dim overlays for prototype */
    #album-art-bg{display:none !important;opacity:0 !important;background:none !important}
    #background-overlay,.screen-dim,.dim-layer{display:none !important;opacity:0 !important}

    /* Personnel panel: on phone place a bit lower so top area remains tappable to dismiss */
    body.phone-ui #artist-details-container{
      align-items:flex-start !important;
      justify-content:center !important;
      padding-top: calc(env(safe-area-inset-top, 0px) + 104px) !important;
      padding-left: 12px;
      padding-right: 12px;
      z-index: 7000 !important; /* above phone controls lane */
    }
    /* prevent accidental text selection in controller-now-playing */
    body.phone-ui, body.phone-ui * { -webkit-user-select:none; user-select:none; }
    /* Album line affordance: no underline, use share glyph like radio */
    body.phone-ui #album-link { text-decoration: none; }
    body.phone-ui #album-link .share-icon {
      display:inline-block !important;
      width:13px;
      height:13px;
      margin-left:6px;
      vertical-align:-2px;
      opacity:.92;
      fill:currentColor;
    }
    /* Keep playback chrome visible; personnel panel overlays above it */
    body.modal-open #progress-bar-wrapper,
    body.modal-open #phone-controls,
    body.modal-open #next-up,
    body.modal-open #mode-logo {
      display: revert !important;
    }

    body.cnp-exit #album-art-bg{opacity:0 !important;background-image:none !important}

    /* Album modal (same interaction model as controller home) */
    .albumModal{position:fixed;inset:0;display:none;background:rgba(0,0,0,.46);z-index:9000;align-items:center;justify-content:center}
    .albumModal.open{display:flex}
    .albumCard{position:relative;width:min(680px,94vw);max-height:88vh;overflow:auto;background:rgba(0,0,0,.82);border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:12px;backdrop-filter:blur(10px)}
    .queueModal{position:fixed;inset:0;display:none;background:rgba(0,0,0,.28);z-index:9100;align-items:flex-start;justify-content:center;padding-top:calc(env(safe-area-inset-top,0px) + 150px)}
    .queueModal.open{display:flex}
    .queueCard{position:relative;width:min(760px,94vw);height:min(62vh,620px);background:rgba(0,0,0,.58);border:1px solid rgba(255,255,255,.16);border-radius:14px;overflow:hidden;backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px)}
    .queueFrame{width:100%;height:100%;border:0;display:block;background:transparent}
    .albumHead{display:flex;gap:10px;align-items:center;margin-bottom:10px}
    .albumHead img{width:54px;height:54px;border-radius:8px;object-fit:cover;background:#0a1222}
    .albumTitle{font-size:17px;font-weight:700}
    .albumMeta{font-size:12px;color:var(--muted,#9eb3d6)}
    .albumMeta .artistLink{color:var(--accent,#4aa8ff);text-decoration:underline;text-underline-offset:2px;background:transparent;border:0;padding:0;margin:0;font:inherit;cursor:pointer}
    .albumTracks{list-style:none;margin:8px 0 0;padding:0}
    .albumTracks li{padding:8px 0;border-bottom:1px solid #1f2a3d;display:flex;justify-content:space-between;gap:8px;font-size:14px}
    .trackBtns{display:flex;gap:6px}
    .trackBtns button{border:1px solid #2a3a58;background:#132038;color:#e6efff;width:30px;height:30px;border-radius:999px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-weight:700;line-height:1;cursor:pointer}
    .albumBtns button{border:1px solid #2a3a58;background:#132038;color:#e6efff;border-radius:10px;padding:6px 9px;cursor:pointer}
    .albumBtns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .modalX{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:999px;border:1px solid #2a3a58;background:rgba(19,32,56,.95);color:#e6efff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;line-height:1}
    .modalX:active{transform:scale(.96)}

    /* Next-up art loading spinner */
    #next-up-img{position:relative}
    #next-up-img.nextup-loading{opacity:.18}
    #next-up-img.nextup-loading::after{content:''}
    #next-up-img-wrap{position:relative;display:inline-flex}
    #nextUpSpin{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
    #nextUpSpin[hidden]{display:none !important}
    #nextUpSpin::before{content:'';width:14px;height:14px;border-radius:999px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;animation:nextUpSpin .8s linear infinite}
    @keyframes nextUpSpin{to{transform:rotate(360deg)}}

    /* Keep hidden until fully loaded, then slide in */
    body.cnp-hidden{opacity:0;visibility:hidden}
    body.cnp-ready{visibility:visible;animation:cnpSlideIn .22s ease-out both}
    body.cnp-exit{animation:cnpSlideOut .2s ease-in both}
    @keyframes cnpSlideIn{
      from{transform:translateX(26px);opacity:.78}
      to{transform:translateX(0);opacity:1}
    }
    @keyframes cnpSlideOut{
      from{transform:translateX(0);opacity:1}
      to{transform:translateX(46px);opacity:.5}
    }

    /* Home card reveal underlay during exit */
    #homeRevealCard{
      position:fixed;
      left:14px;
      right:14px;
      top:calc(env(safe-area-inset-top,0px) + 10px);
      z-index:0;
      opacity:0;
      transform:translateX(-14px);
      transition:opacity .16s ease, transform .18s ease;
      pointer-events:none;

    <script>
    // Pull-to-refresh (controller pages)
    (function enablePullToRefresh(){
      if (window.__npPullRefreshBound) return;
      window.__npPullRefreshBound = true;
      let startY = 0;
      let tracking = false;
      let armed = false;
      const THRESH = 80;

      const topScrollable = () => {
        const el = document.scrollingElement || document.documentElement || document.body;
        return (el?.scrollTop || window.pageYOffset || 0) <= 0;
      };

      window.addEventListener('touchstart', (e) => {
        if (!e.touches || e.touches.length !== 1) return;
        if (!topScrollable()) return;
        startY = e.touches[0].clientY;
        tracking = true;
        armed = false;
      }, { passive: true });

      window.addEventListener('touchmove', (e) => {
        if (!tracking || !e.touches || e.touches.length !== 1) return;
        const dy = e.touches[0].clientY - startY;
        if (dy > THRESH && topScrollable()) armed = true;
      }, { passive: true });

      window.addEventListener('touchend', () => {
        if (tracking && armed) location.reload();
        tracking = false;
        armed = false;
      }, { passive: true });
    })();

    // Next-up art spinner until artwork is ready
    (function bindNextUpSpinner(){
      const img = document.getElementById('next-up-img');
      const spin = document.getElementById('nextUpSpin');
      if (!img || !spin) return;

      function isLoadedSrc(){
        const s = String(img.getAttribute('src') || '').trim();
        return !!s && !/current\.jpg(?:\?|$)/.test(s) && !/data:image\//.test(s);
      }
      function show(){ spin.hidden = false; img.classList.add('nextup-loading'); }
      function hide(){ spin.hidden = true; img.classList.remove('nextup-loading'); }
      function sync(){
        if (isLoadedSrc() && img.complete && img.naturalWidth > 1) hide();
        else show();
      }

      img.addEventListener('load', ()=>{ hide(); });
      img.addEventListener('error', ()=>{ show(); });
      new MutationObserver(sync).observe(img, { attributes:true, attributeFilter:['src'] });

    (function bindActiveControlRing(){
      const host = document.getElementById('phone-controls');
      const ring = document.getElementById('activeCtlRing');
      const symbol = document.getElementById('activeCtlSymbol');
      const btnPlay = document.getElementById('btn-play');
      if (!host || !ring) return;
      const focusIds = ['btn-prev','btn-play','btn-next','btn-repeat','btn-shuffle'];
      let activeBtn = btnPlay || host.querySelector('button.ctl');

      function positionRing(btn){
        if (!(btn instanceof HTMLElement)) return;
        const hb = host.getBoundingClientRect();
        const bb = btn.getBoundingClientRect();
        const pad = 0;
        const w = Math.round(bb.width + pad * 2);
        const h = Math.round(bb.height + pad * 2);
        const x = Math.round((bb.left - hb.left) - pad);
        const y = Math.round((bb.top - hb.top) - pad);
        ring.style.width = `${w}px`;
        ring.style.height = `${h}px`;
        ring.style.transform = `translate3d(${x}px, ${y}px, 0)`;
      }

      function syncPlaySymbol(){
        if (!symbol || !btnPlay) return;
        const playing = btnPlay.classList.contains('on');
        symbol.textContent = playing ? '❚❚' : '▶';
        symbol.style.transform = playing ? 'translateX(0)' : 'translateX(1px)';
        symbol.style.color = playing ? '#22c55e' : '#e9eef6';
        symbol.style.opacity = (activeBtn && activeBtn.id === 'btn-play') ? '1' : '.0';
      }

      function setActive(btn){
        if (!(btn instanceof HTMLElement)) return;
        activeBtn = btn;
        positionRing(btn);
      }

      host.addEventListener('click', (ev) => {
        const btn = ev.target.closest('button.ctl');
        if (!btn) return;
        const id = String(btn.id || '');
        if (focusIds.includes(id)) setActive(btn);
        syncPlaySymbol();
      }, { passive:true });

      if (btnPlay) {
        new MutationObserver(() => { syncPlaySymbol(); }).observe(btnPlay, { attributes:true, attributeFilter:['class','aria-label'] });

      window.addEventListener('resize', () => { if (activeBtn) positionRing(activeBtn); });
      setTimeout(() => { if (activeBtn) positionRing(activeBtn); syncPlaySymbol(); }, 120);

        if (!tracks.length && artist) tracks = await fetchPreviewTracks({genres:[],artists:[artist],albums:[],excludeGenres:[],minRating:0,maxTracks:2000});
        if (album && tracks.length) {
          const aLower = album.toLowerCase();
          const narrowed = tracks.filter((t)=>String(t?.album||'').trim().toLowerCase()===aLower);
          if (narrowed.length) tracks = narrowed;
        }
        return tracks;
      }

      let __albumTapBusy = false;
      async function onAlbumTap(ev){
        if (__albumTapBusy) return;
        const d = (window.lastNowPlayingData || {});
        const streamKind = String(d?.streamKind || '').trim().toLowerCase();
        const isRadioNow = d?.isRadio === true || (d?.isStream === true && streamKind !== 'upnp') || d?.isAirplay === true || d?.isUpnp === true;
        const linkUrl = String(albumLink.getAttribute('href') || '').trim();
        const streamUrl = String(d?.radioAppleMusicUrl || d?.radioItunesUrl || d?.itunesUrl || '').trim();
        const externalUrl = linkUrl || streamUrl;
        const tapMode = String(albumLink.dataset.npTapMode || '').trim();

        if (isRadioNow || externalUrl || tapMode === 'external') {
          // If external link is present, always honor it (avoids early-load local/modal race).
          if (ev) {
            ev.preventDefault();
            ev.stopPropagation();
            if (typeof ev.stopImmediatePropagation==='function') ev.stopImmediatePropagation();
          }
          try { location.href = (externalUrl || linkUrl); } catch {}
          return;
        }

        if (tapMode !== 'local') return;
        if (ev) {
          ev.preventDefault();
          ev.stopPropagation();
          if (typeof ev.stopImmediatePropagation==='function') ev.stopImmediatePropagation();
        }
        __albumTapBusy = true;
        try {
          ctx = { album:String(d?.album||'').trim(), artist:String(d?.artist||'').trim(), art:String(d?.albumArtUrl||d?.altArtUrl||'').trim(), tracks:[] };
          render();
          tracksHost.innerHTML = '<li>Loading album tracks…</li>';
          open();
          try { ctx.tracks = await fetchAlbumTracks(ctx.album, ctx.artist); } catch { ctx.tracks = []; }
          if (modal.classList.contains('open')) render();
        } finally {
          setTimeout(()=>{ __albumTapBusy = false; }, 120);
        }
      }

      function syncAlbumTapState(){
        const d = (window.lastNowPlayingData || {});
        const streamKind = String(d?.streamKind || '').trim().toLowerCase();
        const isRadioNow = d?.isRadio === true || (d?.isStream === true && streamKind !== 'upnp') || d?.isAirplay === true || d?.isUpnp === true;
        const linkUrl = String(albumLink.getAttribute('href') || '').trim();
        const hasStreamFlags = (typeof d?.isStream === 'boolean') || (typeof d?.isAirplay === 'boolean') || (typeof d?.isUpnp === 'boolean') || (typeof d?.isRadio === 'boolean');
        const isLocal = hasStreamFlags ? !isRadioNow : false;

        if (isRadioNow || linkUrl) {
          albumLink.dataset.npTapMode = 'external';
          albumLink.style.pointerEvents = 'auto';
          albumLink.style.cursor = 'pointer';
          albumLink.title = 'Open in Apple Music';
          return;
        }

        if (hasStreamFlags && isLocal) {
          albumLink.dataset.npTapMode = 'local';
          albumLink.style.pointerEvents = 'auto';
          albumLink.style.cursor = 'pointer';
          albumLink.title = 'Open album details';
          return;
        }

        // Unknown/bootstrapping state: do not allow modal misfire.
        albumLink.dataset.npTapMode = 'unknown';
      }
      setInterval(syncAlbumTapState, 900);
      syncAlbumTapState();

      albumLink.addEventListener('pointerdown', onAlbumTap, {capture:true, passive:false});
      albumLink.addEventListener('click', onAlbumTap, {capture:true, passive:false});

      document.getElementById('npAlbumCloseBtn')?.addEventListener('click', close);
      modal.addEventListener('click', (ev)=>{
        if(ev.target===modal) { close(); return; }
        const artistBtn = ev.target.closest('#npAlbumArtistLink');
        if (artistBtn) {
          const artist = String(ctx.artist||'').trim();
          if (artist) {
            const album = String(ctx.album||'').trim();
            const q = new URLSearchParams({ artist });
            if (album) q.set('album', album);
            location.href = `controller-artists.html?${q.toString()}`;
          }
        }
      });
      document.getElementById('npAlbumAppendBtn')?.addEventListener('click', async ()=>{ await sendPlayback('addalbum',{mode:'append',album:ctx.album,artist:ctx.artist||''}); close(); });
      document.getElementById('npAlbumCropBtn')?.addEventListener('click', async ()=>{ await sendPlayback('addalbum',{mode:'crop',album:ctx.album,artist:ctx.artist||''}); close(); });
      document.getElementById('npAlbumReplaceBtn')?.addEventListener('click', async ()=>{ await sendPlayback('addalbum',{mode:'replace',album:ctx.album,artist:ctx.artist||''}); close(); });
      tracksHost.addEventListener('click', async (ev)=>{ const b=ev.target.closest('button[data-track-action][data-track-file]'); if(!b) return; let file=''; try{file=decodeURIComponent(String(b.getAttribute('data-track-file')||''));}catch{file=String(b.getAttribute('data-track-file')||'')} if(!file) return; const a=String(b.getAttribute('data-track-action')||''); if(a==='play'){ await sendPlayback('playfile',{file}); close(); } else { await sendPlayback('addfile',{file}); } });
    })();
</script>
</body>
</html>
