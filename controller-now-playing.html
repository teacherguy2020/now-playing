  <title>Controller Now Playing</title>
  <style>
    html,body{background:#0b1526;color:#fff;min-height:100dvh;overflow:auto;}
    #content{min-height:100dvh !important;}
    /* Background coverage */
    #background-a,#background-b{
      position:fixed !important;
      inset:0 !important;
      width:100vw !important;
      height:100dvh !important;
      background-size:cover !important;
      background-position:center center !important;
      background-repeat:no-repeat !important;
      z-index:0 !important;
      pointer-events:none !important;
    }
    #content{position:relative;z-index:1}
  </style>
  <script>
    // Fallbacks for embedded preview mode.
    window.addEventListener('DOMContentLoaded', () => {
      try {
        const embedded = (window.top !== window.self);
        if (embedded) {
          const host = location.hostname || '10.0.0.233';
          const proto = location.protocol || 'http:';
          const b = document.body;
          const c = document.getElementById('content');
          const bgA = document.getElementById('background-a');
          const bgB = document.getElementById('background-b');

          // Ensure background layers are actually visible in iframe context.
          if (b) b.style.background = 'transparent';
          if (c) { c.style.position = 'relative'; c.style.zIndex = '1'; }
          if (bgA) { bgA.style.zIndex = '0'; bgA.style.opacity = '1'; }
          if (bgB) { bgB.style.zIndex = '0'; bgB.style.opacity = '0'; }

          // Use current art and let CSS blur/filter create the backdrop.
          if (bgA && !bgA.style.backgroundImage) {
            bgA.style.backgroundImage = `url(${proto}//${host}:3101/art/current.jpg?t=${Date.now()})`;
          }
        }
      } catch (_) {}

      // If boot JS errors, don't leave preview on a blank/white boot screen.
      setTimeout(() => {
        try {
          const b = document.body;
          if (b && b.classList.contains('booting')) {
            b.classList.remove('booting');
            b.classList.add('ready');
          }
        } catch (_) {}
      }, 1800);
    });
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/index1080.css?v=20260228-airplay-logo-sm1" />


  <style>
    #cnpBack{position:fixed;right:10px;top:calc(env(safe-area-inset-top,0px) + 8px);z-index:9999;border:1px solid rgba(255,255,255,.28);background:rgba(8,14,24,.66);color:#e9f1ff;border-radius:999px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:20px;text-decoration:none;backdrop-filter:blur(8px)}
    /* Ensure mobile next-up lane is active on controller surface */
    /* Deterministic bottom lane: next-up at bottom, controls above */
    body.phone-ui #next-up{
      display:flex !important;
      opacity:1 !important;
      visibility:visible !important;
      left: var(--padSide) !important;
      right: var(--padSide) !important;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 46px) !important;
      z-index: 5600 !important;
    }
    body.phone-ui #phone-controls{
      bottom: calc(env(safe-area-inset-bottom, 0px) + var(--nextUpH) + 50px) !important;
      z-index: 5590 !important;
    }
    /* Keep album art clear of top-right close button (Safari tab baseline) */
    body.phone-ui #album-art-wrapper{margin-top:22px !important}
    /* In iOS standalone web-app mode, account for status-bar safe area */
    @media (display-mode: standalone) {
      body.phone-ui #album-art-wrapper{
        margin-top: calc(env(safe-area-inset-top, 0px) + 22px) !important;
      }
    }
    /* Balance side padding so visual center is actual center */
    body.phone-ui #content{
      padding-left: var(--padSide) !important;
      padding-right: var(--padSide) !important;
    }

    /* Personnel panel: on phone place a bit lower so top area remains tappable to dismiss */
    body.phone-ui #artist-details-container{
      align-items:flex-start !important;
      justify-content:center !important;
      padding-top: calc(env(safe-area-inset-top, 0px) + 104px) !important;
      padding-left: 12px;
      padding-right: 12px;
      z-index: 7000 !important; /* above phone controls lane */
    }
    /* Keep playback chrome visible; personnel panel overlays above it */
    body.modal-open #progress-bar-wrapper,
    body.modal-open #phone-controls,
    body.modal-open #next-up,
    body.modal-open #mode-logo {
      display: revert !important;
    }

    /* Keep hidden until fully loaded, then slide in */
    body.cnp-hidden{opacity:0;visibility:hidden}
    body.cnp-ready{visibility:visible;animation:cnpSlideIn .22s ease-out both}
    body.cnp-exit{animation:cnpSlideOut .2s ease-in both}
    @keyframes cnpSlideIn{
      from{transform:translateX(26px);opacity:.78}
      to{transform:translateX(0);opacity:1}
    }
    @keyframes cnpSlideOut{
      from{transform:translateX(0);opacity:1}
      to{transform:translateX(34px);opacity:.7}
    }
  </style>

</head>

<body class="booting">
  <a id="cnpBack" href="controller.html" aria-label="Back">›</a>
    <div id="background-a"></div>
  <div id="background-b"></div>
  <script>
    // Prime background immediately so top/bottom browser UI areas are covered at first paint.
    (function(){
      try {
        const host = location.hostname || '10.0.0.233';
        const proto = location.protocol || 'http:';
        const url = `${proto}//${host}:3101/art/current_bg_640_blur.jpg`;
        const a = document.getElementById('background-a');
        const b = document.getElementById('background-b');
        try {
          const root = document.documentElement;
          if (root) {
            root.style.backgroundImage = `url(${url})`;
            root.style.backgroundSize = 'cover';
            root.style.backgroundPosition = 'center center';
            root.style.backgroundRepeat = 'no-repeat';
            root.style.backgroundAttachment = 'fixed';
          }
          const body = document.body;
          if (body) {
            body.style.backgroundImage = `url(${url})`;
            body.style.backgroundSize = 'cover';
            body.style.backgroundPosition = 'center center';
            body.style.backgroundRepeat = 'no-repeat';
            body.style.backgroundAttachment = 'fixed';
          }
        } catch {}
        if (a && !a.style.backgroundImage) a.style.backgroundImage = `url(${url})`;
        if (a) a.style.opacity = '1';
        if (b) b.style.opacity = '0';

      } catch {}
    })();
  </script>

    <script>
      window.NP_DISABLE_ART_SWITCH = true;
      // Controller now-playing should always use phone portrait layout.
      try {
        document.body.classList.add('phone-ui','cnp-hidden');
        window.addEventListener('load', () => {
          document.body.classList.remove('cnp-hidden');
          document.body.classList.add('cnp-ready');
        }, { once:true });

        const back = document.getElementById('cnpBack');
        back?.addEventListener('click', (ev) => {
          ev.preventDefault();
          const href = back.getAttribute('href') || 'controller.html';
          document.body.classList.remove('cnp-ready');
          document.body.classList.add('cnp-exit');
          setTimeout(() => {
            if (history.length > 1) history.back();
            else location.href = href;
          }, 190);
        });
      } catch {}
    </script>

    <script>
    // Pull-to-refresh (controller pages)
    (function enablePullToRefresh(){
      if (window.__npPullRefreshBound) return;
      window.__npPullRefreshBound = true;
      let startY = 0;
      let tracking = false;
      let armed = false;
      const THRESH = 80;

      const topScrollable = () => {
        const el = document.scrollingElement || document.documentElement || document.body;
        return (el?.scrollTop || window.pageYOffset || 0) <= 0;
      };

      window.addEventListener('touchstart', (e) => {
        if (!e.touches || e.touches.length !== 1) return;
        if (!topScrollable()) return;
        startY = e.touches[0].clientY;
        tracking = true;
        armed = false;
      }, { passive: true });

      window.addEventListener('touchmove', (e) => {
        if (!tracking || !e.touches || e.touches.length !== 1) return;
        const dy = e.touches[0].clientY - startY;
        if (dy > THRESH && topScrollable()) armed = true;
      }, { passive: true });

      window.addEventListener('touchend', () => {
        if (tracking && armed) location.reload();
        tracking = false;
        armed = false;
      }, { passive: true });
    })();
</script>
