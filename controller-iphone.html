<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Redirecting…</title>
  <meta http-equiv="refresh" content="0; url=/controller-mobile.html?devicePreset=mobile" />
  <script>
    (function(){
      try {
        var u = new URL(window.location.href);
        var to = new URL('/controller-mobile.html', u.origin);
        u.searchParams.forEach(function(v,k){ to.searchParams.set(k,v); });
        if (!to.searchParams.get('devicePreset')) to.searchParams.set('devicePreset','mobile');
        window.location.replace(to.toString());
      } catch (e) {
        window.location.replace('/controller-mobile.html?devicePreset=mobile');
      }
    })();
  </script>
</head>
<body></body>
</html>
