<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Podcasts</title>
  <style>
    :root{--bg:#0b111c;--text:#f3f6ff;--muted:#9eb3d6;--line:#1f2a3d}
    *{box-sizing:border-box;-webkit-user-select:none;user-select:none}
    body{margin:0;background:var(--bg);color:var(--text);font:15px/1.35 Inter,system-ui;padding:max(10px,env(safe-area-inset-top)) 14px max(16px,env(safe-area-inset-bottom));}
    body.embedded{padding:4px 10px 8px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:2px 0 4px}
    .left{display:flex;align-items:center;gap:10px;min-width:0}
    .back{border:0;background:transparent;color:#c8d8f5;font-size:20px;cursor:pointer;padding:6px}
    h1{margin:0;font-size:30px;letter-spacing:-.01em}
    body.embedded h1{font-size:26px;line-height:1.04}
    .more{width:32px;height:32px;border-radius:999px;border:1px solid #2a3a58;background:#121c30;color:#dfeaff;font-size:16px;display:flex;align-items:center;justify-content:center}
    .meta{color:var(--muted);font-size:13px;margin:0 0 10px}
    .metaInline{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:44vw}
    body.embedded .metaInline{font-size:11px;max-width:38vw}

    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;padding-right:26px}
    body.embedded .grid{grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;padding-right:16px}
    body.embedded .more{width:30px;height:30px;font-size:14px}
    .list{display:block;padding-right:26px}
    .item{border:0;background:transparent;color:var(--text);text-align:left;padding:0;cursor:pointer}
    .item img,.ph{width:100%;aspect-ratio:1/1;border-radius:12px;object-fit:cover;background:#0a1222;display:block}
    .title{font-size:13px;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .row{display:grid;grid-template-columns:52px 1fr;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);cursor:pointer}
    .row img,.row .ph{width:52px;height:52px;border-radius:8px;object-fit:cover;background:#0a1222}

    .alpha{position:fixed;right:4px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:2px;z-index:10}
    .alpha button{border:0;background:transparent;color:#8ea7ce;font-size:11px;line-height:1;padding:1px 2px}
    body.embedded .alpha{right:2px;top:64px;bottom:8px;transform:none;justify-content:space-between;gap:0}
    body.embedded .alpha button{font-size:10px;padding:0 1px;line-height:1}

    .menu{position:fixed;display:none;z-index:120;min-width:220px;padding:6px;border-radius:14px;background:rgba(20,24,34,.82);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 14px 30px rgba(0,0,0,.4)}
    .menu.open{display:block}
    .menu button{width:100%;text-align:left;border:0;background:transparent;color:#eef3ff;padding:10px;border-radius:10px}
    .menu button.active{background:rgba(255,255,255,.08)}

    .modal{position:fixed;inset:0;display:none;background:rgba(0,0,0,.28);z-index:130;align-items:center;justify-content:center}
    .modal.open{display:flex}
    .card{position:relative;width:min(760px,94vw);max-height:88vh;overflow:auto;background:rgba(0,0,0,.58);border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:12px;backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px)}
    .head{display:flex;gap:10px;align-items:center;margin-bottom:10px}
    .head img{width:54px;height:54px;border-radius:8px;object-fit:cover;background:#0a1222}
    .hTitle{font-size:17px;font-weight:700}
    .hMeta{font-size:12px;color:var(--muted)}
    .topBtns{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 10px}
    .modalX{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:999px;border:1px solid #2a3a58;background:rgba(19,32,56,.95);color:#e6efff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;line-height:1}
    .modalX:active{transform:scale(.96)}
    .topBtns button,.epBtn{border:1px solid #2a3a58;background:#132038;color:#e6efff;border-radius:10px;padding:7px 10px;cursor:pointer;transition:background-color .14s ease,border-color .14s ease,transform .12s ease}
    .epBtn.loading{position:relative;color:transparent;pointer-events:none}
    .epBtn.loading::after{content:'';position:absolute;left:50%;top:50%;width:12px;height:12px;margin-left:-6px;margin-top:-6px;border-radius:999px;border:2px solid rgba(255,255,255,.28);border-top-color:#cfe2ff;animation:spin .8s linear infinite}
    .epBtn.added-ok{background:#173826;border-color:#2f7d58;color:#d9ffe9;transform:scale(.97)}
    @keyframes spin{to{transform:rotate(360deg)}}
    .eps{list-style:none;margin:0;padding:0}
    .eps li{padding:8px 0;border-bottom:1px solid #1f2a3d;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
    .epT{font-size:14px}
    .epM{font-size:12px;color:var(--muted)}
    .epBtns{display:flex;gap:6px}
  

    body.nav-backwarding{
      overflow:hidden;
      animation:navBackwardOut .18s ease forwards;
      will-change: transform, opacity;
    }
    @keyframes navBackwardOut{
      from{transform:translateX(0);opacity:1}
      to{transform:translateX(24px);opacity:.38}
    }

  </style>
</head>
<body>
  <div class="top"><div class="left"><button class="back" id="backBtn">‹</button><h1>Podcasts</h1><span class="metaInline" id="meta">Loading shows…</span></div><button class="more" id="menuBtn">•••</button></div>
  <div id="host" class="grid"></div>
  <div id="alpha" class="alpha"></div>

  <div class="menu" id="menu">
    <button data-view="grid" class="active">Grid</button>
    <button data-view="list">List</button>
    <button data-sort="az" class="active">A–Z</button>
    <button data-sort="za">Z–A</button>
  </div>

  <div class="modal" id="showModal" aria-hidden="true">
    <div class="card" role="dialog" aria-modal="true" aria-label="Podcast show details">
      <button id="closeBtn" class="modalX" type="button" aria-label="Close">✕</button>
      <div class="head"><img id="showArt" src="" alt="" /><div><div class="hTitle" id="showTitle">Show</div><div class="hMeta" id="showMeta"></div></div></div>
      <div class="topBtns">
        <button id="loadAllBtn" type="button">Load all to queue</button>
        
      </div>
      <ul class="eps" id="episodes"></ul>
    </div>
  </div>

  <script>
    const __embedded = new URL(location.href).searchParams.get('embedded') === '1';
    if (__embedded) document.body.classList.add('embedded');

    // Server-backed controller palette
    const __npBase = `${location.protocol}//${location.hostname||'10.0.0.233'}:3101`;
    function __npApplyPalette(name, themeMode, customColors){
      const p = String(name||'ocean').toLowerCase();
      const modeRaw = String(themeMode||'auto').toLowerCase();
      const isLight = modeRaw === 'light' || (modeRaw === 'auto' && !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches));
            const map = {
        ocean:    { accent:'#4aa8ff', bg:'#0b111c', line:'#1f2a3d' },
        violet:   { accent:'#a78bfa', bg:'#120f1f', line:'#32284a' },
        mint:     { accent:'#34d399', bg:'#0b1514', line:'#21423f' },
        amber:    { accent:'#fbbf24', bg:'#171208', line:'#4a3720' },
        black:    { accent:'#f5f5f5', bg:'#050505', line:'#222222' },
        orange:   { accent:'#ff7a1a', bg:'#16100a', line:'#4a2f1c' },
        midnight: { accent:'#7aa2ff', bg:'#070b14', line:'#202a3f' },
        slate:    { accent:'#93a4bd', bg:'#0e131b', line:'#2f3c4d' },
        mono:     { accent:'#d8d8d8', bg:'#0b0b0b', line:'#2d2d2d' },
        sunset:   { accent:'#ff8f4d', bg:'#1b110d', line:'#5b3a2d' },
        sunrise:  { accent:'#ffbf47', bg:'#1a130a', line:'#5a4523' },
        rose:     { accent:'#fb7185', bg:'#1a0d14', line:'#5b2b3f' },
        lavender: { accent:'#c4b5fd', bg:'#120d1e', line:'#3d3158' },
        emerald:  { accent:'#34d399', bg:'#081511', line:'#1f4a3e' },
        forest:   { accent:'#4ade80', bg:'#0a150d', line:'#2d4f36' },
      };
      const d = map[p] || map.ocean;
            const lightMap = {
        ocean:    { bg:'#eef5ff', line:'#c8d7ee', text:'#0b0f17', muted:'#3f5673' },
        violet:   { bg:'#f5f0ff', line:'#d9cdf1', text:'#0b0f17', muted:'#52436e' },
        mint:     { bg:'#eefcf7', line:'#c7e8dd', text:'#0b0f17', muted:'#3d5f58' },
        amber:    { bg:'#fff8ea', line:'#ead8b0', text:'#0b0f17', muted:'#65532e' },
        black:    { bg:'#f2f4f8', line:'#d4dae4', text:'#0b0f17', muted:'#4b5567', accent:'#111111' },
        orange:   { bg:'#fff3ea', line:'#ebcfbe', text:'#0b0f17', muted:'#684937' },
        midnight: { bg:'#edf2ff', line:'#cbd5f1', text:'#0b0f17', muted:'#415172' },
        slate:    { bg:'#f1f5f9', line:'#d0d8e2', text:'#0b0f17', muted:'#4a5567' },
        mono:     { bg:'#f4f4f5', line:'#dadade', text:'#0b0f17', muted:'#52525b' },
        sunset:   { bg:'#fff4ee', line:'#efd0c2', text:'#0b0f17', muted:'#6b4d3e' },
        sunrise:  { bg:'#fff7ea', line:'#ecd7b0', text:'#0b0f17', muted:'#6a572f' },
        rose:     { bg:'#fff1f5', line:'#f2cdd8', text:'#0b0f17', muted:'#6f4454' },
        lavender: { bg:'#f6f3ff', line:'#ddd3fb', text:'#0b0f17', muted:'#534675' },
        emerald:  { bg:'#ecfdf5', line:'#c7e9d8', text:'#0b0f17', muted:'#3f6257' },
        forest:   { bg:'#eef9f0', line:'#cde3d0', text:'#0b0f17', muted:'#44614a' },
      };
            const l = lightMap[p] || lightMap.ocean;
      const blendHex = (base, tint, ratio=0.20)=>{
        const b = String(base||'').trim().match(/^#([0-9a-f]{6})$/i);
        const t = String(tint||'').trim().match(/^#([0-9a-f]{6})$/i);
        if (!b || !t) return base;
        const bn = parseInt(b[1],16), tn = parseInt(t[1],16);
        let br=(bn>>16)&255, bg=(bn>>8)&255, bb=bn&255;
        const tr=(tn>>16)&255, tg=(tn>>8)&255, tb=tn&255;
        const k = Math.max(0, Math.min(1, ratio));
        br = Math.round(br + (tr-br)*k);
        bg = Math.round(bg + (tg-bg)*k);
        bb = Math.round(bb + (tb-bb)*k);
        return `#${br.toString(16).padStart(2,'0')}${bg.toString(16).padStart(2,'0')}${bb.toString(16).padStart(2,'0')}`;
      };
      const accent = (l.accent || d.accent);
      const t = isLight
        ? { accent, ...l, bg: blendHex(l.bg, accent, 0.20) }
        : { ...d, text:'#f3f6ff', muted:'#9eb3d6' };
      const hex = (v)=>/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(String(v||'').trim()) ? String(v).trim() : '';
      const cc = customColors && typeof customColors === 'object' ? customColors : {};
      const cPrimary = hex(cc.primaryThemeColor);
      const cSecondary = hex(cc.secondaryThemeColor);
      const cText = hex(cc.primaryTextColor);
      const cText2 = hex(cc.secondaryTextColor);

      const r = document.documentElement;
      r.style.setProperty('--accent', t.accent);
      r.style.setProperty('--bg', cPrimary || t.bg);
      r.style.setProperty('--line', cSecondary || t.line);
      r.style.setProperty('--text', cText || t.text || '#f3f6ff');
      r.style.setProperty('--muted', cText2 || t.muted || '#9eb3d6');
    }
    (async ()=>{
      const __u = new URL(location.href);
      const qColor = String(__u.searchParams.get('colorPreset') || '').trim().toLowerCase();
      const qTheme = String(__u.searchParams.get('theme') || '').trim().toLowerCase();
      const qPrimary = String(__u.searchParams.get('primaryThemeColor') || '').trim();
      const qSecondary = String(__u.searchParams.get('secondaryThemeColor') || '').trim();
      const qText = String(__u.searchParams.get('primaryTextColor') || '').trim();
      const qText2 = String(__u.searchParams.get('secondaryTextColor') || '').trim();
      let lsColor = '';
      let lsTheme = '';
      let lsCustom = null;
      try {
        const p = JSON.parse(localStorage.getItem('nowplaying.mobile.profile.v1') || '{}') || {};
        lsColor = String(p?.colorPreset || '').trim().toLowerCase();
        lsTheme = String(p?.theme || '').trim().toLowerCase();
        lsCustom = p?.customColors || null;
      } catch {}
      const qCustom = (qPrimary || qSecondary || qText || qText2) ? {
        ...(qPrimary ? { primaryThemeColor:qPrimary } : {}),
        ...(qSecondary ? { secondaryThemeColor:qSecondary } : {}),
        ...(qText ? { primaryTextColor:qText } : {}),
        ...(qText2 ? { secondaryTextColor:qText2 } : {}),
      } : null;
      __npApplyPalette(qColor || lsColor || 'ocean', qTheme || lsTheme || 'dark', qCustom || lsCustom || null);
      try {
        const r = await fetch(`${__npBase}/config/controller-profile`, { cache:'no-store' });
        const j = await r.json().catch(()=>({}));
        const sColor = String(j?.profile?.colorPreset || 'ocean').trim().toLowerCase();
        const sTheme = String(j?.profile?.theme || 'dark').trim().toLowerCase();
        const sCustom = j?.profile?.customColors || null;
        __npApplyPalette(qColor || lsColor || sColor || 'ocean', qTheme || lsTheme || sTheme || 'dark', qCustom || lsCustom || sCustom || null);
      } catch {}
    })();

    const base = `${location.protocol}//${location.hostname||'10.0.0.233'}:3101`;
    const STATE_KEY='np.controller.podcasts.menu.v1';
    let key='';
    let state={view:'grid',sort:'az'};
    let shows=[];
    let modalCtx={rss:'',title:'',imageUrl:'',episodes:[]};

    async function ensureKey(){ if(key) return key; const r=await fetch(`${base}/config/runtime`,{cache:'no-store'}); const j=await r.json().catch(()=>({})); key=String(j?.config?.trackKey||'').trim(); return key; }
    function h(){ return {...(key?{'x-track-key':key}:{})}; }

    function syncMenu(){
      const m=document.getElementById('menu');
      [...m.querySelectorAll('button[data-view]')].forEach(b=>b.classList.toggle('active',b.getAttribute('data-view')===state.view));
      [...m.querySelectorAll('button[data-sort]')].forEach(b=>b.classList.toggle('active',b.getAttribute('data-sort')===state.sort));
    }
    function saveMenu(){ try{ localStorage.setItem(STATE_KEY, JSON.stringify(state)); }catch{} }
    function loadMenu(){
      try{ const raw=localStorage.getItem(STATE_KEY); if(!raw) return; const s=JSON.parse(raw||'{}');
        if(['grid','list'].includes(String(s?.view||''))) state.view=String(s.view);
        if(['az','za'].includes(String(s?.sort||''))) state.sort=String(s.sort);
      }catch{}
    }

    function sorted(){ const a=[...shows]; a.sort((x,y)=>String(x.title||'').localeCompare(String(y.title||''),undefined,{sensitivity:'base'})); if(state.sort==='za') a.reverse(); return a; }
    function renderAlpha(list){
      const a=document.getElementById('alpha'); a.innerHTML=''; const map=new Map();
      list.forEach((x,i)=>{ const ch=String(x.title||'#').trim().charAt(0).toUpperCase(); const k=/[A-Z]/.test(ch)?ch:'#'; if(!map.has(k)) map.set(k,i); });
      [...'ABCDEFGHIJKLMNOPQRSTUVWXYZ#'].forEach(ch=>{ if(!map.has(ch)) return; const b=document.createElement('button'); b.textContent=ch; b.onclick=()=>document.querySelector(`[data-idx='${map.get(ch)}']`)?.scrollIntoView({behavior:'smooth',block:'start'}); a.appendChild(b); });
    }

    function render(){
      const list=sorted(); const host=document.getElementById('host'); host.className=state.view==='list'?'list':'grid'; renderAlpha(list);
      host.innerHTML=list.map((s,i)=>{
        const art=String(s.imageUrl||'').trim() || `${base}/art/current.jpg`;
        const sub = s.items==null ? 'Loading…' : `${Number(s.items||0)} downloaded`;
        if(state.view==='list') return `<div class='row' data-idx='${i}' data-rss='${encodeURIComponent(s.rss)}'><img src='${art}' alt=''><div><div class='title'>${s.title||'(show)'}</div><div class='sub'>${sub}</div></div></div>`;
        return `<button class='item' data-idx='${i}' data-rss='${encodeURIComponent(s.rss)}'><img src='${art}' alt=''><div class='title'>${s.title||'(show)'}</div><div class='sub'>${sub}</div></button>`;
      }).join('');
      document.getElementById('meta').textContent = `${list.length} shows`;
    }

    function byRss(enc){ let rss=''; try{rss=decodeURIComponent(String(enc||''));}catch{rss=String(enc||'');} return shows.find(x=>x.rss===rss) || null; }

    async function loadShows(){
      await ensureKey();
      const r=await fetch(`${base}/podcasts`,{cache:'no-store',headers:h()});
      const j=await r.json().catch(()=>({}));
      shows = (r.ok && j?.ok && Array.isArray(j.items)) ? j.items.map(s=>({
        rss:String(s?.rss||'').trim(),
        title:String(s?.title||s?.rss||'').trim(),
        imageUrl:String(s?.imageUrl||'').trim(),
        items:null,
      })).filter(s=>s.rss) : [];
      render();
      hydrateEpisodeCounts();
    }

    async function hydrateEpisodeCounts(){
      for (let i=0;i<shows.length;i++) {
        const s = shows[i];
        if (!s?.rss) continue;
        try {
          const r=await fetch(`${base}/podcasts/episodes/list`,{method:'POST',headers:{'Content-Type':'application/json',...h()},body:JSON.stringify({rss:s.rss,limit:250})});
          const j=await r.json().catch(()=>({}));
          const eps = (r.ok && j?.ok && Array.isArray(j.episodes)) ? j.episodes : [];
          s.items = eps.filter(ep => !!ep?.downloaded).length;
        } catch {
          s.items = 0;
        }
        if (i % 2 === 0) render();
      }
      render();
    }

    function closeModal(){ document.getElementById('showModal').classList.remove('open'); }
    function fileForEpisode(ep){ return String(ep?.mpdPath || '').trim(); }

    async function openShow(s){
      if(!s?.rss) return;
      modalCtx={rss:s.rss,title:s.title,imageUrl:s.imageUrl,episodes:[]};
      document.getElementById('showTitle').textContent=s.title||'(show)';
      document.getElementById('showMeta').textContent='Loading episodes…';
      document.getElementById('showArt').src=s.imageUrl||`${base}/art/current.jpg`;
      document.getElementById('episodes').innerHTML='<li><div class="epM">Loading episodes…</div></li>';
      document.getElementById('showModal').classList.add('open');

      const r=await fetch(`${base}/podcasts/episodes/list`,{method:'POST',headers:{'Content-Type':'application/json',...h()},body:JSON.stringify({rss:s.rss,limit:200})});
      const j=await r.json().catch(()=>({}));
      const eps=(r.ok && j?.ok && Array.isArray(j.episodes)) ? j.episodes : [];
      modalCtx.episodes=eps;
      const downloadedCount = eps.filter(ep => !!ep?.downloaded).length;
      document.getElementById('showMeta').textContent=`${downloadedCount} downloaded • ${eps.length} total`;
      document.getElementById('episodes').innerHTML = eps.map((ep,idx)=>{
        const title=String(ep?.title||'(episode)').trim();
        const date=String(ep?.date||'').trim();
        const file=encodeURIComponent(fileForEpisode(ep));
        const downloaded = !!ep?.downloaded;
        const id = String(ep?.id || '').trim();
        const enclosure = encodeURIComponent(String(ep?.enclosure || '').trim());
        const image = encodeURIComponent(String(ep?.imageUrl || '').trim());
        const metaState = downloaded ? 'Downloaded' : 'Not downloaded';
        const btns = downloaded
          ? `<button class='epBtn' data-ep='play' data-file='${file}'>▶</button><button class='epBtn' data-ep='add' data-file='${file}'>＋</button>`
          : `<button class='epBtn' data-ep='download' data-id='${encodeURIComponent(id)}' data-enclosure='${enclosure}' data-title='${encodeURIComponent(title)}' data-date='${encodeURIComponent(date)}' data-image='${image}'>⬇</button>`;
        return `<li><div><div class='epT'>${idx+1}. ${title}</div><div class='epM'>${date}${date?' • ':''}${metaState}</div></div><div class='epBtns'>${btns}</div></li>`;
      }).join('') || '<li><div class="epM">No episodes found</div></li>';
    }

    async function sendPlayback(action, extra={}){ await ensureKey(); await fetch(`${base}/config/diagnostics/playback`,{method:'POST',headers:{'Content-Type':'application/json',...h()},body:JSON.stringify(Object.assign({action},extra||{}))}).catch(()=>null); }
    async function applyQueue(files){
      const tracks=(Array.isArray(files)?files:[]).map(x=>String(x||'').trim()).filter(Boolean);
      if(!tracks.length) return;
      await ensureKey();
      await fetch(`${base}/config/queue-wizard/apply`,{method:'POST',headers:{'Content-Type':'application/json',...h()},body:JSON.stringify({mode:'replace',keepNowPlaying:false,tracks,shuffle:false,forceRandomOff:false,fastStart:true})}).catch(()=>null);
    }

    document.getElementById('host').addEventListener('click', async (ev)=>{ const el=ev.target.closest('[data-rss]'); if(!el) return; const s=byRss(el.getAttribute('data-rss')); if(s) await openShow(s); });
    async function downloadEpisodeFromButton(b){
      const id = decodeURIComponent(String(b.getAttribute('data-id')||''));
      const enclosure = decodeURIComponent(String(b.getAttribute('data-enclosure')||''));
      const title = decodeURIComponent(String(b.getAttribute('data-title')||''));
      const date = decodeURIComponent(String(b.getAttribute('data-date')||''));
      const imageUrl = decodeURIComponent(String(b.getAttribute('data-image')||''));
      if (!modalCtx?.rss || !id || !enclosure) return;
      b.disabled = true;
      b.classList.add('loading');
      try {
        await ensureKey();
        await fetch(`${base}/podcasts/download-one`,{method:'POST',headers:{'Content-Type':'application/json',...h()},body:JSON.stringify({rss:modalCtx.rss,id,enclosure,title,date,imageUrl})});
      } catch {}
      const s = shows.find(x=>x.rss===modalCtx.rss);
      if (s) await openShow(s);
      await hydrateEpisodeCounts();
    }

    document.getElementById('episodes').addEventListener('click', async (ev)=>{
      const b=ev.target.closest('button[data-ep]'); if(!b) return;
      const a=String(b.getAttribute('data-ep')||'');
      if (a==='download') { await downloadEpisodeFromButton(b); return; }
      let file=''; try{file=decodeURIComponent(String(b.getAttribute('data-file')||''));}catch{file=String(b.getAttribute('data-file')||'');}
      if(!file) return;
      if(a==='play') await sendPlayback('playfile',{file});
      if(a==='add') {
        await sendPlayback('addfile',{file});
        const prev = b.textContent;
        b.textContent = '✓';
        b.classList.add('added-ok');
        setTimeout(()=>{
          b.classList.remove('added-ok');
          b.textContent = prev || '＋';
        }, 520);
      }
    });
    document.getElementById('loadAllBtn').addEventListener('click', async ()=>{ await applyQueue((modalCtx.episodes||[]).filter(ep=>!!ep?.downloaded).map(fileForEpisode)); });
    document.getElementById('closeBtn').addEventListener('click', closeModal);
    document.getElementById('showModal').addEventListener('click',(ev)=>{ if(ev.target.id==='showModal') closeModal(); });

    const menu=document.getElementById('menu');
    document.getElementById('menuBtn').addEventListener('click',(ev)=>{ const r=ev.currentTarget.getBoundingClientRect(); menu.style.left=`${Math.max(8,Math.round(r.right-220))}px`; menu.style.top=`${Math.round(r.bottom+6)}px`; menu.classList.toggle('open'); });
    menu.addEventListener('click',(ev)=>{
      const vb=ev.target.closest('button[data-view]'); const sb=ev.target.closest('button[data-sort]');
      if(vb) state.view=String(vb.getAttribute('data-view')||'grid');
      if(sb) state.sort=String(sb.getAttribute('data-sort')||'az');
      syncMenu(); saveMenu(); render();
    });
    document.addEventListener('click',(ev)=>{ if(menu.classList.contains('open') && !(ev.target.closest('#menu')||ev.target.closest('#menuBtn'))) menu.classList.remove('open'); });

    let __backNavBusy=false;
    const backBtn = document.getElementById('backBtn');
    const pageTitle = document.querySelector('.top h1');
    if (pageTitle) { pageTitle.style.cursor='pointer'; pageTitle.addEventListener('click', ()=> backBtn?.click()); }
    backBtn?.addEventListener('click', ()=>{
      if (__backNavBusy) return;
      __backNavBusy = true;
      document.body.classList.add('nav-backwarding');
      setTimeout(()=>{ const embedded = new URL(location.href).searchParams.get('embedded') === '1'; if (embedded) { try { window.parent?.postMessage({ type:'np-kiosk-hide-pane' }, '*'); } catch {} return; } if(history.length>1) history.back(); else location.href='controller.html'; }, 170);
    });

    loadMenu(); syncMenu(); loadShows();
  
    // Pull-to-refresh (controller pages)
    (function enablePullToRefresh(){
      if (window.__npPullRefreshBound) return;
      window.__npPullRefreshBound = true;
      let startY = 0;
      let tracking = false;
      let armed = false;
      const THRESH = 80;

      const topScrollable = () => {
        const el = document.scrollingElement || document.documentElement || document.body;
        return (el?.scrollTop || window.pageYOffset || 0) <= 0;
      };

      window.addEventListener('touchstart', (e) => {
        if (!e.touches || e.touches.length !== 1) return;
        if (!topScrollable()) return;
        startY = e.touches[0].clientY;
        tracking = true;
        armed = false;
      }, { passive: true });

      window.addEventListener('touchmove', (e) => {
        if (!tracking || !e.touches || e.touches.length !== 1) return;
        const dy = e.touches[0].clientY - startY;
        if (dy > THRESH && topScrollable()) armed = true;
      }, { passive: true });

      window.addEventListener('touchend', () => {
        if (tracking && armed) location.reload();
        tracking = false;
        armed = false;
      }, { passive: true });
    })();
</script>
</body>
