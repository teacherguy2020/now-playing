<!-- index.html (canonical now-playing UI) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Now Playing</title>
  <style>html,body{background:#000;color:#fff;}</style>
  <script>
    // Fallbacks for embedded preview mode.
    window.addEventListener('DOMContentLoaded', () => {
      try {
        const embedded = (window.top !== window.self);
        if (embedded) {
          const host = location.hostname || '10.0.0.233';
          const proto = location.protocol || 'http:';
          const b = document.body;
          const c = document.getElementById('content');
          const bgA = document.getElementById('background-a');
          const bgB = document.getElementById('background-b');

          // Ensure background layers are actually visible in iframe context.
          if (b) b.style.background = 'transparent';
          if (c) { c.style.position = 'relative'; c.style.zIndex = '1'; }
          if (bgA) { bgA.style.zIndex = '0'; bgA.style.opacity = '1'; }
          if (bgB) { bgB.style.zIndex = '0'; bgB.style.opacity = '0'; }

          // Use current art and let CSS blur/filter create the backdrop.
          if (bgA && !bgA.style.backgroundImage) {
            bgA.style.backgroundImage = `url(${proto}//${host}:3101/art/current.jpg?t=${Date.now()})`;
          }
        }
      } catch (_) {}

      // If boot JS errors, don't leave preview on a blank/white boot screen.
      setTimeout(() => {
        try {
          const b = document.body;
          if (b && b.classList.contains('booting')) {
            b.classList.remove('booting');
            b.classList.add('ready');
          }
        } catch (_) {}
      }, 1800);
    });
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/index1080.css?v=20260228-airplay-logo-sm1" />

  <style>
    /* Player.html display-profile scaffold (start here; keep index.html untouched) */
    body.player-size-1280x400{}
    body.player-size-1024x600{}
    body.player-size-800x480{}
    body.player-size-480x320{}
    body.player-size-320x240{}

    /* Example explicit breakpoints to iterate on next */
    @media (min-width:1180px) and (max-height:430px) { body{ } }
    @media (min-width:980px) and (max-width:1100px) and (max-height:640px) { body{ } }
    @media (min-width:760px) and (max-width:900px) and (max-height:520px) { body{ } }

    .playerControls{position:fixed;left:10px;top:10px;z-index:10000;display:flex;gap:8px;align-items:center;padding:8px 10px;border:1px solid rgba(120,140,180,.45);background:rgba(7,12,22,.84);backdrop-filter:blur(4px);border-radius:10px}
    .playerControls label{font-size:12px;opacity:.9}
    .playerControls select{height:30px;border:1px solid rgba(120,140,180,.5);background:#111a2a;color:#e6efff;border-radius:8px;padding:0 8px}
    body.player-builder #displayViewport{position:fixed;left:0;right:0;top:56px;bottom:10px;display:flex;align-items:flex-start;justify-content:center;pointer-events:none}
    body.player-builder #displayFrame{width:calc(var(--player-w,1280px) + (var(--frame-pad,10px) * 2));height:calc(var(--player-h,400px) + (var(--frame-pad,10px) * 2));padding:var(--frame-pad,10px);box-sizing:border-box;border:2px solid rgba(180,196,226,.75);border-radius:0;overflow:hidden;background:#000;transform-origin:top center;transform:scale(var(--player-scale,1));pointer-events:auto}
    body.player-builder #content{position:relative;width:var(--player-w,1280px);height:var(--player-h,400px);margin:0;transform:none}
  </style>
</head>

<body class="booting">
  <div class="playerControls" id="playerControlsCard" aria-label="Player display controls">
    <label for="playerSizeSelect">Screen size</label>
    <select id="playerSizeSelect">
      <option value="1280x400">1280x400</option>
      <option value="1024x600">1024x600</option>
      <option value="800x480">800x480</option>
      <option value="480x320">480x320</option>
      <option value="320x240">320x240</option>
    </select>
  </div>
  <div id="background-a"></div>
  <div id="background-b"></div>

  <div id="displayViewport">
    <div id="displayFrame">
  <div id="content">
    <!-- Album Art -->
    <div id="album-art-wrapper" role="group" aria-label="Album art and controls">
      <div id="album-art-bg"></div>

      <!-- Album artwork (does NOT open modal) -->

        id="album-art"
        src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
        alt="Album Art"
        draggable="false"
      />

      <!-- Personnel hotspot (ONLY this opens the modal) -->

        id="art-info-hotspot"
        class="art-hotspot"
        type="button"
        aria-label="Show personnel"
        title="Show personnel"

        </svg>
      </button>

      <!-- Favorites heart (should NOT trigger modal) -->
      <button
        id="fav-heart"
        type="button"
        aria-label="Toggle favorite"
        title="Toggle favorite"
      >
        <svg viewBox="0 0 24 24" shape-rendering="geometricPrecision" aria-hidden="true" focusable="false">
          <path d="M12 21
                   C12 21 3 14.5 3 8.5

                   C9.24 4 10.91 5 12 6.44
                   C13.09 5 14.76 4 16.5 4

    </div>

    <!-- Text -->
    <div class="text-column">
      <div id="artist-name"></div>

      <div id="titleLine">
        <span id="track-title"></span>
        <span id="ratingStars" class="rating-stars"></span>
      </div>

      <!-- Album + share icon live entirely inside this link -->
      <a id="album-link" aria-label="Open in Apple Music">
        <span id="album-text"></span>
      </a>

      <div id="file-info">

      <div id="personnel-info"></div>

      <div id="next-up">
        <img id="next-up-img" alt="">

            <span class="marquee-copy"></span>

        </span>
      </div>

      <div id="progress-bar-wrapper">
        <div id="progress-fill"></div>
      </div>

      <img id="mode-logo" alt="">
    </div>
  </div>
    </div>
  </div>

  <!-- Phone controls -->

    <!-- Modal -->

    </div>
  </div>

  <script src="scripts/index-ui.js?v=20260228-hero-album-open1"></script>
<script>
(function(){
  try {
    const u = new URL(location.href);
    const valid = ['1280x400','1024x600','800x480','480x320','320x240'];
    const sel = document.getElementById('playerSizeSelect');
    const fromUrl = String(u.searchParams.get('size') || '').trim();
    const fromLs = String(localStorage.getItem('player.profile.size') || '').trim();
    const initial = valid.includes(fromUrl) ? fromUrl : (valid.includes(fromLs) ? fromLs : '1280x400');

    const SIZE_MAP = {
      '1280x400':[1280,400],
      '1024x600':[1024,600],
      '800x480':[800,480],
      '480x320':[480,320],
      '320x240':[320,240],
    };
    const applySizeClass = (size) => {
      valid.forEach((s) => document.body.classList.remove(`player-size-${s}`));
      document.body.classList.add(`player-size-${size}`);
      document.body.classList.add('player-builder');
      const dims = SIZE_MAP[size] || SIZE_MAP['1280x400'];
      const [w,h] = dims;
      const frameW = w + 24;
      const frameH = h + 24;
      const availW = Math.max(320, window.innerWidth - 20);
      const availH = Math.max(200, window.innerHeight - 66);
      const scale = Math.min(1, availW / frameW, availH / frameH);
      document.body.style.setProperty('--player-w', `${w}px`);
      document.body.style.setProperty('--player-h', `${h}px`);
      document.body.style.setProperty('--player-scale', String(Math.max(0.35, scale)));
      try { localStorage.setItem('player.profile.size', size); } catch {}
      try {
        const nu = new URL(location.href);
        nu.searchParams.set('size', size);
        history.replaceState(null, '', nu.toString());
      } catch {}
    };

    if (sel) {
      sel.value = initial;
      sel.addEventListener('change', () => {
        const v = String(sel.value || '1280x400');
        applySizeClass(valid.includes(v) ? v : '1280x400');
      });
    }
    applySizeClass(initial);
    window.addEventListener('resize', () => applySizeClass(String(sel?.value || initial)));
  } catch {}
})();
</script>
