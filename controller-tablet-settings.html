<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Controller Settings</title>
  <style>
    :root{color-scheme:light dark;--accent:#4aa8ff;--field-bg:var(--surface-2,var(--line,rgba(255,255,255,.14)));--field-text:var(--text,#f3f6ff);--field-border:var(--line,rgba(255,255,255,.16));--field-shadow:rgba(255,255,255,.08);--card-bg:var(--surface,#0b111c)}
    *{box-sizing:border-box}
    html,body{background:transparent}
    body{margin:0;padding:10px 12px 20px;font:14px/1.35 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--page-bg,transparent);color:var(--text,#f3f6ff)}
    .top{display:flex;align-items:center;gap:8px;margin:0 0 10px}
    .backBtn{width:34px;height:34px;border-radius:10px;border:1px solid var(--line,rgba(255,255,255,.14));background:color-mix(in oklab,var(--surface,#0b111c) 88%, transparent);color:var(--text,#f3f6ff);display:grid;place-items:center;cursor:pointer}
    .backBtn svg{width:18px;height:18px;display:block;fill:currentColor}
    .topTitle{font-size:15px;font-weight:650;color:var(--text,#f3f6ff)}
    .card{border:1px solid var(--line,rgba(255,255,255,.14));background:var(--card-bg,color-mix(in oklab,var(--surface,#0b111c) 78%, transparent));border-radius:12px;padding:12px}
    h1{margin:0 0 4px;font-size:18px;line-height:1.15}
    .sub{margin:0 0 12px;color:var(--muted,#9eb3d6);font-size:12px}
    label{display:block;font-weight:620;margin:8px 0 6px}
    select{width:100%;padding:10px;border-radius:10px;border:1px solid var(--field-border);background:var(--field-bg);color:var(--field-text);font-size:15px;appearance:none;-webkit-appearance:none;box-shadow:inset 0 1px 0 var(--field-shadow)}
    select:focus,.backBtn:focus{outline:2px solid color-mix(in oklab,var(--accent,#4aa8ff) 72%, white 28%);outline-offset:2px}
    option{background:var(--surface,#0b111c);color:var(--text,#f3f6ff)}
    .hint{margin-top:8px;color:var(--muted,#9eb3d6);font-size:12px}
  </style>
</head>
<body>
  <div class="top">
    <button id="backBtn" class="backBtn" type="button" aria-label="Back">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>
    <div class="topTitle">Settings</div>
  </div>

  <div class="card">
    <h1>Settings</h1>
    <p class="sub">Controller tablet preferences</p>

    <label for="themePreset">Theme preset</label>
    <select id="themePreset" aria-label="Controller tablet theme preset"></select>
    <div class="hint">Applies immediately.</div>

    <label for="vizPreset">Visualizer preset</label>
    <select id="vizPreset" aria-label="Controller tablet visualizer preset"></select>
    <div class="hint">Sets the Visualizer used when opening the Visualizer row.</div>

    <label for="row1">Row 1 source</label>
    <select id="row1"></select>
    <label for="row2">Row 2 source</label>
    <select id="row2"></select>
    <label for="row3">Row 3 source</label>
    <select id="row3"></select>
    <label for="row4">Row 4 source</label>
    <select id="row4"></select>
    <div class="hint">Rows must be unique (no duplicates).</div>

  </div>

  <script>
  (() => {
    const PRESETS = [
      ['ocean','Ocean'],['violet','Violet'],['mint','Mint'],['amber','Amber'],['black','Black'],['blackred','Black + Red Text'],['blackblue','Black + Deep Blue'],['blackpurple','Black + Purple'],['blackgold','Black + Gold'],
      ['orange','Orange'],['midnight','Midnight'],['slate','Slate'],['mono','Mono'],['sunset','Sunset'],
      ['sunrise','Sunrise'],['rose','Rose'],['lavender','Lavender'],['emerald','Emerald'],['forest','Forest'],
      ['cloud','Cloud (Light)'],['sand','Sand (Light)'],['blush','Blush (Light)'],['ivoryred','White + Red']
    ];
    const u = new URL(location.href);
    const themeMode = String(u.searchParams.get('theme') || 'auto').trim().toLowerCase();
    const selected = String(u.searchParams.get('colorPreset') || 'ocean').trim().toLowerCase();
    const sel = document.getElementById('themePreset');
    const vizSel = document.getElementById('vizPreset');
    const rowIds = ['row1','row2','row3','row4'];
    const rowSelects = rowIds.map((id) => document.getElementById(id));
    const ROW_OPTIONS = [
      ['albums','Recently added albums'],
      ['playlists','Recently created playlists'],
      ['podcasts','Recently downloaded podcasts'],
      ['radio','Favorite Radio Stations'],
      ['lastfm-topalbums','Top Albums'],
      ['lastfm-topartists','Top Artists'],
      ['lastfm-toptracks','Top Tracks'],
      ['lastfm-recenttracks','Recently Played']
    ];
    const VIZ_PRESETS = [
      ['classic','Particle Classical'],['particle-rock','Particle Rock'],['aurora','Aurora'],['aeon','Hello'],['fireworks','Fireworks'],
      ['particles','Particles'],['tunnel','Tunnel'],['moire','Moire'],['sphere','Sphere'],['mobius','Mobius'],
      ['orb','Emergent Orb'],['cube','Cube Lattice'],['bloom-field','Bloom Field']
    ];

    const applyPalette = (name, mode) => {
      const p = String(name || 'ocean').toLowerCase();
      const forceDark = p === 'blackred' || p === 'blackblue' || p === 'blackpurple' || p === 'blackgold';
      const forceLight = p === 'cloud' || p === 'sand' || p === 'blush' || p === 'ivoryred';
      const isLight = forceLight;
      const dark = {
        ocean:{accent:'#4aa8ff',surface:'#0b111c',line:'#1f2a3d',text:'#f3f6ff',muted:'#9eb3d6'},
        violet:{accent:'#a78bfa',surface:'#120f1f',line:'#32284a',text:'#f3f6ff',muted:'#9eb3d6'},
        mint:{accent:'#34d399',surface:'#0b1514',line:'#21423f',text:'#f3f6ff',muted:'#9eb3d6'},
        amber:{accent:'#fbbf24',surface:'#171208',line:'#4a3720',text:'#f3f6ff',muted:'#9eb3d6'},
        black:{accent:'#f5f5f5',surface:'#050505',line:'#222222',text:'#f3f6ff',muted:'#9eb3d6'},
        blackred:{accent:'#ff3b47',surface:'#000000',line:'#2b0f13',text:'#ff4d57',muted:'#b33a42'},
        blackblue:{accent:'#3f68c9',surface:'#000000',line:'#141a2a',text:'#5f86e6',muted:'#3f5ea8'},
        blackpurple:{accent:'#8b5ed4',surface:'#000000',line:'#23172f',text:'#b084f5',muted:'#7a56ba'},
        blackgold:{accent:'#d9a441',surface:'#000000',line:'#2a2314',text:'#e0b24d',muted:'#a67c2b'},
        orange:{accent:'#ff7a1a',surface:'#16100a',line:'#4a2f1c',text:'#f3f6ff',muted:'#9eb3d6'},
        midnight:{accent:'#7aa2ff',surface:'#070b14',line:'#202a3f',text:'#f3f6ff',muted:'#9eb3d6'},
        slate:{accent:'#93a4bd',surface:'#0e131b',line:'#2f3c4d',text:'#f3f6ff',muted:'#9eb3d6'},
        mono:{accent:'#d8d8d8',surface:'#0b0b0b',line:'#2d2d2d',text:'#f3f6ff',muted:'#9eb3d6'},
        sunset:{accent:'#ff8f4d',surface:'#1b110d',line:'#5b3a2d',text:'#f3f6ff',muted:'#9eb3d6'},
        sunrise:{accent:'#ffbf47',surface:'#1a130a',line:'#5a4523',text:'#f3f6ff',muted:'#9eb3d6'},
        rose:{accent:'#fb7185',surface:'#1a0d14',line:'#5b2b3f',text:'#f3f6ff',muted:'#9eb3d6'},
        lavender:{accent:'#c4b5fd',surface:'#120d1e',line:'#3d3158',text:'#f3f6ff',muted:'#9eb3d6'},
        emerald:{accent:'#34d399',surface:'#081511',line:'#1f4a3e',text:'#f3f6ff',muted:'#9eb3d6'},
        forest:{accent:'#4ade80',surface:'#0a150d',line:'#2d4f36',text:'#f3f6ff',muted:'#9eb3d6'},
        cloud:{accent:'#5f8fd9',surface:'#eef4ff',line:'#c8d6ef',text:'#132238',muted:'#425b7f'},
        sand:{accent:'#b8863b',surface:'#fff7e8',line:'#ead9b8',text:'#2a2012',muted:'#6f5737'},
        blush:{accent:'#c85c78',surface:'#fff1f5',line:'#f2d0da',text:'#2b1119',muted:'#7a4454'},
        ivoryred:{accent:'#c23b45',surface:'#ffffff',line:'#e9e9e9',text:'#111111',muted:'#c23b45'}
      };
      const d = dark[p] || dark.ocean;
      const t = d;
      const r = document.documentElement;
      r.style.setProperty('--surface', t.surface);
      r.style.setProperty('--surface-2', t.line);
      r.style.setProperty('--line', t.line);
      r.style.setProperty('--text', t.text);
      r.style.setProperty('--muted', t.muted);
      r.style.setProperty('--accent', t.accent || dark.ocean.accent);
      r.style.setProperty('color-scheme', isLight ? 'light' : 'dark');
      r.style.setProperty('--page-bg', 'transparent');
      r.style.setProperty('--card-bg', t.surface);
      r.style.setProperty('--field-bg', t.line);
      r.style.setProperty('--field-text', t.text);
      r.style.setProperty('--field-border', t.line);
      r.style.setProperty('--field-shadow', isLight ? 'rgba(255,255,255,.45)' : 'rgba(255,255,255,.08)');
    };

    const colorMix = (a, b, ratio = 0.5) => {
      const pa = String(a || '').trim().match(/^#([0-9a-f]{6})$/i);
      const pb = String(b || '').trim().match(/^#([0-9a-f]{6})$/i);
      if (!pa || !pb) return a || b || '#000000';
      const av = parseInt(pa[1], 16);
      const bv = parseInt(pb[1], 16);
      const ar = (av >> 16) & 255, ag = (av >> 8) & 255, ab = av & 255;
      const br = (bv >> 16) & 255, bg = (bv >> 8) & 255, bb = bv & 255;
      const k = Math.max(0, Math.min(1, Number(ratio) || 0));
      const rr = Math.round(ar + (br - ar) * k);
      const rg = Math.round(ag + (bg - ag) * k);
      const rb = Math.round(ab + (bb - ab) * k);
      return `#${rr.toString(16).padStart(2,'0')}${rg.toString(16).padStart(2,'0')}${rb.toString(16).padStart(2,'0')}`;
    };

    sel.innerHTML = PRESETS.map(([v,l]) => `<option value="${v}">${l}</option>`).join('');
    sel.value = PRESETS.some(([v]) => v === selected) ? selected : 'ocean';
    applyPalette(sel.value, themeMode);

    const vizFromQ = String(u.searchParams.get('vizPreset') || 'classic').trim().toLowerCase();
    vizSel.innerHTML = VIZ_PRESETS.map(([v,l]) => `<option value="${v}">${l}</option>`).join('');
    vizSel.value = VIZ_PRESETS.some(([v]) => v === vizFromQ) ? vizFromQ : 'classic';

    const defaults = ['albums','playlists','podcasts','radio'];
    const fromQ = String(u.searchParams.get('recentRows') || '').split(',').map((s)=>String(s||'').trim().toLowerCase()).filter(Boolean);
    const rows = [];
    for (const r of [...fromQ, ...defaults]) {
      if (!ROW_OPTIONS.some(([v]) => v===r)) continue;
      if (rows.includes(r)) continue;
      rows.push(r);
      if (rows.length >= 4) break;
    }
    rowSelects.forEach((s, i) => {
      s.innerHTML = ROW_OPTIONS.map(([v,l]) => `<option value="${v}">${l}</option>`).join('');
      s.value = rows[i] || defaults[i];
    });

    const collectPayload = (changedIdx = -1) => {
      applyPalette(sel.value, themeMode);
      const vals = rowSelects.map((s) => String(s.value || '').toLowerCase());
      if (changedIdx >= 0) {
        const used = new Set();
        for (let i = 0; i < vals.length; i++) {
          let v = vals[i];
          if (!used.has(v)) { used.add(v); continue; }
          const alt = ROW_OPTIONS.map(([x]) => x).find((x) => !used.has(x));
          if (alt) {
            vals[i] = alt;
            rowSelects[i].value = alt;
            used.add(alt);
          }
        }
      }
      return { colorPreset: String(sel.value || 'ocean'), recentRows: vals, visualizerPreset: String(vizSel?.value || 'classic').toLowerCase() };
    };

    const send = (changedIdx = -1) => {
      const payload = collectPayload(changedIdx);
      try {
        window.parent?.postMessage({ type: 'np-controller-settings', ...payload, persistNow: true }, '*');
      } catch {}
    };

    sel.addEventListener('change', () => send(-1));
    vizSel.addEventListener('change', () => send(-1));
    rowSelects.forEach((s, i) => s.addEventListener('change', () => send(i)));

    let backBusy = false;
    document.getElementById('backBtn')?.addEventListener('click', () => {
      if (backBusy) return;
      backBusy = true;
      setTimeout(() => {
        const embedded = new URL(location.href).searchParams.get('embedded') === '1';
        if (embedded) {
          try { window.parent?.postMessage({ type:'np-kiosk-hide-pane' }, '*'); } catch {}
          return;
        }
        if (history.length > 1) history.back();
        else location.href = 'controller-tablet.html';
      }, 140);
    });
  })();
  </script>
</body>
</html>
