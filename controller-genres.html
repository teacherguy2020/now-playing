<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Genres</title>
  <style>
    :root{--bg:#0b111c;--text:#f3f6ff;--muted:#9eb3d6;--line:#1f2a3d;--accent:#4aa8ff}
    *{box-sizing:border-box;-webkit-user-select:none;user-select:none}
    body{margin:0;background:var(--bg);color:var(--text);font:15px/1.35 Inter,system-ui;padding:max(10px,env(safe-area-inset-top)) 14px max(16px,env(safe-area-inset-bottom));}
    body.embedded{background:transparent}
    .top{display:flex;align-items:center;gap:10px;margin:4px 0 8px}
    .back{border:0;background:transparent;color:var(--muted);font-size:20px;cursor:pointer;padding:6px}
    h1{margin:0;font-size:30px;letter-spacing:-.01em}
    .meta{color:var(--muted);font-size:13px;margin:0 0 8px}
    .meta .miniSpin{display:inline-block;width:14px;height:14px;border-radius:999px;border:2px solid color-mix(in oklab,var(--line) 70%, transparent);border-top-color:var(--accent);animation:spin .8s linear infinite;vertical-align:-2px}
    .list{padding-right:26px;background:transparent}
    body.embedded .row{background:transparent}
    body.embedded .row.activating{background:var(--line)}
    .row{display:grid;grid-template-columns:52px 1fr;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);cursor:pointer;transition:background-color .14s ease, transform .14s ease, opacity .14s ease}
    .row.activating{background:var(--line);transform:scale(.992);opacity:.92}
    .thumb{width:52px;height:52px;border-radius:8px;object-fit:cover;background:var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:22px}
    .row.activating .thumb{color:var(--text)}
    .name{font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sub{font-size:12px;color:var(--muted)}
    .alpha{position:fixed;right:4px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:2px;z-index:10}
    .alpha button{border:0;background:transparent;color:var(--muted);font-size:11px;line-height:1;padding:1px 2px}
  

    body.nav-backwarding{
      overflow:hidden;
      animation:navBackwardOut .18s ease forwards;
      will-change: transform, opacity;
    }
    @keyframes navBackwardOut{
      from{transform:translateX(0);opacity:1}
      to{transform:translateX(24px);opacity:.38}
    }

  </style>
</head>
<body>
  <div class="top"><button class="back" id="backBtn">‹</button><h1>Genres</h1></div>
  <p class="meta" id="meta"><span class="miniSpin" aria-label="Loading"></span></p>
  <div class="list" id="list"></div>
  <div class="alpha" id="alpha"></div>
  <script>

    // Server-backed controller palette
    const __npBase = `${location.protocol}//${location.hostname||'nowplaying.local'}:3101`;
    function __npApplyPalette(name, themeMode, customColors){
      const p = String(name||'ocean').toLowerCase();
      const modeRaw = String(themeMode||'auto').toLowerCase();
      const forceLightPreset = p === 'cloud' || p === 'sand' || p === 'blush' || p === 'ivoryred';
      const isLight = forceLightPreset;
            const map = {
        ocean:    { accent:'#4aa8ff', bg:'#0b111c', line:'#1f2a3d' },
        violet:   { accent:'#a78bfa', bg:'#120f1f', line:'#32284a' },
        mint:     { accent:'#34d399', bg:'#0b1514', line:'#21423f' },
        amber:    { accent:'#fbbf24', bg:'#171208', line:'#4a3720' },
        black:    { accent:'#f5f5f5', bg:'#050505', line:'#222222' },
        blackred: { accent:'#ff3b47', bg:'#000000', line:'#2b0f13' },
        blackblue: { accent:'#3f68c9', bg:'#000000', line:'#141a2a' },
        blackpurple: { accent:'#8b5ed4', bg:'#000000', line:'#23172f' },
        blackgold: { accent:'#d9a441', bg:'#000000', line:'#2a2314' },
        cloud:    { accent:'#5f8fd9', bg:'#eef4ff', line:'#c8d6ef' },
        sand:     { accent:'#b8863b', bg:'#fff7e8', line:'#ead9b8' },
        blush:    { accent:'#c85c78', bg:'#fff1f5', line:'#f2d0da' },
        ivoryred: { accent:'#c23b45', bg:'#ffffff', line:'#e9e9e9' },
        orange:   { accent:'#ff7a1a', bg:'#16100a', line:'#4a2f1c' },
        midnight: { accent:'#7aa2ff', bg:'#070b14', line:'#202a3f' },
        slate:    { accent:'#93a4bd', bg:'#0e131b', line:'#2f3c4d' },
        mono:     { accent:'#d8d8d8', bg:'#0b0b0b', line:'#2d2d2d' },
        sunset:   { accent:'#ff8f4d', bg:'#1b110d', line:'#5b3a2d' },
        sunrise:  { accent:'#ffbf47', bg:'#1a130a', line:'#5a4523' },
        rose:     { accent:'#fb7185', bg:'#1a0d14', line:'#5b2b3f' },
        lavender: { accent:'#c4b5fd', bg:'#120d1e', line:'#3d3158' },
        emerald:  { accent:'#34d399', bg:'#081511', line:'#1f4a3e' },
        forest:   { accent:'#4ade80', bg:'#0a150d', line:'#2d4f36' },
      };
      const d = map[p] || map.ocean;
            const lightMap = {
        ocean:    { bg:'#eef5ff', line:'#c8d7ee', text:'#0b0f17', muted:'#3f5673' },
        violet:   { bg:'#f5f0ff', line:'#d9cdf1', text:'#0b0f17', muted:'#52436e' },
        mint:     { bg:'#eefcf7', line:'#c7e8dd', text:'#0b0f17', muted:'#3d5f58' },
        amber:    { bg:'#fff8ea', line:'#ead8b0', text:'#0b0f17', muted:'#65532e' },
        black:    { bg:'#f2f4f8', line:'#d4dae4', text:'#0b0f17', muted:'#4b5567', accent:'#111111' },
        blackred: { bg:'#ffeef0', line:'#f0c7cd', text:'#2a090d', muted:'#7a3b43' },
        blackblue: { bg:'#eef2ff', line:'#cfd8f5', text:'#101735', muted:'#3f4f86' },
        blackpurple: { bg:'#f4efff', line:'#ddd1f6', text:'#201233', muted:'#5b3d85' },
        blackgold: { bg:'#fff7e8', line:'#ead9b8', text:'#2a2012', muted:'#6f5737' },
        cloud:    { bg:'#eef4ff', line:'#c8d6ef', text:'#132238', muted:'#425b7f', accent:'#5f8fd9' },
        sand:     { bg:'#fff7e8', line:'#ead9b8', text:'#2a2012', muted:'#6f5737', accent:'#b8863b' },
        blush:    { bg:'#fff1f5', line:'#f2d0da', text:'#2b1119', muted:'#7a4454', accent:'#c85c78' },
        ivoryred: { bg:'#ffffff', line:'#e9e9e9', text:'#111111', muted:'#c23b45', accent:'#c23b45' },
        orange:   { bg:'#fff3ea', line:'#ebcfbe', text:'#0b0f17', muted:'#684937' },
        midnight: { bg:'#edf2ff', line:'#cbd5f1', text:'#0b0f17', muted:'#415172' },
        slate:    { bg:'#f1f5f9', line:'#d0d8e2', text:'#0b0f17', muted:'#4a5567' },
        mono:     { bg:'#f4f4f5', line:'#dadade', text:'#0b0f17', muted:'#52525b' },
        sunset:   { bg:'#fff4ee', line:'#efd0c2', text:'#0b0f17', muted:'#6b4d3e' },
        sunrise:  { bg:'#fff7ea', line:'#ecd7b0', text:'#0b0f17', muted:'#6a572f' },
        rose:     { bg:'#fff1f5', line:'#f2cdd8', text:'#0b0f17', muted:'#6f4454' },
        lavender: { bg:'#f6f3ff', line:'#ddd3fb', text:'#0b0f17', muted:'#534675' },
        emerald:  { bg:'#ecfdf5', line:'#c7e9d8', text:'#0b0f17', muted:'#3f6257' },
        forest:   { bg:'#eef9f0', line:'#cde3d0', text:'#0b0f17', muted:'#44614a' },
      };
            const l = lightMap[p] || lightMap.ocean;
      const accent = (l.accent || d.accent);
      const t = isLight
        ? { accent, ...l, bg: l.bg }
        : { ...d, text: p === 'blackred' ? '#ff4d57' : p === 'blackblue' ? '#5f86e6' : p === 'blackpurple' ? '#b084f5' : p === 'blackgold' ? '#e0b24d' : '#f3f6ff', muted: p === 'blackred' ? '#b33a42' : p === 'blackblue' ? '#3f5ea8' : p === 'blackpurple' ? '#7a56ba' : p === 'blackgold' ? '#a67c2b' : '#9eb3d6' };

      const r = document.documentElement;
      r.style.setProperty('--accent', t.accent);
      r.style.setProperty('--bg', t.bg);
      r.style.setProperty('--line', t.line);
      r.style.setProperty('--text', t.text || '#f3f6ff');
      r.style.setProperty('--muted', t.muted || '#9eb3d6');
    }
    (async ()=>{
      const __u = new URL(location.href);
      const qColor = String(__u.searchParams.get('colorPreset') || '').trim().toLowerCase();
      const qTheme = String(__u.searchParams.get('theme') || '').trim().toLowerCase();
      const qPrimary = String(__u.searchParams.get('primaryThemeColor') || '').trim();
      const qSecondary = String(__u.searchParams.get('secondaryThemeColor') || '').trim();
      const qText = String(__u.searchParams.get('primaryTextColor') || '').trim();
      const qText2 = String(__u.searchParams.get('secondaryTextColor') || '').trim();
      let lsColor = '';
      let lsTheme = '';
      const qCustom = (qPrimary || qSecondary || qText || qText2) ? {
        ...(qPrimary ? { primaryThemeColor:qPrimary } : {}),
        ...(qSecondary ? { secondaryThemeColor:qSecondary } : {}),
        ...(qText ? { primaryTextColor:qText } : {}),
        ...(qText2 ? { secondaryTextColor:qText2 } : {}),
      } : null;
      __npApplyPalette(qColor || 'ocean', qTheme || 'dark', qCustom || null);
      try {
        const r = await fetch(`${__npBase}/config/controller-profile`, { cache:'no-store' });
        const j = await r.json().catch(()=>({}));
        const sColor = String(j?.profile?.colorPreset || 'ocean').trim().toLowerCase();
        const sTheme = String(j?.profile?.theme || 'dark').trim().toLowerCase();
        __npApplyPalette(qColor || sColor || 'ocean', qTheme || sTheme || 'dark', qCustom || null);
      } catch {}
    })();

    const base = `${location.protocol}//${location.hostname||'nowplaying.local'}:3101`;
    let key='';
    let genres=[];

    async function ensureKey(){ if(key) return key; const r=await fetch(`${base}/config/runtime`,{cache:'no-store'}); const j=await r.json().catch(()=>({})); key=String(j?.config?.trackKey||'').trim(); return key; }

    async function loadGenres(){
      await ensureKey();
      const r=await fetch(`${base}/config/queue-wizard/options`,{cache:'no-store',headers:{...(key?{'x-track-key':key}:{})}});
      const j=await r.json().catch(()=>({}));
      genres = (r.ok && j?.ok && Array.isArray(j.genres)) ? j.genres.map(String).map(s=>s.trim()).filter(Boolean) : [];
      genres.sort((a,b)=>a.localeCompare(b,undefined,{sensitivity:'base'}));
      render();
    }

    function render(){
      const list=document.getElementById('list');
      document.getElementById('meta').textContent = `${genres.length} genres`;
      list.innerHTML = genres.map((g,i)=>`<div class='row' data-idx='${i}' data-genre='${encodeURIComponent(g)}'><div class='thumb'>◉</div><div><div class='name'>${g}</div><div class='sub'>Open albums in this genre</div></div></div>`).join('');
      renderAlpha();
    }

    function renderAlpha(){
      const alpha = document.getElementById('alpha');
      alpha.innerHTML='';
      const m = new Map();
      genres.forEach((g,i)=>{ const ch=g.trim().charAt(0).toUpperCase(); const k=/[A-Z]/.test(ch)?ch:'#'; if(!m.has(k)) m.set(k,i); });
      [...'ABCDEFGHIJKLMNOPQRSTUVWXYZ#'].forEach(ch=>{
        if(!m.has(ch)) return;
        const b=document.createElement('button'); b.textContent=ch;
        b.onclick=()=>{ const el=document.querySelector(`[data-idx='${m.get(ch)}']`); el?.scrollIntoView({behavior:'smooth',block:'start'}); };
        alpha.appendChild(b);
      });
    }

    let __genreNavBusy = false;
    document.getElementById('list').addEventListener('click', (ev)=>{
      const row = ev.target.closest('.row[data-genre]');
      if(!row || __genreNavBusy) return;
      let genre='';
      try{ genre=decodeURIComponent(String(row.getAttribute('data-genre')||'')); }catch{ genre=String(row.getAttribute('data-genre')||''); }
      if(!genre) return;
      __genreNavBusy = true;
      row.classList.add('activating');
      const u = new URL('controller-albums.html', location.href);
      u.searchParams.set('genre', genre);
      u.searchParams.set('cb', String(Date.now()));
      if (new URL(location.href).searchParams.get('embedded') === '1') {
        u.searchParams.set('embedded','1');
        try { window.parent?.postMessage({ type:'np-kiosk-pane-genre', pane:'kiosk-albums.html', genre }, '*'); } catch {}
      }
      setTimeout(()=>{ location.href = u.toString(); }, 110);
    });

    let __backNavBusy=false;
    const backBtn = document.getElementById('backBtn');
    const pageTitle = document.querySelector('.top h1');
    if (pageTitle) { pageTitle.style.cursor='pointer'; pageTitle.addEventListener('click', ()=> backBtn?.click()); }
    backBtn?.addEventListener('click', ()=>{
      if (__backNavBusy) return;
      __backNavBusy = true;
      document.body.classList.add('nav-backwarding');
      setTimeout(()=>{ const embedded = new URL(location.href).searchParams.get('embedded') === '1'; if (embedded) { try { window.parent?.postMessage({ type:'np-kiosk-hide-pane' }, '*'); } catch {} return; } if(history.length>1) history.back(); else location.href='controller.html'; }, 170);
    });

    loadGenres();
  
    // Pull-to-refresh (controller pages)
    (function enablePullToRefresh(){
      if (window.__npPullRefreshBound) return;
      window.__npPullRefreshBound = true;
      let startY = 0;
      let tracking = false;
      let armed = false;
      const THRESH = 80;

      const topScrollable = () => {
        const el = document.scrollingElement || document.documentElement || document.body;
        return (el?.scrollTop || window.pageYOffset || 0) <= 0;
      };

      window.addEventListener('touchstart', (e) => {
        if (!e.touches || e.touches.length !== 1) return;
        if (!topScrollable()) return;
        startY = e.touches[0].clientY;
        tracking = true;
        armed = false;
      }, { passive: true });

      window.addEventListener('touchmove', (e) => {
        if (!tracking || !e.touches || e.touches.length !== 1) return;
        const dy = e.touches[0].clientY - startY;
        if (dy > THRESH && topScrollable()) armed = true;
      }, { passive: true });

      window.addEventListener('touchend', () => {
        if (tracking && armed) location.reload();
        tracking = false;
        armed = false;
      }, { passive: true });
    })();
</script>
</body>
</html>
