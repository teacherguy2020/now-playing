<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Now Playing Display Router</title>
  <style>
    html,body{margin:0;width:100%;height:100%;background:#000;overflow:hidden}
    #v{width:100%;height:100%;border:0;display:block;background:#000}
  </style>
</head>
<body>
  <iframe id="v" title="Display"></iframe>
  <script>
    (async () => {
      const f = document.getElementById('v');
      const host = location.hostname || 'nowplaying.local';
      const api = `${location.protocol}//${host}:3101`;
      const fallback = 'peppy';
      const forcedMode = String(new URLSearchParams(location.search).get('mode') || '').trim().toLowerCase();
      let mode = forcedMode || fallback;
      let skin = '';
      let theme = '';
      let profile = {};
      try {
        const r = await fetch(`${api}/peppy/last-profile`, { cache: 'no-store' });
        const j = await r.json().catch(() => ({}));
        profile = j?.profile || {};
        if (!forcedMode) mode = String(profile?.displayMode || fallback).trim().toLowerCase();
        skin = String(profile?.skin || '').trim();
        theme = String(profile?.theme || '').trim();
      } catch {}

      if (mode === 'moode') {
        f.src = 'http://moode.local/index.php';
        return;
      }
      if (mode === 'player') {
        const q = new URLSearchParams();
        q.set('kiosk', '1');
        q.set('size', String(profile?.playerSize || '1280x400'));
        q.set('ts', String(Date.now()));
        f.src = `player-render.html?${q.toString()}`;
        return;
      }
      if (mode === 'visualizer' || mode === 'viz') {
        // Prefer explicit pushed visualizer URL when present.
        const pushedUrl = String(profile?.url || '').trim();
        if (/visualizer\.html/i.test(pushedUrl)) {
          try {
            const u = new URL(pushedUrl, location.href);
            u.searchParams.set('kiosk', '1');
            u.searchParams.set('ts', String(Date.now()));
            f.src = u.toString();
            return;
          } catch {}
        }
        const v = (profile && typeof profile.visualizer === 'object') ? profile.visualizer : {};
        const q = new URLSearchParams();
        q.set('kiosk', '1');
        if (v?.preset) q.set('preset', String(v.preset));
        if (Number.isFinite(Number(v?.energy))) q.set('energy', String(Math.max(1, Math.min(10, Number(v.energy)))));
        if (Number.isFinite(Number(v?.motion))) q.set('motion', String(Math.max(1, Math.min(10, Number(v.motion)))));
        if (Number.isFinite(Number(v?.glow))) q.set('glow', String(Math.max(1, Math.min(10, Number(v.glow)))));
        q.set('ts', String(Date.now()));
        f.src = `visualizer.html?${q.toString()}`;
        return;
      }
      if (mode === 'index' || mode === 'webui') {
        f.src = `index.html?kiosk=1&ts=${Date.now()}`;
        return;
      }

      const q = new URLSearchParams();
      q.set('kiosk', '1');
      if (skin) q.set('skin', skin);
      if (theme) q.set('theme', theme);
      q.set('ts', String(Date.now()));
      f.src = `peppy.html?${q.toString()}`;
    })();
  </script>
</body>
</html>
