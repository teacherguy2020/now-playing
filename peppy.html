<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Peppy Bridge</title>
  <style>
    @font-face{
      font-family:"DotGothic16Local";
      src:url("assets/fonts/DotGothic16-Regular.ttf") format("truetype");
      font-display:swap;
    }
    :root{
      --bg:#05070d;
      --fg:#e6efff;
      --muted:#9bb0d3;
      --card:#0d1422;
      --card2:#08101a;
      --line:#22324a;
      --accent:#7dd3fc;
      --accent2:#22c55e;
      --progress-seg:#2eb9ee;
      --progress-rgb:46,185,238;
      --dot-bg:#06101a;
      --dot-dim:#3a516f;
      --stage-w:1280;
      --stage-h:400;
      --stage-left-col:320;
    }
    html,body{margin:0;background:var(--bg);color:var(--fg);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;height:100%;overflow:hidden}
    body{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:6px 8px 0;box-sizing:border-box;gap:6px}
    .previewStage{position:relative;display:flex;align-items:flex-start;justify-content:center;overflow:hidden}
    .wrap{width:calc(var(--stage-w) * 1px);height:calc(var(--stage-h) * 1px);display:grid;grid-template-columns:calc(var(--stage-left-col) * 1px) 1fr;gap:4px;padding:0;box-sizing:border-box;transform-origin:top center}
    .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:8px;overflow:hidden}
    .left{display:flex;flex-direction:column;align-items:stretch;height:100%;position:relative}
    body.linear-meter .meters .progress{position:relative;top:0;margin-top:0;width:100%;margin-left:0}
    .artFrame{position:relative;flex:1 1 auto;min-height:0;width:100%;display:flex;align-items:flex-end;justify-content:center}
    #art,#artVideo{width:100%;height:100%;object-fit:contain;background:#02040a;display:block;margin:0;border-radius:4px;box-shadow:0 0 28px rgba(var(--progress-rgb,46,185,238),.24), 0 0 58px rgba(var(--progress-rgb,46,185,238),.16)}
    #artGlow{position:absolute;left:0;right:0;top:0;bottom:0;pointer-events:none;z-index:6;border-radius:4px;background:radial-gradient(128% 118% at 50% 50%, rgba(var(--progress-rgb,46,185,238),.44) 0%, rgba(var(--progress-rgb,46,185,238),.18) 22%, rgba(var(--progress-rgb,46,185,238),.06) 44%, rgba(var(--progress-rgb,46,185,238),.015) 58%, rgba(var(--progress-rgb,46,185,238),0) 70%);mix-blend-mode:screen;opacity:.86}
    body.font-dot .artFrame{width:calc(100% - 28px);aspect-ratio:1 / 1;height:auto;margin:auto 14px 0 14px;flex:0 0 auto}
    /* Compact layout: pin art frame to top-left of left column across all presets. */
    body.screen-compact .artFrame{width:calc(100% - 36px);max-width:calc(100% - 36px);aspect-ratio:1 / 1;height:auto;margin:14px auto auto 14px;flex:0 0 auto;justify-content:flex-start;align-items:flex-start}
    body.font-dot #artGlow{left:0;right:0;top:0;bottom:0;border-radius:0}
    body.font-dot #art,body.font-dot #artVideo{width:100%;height:100%;object-fit:contain;border-radius:0;background:#161216;border:3px solid #5a4a3f;outline:8px solid rgba(22,16,14,.9);box-shadow:0 0 0 2px rgba(214,184,146,.25), 0 0 18px rgba(232,196,130,.28), 0 0 34px rgba(232,196,130,.18), 0 0 28px rgba(var(--progress-rgb,46,185,238),.22), 0 0 56px rgba(var(--progress-rgb,46,185,238),.14), inset 0 0 0 4px rgba(34,26,20,.65), inset 0 -30px 44px rgba(0,0,0,.52), inset 0 0 54px rgba(0,0,0,.28), inset 0 0 26px rgba(255,220,165,.18), inset 0 0 48px rgba(var(--progress-rgb,46,185,238),.28), 0 8px 22px rgba(0,0,0,.46);filter:contrast(1.08) saturate(.9)}
    body.font-dot.warm-parchment #art,body.font-dot.warm-parchment #artVideo{border-radius:0;border-color:#8f7659;outline-color:rgba(65,48,34,.9);box-shadow:0 0 0 2px rgba(241,224,198,.35), 0 0 24px rgba(244,211,160,.36), 0 0 42px rgba(244,211,160,.22), inset 0 0 0 4px rgba(72,52,32,.64), inset 0 -34px 50px rgba(52,30,14,.56), inset 0 0 60px rgba(120,84,45,.42), inset 0 0 34px rgba(255,224,176,.28), 0 10px 24px rgba(0,0,0,.36);filter:sepia(.2) contrast(1.08) saturate(.88)}
    /* Keep ~4 dark-dot rows above and below 5x7 glyphs (pitch=2) for top meta rows. */
    .leftFileMeta{border-radius:0;border-left:none;border-right:none;border-bottom:none;margin-top:0}
    .leftFileMeta.dotline.small{height:34px}
    body.kiosk .leftFileMeta.dotline.small{height:34px}
    .meta{padding:4px 10px 0px;display:grid;gap:1px}
    #leftMetaSlot,#rightMetaSlot{display:grid;gap:0}
    .title{font-size:28px;font-weight:760;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.02}
    .sub{font-size:17px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.05}
    .matrix{display:block}
    .dotline{display:block;width:100%;height:28px;background:#081018;border:none;border-radius:6px;padding:2px 6px;box-sizing:border-box;image-rendering:pixelated}
    .dotline.title{height:56px}
    .dotline.small{height:24px}
    .subline{display:flex;gap:14px;flex-wrap:wrap;font-size:16px;color:#bfd0ee;line-height:1.1}
    .right{position:relative;display:grid;grid-template-rows:auto;align-content:start}
    .meters{position:absolute;right:4px;bottom:12px;width:min(820px, calc(100% - 12px));display:grid;grid-template-rows:auto;gap:2px;padding:0;align-content:end}
    .controls{position:absolute;left:28px;bottom:12px;height:208px;display:grid;grid-template-columns:repeat(2,60px);grid-template-rows:repeat(3,60px);column-gap:8px;row-gap:14px;align-content:start;z-index:4}
    .formatStrip{display:none}
    /* 1280x400 adopts compact-style left panel: art top, LED strip, one-row controls. */
    body.screen-1280x400 #leftMetaSlot{display:none}
    body.screen-1280x400 .artFrame{margin:14px auto auto 14px}
    body.screen-1280x400 .formatStrip{display:flex;position:absolute;left:12px;right:12px;bottom:55px;justify-content:center;align-items:center;align-content:center;flex-wrap:wrap;gap:6px 10px;z-index:5;pointer-events:none;max-width:296px;margin:0 auto}
    body.screen-1280x400 .formatStrip .fmtBreak{display:block;flex-basis:100%;height:0}
    body.screen-1280x400 .formatStrip .fmtItem[data-fmt="sr44"],
    body.screen-1280x400 .formatStrip .fmtItem[data-fmt="sr48"],
    body.screen-1280x400 .formatStrip .fmtItem[data-fmt="sr96"],
    body.screen-1280x400 .formatStrip .fmtItem[data-fmt="b16"],
    body.screen-1280x400 .formatStrip .fmtItem[data-fmt="b24"],
    body.screen-1280x400 .formatStrip .fmtItem[data-fmt="live"]{display:inline-flex}
    body.screen-1280x400 .formatStrip .fmtItem:nth-child(-n+5){transform:translateY(5px)}
    body.screen-1280x400 .formatStrip .fmtRate{display:none}
    body.screen-1280x400 .controls{position:absolute;left:12px;right:12px;bottom:8px;height:44px;grid-template-columns:repeat(6,44px);grid-template-rows:44px;column-gap:6px;row-gap:0;justify-content:center;align-content:center;z-index:4}
    body.screen-1280x400 .ctrlBtn{width:44px;height:44px;border-radius:0;border-color:#5a616d;background:linear-gradient(180deg, rgba(255,255,255,.22) 0%, rgba(255,255,255,.08) 16%, #3a414d 17%, #262d38 58%, #1a212b 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.35), inset 0 -2px 0 rgba(0,0,0,.42), 0 2px 4px rgba(0,0,0,.5)}
    body.screen-1280x400 .ctrlBtn .symSvg{width:18px;height:18px}
    body.screen-1280x400 .ctrlBtn:active{transform:translateY(1px);box-shadow:inset 0 1px 0 rgba(255,255,255,.22), inset 0 -1px 0 rgba(0,0,0,.52), 0 1px 2px rgba(0,0,0,.46)}
    body.screen-1280x400 .meters{width:min(900px, calc(100% - 12px));left:50%;right:auto;transform:translateX(-50%)}
    body.screen-1280x400 .needleWrap{height:220px}
    body.screen-1280x400 .meta{padding:0 8px 0;gap:0}
    body.screen-1280x400 .dotline.title{height:52px}
    .fmtItem{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#9db0c7;letter-spacing:.3px}
    .fmtBreak{display:none}
    .fmtItem[data-fmt="sr44"],.fmtItem[data-fmt="sr48"],.fmtItem[data-fmt="sr96"],.fmtItem[data-fmt="b16"],.fmtItem[data-fmt="b24"],.fmtItem[data-fmt="live"]{display:none}
    .fmtLed{width:7px;height:7px;border-radius:50%;background:#1e2e22;border:1px solid #3d5f45;box-shadow:inset 0 0 2px rgba(0,0,0,.55)}
    .fmtItem.on .fmtLed{background:#67f18b;border-color:#9ff7b4;box-shadow:0 0 6px rgba(108,241,148,.8), 0 0 12px rgba(108,241,148,.35)}
    .fmtItem[data-fmt="hq"].on .fmtLed{background:#f4c84a;border-color:#ffe08c;box-shadow:0 0 6px rgba(244,200,74,.85),0 0 12px rgba(244,200,74,.4)}
    .fmtItem[data-fmt="sr44"].on .fmtLed,.fmtItem[data-fmt="sr48"].on .fmtLed,.fmtItem[data-fmt="sr96"].on .fmtLed,.fmtItem[data-fmt="b16"].on .fmtLed,.fmtItem[data-fmt="b24"].on .fmtLed{background:#3fa9e6;border-color:#89cdef;box-shadow:0 0 6px rgba(63,169,230,.8),0 0 12px rgba(63,169,230,.34)}
    @keyframes livePulseSlow{0%{opacity:.62;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}100%{opacity:.62;transform:scale(1)}}
    .fmtItem[data-fmt="live"].on .fmtLed{background:#f05a5a;border-color:#ffaaaa;box-shadow:0 0 6px rgba(240,90,90,.78),0 0 12px rgba(240,90,90,.36);animation:livePulseSlow 3.6s ease-in-out infinite}
    .fmtRate{margin-left:auto;font-size:10px;color:#b7c6d8}
    /* Compact profiles: keep classic 2x3 controls; JS positions block in left-column gap above art. */
    body.screen-compact .controls{height:208px;grid-template-columns:repeat(2,60px);grid-template-rows:repeat(3,60px);column-gap:8px;row-gap:14px;align-content:start}
    body.screen-1024x320 .card.left{display:grid;grid-template-rows:minmax(0,1fr) auto;align-items:stretch}
    body.screen-1024x320 .meta{padding:0 8px 0;gap:0}
    body.screen-1024x320 .dotline.title{height:44px}
    body.screen-1024x320 #leftMetaSlot:empty{display:none}
    body.screen-1024x320 .artFrame{grid-row:1;align-self:start}
    body.screen-1024x320 .formatStrip{display:flex;position:absolute;left:10px;right:10px;bottom:50px;justify-content:center;align-items:center;gap:6px;padding-top:0;z-index:5;pointer-events:none}
    body.screen-1024x320 .formatStrip .fmtRate{display:none}
    body.screen-1024x320 .controls{position:static;grid-row:2;height:38px;grid-template-columns:repeat(6,34px);grid-template-rows:38px;column-gap:4px;row-gap:0;justify-self:center;align-self:end;z-index:4;margin-bottom:6px}
    body.screen-1024x320 .ctrlBtn{width:34px;height:38px}
    body.screen-1024x320 .ctrlBtn .symSvg{width:15px;height:15px}
    body.screen-480x320 .controls{height:164px;grid-template-columns:repeat(2,50px);grid-template-rows:repeat(3,50px);column-gap:8px;row-gap:7px}
    body.screen-480x320 .ctrlBtn{width:50px;height:50px}
    body.screen-480x320 .ctrlBtn .symSvg{width:24px;height:24px}
    .skinOps{position:static;display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;width:min(1280px,calc(100vw - 16px));padding:6px 8px;border:1px solid var(--line);border-radius:8px;background:linear-gradient(180deg,var(--card),var(--card2));box-sizing:border-box}
    .skinBtn{height:26px;padding:0 10px;border:1px solid #3f4753;background:#1f2731;color:#d8e4f3;font-size:12px;cursor:pointer}
    .skinSelect{height:26px;border:1px solid #3f4753;background:#131b24;color:#d8e4f3;font-size:12px;padding:0 6px}
    .iframeScale{position:absolute;right:14px;top:10px;display:none;align-items:center;gap:8px;background:#0f1722;border:1px solid #2f3a4b;padding:4px 8px}
    .iframeScale input{width:120px}
    .iframeScale span{font-size:12px;color:#d8e4f3;min-width:42px;text-align:right}
    .exportModal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(2,8,20,.72);z-index:9999;padding:16px}
    .exportModal.open{display:flex}
    .exportCard{width:min(820px,96vw);max-height:84vh;display:grid;grid-template-rows:auto 1fr auto;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;box-shadow:0 20px 60px rgba(0,0,0,.45)}
    .exportHead{display:flex;justify-content:space-between;align-items:center}
    .exportTitle{font-weight:700}
    .exportActions{display:flex;gap:8px}
    .exportJson{width:100%;height:100%;min-height:320px;background:#0a1118;color:#d8e4f3;border:1px solid #3f4753;border-radius:8px;padding:10px;font:12px ui-monospace,SFMono-Regular,Menlo,monospace;box-sizing:border-box}
    .ctrlBtn{width:60px;height:60px;border:1px solid #3f4753;border-radius:4px;background:linear-gradient(180deg,#2f353f,#212730);color:#e9eef5;line-height:1;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.12), inset 0 -2px 0 rgba(0,0,0,.35), 0 2px 4px rgba(0,0,0,.45)}
    .ctrlBtn .symSvg{width:28px;height:28px;fill:#aeb8c6;filter:drop-shadow(0 1px 0 rgba(255,255,255,.08)) drop-shadow(0 -1px 0 rgba(0,0,0,.62))}
    .ctrlBtn:active{transform:translateY(1px);box-shadow:inset 0 1px 0 rgba(255,255,255,.10), inset 0 -1px 0 rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.4)}
    .ctrlBtn.lit .symSvg{fill:#9cffb0;filter:drop-shadow(0 0 6px rgba(120,255,150,.85)) drop-shadow(0 0 14px rgba(120,255,150,.45))}
    .ctrlBtn.tap .symSvg{filter:drop-shadow(0 0 3px rgba(220,240,255,.45))}
    .row{display:grid;grid-template-columns:1fr;align-items:center;gap:0;margin:0;padding:0}
    .lbl{display:none;font-weight:800;color:#bcd0ef;text-align:center;font-size:11px}
    .needleWrap{height:208px;border:none;background:transparent;overflow:hidden;box-shadow:inset 0 0 4px rgba(10,22,46,.16)}
    #needleCanvas{display:block;width:100%;height:100%}
    .stars{letter-spacing:2px;font-size:18px;display:inline-flex;gap:2px}
    .star{color:#7a6420;opacity:.35;transition:opacity .12s linear, text-shadow .12s linear, color .12s linear}
    .star.active{color:#fbbf24;opacity:.98;text-shadow:0 0 5px rgba(251,191,36,.55), 0 0 10px rgba(251,191,36,.35)}
    .progress{height:10px;border-radius:0;border:1px solid #304764;background:#091120;overflow:hidden;margin:0;padding:0;width:100%}
    .progressSegbar{position:relative;display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:6px;padding:2px 8px;box-sizing:border-box;height:100%}
    .pfill{position:absolute;left:8px;right:8px;top:2px;bottom:2px;width:auto;pointer-events:none;border-radius:0;background:rgba(var(--progress-rgb),.88);box-shadow:0 0 7px rgba(var(--progress-rgb),.42),0 0 18px rgba(var(--progress-rgb),.24);transform-origin:left center;transform:scaleX(0);transition:transform .10s linear,opacity .10s linear;opacity:0}
    /* Linear mode: align visible progress/fill rails with linear meter lane edges. */
    body.linear-meter .progressSegbar{padding:2px 1px;gap:2px}
    body.linear-meter .pfill{left:1px;right:1px}
    .pseg{border-radius:0;background:var(--progress-seg);opacity:.20;transition:opacity .12s linear, box-shadow .12s linear}
    .pseg.active{opacity:.82;box-shadow:0 0 6px rgba(var(--progress-rgb),.72), 0 0 14px rgba(var(--progress-rgb),.42)}
    .pseg.tail{animation:tailPulse 2.6s ease-in-out infinite}
    @keyframes tailPulse{
      0%,100%{opacity:.62;box-shadow:0 0 4px rgba(var(--progress-rgb),.35)}
      50%{opacity:1;box-shadow:0 0 9px rgba(var(--progress-rgb),.92),0 0 18px rgba(var(--progress-rgb),.55)}
    }
    /* Keep fixed 1280x400 composition in all contexts (standalone + iframe). */
  </style>
</head>
<body>
  <div id="exportModal" class="exportModal" aria-hidden="true">
    <div class="exportCard" role="dialog" aria-modal="true" aria-label="Export skin JSON">
      <div class="exportHead">
        <div class="exportTitle">Skin Profile JSON</div>
        <button id="exportClose" class="skinBtn" type="button">Close</button>
      </div>
      <textarea id="exportJson" class="exportJson" spellcheck="false"></textarea>
      <div class="exportActions">
        <button id="exportCopy" class="skinBtn" type="button">Copy</button>
      </div>
    </div>
  </div>
  <div id="previewStage" class="previewStage">
  <div id="wrap" class="wrap">
    <section class="card left">
      <div class="progress" style="margin:0;width:100%;border-left:none;border-right:none;border-bottom:none;"><div id="trackProgress" class="progressSegbar"></div></div>
      <div id="leftMetaSlot">
        <canvas class="dotline small leftFileMeta" id="fileMetaCanvas" width="640" height="24"></canvas>
        <canvas class="dotline small leftFileMeta" id="fileMetaCanvas2" width="640" height="24"></canvas>
      </div>
      <div class="artFrame" id="artFrame">
        <img id="art" alt="Album art" src="" />
        <video id="artVideo" muted loop playsinline preload="metadata" style="display:none;"></video>
        <div id="artGlow" aria-hidden="true"></div>
      </div>
    </section>

    <section class="card right">
      <div class="meta">
        <canvas class="dotline title" id="artistCanvas" width="1200" height="88"></canvas>
        <canvas class="dotline title" id="titleCanvas" width="1200" height="88"></canvas>
        <canvas class="dotline title" id="albumYearCanvas" width="1200" height="88"></canvas>
        <div id="rightMetaSlot"></div>
      </div>

      <div id="skinOps" class="skinOps" aria-label="Skin operations">
        <button id="skinExport" class="skinBtn" type="button">Export JSON</button>
        <button id="skinSavePreset" class="skinBtn" type="button">Save as Preset</button>
        <select id="peppyPreset" class="skinSelect" aria-label="Peppy preset">
          <option value="">Load preset…</option>
          <option value="builtin:0">Modern Blue Circular</option>
          <option value="builtin:1">Matrix Classic Needle</option>
          <option value="builtin:2">Red Neon Studio</option>
          <option value="builtin:3">Cassette Linear Classic</option>
          <option value="builtin:4">Obsidian Ember Matrix</option>
          <option value="builtin:5">Gray Ghost</option>
          <option value="builtin:6">Modern Condensed Linear Theme (S)</option>
          <option value="builtin:7">Inter Tight Studio Linear (L)</option>
          <option value="builtin:8">Montserrat Circular Clean</option>
          <option value="builtin:9">Warm Parchment Gold Circular</option>
        </select>
        <button id="pushPeppyFromTab" class="skinBtn" type="button">Push Peppy to moOde</button>
        <select id="screenProfile" class="skinSelect" aria-label="Peppy screen profile">
          <option value="1280x400">Screen: 1280×400</option>
          <option value="1024x320">Screen: 1024×320</option>
          <option value="800x480">Screen: 800×480</option>
          <option value="480x320">Screen: 480×320</option>
        </select>
        <label class="skinSelect" style="display:inline-flex;align-items:center;gap:6px;padding:0 8px;">
          <input type="radio" name="meterType" id="meterTypeCircular" value="circular" checked /> Circular
        </label>
        <label class="skinSelect" style="display:inline-flex;align-items:center;gap:6px;padding:0 8px;">
          <input type="radio" name="meterType" id="meterTypeLinear" value="linear" /> Linear
        </label>
        <select id="skinName" class="skinSelect" aria-label="Select meter"></select>
        <select id="fontMode" class="skinSelect" aria-label="Font style">
          <option value="ui-sans">UI Sans</option>
          <option value="ui-sans-condensed">UI Sans Condensed</option>
          <option value="inter-tight">Inter Tight</option>
          <option value="montserrat">Montserrat</option>
          <option value="dot-matrix">Dot Matrix</option>
        </select>
        <select id="fontSize" class="skinSelect" aria-label="Font size">
          <option value="s">Font S</option>
          <option value="m" selected>Font M</option>
          <option value="l">Font L</option>
          <option value="xl">Font XL</option>
        </select>
        <select id="linearStyle" class="skinSelect" aria-label="Linear meter style">
          <option value="cassette">Linear: Cassette (segmented)</option>
          <option value="continuous">Linear: Continuous (green→yellow→red)</option>
          <option value="continuous-theme">Linear: Continuous (theme color)</option>
        </select>
        <select id="linearSize" class="skinSelect" aria-label="Linear meter size">
          <option value="s">Linear Size: Small</option>
          <option value="m" selected>Linear Size: Medium</option>
          <option value="l">Linear Size: Large</option>
        </select>
        <select id="needleSensitivity" class="skinSelect" aria-label="Needle sensitivity">
          <option value="low">Needle: Low</option>
          <option value="medium" selected>Needle: Medium</option>
          <option value="high">Needle: High</option>
        </select>
        <select id="needleSmoothing" class="skinSelect" aria-label="Needle smoothing">
          <option value="off">Smoothing: Off</option>
          <option value="low">Smoothing: Low</option>
          <option value="medium" selected>Smoothing: Medium</option>
          <option value="high">Smoothing: High</option>
        </select>
        <select id="themeName" class="skinSelect" aria-label="Peppy theme preset">
          <option value="graphite-green">Matrix</option>
          <option value="graphite-green">Green Neon</option>
          <option value="red-neon">Red Neon</option>
          <option value="red-neon">Muted Merlot</option>
          <option value="warm-parchment">Warm Parchment</option>
          <option value="midnight-blue">Blue Neon</option>
          <option value="midnight-blue">Chill Blue</option>
          <option value="midnight-blue">Abyss Graphite</option>
          <option value="silver-black">Slate Medium</option>
          <option value="silver-black">Monotone Gray</option>
          <option value="obsidian-black">Obsidian Black</option>
          <option value="silver-black">Morning Paper</option>
        </select>
      </div>
      <div id="iframeScale" class="iframeScale" aria-label="Iframe preview scale">
        <label for="iframeScaleInput" style="font-size:12px;color:#d8e4f3;">Scale</label>

              const target = Math.round(cRect.top - nRect.top);
              if (Number.isFinite(target)) panelY = Math.max(0, Math.min(H - panelH, target));
            }
          } catch {}

          const topY = panelY + Math.max(6, Math.floor((panelH - (laneH * 2 + 12)) / 2));
          const botY = topY + laneH + 12;

          const cs = getComputedStyle(document.documentElement);
          const panelBase = String(cs.getPropertyValue('--card2') || '').trim() || '#08101a';
          const panelBorder = String(cs.getPropertyValue('--line') || '').trim() || '#22324a';
          const laneBaseColor = String(cs.getPropertyValue('--card') || '').trim() || '#0d1422';

          ctx.globalAlpha = 0.82;
          ctx.fillStyle = panelBase;
          ctx.fillRect(panelX, panelY, panelW, panelH);
          ctx.globalAlpha = 1;
          ctx.strokeStyle = panelBorder;
          ctx.strokeRect(panelX + 0.5, panelY + 0.5, panelW - 1, panelH - 1);

          const drawRail = (y, level, label = 'L', channel = 'L') => {
            const x0 = panelX + pad;
            const h = laneH;
            const segs = 34;
            const gap = 2;
            const segW = Math.max(2, Math.floor((w - (segs - 1) * gap) / segs));
            const lit = Math.round((clamp(level) / 100) * segs);
            const style = String(previewLinearStyle || 'continuous');
            const cassetteStyle = (style === 'cassette');
            const useThemeTint = (style === 'continuous-theme');

            ctx.globalAlpha = 0.9;
            ctx.fillStyle = laneBaseColor;
            ctx.fillRect(x0, y, w, h);
            ctx.globalAlpha = 1;
            ctx.strokeStyle = panelBorder;
            ctx.strokeRect(x0 + 0.5, y + 0.5, w - 1, h - 1);

            // rail label
            ctx.fillStyle = 'rgba(190,210,235,.72)';
            ctx.font = 'bold 11px Inter, system-ui, sans-serif';
            ctx.fillText(label, x0 - 15, y + h - 5);

            if (!cassetteStyle) {
              const pct = clamp(level) / 100;
              const fillW = Math.max(0, Math.floor(w * pct));
              ctx.fillStyle = 'rgba(18,30,44,.55)';
              ctx.fillRect(x0 + 1, y + 3, w - 2, h - 6);

              if (useThemeTint) {
                const rgb = getComputedStyle(document.documentElement).getPropertyValue('--progress-rgb').trim() || '46,185,238';
                const fw = Math.max(0, fillW - 2);
                const gx = x0 + 1;
                // Thresholded theme progression (like G→Y→R behavior):
                // low band always, mid only after threshold, high only near peak.
                const lowEnd = Math.floor(w * 0.62);
                const midEnd = Math.floor(w * 0.82);
                const lowW = Math.min(fw, lowEnd);
                const midW = Math.min(Math.max(0, fw - lowEnd), Math.max(0, midEnd - lowEnd));
                const highW = Math.max(0, fw - midEnd);
                if (lowW > 0) {
                  ctx.fillStyle = `rgba(${rgb},.30)`;
                  ctx.fillRect(gx, y + 3, lowW, h - 6);
                }
                if (midW > 0) {
                  ctx.fillStyle = `rgba(${rgb},.58)`;
                  ctx.fillRect(gx + lowEnd, y + 3, midW, h - 6);
                }
                if (highW > 0) {
                  ctx.fillStyle = `rgba(${rgb},.90)`;
                  ctx.fillRect(gx + midEnd, y + 3, highW, h - 6);
                }
              } else {
                const greenEnd = Math.floor(w * 0.62);
                const yellowEnd = Math.floor(w * 0.82);
                const fw = Math.max(0, fillW - 2);
                const drawPart = (sx, sw, color) => {
                  if (sw <= 0) return;
                  ctx.fillStyle = color;
                  ctx.fillRect(sx, y + 3, sw, h - 6);
                };
                const xStart = x0 + 1;
                const gW = Math.min(fw, greenEnd);
                const yW = Math.min(Math.max(0, fw - greenEnd), Math.max(0, yellowEnd - greenEnd));
                const rW = Math.max(0, fw - yellowEnd);
                drawPart(xStart, gW, '#79f28a');
                drawPart(xStart + greenEnd, yW, '#ffe06b');
                drawPart(xStart + yellowEnd, rW, '#ff6464');
              }
            } else {
              for (let i = 0; i < segs; i++) {
                const sx = x0 + i * (segW + gap);
                const zoneRed = i >= Math.floor(segs * 0.82);
                const zoneYellow = !zoneRed && i >= Math.floor(segs * 0.62);
                const active = i < lit;
                const base = useThemeTint ? '#2eb9ee' : (zoneRed ? '#ff6464' : (zoneYellow ? '#ffe06b' : '#bff3ff'));
                const idle = useThemeTint
                  ? 'rgba(85,165,200,.17)'
                  : (zoneRed ? 'rgba(255,110,110,.16)' : (zoneYellow ? 'rgba(255,230,120,.14)' : 'rgba(140,235,255,.12)'));
                ctx.fillStyle = active ? base : idle;
                ctx.fillRect(sx, y + 3, segW, h - 6);
              }
            }

            // subtle live peak line (continuous styles only)
            if (!cassetteStyle) {
              const held = clamp(peakHold[channel] ?? level);
              const peakX = Math.max(x0 + 1, Math.min(x0 + w - 1, x0 + Math.round((held / 100) * w)));
              ctx.strokeStyle = useThemeTint ? 'rgba(190,245,255,.42)' : 'rgba(255,255,255,.32)';
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(peakX + 0.5, y + 2);
              ctx.lineTo(peakX + 0.5, y + h - 2);
              ctx.stroke();
            }
          };

          drawRail(topY, meterState.L.cur, 'L', 'L');
          drawRail(botY, meterState.R.cur, 'R', 'R');
          drawSpectrumOverlay(ctx, panelX + 10, panelY + panelH - 18, panelW - 20, 12);
          lastLinearLayout = { panelX, panelY, panelW, panelH, pad, railW: w };
          updateIframeControlAnchor(panelW);
          syncProgressPlacement();
          return;
        }

        const bgr = needleSkin.bgr;
        const fgr = needleSkin.fgr;
        const hasSkin = bgr.complete && bgr.naturalWidth > 0;

        const baseH = H - 4;
        let meterH = Math.floor(baseH * 1.72);
        const skinAspect = (hasSkin && bgr.naturalWidth > 0 && bgr.naturalHeight > 0)
          ? ((bgr.naturalWidth / 2) / bgr.naturalHeight)
          : 1.6;
        let meterW = Math.floor(meterH * skinAspect); // preserve source meter proportion
        const gap = 6;
        let groupW = meterW * 2 + gap;
        if (groupW > (W - 2)) {
          const maxWPer = Math.floor((W - 2 - gap) / 2);
          meterW = Math.max(40, maxWPer);
          meterH = Math.max(30, Math.floor(meterW / skinAspect));
          groupW = meterW * 2 + gap;
        }
        meterH = Math.min(meterH, H - 2);
        const startX = Math.max(0, Math.floor((W - groupW) / 2)); // centered in meter canvas
        const y0 = Math.max(0, H - meterH);
        updateIframeControlAnchor(groupW);

        const drawOne = (x, level, side) => {
          if (hasSkin) {
            const sw = Math.floor(bgr.naturalWidth / 2);
            const sx = side === 'L' ? 0 : sw;
            ctx.drawImage(bgr, sx, 0, sw, bgr.naturalHeight, x, y0, meterW, meterH);
            const tint = meterTint();
            ctx.save();
            ctx.globalCompositeOperation = 'multiply';
            ctx.globalAlpha = tint.alpha;
            ctx.fillStyle = tint.color;
            ctx.fillRect(x, y0, meterW, meterH);
            ctx.restore();
          } else {
            ctx.fillStyle = '#1aa5de';
            ctx.fillRect(x, y0, meterW, meterH);
          }

          const px = side === 'R' ? (needleCfg.pivotXRight ?? needleCfg.pivotX) : (needleCfg.pivotXLeft ?? needleCfg.pivotX);
          const cx = x + meterW * px;
          const cy = y0 + meterH * needleCfg.pivotY;
          const r = meterW * needleCfg.radiusMul;
          const sDeg = side === 'R' ? (needleCfg.startDegRight ?? needleCfg.startDeg) : (needleCfg.startDegLeft ?? needleCfg.startDeg);
          const eDeg = side === 'R' ? (needleCfg.endDegRight ?? needleCfg.endDeg) : (needleCfg.endDegLeft ?? needleCfg.endDeg);
          const aStart = (sDeg * Math.PI) / 180;
          const aEnd = (eDeg * Math.PI) / 180;
          const n = clamp(level) / 100;
          const a = aStart + (aEnd - aStart) * n;
          const tipR = (r - needleCfg.needleInset) * (needleCfg.lenMul || 1.0);
          const nx = cx + Math.cos(a) * tipR;
          const ny = cy + Math.sin(a) * tipR;

          const ni = needleSkin.needle;
          if (ni && ni.complete && ni.naturalWidth > 0) {
            const sw = ni.naturalWidth;
            const sh = ni.naturalHeight;
            const tipLen = Math.max(12, r - needleCfg.needleInset);
            const srcAspect = sw / Math.max(1, sh);
            const visRatio = getNeedleVisibleRatio(ni);
            // Convert desired visible tip length -> sprite draw height.
            const drawH = Math.max(12, (tipLen * (needleCfg.lenMul || 1.0)) / Math.max(0.05, visRatio));
            const drawW = Math.max(2, drawH * srcAspect * (needleCfg.widthMul || 1.0));
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(a + Math.PI / 2);
            ctx.drawImage(ni, 0, 0, sw, sh, -drawW * 0.5, -(drawH - 2), drawW, drawH);
            ctx.restore();
          } else {
            ctx.strokeStyle = 'rgba(6,8,10,.98)';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(nx, ny);
            ctx.stroke();
          }
          ctx.fillStyle = 'rgba(5,24,40,.95)';
          ctx.beginPath();
          ctx.arc(cx, cy, 2.2, 0, Math.PI * 2);
          ctx.fill();

          if (fgr.complete && fgr.naturalWidth > 0) {
            const swf = Math.floor(fgr.naturalWidth / 2);
            const sxf = side === 'L' ? 0 : swf;
            ctx.drawImage(fgr, sxf, 0, swf, fgr.naturalHeight, x, y0, meterW, meterH);
          }
        };

        drawOne(startX, meterState.L.cur, 'L');
        drawOne(startX + meterW + gap, meterState.R.cur, 'R');
        drawSpectrumOverlay(ctx, Math.max(6, startX), Math.max(6, H - 16), Math.min(W - 12, groupW), 10);
      }

      function buildProgressSegments(el){
        if (!el) return [];
        const out = [];
        for (let i = 0; i < 12; i++) {
          const s = document.createElement('div');
          s.className = 'pseg';
          el.appendChild(s);
          out.push(s);
        }
        return out;
      }
      let lastProgressPct = 0;
      const pseg = buildProgressSegments(trackProgress);
      const pfill = (() => {
        if (!trackProgress) return null;
        const d = document.createElement('div');
        d.className = 'pfill';
        trackProgress.appendChild(d);
        return d;
      })();

      function paintSegments(segs, v){
        const c = clamp(v);
        const fm = String(fontMode?.value || previewFontMode || 'ui-sans');
        const forceContinuous = (fm === 'ui-sans' || fm === 'ui-sans-condensed' || fm === 'inter-tight' || fm === 'montserrat');
        if (forceContinuous) {
          segs.forEach((el) => {
            el.classList.remove('active', 'tail');
            el.style.opacity = '0';
          });
          if (pfill) {
            pfill.style.opacity = '1';
            pfill.style.transform = `scaleX(${Math.max(0, Math.min(1, c / 100))})`;
          }
          return;
        }
        if (pfill) {
          pfill.style.opacity = '0';
          pfill.style.transform = 'scaleX(0)';
        }
        const n = Math.round((c / 100) * segs.length);
        segs.forEach((el, i) => {
          el.style.opacity = '';
          const active = i < n;
          el.classList.toggle('active', active);
          el.classList.toggle('tail', active && i === (n - 1));
        });
      }

      function prepCanvas(canvas){
        if (!canvas) return null;
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const w = Math.max(10, Math.floor(canvas.clientWidth));
        const h = Math.max(10, Math.floor(canvas.clientHeight));
        const rw = Math.floor(w * dpr), rh = Math.floor(h * dpr);
        if (canvas.width !== rw || canvas.height !== rh) {
          canvas.width = rw; canvas.height = rh;
        }
        const ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        return { ctx, w, h };
      }

      function glyph(ch){
        const c = String(ch || '');
        if (DOT_FONT_5x7[c]) return DOT_FONT_5x7[c];
        if (c >= 'a' && c <= 'z') {
          const up = c.toUpperCase();
          return DOT_FONT_5x7[up] || DOT_FONT_5x7[' '];
        }
        const up = c.toUpperCase();
        return DOT_FONT_5x7[up] || DOT_FONT_5x7[' '];

      function dotPalette(){
        const cs = getComputedStyle(document.documentElement);
        const npbBg = String(cs.getPropertyValue('--npb-card-bg') || '').trim();
        const npbBorder = String(cs.getPropertyValue('--npb-card-border') || '').trim();
        const npbText = String(cs.getPropertyValue('--npb-text') || '').trim();
        const npbAccent = String(cs.getPropertyValue('--npb-tab-active-bg') || '').trim() || String(cs.getPropertyValue('--npb-star') || '').trim();
        const theme = String(themeName?.value || '').trim();
        if (theme === 'warm-parchment') {
          return {
            bg: '#0f1116',
            dim: '#6a5428',
            on: '#ffd978',
            glow: '#e6b85a',
          };
        }
        return {
          bg: npbBg || String(cs.getPropertyValue('--dot-bg') || '').trim() || '#06101a',
          dim: npbBorder || String(cs.getPropertyValue('--dot-dim') || '').trim() || '#3a516f',
          on: npbText || String(cs.getPropertyValue('--fg') || '').trim() || '#d4e0ec',
          glow: npbAccent || String(cs.getPropertyValue('--accent') || '').trim() || '#7dd3fc',
        };
      }

      function drawDotText(canvas, text, opts = {}) {
        const p = prepCanvas(canvas);
        if (!p) return;
        const { ctx, w: W, h: H } = p;
        const pal = opts.palette || dotPalette();
        ctx.clearRect(0,0,W,H);
        // Theme-aware matrix bed: dark themes stay dark, light themes stay light.
        const parseRgb = (s) => {
          const m = String(s||'').match(/#?([0-9a-f]{6})/i);
          if (m) {
            const n = parseInt(m[1], 16);
            return [(n>>16)&255,(n>>8)&255,n&255];
          }
          return [22,26,34];
        };
        const [pr,pg,pb] = parseRgb(pal.bg);
        const lum = (0.2126*pr + 0.7152*pg + 0.0722*pb) / 255;
        if (lum > 0.58) {
          ctx.fillStyle = pal.bg;
          ctx.fillRect(0,0,W,H);
          ctx.globalAlpha = 0.10;
          ctx.fillStyle = '#000000';
          ctx.fillRect(0,0,W,H);
          ctx.globalAlpha = 1;
        } else {
          ctx.fillStyle = '#040506';
          ctx.fillRect(0,0,W,H);
          ctx.globalAlpha = 0.16;
          ctx.fillStyle = pal.bg;
          ctx.fillRect(0,0,W,H);
          ctx.globalAlpha = 1;
        }

        // Subtle surface tint to help matrix fields blend with active theme.
        const [tr,tg,tb] = parseRgb(pal.glow);
        const activeTheme = String(themeName?.value || '').trim();
        const tintA = activeTheme === 'warm-parchment' ? 0.14 : 0.08;
        const tint = ctx.createLinearGradient(0, 0, 0, H);
        tint.addColorStop(0, `rgba(${tr},${tg},${tb},${tintA * 0.85})`);
        tint.addColorStop(0.5, `rgba(${tr},${tg},${tb},${tintA * 0.35})`);
        tint.addColorStop(1, `rgba(${tr},${tg},${tb},${tintA * 0.15})`);
        ctx.fillStyle = tint;
        ctx.fillRect(0,0,W,H);

        const pitch = opts.pitch || 8;
        const radius = (opts.dot || 3.2) / 2;
        const padX = 8;
        const padY = Number.isFinite(Number(opts.padY)) ? Number(opts.padY) : 5;
        const cols = Math.floor((W - padX*2) / pitch);
        const rows = Math.floor((H - padY*2) / pitch);

        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const x = padX + c * pitch + pitch/2;
            const y = padY + r * pitch + pitch/2;
            ctx.globalAlpha = (lum > 0.58) ? 0.10 : 0.035;
            ctx.fillStyle = pal.dim;
            ctx.beginPath(); ctx.arc(x,y,radius,0,Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
          }
        }

        const glyphW = Number.isFinite(Number(opts.glyphW)) ? Number(opts.glyphW) : 5;
        const glyphH = Number.isFinite(Number(opts.glyphH)) ? Number(opts.glyphH) : 7;
        const gap = 1;
        const charAdvance = (ch) => (ch === ' ' ? 3 : (ch === '.' || ch === ':' || ch === ',' ? 4 : (glyphW + gap)));
        let s = String(text || '—');
        const fitText = (txt) => {
          let out = '';
          let used = 0;
          for (const ch of txt) {
            const adv = charAdvance(ch);
            if ((used + adv) > cols) break;
            out += ch;
            used += adv;
          }
          return out;
        };
        let fitted = fitText(s);
        if (fitted.length < s.length) {
          fitted = fitText((fitted.slice(0, Math.max(0, fitted.length - 3)) + '...'));
        }
        s = fitted;

        const startCol = 0;
        const rowShift = Number.isFinite(Number(opts.rowShift)) ? Number(opts.rowShift) : 0;
        const startRow = Math.max(0, Math.floor((rows - glyphH) / 2) + rowShift);

        ctx.fillStyle = pal.on;
        ctx.shadowColor = pal.glow;
        ctx.shadowBlur = 7;
        let penCol = startCol;
        for (let i = 0; i < s.length; i++) {
          const ch = s[i];
          const g0 = glyph(ch);
          const g = (() => {
            if (glyphH <= 7) return g0;
            const padTop = Math.floor((glyphH - 7) / 2);
            const padBot = Math.max(0, glyphH - 7 - padTop);
            return Array.from({ length: padTop }, () => '00000').concat(g0).concat(Array.from({ length: padBot }, () => '00000'));
          })();
          for (let ry = 0; ry < glyphH; ry++) {
            const row = g[ry] || '00000';
            for (let rx = 0; rx < glyphW; rx++) {
              if (row[rx] !== '1') continue;
              const col = penCol + rx;
              if (col < 0 || col >= cols) continue;
              const x = padX + col * pitch + pitch/2;
              const y = padY + (startRow + ry) * pitch + pitch/2;
              ctx.beginPath(); ctx.arc(x,y,radius,0,Math.PI*2); ctx.fill();
            }
          }
          penCol += charAdvance(ch);
          if (penCol >= cols) break;
        }
        ctx.shadowBlur = 0;
      }

      function drawPlainText(canvas, text, opts = {}) {
        const p = prepCanvas(canvas);
        if (!p) return;
        const { ctx, w: W, h: H } = p;
        const pal = opts.palette || dotPalette();
        ctx.clearRect(0,0,W,H);
        ctx.fillStyle = 'transparent';
        ctx.fillRect(0,0,W,H);
        const size = Number(opts.size || 54);
        const family = String(opts.font || 'Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif');
        const weight = String(opts.weight || '800');
        ctx.font = `${weight} ${size}px ${family}`;
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'left';
        ctx.fillStyle = pal.on;
        ctx.shadowColor = 'transparent';
        const padX = Number(opts.padX || 8);
        const y = Math.round(H / 2);
        const s = String(text || '—');
        const ellipsize = (t) => {
          if (ctx.measureText(t).width <= (W - padX*2)) return t;
          let out = t;
          while (out.length > 1 && ctx.measureText(`${out}…`).width > (W - padX*2)) out = out.slice(0, -1);
          return `${out}…`;
        };
        ctx.fillText(ellipsize(s), padX, y);
      }

      async function resolveApiBase(){

          if (!r.ok || !j?.ok) return;
          const byKey = new Map(); const byHost = new Map();
          const logoByKey = new Map(); const logoByHost = new Map();
          for (const t of (Array.isArray(j.tracks) ? j.tracks : [])) {
            const file = String(t?.file || '').trim();
            const st = String(t?.stationName || t?.artist || '').trim();

            if (!file) continue;
            const k = streamKey(file);

              const h = String(new URL(file).hostname || '').toLowerCase();

      async function resolveMotionMp4(appleUrl) {
        const normalized = normalizeAppleMusicUrl(appleUrl);
        if (!normalized) return '';
        const cached = motionArtCache.get(normalized);
        if (cached?.state === 'ready') return String(cached.mp4 || '');
        if (cached?.state === 'none') return '';
        if (cached?.state === 'pending' && cached.promise) return cached.promise;

        const p = (async () => {
          try {
            const endpoint = `https://api.aritra.ovh/v1/covers?url=${encodeURIComponent(normalized)}`;
            const r = await fetch(endpoint, { cache: 'force-cache' });
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const j = await r.json().catch(() => ({}));
            const square = Array.isArray(j?.master_Streams?.square) ? j.master_Streams.square : [];
            const list = square.filter((x) => String(x?.uri || '').includes('.m3u8'));
            if (!list.length) {
              motionArtCache.set(normalized, { state: 'none' });
              return '';
            }
            const preferred = list
              .map((x) => ({ uri: String(x?.uri || ''), width: Number(x?.width || 0), bw: Number(x?.bandwidth || 0) }))
              .filter((x) => x.uri)
              .sort((a, b) => (a.width - b.width) || (a.bw - b.bw));
            const choice = preferred.filter((x) => x.width >= 700 && x.width <= 1200).slice(-1)[0] || preferred.slice(-1)[0];
            const mp4 = String(choice?.uri || '').replace(/\.m3u8(?:\?.*)?$/i, '-.mp4');
            if (!mp4 || mp4 === choice.uri) {
              motionArtCache.set(normalized, { state: 'none' });
              return '';
            }
            motionArtCache.set(normalized, { state: 'ready', mp4 });
            return mp4;
          } catch {
            motionArtCache.set(normalized, { state: 'none' });
            return '';
          }
        })();
        motionArtCache.set(normalized, { state: 'pending', promise: p });
        return p;
      }

          const s = String(v || '').trim().toLowerCase();
          const m = s.match(/(\d+(?:\.\d+)?)/);

        const blob = `${String(sr || '')} ${String(rate || '')} ${String(encoded || '')} ${String(outrate || '')}`.toLowerCase();

          const rr = String(rate || '').toLowerCase();

          b16: (bdN > 0 && bdN <= 16),

          const encodedNoCh = encoded.replace(/,?\s*\d+\s*ch\b/i, '').replace(/\s+/g, ' ').trim();
          const hiRes = (Number(bd) > 16) || (Number.isFinite(srNum) && srNum > 48000);
          const qualityTag = kind === 'Lossless' ? (hiRes ? 'HI-RES' : 'HQ') : kind.toUpperCase();
          const compactFallback = [fmt, [bd, srShort].filter(Boolean).join('/')].filter(Boolean).join(' ');
          const brNum = Number(br);
          const brLabel = Number.isFinite(brNum) && brNum > 0 ? `${Math.round(brNum)}k` : '';
          const rateLabel = [brLabel, [bd, srShort].filter(Boolean).join('/')].filter(Boolean).join(' • ');
          setFormatStrip({
            fmt,
            hq: (qualityTag === 'HQ' || qualityTag === 'HI-RES'),
            rate: rateLabel || compactFallback || 'DIGITAL',
            sr: srRaw,
            bd: bd,
            ch,
            encoded: encodedRaw,
            outrate: outrateRaw,
            isLive: !!(j?.isRadio || j?.isStream),
          });
          const ratingRaw = Number(j?.rating ?? j?.stars ?? j?.songRating ?? NaN);
          const rating = Number.isFinite(ratingRaw) ? Math.max(0, Math.min(5, Math.round(ratingRaw))) : NaN;
          const ratingLabel = Number.isFinite(rating) && rating > 0 ? `RATING: ${rating}` : '';
          dotFileMeta = (encodedNoCh || compactFallback || 'DIGITAL');
          dotFileMeta2 = [qualityTag || 'DIGITAL', ratingLabel].filter(Boolean).join(' • ');

          const isRadioLike = !!(j?.isRadio || j?.isStream || j?.isAirplay || j?.isUpnp || j?.isPodcast);
          let resolvedRadioStation = '';
          let resolvedRadioLogo = '';
          if (isRadioLike) {
            await ensureRadioLookup();
            const rawStation = String(j?.stationName || j?._stationName || j?.radioStationName || j?.name || '').trim();
            const k = streamKey(file);
            let host = '';
            try { host = String(new URL(file).hostname || '').toLowerCase(); } catch {}
            resolvedRadioStation = decodeEntities(rawStation || String((k && radioByKey.get(k)) || (host && radioByHost.get(host)) || '').trim());
            resolvedRadioLogo = String(j?.stationLogoUrl || j?.radioLogoUrl || j?.logoUrl || (k && radioLogoByKey.get(k)) || (host && radioLogoByHost.get(host)) || '').trim();
            if (!resolvedRadioLogo && file) resolvedRadioLogo = `${api}/art/radio-logo.jpg?file=${encodeURIComponent(file)}`;
            const streamTitle = decodeEntities(String(j?.streamTitle || j?.subline || '').trim());
            const hasCanonicalDisplay = !!String(j?.displayTitle || '').trim() || !!String(j?.displayArtist || '').trim();
            // Only force station fallback when canonical display fields are absent.
            if (!hasCanonicalDisplay) {
              dotTitle = streamTitle || resolvedRadioStation || 'Live Radio';
              dotArtist = resolvedRadioStation || 'Radio';
              dotAlbumYear = resolvedRadioStation ? `${resolvedRadioStation}${y ? ` (${y})` : ''}` : 'Live Radio';
            }
          }
          redrawDotCanvases();
          const pctDirect = Number(j?.songPercent ?? j?.progressPercent ?? j?.percent ?? NaN);
          const elapsed = Number(j?.elapsed ?? j?.elapsedSec ?? j?.positionSec ?? j?.currentTime ?? 0);
          const total = Number(j?.time ?? j?.duration ?? j?.totalTime ?? 0);
          const p = Number.isFinite(pctDirect)
            ? Math.max(0, Math.min(100, pctDirect))
            : ((Number.isFinite(elapsed) && Number.isFinite(total) && total > 0)
                ? Math.max(0, Math.min(100, (elapsed / total) * 100))
                : 0);
          if (progressEl) progressEl.style.display = isRadioLike ? 'none' : '';
          lastProgressPct = isRadioLike ? 0 : p;
          paintSegments(pseg, lastProgressPct);

          const pausedLike = (playbackState === 'pause' || playbackState === 'paused');
          const playingLike = (playbackState === 'play' || playbackState === 'playing' || playbackState.includes('play') || (isRadioLike && !pausedLike && playbackState !== 'stop' && playbackState !== 'stopped' && playbackState !== 'idle'));
          if (!playingLike) {
            setTarget('L', 0);
            setTarget('R', 0);
          }

          const stationLogoRaw = String(resolvedRadioLogo || j?.stationLogoUrl || j?.radioLogoUrl || j?.logoUrl || '').trim();
          const artRaw = String(j?.displayArtUrl || (isRadioLike ? (stationLogoRaw || j?.altArtUrl || '') : (j?.albumArtUrl || j?.artUrl || j?.altArtUrl || '')) || '').trim();
          const artUrl = artRaw ? (artRaw.startsWith('http') ? artRaw : `${api}${artRaw}`) : '';
          if (artUrl !== lastArt) {
            if (artUrl) art.src = artUrl;
            else art.removeAttribute('src');
            lastArt = artUrl;
          }

          const appleUrl = String(j?.appleMusicUrl || j?.appleUrl || '').trim();
          const continuityKey = String(j?.file || j?.songid || `${a}|${al}`).trim();
          const motionKey = continuityKey;
          const motionToken = ++motionReqToken;
          const trackChangedForMotion = !!motionKey && (motionKey !== motionLockTrackKey);
          if (trackChangedForMotion && !(motionLockTrackKey === motionKey && motionLockMp4)) {
            motionLockTrackKey = '';
            motionLockMp4 = '';
          }

          if (!motionArtEnabled() || isRadioLike) {
            clearMotionArtVideo();
          } else if (motionKey && motionLockTrackKey === motionKey && motionLockMp4) {
            setMotionArtVideo(motionLockMp4, artUrl);
          } else {
            resolveLocalMotionMp4(a, al)
              .then((localMp4) => {
                if (motionToken !== motionReqToken) return;
                const resolved = String(localMp4 || '').trim();
                if (resolved) {
                  motionLockTrackKey = motionKey;
                  motionLockMp4 = resolved;
                  setMotionArtVideo(resolved, artUrl);
                  return;
                }
                return resolveMotionMp4(appleUrl).then((remoteMp4) => {
                  if (motionToken !== motionReqToken) return;
                  const rmp4 = String(remoteMp4 || '').trim();
                  if (rmp4) {
                    motionLockTrackKey = motionKey;
                    motionLockMp4 = rmp4;
                    setMotionArtVideo(rmp4, artUrl);
                  } else {
                    clearMotionArtVideo();
                  }
                });
              })
              .catch(() => {
                if (motionToken !== motionReqToken) return;
                clearMotionArtVideo();
              });
          }
        } catch {}
      }

      async function pollMeter(){
        try {
          const r = await fetch(`${api}/peppy/vumeter`, { cache:'no-store' });
          const j = await r.json().catch(() => ({}));
          const m = j?.meter || {};
          setTarget('L', m.left);
          setTarget('R', m.right);
          const binsRaw = Array.isArray(m?.spectrum) ? m.spectrum : [];
          if (binsRaw.length) {
            spectrumState = binsRaw.slice(0, 32).map((v) => {
              const n = Number(v);
              return Number.isFinite(n) ? Math.max(0, Math.min(100, n)) : 0;
            });
          }
          if (!j?.fresh) {
            setTarget('L', 0); setTarget('R', 0);
            spectrumState = spectrumState.map(() => 0);
          }
        } catch {
          setTarget('L', 0); setTarget('R', 0);
          spectrumState = spectrumState.map(() => 0);
        }
      }

      function animate(){
        const sm = String(needleSmoothing?.value || previewSmoothing || 'medium');
        const riseA = sm === 'off' ? 1.0 : (sm === 'low' ? 0.56 : (sm === 'high' ? 0.24 : 0.42));
        const fallA = sm === 'off' ? 1.0 : (sm === 'low' ? 0.20 : (sm === 'high' ? 0.07 : 0.12));
        for (const k of ['L','R']) {
          const s = meterState[k];
          const a = s.target > s.cur ? riseA : fallA;
          s.cur = s.cur + (s.target - s.cur) * a;

          // Peak hold: no decay (updates only when a new higher peak arrives).
          const cur = clamp(s.cur);
          const held = clamp(peakHold[k] || 0);
          if (cur >= held) peakHold[k] = cur;
        }
        drawNeedles();
        requestAnimationFrame(animate);
      }

      ctrlPrev?.addEventListener('click', () => playback('prev', ctrlPrev));
      ctrlPlay?.addEventListener('click', () => playback('play', ctrlPlay));
      ctrlNext?.addEventListener('click', () => playback('next', ctrlNext));
      ctrlRepeat?.addEventListener('click', () => playback('repeat', ctrlRepeat));
      ctrlPause?.addEventListener('click', () => playback('pause', ctrlPause));
      ctrlShuffle?.addEventListener('click', () => playback('shuffle', ctrlShuffle));

      refreshPresetSelect();
      skinExport?.addEventListener('click', () => {
        try {
          const profile = getCurrentProfile();
          const json = JSON.stringify(profile, null, 2);
          if (exportJson) exportJson.value = json;
          if (exportModal) {
            exportModal.classList.add('open');
            exportModal.setAttribute('aria-hidden', 'false');
          }
        } catch {}
      });
      skinSavePreset?.addEventListener('click', () => {
        try {
          const name = String(prompt('Preset name?', `My Preset ${new Date().toLocaleTimeString()}`) || '').trim();
          if (!name) return;
          const cur = listCustomPresets();
          const idx = cur.findIndex((p) => String(p?.name || '').trim().toLowerCase() === name.toLowerCase());
          if (idx >= 0) cur[idx] = { ...cur[idx], name, ...getCurrentProfile() };
          else cur.push({ name, ...getCurrentProfile() });
          localStorage.setItem(PEPPY_PRESETS_KEY, JSON.stringify(cur));
          refreshPresetSelect();
          if (peppyPreset) peppyPreset.value = `custom:${idx >= 0 ? idx : (cur.length - 1)}`;
        } catch {}
      });
      peppyPreset?.addEventListener('change', () => {
        const v = String(peppyPreset.value || '');
        if (!v) return;
        if (v.startsWith('builtin:')) {
          const i = Number(v.split(':')[1]);
          if (Number.isFinite(i)) applyPreset(BUILTIN_PRESETS[i]);
          return;
        }
        if (v.startsWith('custom:')) {
          const i = Number(v.split(':')[1]);
          const c = listCustomPresets();
          if (Number.isFinite(i) && c[i]) applyPreset(c[i]);
        }
      });
      screenProfile?.addEventListener('change', () => {
        applyScreenProfile(screenProfile.value || '1280x400');
        fitPreviewScale();
        redrawDotCanvases();
        syncProgressPlacement();
        drawNeedles();
        publishProfileState();
      });
      pushPeppyFromTab?.addEventListener('click', () => {
        try {
          const profile = getCurrentProfile();
          window.parent?.postMessage({ type:'peppy-profile', ...profile }, '*');
          // Give parent one tick to absorb profile before push action.
          setTimeout(() => {
            try { window.parent?.postMessage({ type:'np-display-action', action:'push-peppy', profile }, '*'); } catch {}
          }, 40);
        } catch {
          try { window.parent?.postMessage({ type:'np-display-action', action:'push-peppy' }, '*'); } catch {}
        }
      });
      exportClose?.addEventListener('click', () => {
        if (!exportModal) return;
        exportModal.classList.remove('open');
        exportModal.setAttribute('aria-hidden', 'true');
      });
      exportCopy?.addEventListener('click', async () => {
        const txt = String(exportJson?.value || '');
        if (!txt) return;
        let ok = false;
        try {
          await navigator.clipboard.writeText(txt);
          ok = true;
        } catch {}
        if (!ok) {
          try {
            exportJson?.focus();
            exportJson?.select();
            exportJson?.setSelectionRange(0, txt.length);
            ok = document.execCommand('copy');
          } catch {}
        }
        const prev = exportCopy.textContent;
        exportCopy.textContent = ok ? 'Copied' : 'Select All + Copy';
        setTimeout(() => { try { exportCopy.textContent = prev; } catch {} }, 1300);
      });


      skinName?.addEventListener('change', () => {
        previewSkin = String(skinName?.value || 'blue-1280');
        try { localStorage.setItem('peppy.skin', previewSkin); } catch {}
        applyNeedleSkin(previewSkin);
        drawNeedles();
        publishProfileState();
      });
      const onMeterTypeChange = () => {
        previewMeterType = meterTypeLinear?.checked ? 'linear' : 'circular';
        syncMeterTypeClass();
        try { localStorage.setItem('peppy.meterType', previewMeterType); } catch {}
        renderSkinOptions(previewSkin);
        previewSkin = String(skinName?.value || previewSkin || 'blue-1280');
        try { localStorage.setItem('peppy.skin', previewSkin); } catch {}
        applyNeedleSkin(previewSkin);
        redrawDotCanvases();
        drawNeedles();
        publishProfileState();
      };
      meterTypeCircular?.addEventListener('change', onMeterTypeChange);
      meterTypeLinear?.addEventListener('change', onMeterTypeChange);
      fontMode?.addEventListener('change', () => {
        previewFontMode = String(fontMode?.value || 'ui-sans');
        try { localStorage.setItem('peppy.fontMode', previewFontMode); } catch {}
        enforceLinearRulesForFont();
        drawNeedles();
        paintSegments(pseg, lastProgressPct);
        redrawDotCanvases();
        publishProfileState();
      });
      fontSize?.addEventListener('change', () => {
        previewFontSize = String(fontSize?.value || 'm');
        try { localStorage.setItem('peppy.fontSize', previewFontSize); } catch {}
        redrawDotCanvases();
        publishProfileState();
      });
      linearStyle?.addEventListener('change', () => {
        previewLinearStyle = String(linearStyle?.value || 'continuous');
        enforceLinearRulesForFont();
        try { localStorage.setItem('peppy.linearStyle', previewLinearStyle); } catch {}
        drawNeedles();
        paintSegments(pseg, lastProgressPct);
        publishProfileState();
      });
      linearSize?.addEventListener('change', () => {
        previewLinearSize = String(linearSize?.value || 'm');
        if (!['s','m','l'].includes(previewLinearSize)) previewLinearSize = 'm';
        try { localStorage.setItem('peppy.linearSize', previewLinearSize); } catch {}
        drawNeedles();
        publishProfileState();
      });
      needleSensitivity?.addEventListener('change', () => {
        previewSensitivity = String(needleSensitivity?.value || 'medium');
        try { localStorage.setItem('peppy.sensitivity', previewSensitivity); } catch {}
        drawNeedles();
        publishProfileState();
      });
      needleSmoothing?.addEventListener('change', () => {
        previewSmoothing = String(needleSmoothing?.value || 'medium');
        try { localStorage.setItem('peppy.smoothing', previewSmoothing); } catch {}
        publishProfileState();
      });
      themeName?.addEventListener('change', () => {
        const n = String(themeName?.value || 'midnight-blue');
        try { localStorage.setItem('peppy.theme', n); } catch {}
        applyTheme(n);
        redrawDotCanvases();
        publishProfileState();
      });
      iframeScaleInput?.addEventListener('input', () => {
        const s = Math.max(30, Math.min(100, Number(iframeScaleInput.value || 50)));
        try { localStorage.setItem('peppy.iframeScale', String(s / 100)); } catch {}
        if (iframeScaleValue) iframeScaleValue.textContent = `${s}%`;
        fitPreviewScale();
      });
      window.addEventListener('message', (ev) => {
        const d = ev?.data || {};
        // Keep Peppy builder theme independent from app shell theme.
        // Ignore app theme-sync/preset messages to prevent visual override while editing.
        if (d?.type === 'np-theme-sync' || d?.type === 'np-theme-load-preset') {
          return;
        }
      });
      window.addEventListener('keydown', (ev) => {
        if (ev.key !== 'Escape') return;
        if (!exportModal?.classList.contains('open')) return;
        exportModal.classList.remove('open');
        exportModal.setAttribute('aria-hidden', 'true');
      });
      exportModal?.addEventListener('click', (ev) => {
        if (ev.target !== exportModal) return;
        exportModal.classList.remove('open');
        exportModal.setAttribute('aria-hidden', 'true');
      });

      (async () => {
        fitPreviewScale();
        publishProfileState();
        await loadSkinCatalog();
        renderSkinOptions(previewSkin);
        await resolveApiBase();
        try {
          const r = await fetch(`${api}/peppy/last-profile`, { cache:'no-store' });
          const j = await r.json().catch(() => ({}));
          const p = j?.profile || {};
          const s = String(p?.skin || '').trim();
          const t = String(p?.theme || '').trim();
          const mt = String(p?.meterType || '').trim();
          const fm = String(p?.fontMode || '').trim();
          const fsz = String(p?.fontSize || '').trim();
          const ls = toLinearStyle(p);
          const lz = String(p?.linearSize || '').trim();
          const sens = String(p?.sensitivity || '').trim().toLowerCase();
          const smooth = String(p?.smoothing || '').trim().toLowerCase();
          const ps = normalizeScreenProfile(p?.playerSize || p?.screenProfile || '1280x400');
          if (!hasSkinParam && s) {
            previewSkin = s;
            try { localStorage.setItem('peppy.skin', s); } catch {}
          }
          if (!hasThemeParam && t && THEMES[t]) {
            if (themeName) themeName.value = t;
            try { localStorage.setItem('peppy.theme', t); } catch {}
            applyTheme(t);
          }
          if (mt === 'linear' || mt === 'circular') {
            if (meterTypeLinear) meterTypeLinear.checked = (mt === 'linear');
            if (meterTypeCircular) meterTypeCircular.checked = (mt !== 'linear');
            try { localStorage.setItem('peppy.meterType', mt); } catch {}
          }
          if (!hasSizeParam) applyScreenProfile(ps);
          if (['ui-sans','ui-sans-condensed','inter-tight','montserrat','dot-matrix'].includes(fm)) {
            if (fontMode) fontMode.value = fm;
            try { localStorage.setItem('peppy.fontMode', fm); } catch {}
          }
          if (['s','m','l','xl'].includes(fsz)) {
            if (fontSize) fontSize.value = fsz;
            try { localStorage.setItem('peppy.fontSize', fsz); } catch {}
          }
          if (['cassette','continuous','continuous-theme'].includes(ls)) {
            previewLinearStyle = ls;
            if (linearStyle) linearStyle.value = ls;
            try { localStorage.setItem('peppy.linearStyle', ls); } catch {}
          }
          if (['s','m','l'].includes(lz)) {
            previewLinearSize = lz;
            if (linearSize) linearSize.value = lz;
            try { localStorage.setItem('peppy.linearSize', lz); } catch {}
          }
          enforceLinearRulesForFont();
          if (sens === 'low' || sens === 'medium' || sens === 'high') {
            previewSensitivity = sens;
            if (needleSensitivity) needleSensitivity.value = sens;
            try { localStorage.setItem('peppy.sensitivity', sens); } catch {}
          }
          if (smooth === 'off' || smooth === 'low' || smooth === 'medium' || smooth === 'high') {
            previewSmoothing = smooth;
            if (needleSmoothing) needleSmoothing.value = smooth;
            try { localStorage.setItem('peppy.smoothing', smooth); } catch {}
          }
          renderSkinOptions(previewSkin);
          previewSkin = String(skinName?.value || previewSkin || 'blue-1280');
          applyNeedleSkin(previewSkin);
          redrawDotCanvases();
          drawNeedles();
          publishProfileState();
        } catch {}
        await ensureRuntimeKey();
        await pollNowPlaying();
        await pollMeter();
        animate();
        setInterval(pollNowPlaying, 2500);
        setInterval(pollMeter, 90);
      })();
    })();
  </script>
</body>
</html>
