<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Now Playing Visualizer</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#02040a;color:#aab7cc;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
    canvas{position:fixed;inset:0;width:100%;height:100%;display:block}
    body.designer{background:#000 !important}
    body.designer canvas{inset:auto;top:56px;left:50%;width:100vw;height:100vh;transform:translateX(-50%) scale(.45);transform-origin:top center;box-shadow:0 0 0 1px rgba(255,255,255,.08)}
    .hud{position:fixed;left:12px;right:12px;bottom:10px;display:flex;justify-content:space-between;align-items:flex-end;pointer-events:none;text-shadow:0 1px 2px rgba(0,0,0,.55);mix-blend-mode:screen;opacity:.78}
    .t{font-size:20px;font-weight:700;max-width:70vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .a{font-size:13px;opacity:.86;max-width:70vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .m{font-size:12px;opacity:.72;text-align:right}
    body.pure .hud{display:none !important}
    body.pure .ctl{display:none !important}
    .ctl{position:fixed;top:8px;left:50%;display:none;gap:6px;align-items:center;justify-content:center;flex-wrap:wrap;width:min(1280px,calc(100vw - 16px));transform:translateX(-50%);background:var(--npb-card-bg,rgba(5,10,20,.72));backdrop-filter:blur(4px);border:1px solid var(--npb-card-border,rgba(120,150,190,.35));border-radius:10px;padding:6px 8px;z-index:20;color:var(--npb-text,#dbe8ff)}
    .ctl select,.ctl button{height:24px;background:var(--npb-tab-bg,#0f1b2f);color:var(--npb-tab-text,#dbe8ff);border:1px solid var(--npb-tab-border,#3a547a);border-radius:6px;font-size:12px}
    .ctl select{padding:0 6px}
    .ctl button{padding:0 8px;cursor:pointer}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="ctl" class="ctl" aria-label="Visualizer controls">
    <span style="font-size:11px;opacity:.8;">Preset</span>
    <select id="presetSel" aria-label="Preset">
      <option value="classic">classic</option>
      <option value="aeon">aeon</option>
      <option value="fireworks">fireworks</option>
      <option value="sphere">sphere</option>
      <option value="moire">moire</option>
      <option value="ambient">ambient</option>
    </select>
    <span style="font-size:11px;opacity:.8;">Saved</span>
    <select id="savedPresetSel" aria-label="Saved visualizer presets"><option value="">(none)</option></select>
    <span style="font-size:11px;opacity:.8;">Energy</span>
    <select id="energySel" aria-label="Energy level">
      <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
      <option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option>
    </select>
    <span style="font-size:11px;opacity:.8;">Motion</span>
    <select id="motionSel" aria-label="Motion level">
      <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
      <option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option>
    </select>
    <span style="font-size:11px;opacity:.8;">Glow</span>
    <select id="glowSel" aria-label="Glow level">
      <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
      <option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option>
    </select>
    <button id="applyBtn" type="button">apply</button>
    <button id="savePresetBtn" type="button">Save</button>
    <button id="deletePresetBtn" type="button">Delete</button>
    <button id="exportPresetBtn" type="button">Export</button>
    <button id="importPresetBtn" type="button">Import</button>
    <button id="pushMoodeBtn" type="button">Push to moOde</button>
    <span id="pushStatus" style="font-size:11px;opacity:.8;min-width:180px;"></span>
  </div>
  <div class="hud"><div><div id="t" class="t">Visualizer</div><div id="a" class="a">Waiting for audio…</div></div><div id="m" class="m">aurora</div></div>
  <input id="importPresetFile" type="file" accept="application/json,.json" style="display:none" />
<script>
(()=>{
  const qp=new URLSearchParams(location.search);
  const host=location.hostname||'10.0.0.4';
  const api=`${location.protocol}//${host}:3101`;
  const c=document.getElementById('c'),x=c.getContext('2d');
  const tEl=document.getElementById('t'),aEl=document.getElementById('a'),mEl=document.getElementById('m');
  const ctl=document.getElementById('ctl'),presetSel=document.getElementById('presetSel'),savedPresetSel=document.getElementById('savedPresetSel'),energySel=document.getElementById('energySel'),motionSel=document.getElementById('motionSel'),glowSel=document.getElementById('glowSel'),applyBtn=document.getElementById('applyBtn'),savePresetBtn=document.getElementById('savePresetBtn'),deletePresetBtn=document.getElementById('deletePresetBtn'),exportPresetBtn=document.getElementById('exportPresetBtn'),importPresetBtn=document.getElementById('importPresetBtn'),importPresetFile=document.getElementById('importPresetFile'),pushMoodeBtn=document.getElementById('pushMoodeBtn'),pushStatus=document.getElementById('pushStatus');
  let W=0,H=0,dpr=1;
  function rs(){
    dpr=Math.max(1,Math.min(2,devicePixelRatio||1));
    const designerMode = (uiOn && !kioskOn);
    W = designerMode ? 1280 : Math.max(320,innerWidth|0);
    H = designerMode ? 400  : Math.max(180,innerHeight|0);
    c.width=W*dpr; c.height=H*dpr;
    c.style.width=W+'px'; c.style.height=H+'px';
    x.setTransform(dpr,0,0,dpr,0,0);
    try{ applyDesignerScale(); }catch{}
  }
  addEventListener('resize',rs);

  const PRESETS={
    classic:{scene:'particles', attack:0.38, release:0.14, onsetGain:1.0, feedback:0.09, sat:1.0},
    aeon:{scene:'aeon', attack:0.42, release:0.16, onsetGain:1.15, feedback:0.08, sat:1.08},
    fireworks:{scene:'fireworks', attack:0.46, release:0.16, onsetGain:1.3, feedback:0.07, sat:1.12},
    sphere:{scene:'sphere', attack:0.30, release:0.12, onsetGain:0.75, feedback:0.11, sat:0.95},
    moire:{scene:'moire', attack:0.34, release:0.13, onsetGain:0.9, feedback:0.1, sat:1.0},
    ambient:{scene:'aurora', attack:0.20, release:0.09, onsetGain:0.5, feedback:0.14, sat:0.85}
  };
  const hasPresetParam = qp.has('preset');
  const hasEnergyParam = qp.has('energy');
  const hasMotionParam = qp.has('motion');
  const hasGlowParam = qp.has('glow');
  let presetKey=String(qp.get('preset')||'classic').toLowerCase();
  if (presetKey === 'magnetosphere') presetKey = 'sphere';
  if (presetKey === 'jelly') presetKey = 'aeon';
  let preset=PRESETS[presetKey]||PRESETS.classic;
  const PRESET_LEVELS={
    classic:{energy:5,motion:5,glow:5},
    aeon:{energy:7,motion:6,glow:8},
    fireworks:{energy:8,motion:7,glow:7},
    sphere:{energy:6,motion:5,glow:8},
    moire:{energy:5,motion:6,glow:5},
    ambient:{energy:5,motion:10,glow:5}
  };
  const lv=PRESET_LEVELS[presetKey]||PRESET_LEVELS.classic;
  let energyLevel=Math.max(1,Math.min(10,Number(qp.get('energy')||String(lv.energy))||lv.energy));
  let motionLevel=Math.max(1,Math.min(10,Number(qp.get('motion')||String(lv.motion))||lv.motion));
  let glowLevel=Math.max(1,Math.min(10,Number(qp.get('glow')||String(lv.glow))||lv.glow));
  let energyK=1, motionK=1, glowK=1;
  function recalcLevelKs(){
    // Wider response span so 1 vs 10 is obvious.
    energyK = 0.45 + (energyLevel-1)*(1.75/9); // 0.45..2.20
    motionK = 0.55 + (motionLevel-1)*(1.25/9); // 0.55..1.80
    glowK   = 0.45 + (glowLevel-1)*(1.60/9);   // 0.45..2.05
  }
  recalcLevelKs();
  const sceneParamRaw=qp.get('scene');
  const sceneExplicit=(sceneParamRaw!==null && String(sceneParamRaw).trim()!=='');

  let scene=String(sceneExplicit ? sceneParamRaw : (preset.scene||'aurora')).toLowerCase(); // aurora|particles|tunnel|moire|aeon|fireworks|auto
  let auto=(scene==='auto');
  // aliases
  if(scene==='classic') scene='aurora';
  if(scene==='plasma') scene='sphere';
  if(scene==='magnetosphere') scene='sphere';
  if(scene==='jelly') scene='aeon';
  if(auto) scene='aurora';
  const scenes=['aurora','aeon','fireworks','particles','tunnel','moire','sphere'];
  let sceneIdx=scenes.indexOf(scene); if(sceneIdx<0) sceneIdx=0;

  // Designer controls should be visible by default in editor contexts.
  // For embedded pane usage, force pure-visual mode (no HUD/controls).
  const uiParam = String(qp.get('ui') || '').trim().toLowerCase();
  const kioskOn = ['1','true','yes','on'].includes(String(qp.get('kiosk') || '').trim().toLowerCase());
  const embeddedOn = ['1','true','yes','on'].includes(String(qp.get('embedded') || '').trim().toLowerCase());
  const pureOn = embeddedOn || ['1','true','yes','on'].includes(String(qp.get('pure') || '').trim().toLowerCase());
  const uiOn = pureOn ? false : ((uiParam === '0' || uiParam === 'false' || uiParam === 'off') ? false : !kioskOn);
  if (ctl) ctl.style.display = uiOn ? 'flex' : 'none';
  try { document.body.classList.toggle('designer', !!uiOn && !kioskOn); } catch {}
  try { document.body.classList.toggle('pure', !!pureOn); } catch {}

  // In embedded pane mode, a tap/click should open full-screen visualizer.
  if (embeddedOn) {
    const openFullscreenFromEmbedded = () => {
      try {
        const u = new URL(location.href);
        u.searchParams.delete('embedded');
        u.searchParams.delete('pure');
        u.searchParams.set('kiosk', '1');
        u.searchParams.set('ui', '0');
        const target = `${u.pathname}${u.search}`;
        if (window.top && window.top !== window) window.top.location.href = target;
        else location.href = target;
      } catch {}
    };
    let tapped = false;
    document.addEventListener('pointerup', () => {
      if (tapped) return;
      tapped = true;
      openFullscreenFromEmbedded();
    }, { passive:true });
  }

  // In fullscreen kiosk visualizer, tap returns to kiosk/controller with Visualizer pane open.
  if (kioskOn && !embeddedOn && !uiOn) {
    let tappedBack = false;
    document.addEventListener('pointerup', () => {
      if (tappedBack) return;
      tappedBack = true;
      try {
        const hostPart = location.host || 'nowplaying.local:8101';
        const p = encodeURIComponent(String(presetKey || 'classic'));
        const e = encodeURIComponent(String(Math.round(energyLevel || 6)));
        const m = encodeURIComponent(String(Math.round(motionLevel || 6)));
        const g = encodeURIComponent(String(Math.round(glowLevel || 6)));
        const target = `${location.protocol}//${hostPart}/controller.html?kiosk=1&preview=1&open=kiosk-visualizer.html&vpreset=${p}&venergy=${e}&vmotion=${m}&vglow=${g}`;
        if (window.top && window.top !== window) window.top.location.href = target;
        else location.href = target;
      } catch {}
    }, { passive:true });
  }
  function applyDesignerScale(){
    try {
      if (!c) return;
      if (uiOn && !kioskOn) {
        const top = 56;
        const availW = Math.max(320, (window.innerWidth||1280) - 16);
        const availH = Math.max(180, (window.innerHeight||720) - top - 8);
        const s = Math.max(0.2, Math.min(1, availW / 1280, availH / 400));
        c.style.position = 'fixed';
        c.style.inset = 'auto';
        c.style.top = `${top}px`;
        c.style.left = '50%';
        c.style.transform = `translateX(-50%) scale(${s})`;
        c.style.transformOrigin = 'top center';
      } else {
        c.style.position = 'fixed';
        c.style.inset = '0';
        c.style.top = '';
        c.style.left = '';
        c.style.transform = '';
        c.style.transformOrigin = '';
      }
    } catch {}
  }
  rs();
  applyDesignerScale();
  if (presetSel) presetSel.value = PRESETS[presetKey] ? presetKey : 'classic';
  if (energySel) energySel.value = String(Math.round(energyLevel));
  if (motionSel) motionSel.value = String(Math.round(motionLevel));
  if (glowSel) glowSel.value = String(Math.round(glowLevel));

  const VIS_PRESETS_KEY = 'nowplaying.visualizer.presets.v1';
  function readSavedPresets(){
    try { const j=JSON.parse(localStorage.getItem(VIS_PRESETS_KEY)||'[]'); return Array.isArray(j)?j:[]; } catch { return []; }
  }
  function writeSavedPresets(arr){
    try { localStorage.setItem(VIS_PRESETS_KEY, JSON.stringify(Array.isArray(arr)?arr:[])); } catch {}
  }
  function currentPresetPayload(){
    return {
      name:'',
      preset: String(presetSel?.value || presetKey || 'classic').toLowerCase(),
      energy: Math.max(1, Math.min(10, Number(energySel?.value || Math.round(energyLevel)) || 6)),
      motion: Math.max(1, Math.min(10, Number(motionSel?.value || Math.round(motionLevel)) || 6)),
      glow: Math.max(1, Math.min(10, Number(glowSel?.value || Math.round(glowLevel)) || 6)),
      ts: Date.now(),
      version: 1,
    };
  }
  function refreshSavedPresetSelect(selectedName=''){
    if (!savedPresetSel) return;
    const list = readSavedPresets();
    savedPresetSel.innerHTML = '<option value="">(none)</option>';
    for (const p of list){
      const o=document.createElement('option');
      o.value=String(p?.name||'');
      o.textContent=String(p?.name||'');
      savedPresetSel.appendChild(o);
    }
    if (selectedName) savedPresetSel.value = selectedName;
  }
  function applySavedPresetByName(name){
    const list=readSavedPresets();
    const p=list.find(x=>String(x?.name||'')===String(name||''));
    if(!p) return;
    if (presetSel) presetSel.value = String(p.preset||'classic');
    if (energySel) energySel.value = String(Math.max(1,Math.min(10,Number(p.energy)||6)));
    if (motionSel) motionSel.value = String(Math.max(1,Math.min(10,Number(p.motion)||6)));
    if (glowSel) glowSel.value = String(Math.max(1,Math.min(10,Number(p.glow)||6)));
    applyBtn?.click();
  }
  refreshSavedPresetSelect();
  savedPresetSel?.addEventListener('change', ()=>{ const n=String(savedPresetSel.value||''); if(n) applySavedPresetByName(n); });
  savePresetBtn?.addEventListener('click', ()=>{
    const name = String(prompt('Preset name?','') || '').trim();
    if (!name) return;
    const list = readSavedPresets().filter(p=>String(p?.name||'')!==name);
    const payload = currentPresetPayload(); payload.name = name;
    list.push(payload);
    list.sort((a,b)=>String(a.name).localeCompare(String(b.name)));
    writeSavedPresets(list);
    refreshSavedPresetSelect(name);
    if (pushStatus) pushStatus.textContent = `Saved preset: ${name}`;
  });
  deletePresetBtn?.addEventListener('click', ()=>{
    const name = String(savedPresetSel?.value || '').trim();
    if (!name) return;
    if (!confirm(`Delete preset "${name}"?`)) return;
    const list = readSavedPresets().filter(p=>String(p?.name||'')!==name);
    writeSavedPresets(list);
    refreshSavedPresetSelect('');
    if (pushStatus) pushStatus.textContent = `Deleted preset: ${name}`;
  });
  exportPresetBtn?.addEventListener('click', async ()=>{
    const name = String(savedPresetSel?.value || '').trim();
    const list = readSavedPresets();
    const payload = name ? list.find(p=>String(p?.name||'')===name) : currentPresetPayload();
    if (!payload) return;
    const data = JSON.stringify(payload, null, 2);
    const file = `${String(payload.name||payload.preset||'visualizer-preset').replace(/\s+/g,'-').toLowerCase()}.json`;

    // Prefer native share on mobile/webviews where blob: downloads can fail.
    try {
      const f = new File([data], file, { type:'application/json' });
      if (navigator.share && (!navigator.canShare || navigator.canShare({ files:[f] }))) {
        await navigator.share({ files:[f], title:file, text:'Visualizer preset export' });
        if (pushStatus) pushStatus.textContent = `Shared preset: ${file}`;
        return;
      }
    } catch {}

    // Clipboard fallback for constrained in-app browsers.
    try {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(data);
        if (pushStatus) pushStatus.textContent = `Copied preset JSON to clipboard (${file})`;
        return;
      }
    } catch {}

    // Desktop/browser default download flow.
    const blob = new Blob([data], { type:'application/json' });
    const a=document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = file;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 500);
  });
  importPresetBtn?.addEventListener('click', ()=> importPresetFile?.click());
  importPresetFile?.addEventListener('change', async ()=>{
    try {
      const f = importPresetFile.files && importPresetFile.files[0];
      if (!f) return;
      const txt = await f.text();
      const j = JSON.parse(txt);
      const name = String(j?.name || prompt('Name for imported preset?', String(j?.preset||'imported')) || '').trim();
      if (!name) return;
      const p = {
        name,
        preset: String(j?.preset || 'classic').toLowerCase(),
        energy: Math.max(1,Math.min(10,Number(j?.energy)||6)),
        motion: Math.max(1,Math.min(10,Number(j?.motion)||6)),
        glow: Math.max(1,Math.min(10,Number(j?.glow)||6)),
        ts: Date.now(),
        version: 1,
      };
      const list = readSavedPresets().filter(x=>String(x?.name||'')!==name);
      list.push(p); list.sort((a,b)=>String(a.name).localeCompare(String(b.name)));
      writeSavedPresets(list);
      refreshSavedPresetSelect(name);
      applySavedPresetByName(name);
      if (pushStatus) pushStatus.textContent = `Imported preset: ${name}`;
    } catch (e) {
      if (pushStatus) pushStatus.textContent = `Import failed: ${e?.message || e}`;
    } finally {
      try { importPresetFile.value = ''; } catch {}
    }
  });

  // Designer reopen persistence: if no explicit query values are provided,
  // restore the last pushed visualizer profile from API.
  (async ()=>{
    try {
      if (!uiOn) return;
      if (hasPresetParam || hasEnergyParam || hasMotionParam || hasGlowParam) return;
      const r = await fetch(`${api}/peppy/last-profile`, { cache:'no-store' });
      const j = await r.json().catch(()=>({}));
      const p = j?.profile || {};
      if (String(p?.displayMode || '').toLowerCase() !== 'visualizer') return;
      const v = (p && typeof p.visualizer === 'object') ? p.visualizer : null;
      if (!v) return;
      if (presetSel && v.preset) presetSel.value = String(v.preset).toLowerCase();
      if (energySel && Number.isFinite(Number(v.energy))) energySel.value = String(Math.max(1,Math.min(10,Number(v.energy))));
      if (motionSel && Number.isFinite(Number(v.motion))) motionSel.value = String(Math.max(1,Math.min(10,Number(v.motion))));
      if (glowSel && Number.isFinite(Number(v.glow))) glowSel.value = String(Math.max(1,Math.min(10,Number(v.glow))));
      applyDesignerSelection(true);
    } catch {}
  })();

  function applyDesignerSelection(syncUrl=true){
    try {
      const p = String(presetSel?.value || presetKey || 'classic').toLowerCase();
      const eNum = Math.max(1, Math.min(10, Number(energySel?.value || Math.round(energyLevel)) || Math.round(energyLevel)));
      const mNum = Math.max(1, Math.min(10, Number(motionSel?.value || Math.round(motionLevel)) || Math.round(motionLevel)));
      const gNum = Math.max(1, Math.min(10, Number(glowSel?.value || Math.round(glowLevel)) || Math.round(glowLevel)));

      presetKey = p;
      preset = PRESETS[presetKey] || PRESETS.classic;
      energyLevel = eNum;
      motionLevel = mNum;
      glowLevel = gNum;
      recalcLevelKs();

      // scene follows preset unless explicitly provided in URL
      scene = String(preset.scene || scene || 'aurora').toLowerCase();
      if (scene === 'magnetosphere') scene = 'sphere';
      if (scene === 'jelly') scene = 'aeon';

      if (syncUrl) {
        const url = new URL(location.href);
        url.searchParams.set('preset', presetKey);
        url.searchParams.set('energy', String(energyLevel));
        url.searchParams.set('motion', String(motionLevel));
        url.searchParams.set('glow', String(glowLevel));
        url.searchParams.delete('scene');
        url.searchParams.set('ui', '1');
        history.replaceState(null, '', `${url.pathname}${url.search}${url.hash}`);
      }
    } catch {}
  }
  function applyPresetDefaultsFromSelection(){
    try {
      const p = String(presetSel?.value || presetKey || 'classic').toLowerCase();
      const lv = PRESET_LEVELS[p] || PRESET_LEVELS.classic;
      if (energySel) energySel.value = String(Math.max(1, Math.min(10, Number(lv.energy) || 5)));
      if (motionSel) motionSel.value = String(Math.max(1, Math.min(10, Number(lv.motion) || 5)));
      if (glowSel) glowSel.value = String(Math.max(1, Math.min(10, Number(lv.glow) || 5)));
    } catch {}
  }

  presetSel?.addEventListener('change', () => {
    applyPresetDefaultsFromSelection();
    applyDesignerSelection(true);
  });

  applyBtn?.addEventListener('click', () => applyDesignerSelection(true));

  async function pushToMoode(){
    try {
      if (pushMoodeBtn) pushMoodeBtn.textContent = 'Pushing…';
      if (pushStatus) pushStatus.textContent = '';
      const rt = await fetch(`${api}/config/runtime`, { cache:'no-store' });
      const rj = await rt.json().catch(()=>({}));
      const key = String(rj?.config?.trackKey || '').trim();
      const url = `${location.protocol}//${host}:8101/display.html?kiosk=1`;
      const p = String(presetSel?.value || presetKey || 'classic').toLowerCase();
      const e = String(energySel?.value || Math.round(energyLevel));
      const m = String(motionSel?.value || Math.round(motionLevel));
      const g = String(glowSel?.value || Math.round(glowLevel));
      const visUrl = `${location.protocol}//${host}:8101/visualizer.html?kiosk=1&preset=${encodeURIComponent(p)}&energy=${encodeURIComponent(e)}&motion=${encodeURIComponent(m)}&glow=${encodeURIComponent(g)}`;
      const saveResp = await fetch(`${api}/peppy/last-profile`, {
        method:'POST',
        headers:{'Content-Type':'application/json', ...(key?{'x-track-key':key}:{})},
        body: JSON.stringify({ url: visUrl, displayMode:'visualizer', visualizer:{ preset:p, energy:Number(e), motion:Number(m), glow:Number(g) } })
      }).catch(()=>null);
      const rr = await fetch(`${api}/config/moode/browser-url`, {
        method:'POST',
        headers:{'Content-Type':'application/json', ...(key?{'x-track-key':key}:{})},
        body: JSON.stringify({ url, reason:'visualizer-designer-push' })
      });
      const jj = await rr.json().catch(()=>({}));

    const eN = (energyLevel - 1) / 9;
    const redThresh = 0.78 - eN * 0.34;
    const vortexThresh = 0.98 - eN * 0.42;

    // Fallback for compressed/loud genres: sustained loudness can escalate, but only after dwell.
    const loudRed = loud >= (78 - eN * 4);
    const loudVortex = loud >= (86 - eN * 5);
    const loudRedReady = loudRed && chaosStreakMs >= 6000;
    const loudVortexReady = loudVortex && chaosStreakMs >= 16000;

    const chaosTierRed = chaosActive && (noveltyEnv >= redThresh || loudRedReady);
    const chaosTierVortex = chaosActive && (noveltyEnv >= vortexThresh || loudVortexReady);
    const vortexTarget = chaosTierVortex ? 1 : 0;
    vortexMorph = mix(vortexMorph, vortexTarget, vortexTarget > vortexMorph ? 0.09 : 0.035);
    // keep camera stable; apply twist to particle coordinates instead

    // Classic: map particle color lanes to spectrum ranges (same 7-band scaffold as ambient).
    const bandVals = AMBIENT_LINE_BANDS_HZ.map(([hzLo,hzHi]) => {
      const iLo = hzToIdx(hzLo, binsFast.length||1, spectrumNyquist);
      const iHi = hzToIdx(hzHi, binsFast.length||1, spectrumNyquist);
      return avgRange(binsFast, iLo, iHi) / 100;
    });

    // Spectral pan: low-heavy drifts left, high-heavy drifts right.
    // Use normalized contrast + slow bias cancellation so it doesn't sit left all the time.
    const denom = Math.max(20, (highE + lowE) * 0.9);
    const spectralPanRaw = clamp((highE - lowE) / denom, -1, 1);
    panBiasEnv = mix(panBiasEnv, spectralPanRaw, 0.01); // very slow long-term center tracking
    const spectralPanBalanced = clamp((spectralPanRaw - panBiasEnv * 0.9) * 1.35, -1, 1);
    const panAtk = 0.22, panRel = 0.08;
    const panA = Math.abs(spectralPanBalanced) > Math.abs(particlePanEnv) ? panAtk : panRel;
    particlePanEnv = mix(particlePanEnv, spectralPanBalanced, panA);
    const panPxBase = particlePanEnv * (W * 0.33); // global visible drift

    for(let idx=0; idx<particles.length; idx++){
      const p = particles[idx];
      p.z-=speed + pulse*0.01;
      if(p.z<=0.02){p.x=Math.random();p.y=Math.random();p.z=1; p.cdx=0; p.cdy=0; p.ct=0; p.cr=0; p.ca=-1; p.cp=0; p.co=0;}
      p.x=(p.x+p.vx+1)%1; p.y=(p.y+p.vy+1)%1;
      if (particleChaos > 0.04) {
        if (!p.cdx && !p.cdy) {
          const a = Math.random() * Math.PI * 2;
          p.cdx = Math.cos(a);
          p.cdy = Math.sin(a);
        }
        const chaosTravel = Math.min(1.2, particleChaos) * 0.010;
        p.x = (p.x + p.cdx * chaosTravel + 1) % 1;
        p.y = (p.y + p.cdy * chaosTravel + 1) % 1;
      }
      let sx=(p.x-0.5)/(p.z)+0.5, sy=(p.y-0.5)/(p.z)+0.5;
      if (Math.abs(particleSpin) > 0.0002 || particleChaos > 0.02) {
        const cx = sx - 0.5;
        const cy = sy - 0.5;
        let localTwist = particleSpin * (0.35 + (1 - p.z) * 0.95);
        if (particleChaos > 0.02) {
          const chaosAmt = Math.min(1.0, particleChaos * 0.7);
          if (!p.cdx && !p.cdy) {
            const a = Math.random() * Math.PI * 2;
            p.cdx = Math.cos(a);
            p.cdy = Math.sin(a);
          }
          const jitter = (p.cdx * 0.07 + p.cdy * 0.05) * chaosAmt;
          localTwist += jitter;
        }
        const c = Math.cos(localTwist), s = Math.sin(localTwist);
        const rx = cx*c - cy*s;
        const ry = cx*s + cy*c;
        sx = rx + 0.5;
        sy = ry + 0.5;
      }

      // Strong per-dot chaos drift (persistent random direction per particle lifetime)
      if (particleChaos > 0.03) {
        if (!p.cdx && !p.cdy) {
          const a = Math.random() * Math.PI * 2;
          p.cdx = Math.cos(a);
          p.cdy = Math.sin(a);
        }
        const chaosDrift = Math.min(1.2, particleChaos * 1.1) * (0.020 + (1 - p.z) * 0.040) * (1 - vortexMorph);
        sx += p.cdx * chaosDrift;
        sy += p.cdy * chaosDrift;
      }

      // Tier-2 chaos: edge-to-center vortex rails (leader/follower trains), morphed in/out.
      if (vortexMorph > 0.001) {
        // right=high, left=low mapping already used below for lane
        const laneTmp = Math.max(0, Math.min(6, Math.floor((1 - Math.max(0, Math.min(0.999, sx))) * 7)));
        const bTmp = Number(bandVals[laneTmp] || 0);
        const g = laneTmp <= 1 ? 2 : (laneTmp <= 3 ? 1 : 0); // 2=high,1=mid,0=low

        const arms = (g === 2) ? 8 : (g === 1 ? 7 : 6);
        if (p.ca < 0) p.ca = Math.floor(Math.random() * arms);
        if (!p.cp) p.cp = Math.random() * Math.PI * 2;
        if (!p.co) p.co = Math.random(); // follower offset along rail

        // Spawn near edges, then travel inward to center and vanish.
        if (!p.cr) p.cr = 0.42 + Math.random() * 0.10;

        const armSep = (Math.PI * 2) / arms;
        const chaosAmt = Math.min(1.5, particleChaos * 1.2);

        const inwardBase = (g === 2) ? 0.0028 : (g === 1 ? 0.0023 : 0.0019);
        const inward = (inwardBase + (1 - p.z) * inwardBase * 1.5) * (1.0 + chaosAmt * 0.7);
        p.cr -= inward;
        if (p.cr < 0.040) {
          // disappear at center, then respawn near edge on a rail
          p.cp = Math.random() * Math.PI * 2;
          p.ca = Math.floor(Math.random() * arms);
          p.co = Math.random();
          p.cr = 0.42 + Math.random() * 0.10;
          continue;
        }

        // Leader/follower: one leader phase per rail/group, particles trail via persistent offset.
        const angBase = (g === 2) ? 0.052 : (g === 1 ? 0.040 : 0.030);
        const leaderPhase = tm * (angBase * 20 + chaosAmt * 0.22 + bTmp * 0.14) + p.cp;
        const trailSpan = 2.6;
        const laneTheta = p.ca * armSep + leaderPhase - p.co * trailSpan;

        const curlK = (g === 2) ? 3.8 : (g === 1 ? 3.3 : 2.9);
        const spiralCurl = Math.log(1 + p.cr * 30) * curlK;
        const theta = laneTheta + spiralCurl;

        const squash = (g === 2) ? 0.64 : (g === 1 ? 0.60 : 0.56);
        const vx = 0.5 + Math.cos(theta) * p.cr;
        const vy = 0.5 + Math.sin(theta) * (p.cr * squash);

        sx = sx * (1 - vortexMorph) + vx * vortexMorph;
        sy = sy * (1 - vortexMorph) + vy * vortexMorph;
      }
      if (silence > 0.001) {
        // As silence approaches, fling particles away from center in unique directions.
        const dx = sx - 0.5;
        const dy = sy - 0.5;
        const n = Math.hypot(dx, dy) || 1;
        const ux = dx / n, uy = dy / n;
        const chaosDir = Math.sin(idx*12.7 + tm*2.1) * 0.35;
        const scatter = Math.pow(silence, 1.35) * (0.35 + (1-p.z)*1.55);
        sx += (ux + chaosDir*uy) * scatter;
        sy += (uy - chaosDir*ux) * scatter;
      }
      const panPx = panPxBase * (0.55 + (1-p.z)*0.9);
      const px=sx*W + panPx, py=sy*H;
      if(px<0||py<0||px>W||py>H) continue;
      // Organize band lanes spatially right -> left (high -> low)
      const xNorm = Math.max(0, Math.min(0.999, px / Math.max(1, W)));
      const lane = Math.max(0, Math.min(6, Math.floor((1 - xNorm) * 7))); // right=0 (high), left=6 (low)
      const b = Number(bandVals[lane]||0);

      // Quantity reacts to lane strength
      const volumeDensity = clamp(0.55 + energy/85, 0.45, 1.9);
      const drawProb = Math.max(0.02, Math.min(1, (0.18 + b*1.05 + colorFlash*0.10) * volumeDensity * (1 - silence*0.75)));
      if (Math.random() > drawProb) continue;

      const bandSizeBoost = b * 2.6; // stronger band -> bigger dots in that lane
      let rRaw=2 + bandSizeBoost + (1-p.z)*(3.2 + tailFromSpeed*1.8 + Math.min(1.6, particleChaos*1.2)) + pulse*3;
      if (vortexMorph > 0.001) {
        // As vortex morphs in, dots increasingly shrink toward center.
        const centerScale = Math.max(0.35, Math.min(1.0, (p.cr || 0.06) / 0.42));
        rRaw *= (1 - vortexMorph) + centerScale * vortexMorph;
      }
      const r=Math.min(9, Math.max(0.8, rRaw));
      const laneHue = 20 + lane*46;
      const hue=(laneHue + t*8 + b*120 + colorFlash*20)%360;
      const chaosPop = Math.min(1.0, particleChaos * 0.75);
      const chaosTail = Math.min(1.4, particleChaos * 1.1);
      const fade = 1 - (silence * 0.92);
      const lum=(52 + b*26 + colorFlash*8 + chaosPop*10) * (0.45 + fade*0.55);
      const alpha=((0.10 + b*0.18) + (1-p.z)*(0.22 + tailFromSpeed*0.34 + chaosTail*0.22) + chaosPop*0.10) * fade;
      const chaosG = Math.round(140 * (1 - vortexMorph)); // orange -> red morph
      x.fillStyle = chaosTierRed
        ? `rgba(255,${chaosG},0,${Math.max(0.14, alpha)})`
        : `hsla(${hue},95%,${lum}%,${alpha})`;
      x.beginPath(); x.arc(px,py,r,0,Math.PI*2); x.fill();
      if (chaosPop > 0.08) {
        const split = (0.8 + chaosPop*4.2) * (0.6 + (1-p.z));
        if (!p.cdx && !p.cdy) {
          const a = Math.random() * Math.PI * 2;
          p.cdx = Math.cos(a);
          p.cdy = Math.sin(a);
        }
        const offX = p.cdx * split;
        const offY = p.cdy * split;
        x.fillStyle = chaosTierRed
          ? `rgba(255,${chaosG},0,${Math.max(0.10, alpha*0.85)})`
          : `hsla(${(hue+18)%360},95%,${Math.min(92, lum+6)}%,${Math.max(0.08, alpha*0.8)})`;
        x.beginPath(); x.arc(px+offX,py+offY,Math.max(1.2, r*0.78),0,Math.PI*2); x.fill();
      }
    }
    x.restore();
  }

  function drawTunnel(){
    x.fillStyle='rgba(2,4,10,0.24)'; x.fillRect(0,0,W,H);
    x.save(); x.translate(W/2,H/2);
    x.globalCompositeOperation='lighter';
    const rings=42;
    for(let i=0;i<rings;i++){
      const p=((i*0.06)+(t*0.16)+(energy*0.01))%1;
      const z=1-p;
      const rr=(Math.min(W,H)*0.55) * Math.pow(z,1.2);
      const wob=Math.sin(t*2+i*0.8)* (2+mid*0.05);
      x.lineWidth=Math.max(1, (1-z)*3 + pulse*2);
      const hue=(190 + i*5 + bass*0.8 + t*30)%360;
      x.strokeStyle=`hsla(${hue},90%,${45+treb*0.2}%,${0.08 + (1-z)*0.22})`;
      x.beginPath(); x.arc(wob,0,rr,0,Math.PI*2); x.stroke();
    }
    // radial spikes
    const spikes=64;
    for(let i=0;i<spikes;i++){
      const a=(i/spikes)*Math.PI*2 + t*0.35;
      const b=bins[i%bins.length]/100;
      const r1=40+mid*0.5, r2=r1 + 60 + b*220 + pulse*90;
      x.strokeStyle=`hsla(${(160+i*3+t*12)%360},95%,60%,0.14)`;
      x.lineWidth=1.2;
      x.beginPath(); x.moveTo(Math.cos(a)*r1,Math.sin(a)*r1); x.lineTo(Math.cos(a)*r2,Math.sin(a)*r2); x.stroke();
    }
    x.restore();
  }

  function drawMoire(){
    const lowPowerMoire = kioskOn || embeddedOn;
    if (lowPowerMoire) { __moireToggle = (__moireToggle + 1) % 2; if (__moireToggle) return; }
    x.fillStyle='rgba(2,4,10,0.22)'; x.fillRect(0,0,W,H);
    x.save();
    x.translate(W/2,H/2);
    x.globalCompositeOperation='lighter';

    const e=energy/100;
    const b=bass/100;
    const m=mid/100;
    const tr=treb/100;
    const maxR=Math.min(W,H)*0.62;

    // Knob mapping for visible differences:
    // energy -> denser rings / stronger alpha
    // motion -> faster phase drift / offsets
    // glow   -> stronger line alpha + blur
    const densityK = 0.75 + (energyK * 0.7);
    const motionDrift = 0.6 + (motionK * 1.2);
    const glowAlpha = 0.55 + (glowK * 0.55);

    const step=Math.max(lowPowerMoire ? 10 : 8, Math.floor((18 - e*4) / densityK));

    x.strokeStyle=`hsla(${(190+tm*18)%360},95%,62%,${(0.10 + 0.08*e)*glowAlpha})`;
    x.lineWidth=(1.0 + pulse*0.9) * (0.85 + glowK*0.22);
    x.shadowBlur = lowPowerMoire ? 0 : Math.min(8, (2 + pulse*5) * (0.45 + glowK*0.22));
    x.shadowColor = `hsla(${(200+tm*12)%360},100%,62%,${lowPowerMoire ? 0 : (0.12 + glowK*0.12)})`;
    let ringsA = 0;
    for(let r=8;r<maxR;r+=step){
      if (++ringsA > (lowPowerMoire ? 28 : 42)) break;
      const ox=Math.sin(tm*0.9*motionDrift + r*0.02)*(16 + b*30 + pulse*30) * (0.85 + motionK*0.22);
      const oy=Math.cos(tm*0.7*motionDrift + r*0.017)*(10 + m*26) * (0.85 + motionK*0.22);
      x.beginPath(); x.arc(ox,oy,r,0,Math.PI*2); x.stroke();
    }

    x.strokeStyle=`hsla(${(320+tm*14)%360},90%,58%,${(0.08 + 0.07*tr)*glowAlpha})`;
    x.lineWidth=(0.9 + e*0.8) * (0.85 + glowK*0.2);
    const step2=Math.max(lowPowerMoire ? 10 : 8, Math.floor((16 - tr*4) / densityK));
    let ringsB = 0;
    for(let r=6;r<maxR;r+=step2){
      if (++ringsB > (lowPowerMoire ? 28 : 42)) break;
      const ox=Math.cos(tm*1.05*motionDrift + r*0.018)*(18 + m*28) * (0.82 + motionK*0.25);
      const oy=Math.sin(tm*0.82*motionDrift + r*0.021)*(14 + tr*30 + pulse*20) * (0.82 + motionK*0.25);
      x.beginPath(); x.arc(ox,oy,r,0,Math.PI*2); x.stroke();
    }

    x.shadowBlur = 0;
    x.rotate(tm*0.03*motionDrift + e*0.2*(0.7 + motionK*0.35));
    x.strokeStyle=`rgba(220,235,255,${0.04 + 0.04*glowK})`;
    x.lineWidth=1;
    const span=Math.max(W,H);
    const gStep=Math.max(lowPowerMoire ? 14 : 9, Math.floor((18 - e*4) / densityK));
    for(let yy=-span; yy<=span; yy+=gStep){ x.beginPath(); x.moveTo(-span,yy); x.lineTo(span,yy); x.stroke(); }

    x.restore();
  }

  function drawMagnetosphere(){
    x.fillStyle='rgba(2,5,12,0.20)'; x.fillRect(0,0,W,H);
    x.save();
    x.translate(W*0.5, H*0.52);
    x.globalCompositeOperation='lighter';

    const e = energy/100;
    const b = bass/100;
    const m = mid/100;
    const tr = treb/100;
    const hue0 = (188 + t*9 + tr*120 + colorAlive*40 + colorFlash*48) % 360;

    // Use separate X/Y extents so 1280x400 doesn't look tiny.
    const rxBase = (W * 0.38) * (0.84 + b*0.32 + pulse*0.12);
    const ryBase = (H * 0.36) * (0.86 + m*0.22 + pulse*0.10);

    // magnetic field lines (dipole-ish), widened for cinematic spread
    const lines = 30;
    for(let i=0;i<lines;i++){
      const phase = (i/lines)*Math.PI*2;
      const spin = t*(0.22 + m*0.35);
      const a = phase + spin;
      x.beginPath();
      const steps=88;
      for(let s=0;s<=steps;s++){
        const u = (s/steps)*2 - 1; // -1..1
        const env = (0.18 + 0.82*(1-u*u));
        const twist = Math.sin(u*4 + t*1.3 + phase)* (0.20 + tr*0.24);
        const px = Math.cos(a + twist) * rxBase * env;
        const py = Math.sin(a + twist) * ryBase * env * 0.92 + u * (H*0.16);
        if(s===0) x.moveTo(px,py); else x.lineTo(px,py);
      }
      x.lineWidth = 1.0 + e*1.8;
      x.strokeStyle = `hsla(${(hue0 + i*3)%360},95%,${52 + m*18}%,${0.09 + e*0.20})`;
      x.stroke();
    }

    // constant clean orbital stream around the core (no zig-zag meander)
    const streamCount = 150;
    const orbitSpeed = 0.24 + motionK*0.24 + e*0.20; // speed modulation from music
    const head = tm * orbitSpeed;
    const tailLen = 1.55 * Math.PI; // long visible tail
    for(let i=0;i<streamCount;i++){
      const t01 = i / Math.max(1, (streamCount - 1));
      const a = head - t01 * tailLen;
      const fade = Math.pow(1 - t01, 1.25);
      const x0 = Math.cos(a) * rxBase * 0.79;
      const y0 = Math.sin(a) * ryBase * 0.79;
      const rr = (0.8 + tr*1.5 + pulse*0.6) * (0.72 + fade*0.85);
      const hue = (hue0 + 70 + colorAlive*26 + colorFlash*24 + t01*34) % 360; // head/tail color reacts
      x.fillStyle = `hsla(${hue},100%,${68 + fade*14 + colorFlash*6}%,${0.04 + fade*0.34})`;
      x.beginPath(); x.arc(x0,y0,rr,0,Math.PI*2); x.fill();
    }

    // central core glow + stronger size response (overall + transient)
    const overall = (lowE*0.45 + midE*0.33 + highE*0.22);
    const coreBase = 20 + (overall*0.26);
    const coreBeat = pulse*24 + onset*10;
    const coreR = Math.max(18, Math.min(92, coreBase + coreBeat));
    const haloScale = 2.8 + (overall/100)*4.2 + pulse*1.1;
    const g = x.createRadialGradient(0,0,2,0,0,coreR*haloScale);
    g.addColorStop(0,'rgba(210,245,255,0.82)');
    g.addColorStop(0.35,`hsla(${hue0},100%,${64 + colorFlash*10}%,${0.24 + colorFlash*0.12})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle = g;
    x.beginPath(); x.arc(0,0,coreR*(2.2 + (overall/100)*2.0),0,Math.PI*2); x.fill();

    x.restore();
  }

  function drawAeon(){
    x.fillStyle='rgba(4,8,18,0.18)'; x.fillRect(0,0,W,H);
    x.save();
    x.translate(W*0.5, H*0.5);
    x.globalCompositeOperation='lighter';

    const hue0=(190 + tm*11 + treb*0.7 + colorAlive*36 + colorFlash*42)%360;
    const amp=(0.55 + bass/120 + pulse*0.42);
    const scale=Math.min(W,H)*0.28;

    // layered parametric ribbons (aeon-ish)
    for(let i=0;i<aeonSeeds.length;i++){
      const s=aeonSeeds[i];
      const steps=240;
      x.beginPath();
      for(let n=0;n<=steps;n++){
        const u=(n/steps)*Math.PI*2;
        const wob=1 + 0.12*Math.sin(u*7 + tm*(1.0+s.k)) + 0.06*Math.sin(u*13 - tm*0.7);
        const x1=Math.sin(u*s.a + tm*(0.35+s.k) + s.p) * scale * wob * (0.78 + amp*0.42);
        const y1=Math.sin(u*s.b + tm*(0.28+s.k*0.8)) * scale * 0.64 * wob * (0.82 + mid/180);
        if(n===0) x.moveTo(x1,y1); else x.lineTo(x1,y1);
      }
      x.closePath();
      x.lineWidth=1.4 + pulse*1.2;
      x.strokeStyle=`hsla(${(hue0+i*26)%360},95%,${58+i*3}%,${0.10 + 0.07*(i+1)/aeonSeeds.length})`;
      x.shadowBlur=(7 + pulse*10) * (0.72 + glowK*0.33);
      x.shadowColor=`hsla(${(hue0+i*28)%360},100%,65%,${0.18 + 0.10*glowK})`;
      x.stroke();
    }

    x.shadowBlur=0;
    // central orbital glow
    const core=26 + bass*0.24 + pulse*24;
    const g=x.createRadialGradient(0,0,2,0,0,core*2.8);
    g.addColorStop(0,'rgba(230,245,255,0.70)');
    g.addColorStop(0.4,`hsla(${(hue0+18)%360},100%,64%,0.24)`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g; x.beginPath(); x.arc(0,0,core*1.9,0,Math.PI*2); x.fill();

    x.restore();
  }

  function spawnFireworks(){
    const cx=W*(0.2+Math.random()*0.6), cy=H*(0.18+Math.random()*0.42);
    const count=26 + Math.floor(Math.random()*24);
    const hue=(170 + bass*1.2 + colorAlive*44 + colorFlash*36 + Math.random()*140)%360;
    for(let i=0;i<count;i++){
      const a=Math.random()*Math.PI*2;
      const sp=(1.0+Math.random()*2.6) * (0.9 + energy/120);
      sparks.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,dec:0.012+Math.random()*0.02,h:hue+Math.random()*24});
    }
  }

  function drawFireworks(){
    x.fillStyle='rgba(3,5,10,0.26)'; x.fillRect(0,0,W,H);
    const now=performance.now();
    const eRise=Math.max(0, energy-lastEnergy);
    const bRise=Math.max(0, bass-lastBass);
    lastEnergy=energy;
    lastBass=bass;

    // Context-aware gating: ballads stay sparse; dense tracks can bloom.
    const trackActivity = Math.max(0, energy - energyFloor);
    const quietMode = (energy < 22) && (trackActivity < 8);

    // Beat/transient driven with cooldown so it keeps firing without becoming spammy.
    const onsetThresh = quietMode ? 0.50 : 0.24;
    const pulseThresh = quietMode ? 0.58 : 0.32;
    const strongHit = (onset>onsetThresh) || (pulse>pulseThresh) || (eRise>0.95) || (bRise>1.9);
    const sustained = !quietMode && (energy>30 && bass>24);
    if(now>=nextFireAt && (strongHit || sustained)){
      spawnFireworks();
      const cooldown = quietMode
        ? (700 + Math.random()*900)
        : (strongHit ? (140 + Math.random()*170) : (240 + Math.random()*260));
      nextFireAt = now + cooldown;
    }

    // Gentle sparkle only when musically active enough.
    if(now>=nextFireAt && !quietMode && energy>20 && Math.random()<0.02){
      spawnFireworks();
      nextFireAt = now + 260 + Math.random()*320;
    }

    x.save();
    x.globalCompositeOperation='lighter';
    for(let i=sparks.length-1;i>=0;i--){
      const p=sparks[i];
      p.vy += 0.012;
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.992; p.vy *= 0.992;
      p.life -= p.dec;
      if(p.life<=0 || p.x<-30 || p.x>W+30 || p.y<-30 || p.y>H+30){ sparks.splice(i,1); continue; }
      const a=Math.max(0,p.life);
      x.fillStyle=`hsla(${p.h%360},100%,${56+treb*0.25}%,${0.12+a*0.65})`;
      const r=1.6 + (1-a)*2.8 + pulse*1.2;
      x.beginPath(); x.arc(p.x,p.y,r,0,Math.PI*2); x.fill();
    }
    // horizon glow
    const g=x.createLinearGradient(0,H*0.45,0,H);
    g.addColorStop(0,'rgba(0,0,0,0)');
    g.addColorStop(1,`hsla(${(200+t*8)%360},85%,20%,0.22)`);
    x.fillStyle=g; x.fillRect(0,0,W,H);
    x.restore();
  }

  function frame(ts){
    t=ts*0.001;
    tm=t*motionK;
    if(auto && ts-lastSwitch>22000){ sceneIdx=(sceneIdx+1)%scenes.length; scene=scenes[sceneIdx]; lastSwitch=ts; }
    mEl.textContent=`${scene}${auto?' · auto':''} · ${presetKey} · E${Math.round(energyLevel)} M${Math.round(motionLevel)} G${Math.round(glowLevel)}`;

    // Lightweight feedback loop (render-to-self transform) for trails/depth.
    x.save();
    const fb = Math.max(0.03, Math.min(0.24, Number(preset.feedback||0.08) * (0.85 + (energyK-1)*0.5) * (0.82 + (glowK-1)*0.7)));
    x.globalAlpha = fb + Math.min(0.12, pulse*0.03*(0.85+glowK*0.3));
    x.translate(W*0.5, H*0.5);
    const z = 1.002 + Math.min(0.012, energy/14000) * (0.7 + motionK*0.45);
    x.scale(z, z);
    x.rotate((mid/1000 - 0.02) * 0.002 * (0.65 + motionK*0.55));
    x.translate(-W*0.5, -H*0.5);
    x.drawImage(c, 0, 0, W, H);
    x.restore();

    if(scene==='aeon') drawAeon();
    else if(scene==='fireworks') drawFireworks();
    else if(scene==='particles') drawParticles();
    else if(scene==='tunnel') drawTunnel();
    else if(scene==='moire') drawMoire();
    else if(scene==='sphere') drawMagnetosphere();
    else drawAurora();

    // faint scanlines for CRT feel
    x.fillStyle='rgba(255,255,255,0.025)';
    for(let y=0;y<H;y+=3) x.fillRect(0,y,W,1);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
