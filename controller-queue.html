<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Live Queue</title>
  <style>
    :root{--bg:#0b111c;--text:#f3f6ff;--muted:#9eb3d6;--line:#1f2a3d;--danger:#ff3b30;--surface:#132038;--surface-border:#2a3a58;--row-head:rgba(74,168,255,.14)}
    *{box-sizing:border-box;-webkit-user-select:none;user-select:none} body{margin:0;background:var(--bg);color:var(--text);font:15px/1.35 Inter,system-ui;padding:max(10px,env(safe-area-inset-top)) 14px max(16px,env(safe-area-inset-bottom));}
    .top{display:flex;align-items:center;gap:10px;margin:2px 0 4px}
    .grow{flex:1}
    body.embedded{background:transparent;padding:6px 8px 8px;position:relative}
    body.embedded .top{display:flex;margin:0 0 2px}
    body.embedded .row{background:color-mix(in oklab, var(--bg) 70%, transparent)}
    body.embedded .row.head{background:var(--row-head)}
    .back{border:0;background:transparent;color:#c8d8f5;font-size:20px;cursor:pointer;padding:6px}
    h1{margin:0;font-size:28px;letter-spacing:-.01em}
    .meta{color:var(--muted);font-size:12px;margin:0}
    .queueTopActions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin:0}
    .queueTopActions button{border:1px solid var(--line);background:var(--line);color:var(--text);border-radius:9px;padding:6px 9px;font-size:12px;line-height:1.05;cursor:pointer}
    .queueTopActions button.warn{border-color:var(--line);background:var(--line);color:var(--text)}
    .meta .miniSpin{display:inline-block;width:14px;height:14px;border-radius:999px;border:2px solid rgba(255,255,255,.22);border-top-color:#9fc4ff;animation:spin .8s linear infinite;vertical-align:-2px}
    .vibeBusy{position:fixed;left:50%;top:10px;transform:translateX(-50%);z-index:200;display:none;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:rgba(12,18,28,.88);border:1px solid #2a3a58;color:#e6efff;font-size:12px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
    .vibeBusy.show{display:flex}
    .vibeBusy .miniSpin{display:inline-block;width:14px;height:14px;border-radius:999px;border:2px solid rgba(255,255,255,.22);border-top-color:#9fc4ff;animation:spin .8s linear infinite}
    .list{margin:0;padding:0;list-style:none;position:relative}
    #dropLine{position:absolute;left:0;right:0;height:3px;background:#45b26f;box-shadow:0 0 0 1px rgba(69,178,111,.18);z-index:10003;pointer-events:none;display:none}

    .rowWrap{position:relative;border-bottom:1px solid var(--line);overflow:hidden}
    .rowWrap.dragActive{overflow:visible;z-index:9997}
    .vibeBtn,.deleteBtn{position:absolute;top:0;bottom:0;width:92px;border:0;color:#fff;font-weight:700;font-size:15px;opacity:0;pointer-events:none;transition:opacity .16s ease}
    .vibeBtn{right:92px;background:#5b3df0}
    .deleteBtn{right:0;background:var(--danger)}
    .row{position:relative;z-index:1;background:var(--bg);display:grid;grid-template-columns:28px 28px 1fr 30px;gap:8px;align-items:center;padding:6px 0;transform:translateX(0);transition:transform .18s ease;touch-action:pan-y}
    .row.swiped{transform:translateX(-184px)}
    .rowWrap.onlyDelete .row.swiped{transform:translateX(-92px)}
    .row.swiped ~ .vibeBtn,.row.swiped ~ .deleteBtn{opacity:1;pointer-events:auto}
    .rowWrap.onlyDelete .vibeBtn{display:none}
    .row.head{background:var(--row-head)}
    .row.optimisticPlay{background:rgba(69,178,111,.16);box-shadow:inset 0 0 0 2px rgba(69,178,111,.95)}
    .num{font-weight:700;color:var(--text);text-align:center}
    .coverWrap{position:relative;display:block}
    .thumb{width:28px;height:28px;border-radius:6px;object-fit:cover;background:#0a1222;border:1px solid #33485f}
    .coverMore{position:absolute;left:3px;top:3px;width:16px;height:16px;border-radius:999px;border:1px solid rgba(255,255,255,.22);background:rgba(12,18,28,.72);color:#e8f0ff;font-size:9px;display:flex;align-items:center;justify-content:center;z-index:2}
    .title{font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sub{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sub .stars{margin-left:6px;letter-spacing:.3px;color:#ffd76a;font-weight:700}

    .row.dragging{opacity:.96;z-index:9999;box-shadow:0 16px 34px rgba(0,0,0,.52);transform:scale(1.03)}
    .rowWrap.dropTarget{outline:none}
    .more{width:30px;height:30px;border-radius:999px;border:1px solid #2a3a58;background:#121c30;color:#dfeaff;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer}

    .menu{position:fixed;display:none;z-index:120;min-width:230px;padding:6px;border-radius:18px;
      background:rgba(28,34,48,.78);border:1px solid rgba(255,255,255,.14);
      backdrop-filter:blur(18px) saturate(1.2);-webkit-backdrop-filter:blur(18px) saturate(1.2);
      box-shadow:0 18px 34px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.08)}
    .menu.open{display:block}
    .menu button{width:100%;display:flex;align-items:center;gap:10px;text-align:left;border:0;background:transparent;color:#f2f6ff;padding:11px 12px;border-radius:12px;cursor:pointer;font-size:16px;line-height:1.2}
    .menu button:hover{background:rgba(255,255,255,.08)}
    .menu .ico{width:18px;display:inline-flex;justify-content:center;opacity:.92}
    .menu .sep{height:1px;background:rgba(255,255,255,.14);margin:4px 8px}

    body.embedded h1{font-size:20px;line-height:1.05}
    body.embedded .meta{margin:0;font-size:11px}
    body.embedded .queueTopActions{position:absolute;top:6px;right:8px;margin:0;z-index:6}
    body.embedded .queueTopActions button{padding:5px 8px;font-size:11px;border-radius:8px}

    .albumModal,.artistModal{position:fixed;inset:0;display:none;background:rgba(0,0,0,.28);z-index:130;align-items:center;justify-content:center}
    .albumModal.open,.artistModal.open{display:flex}
    .albumCard,.artistCard{position:relative;width:min(680px,94vw);max-height:88vh;overflow:auto;background:rgba(0,0,0,.58);border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:12px;backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px)}
    .albumHead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .albumHead img{width:54px;height:54px;border-radius:8px;object-fit:cover;background:#0a1222}
    .albumTitle{font-size:17px;font-weight:700}
    .albumMeta{font-size:12px;color:var(--muted)}
    .albumTracks{list-style:none;margin:8px 0 0;padding:0}
    .albumTracks li{padding:8px 0;border-bottom:1px solid #1f2a3d;font-size:14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .trackBtns{display:flex;gap:6px}
    .trackBtns button{border:1px solid var(--line);background:var(--line);color:var(--text);width:30px;height:30px;border-radius:999px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-weight:700;line-height:1;cursor:pointer}
    .albumBtns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
    .albumBtns button{border:1px solid var(--line);background:var(--line);color:var(--text);border-radius:10px;padding:9px 10px;cursor:pointer}
    .albumBtns button.is-busy,.trackBtns button.is-busy{opacity:.88;filter:saturate(1.15);box-shadow:0 0 0 2px rgba(159,196,255,.28) inset,0 0 0 1px rgba(159,196,255,.45);transform:scale(.98)}
    .albumBtns button.is-done,.trackBtns button.is-done{box-shadow:0 0 0 2px rgba(69,178,111,.28) inset,0 0 0 1px rgba(69,178,111,.62)}
    .modalX{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:999px;border:1px solid var(--line);background:var(--line);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;line-height:1}
    .modalX:active{transform:scale(.96)}
    .artistControls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:8px 0 10px}
    .artistControls button{border:1px solid var(--line);background:var(--line);color:var(--text);border-radius:10px;padding:8px 10px;cursor:pointer}
    .artistControls select,.artistControls input[type='text']{border:1px solid var(--line);background:var(--line);color:var(--text);border-radius:8px;padding:6px 8px}
    .artistModal .artistControls .albumMeta,
    .artistModal .artistControls label{color:var(--text)}
    .artistGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .artistAlbumBtn{border:1px solid var(--line);background:var(--line);color:var(--text);border-radius:10px;padding:8px;cursor:pointer;text-align:left}
    .artistAlbumBtn img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:8px;background:#0a1222;margin-bottom:6px}
    .artistAlbumName{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .loadingRow{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;padding:8px 2px}
    .spin{width:14px;height:14px;border-radius:999px;border:2px solid rgba(255,255,255,.22);border-top-color:#9fc4ff;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  

    body.nav-backwarding{
      overflow:hidden;
      animation:navBackwardOut .18s ease forwards;
      will-change: transform, opacity;
    }
    @keyframes navBackwardOut{
      from{transform:translateX(0);opacity:1}
      to{transform:translateX(24px);opacity:.38}
    }

  </style>
  <link rel="stylesheet" href="styles/controller-modals.css?v=20260310-modal-contrast1" />
</head>
<body>
  <div class="top"><button class="back" id="backBtn" aria-label="Back">‹</button><h1>Live Queue</h1><span id="meta" class="meta"><span class="miniSpin" aria-label="Loading"></span></span><span class="grow"></span><div class="queueTopActions"><button id="routeAlexaBtn" type="button" title="Invoke configured Alexa route webhook">Route to Alexa</button><button id="shuffleQueueBtn" type="button" title="Turn random off and shuffle queue">Shuffle</button><button id="cropQueueBtn" type="button" title="Keep only currently playing track">Crop</button><button id="clearQueueBtn" class="warn" type="button" title="Remove all tracks from queue">Clear</button></div></div>
  <ul class="list" id="list"><li id="dropLine" aria-hidden="true"></li></ul>
  <div class="vibeBusy" id="vibeBusy"><span class="miniSpin" aria-hidden="true"></span><span id="vibeBusyText">Building vibe queue…</span></div>

  <div class="menu" id="trackMenu" aria-hidden="true">
    <button id="goAlbumBtn" type="button"><span class="ico">◉</span><span>Go to Album</span></button>
    <button id="goArtistBtn" type="button"><span class="ico">🎤</span><span>Go to Artist</span></button>
  </div>

  <div class="albumModal" id="albumModal" aria-hidden="true">
    <div class="albumCard" role="dialog" aria-modal="true" aria-label="Album details">
      <button id="albumCloseBtn" class="modalX" type="button" aria-label="Close">✕</button>
      <div class="albumHead">
        <img id="albumArt" src="" alt="" />
        <div>
          <div class="albumTitle" id="albumTitle">Album</div>
          <div class="albumMeta" id="albumMeta"></div>
          <div class="albumMeta">Artist: <button id="albumArtistLink" type="button" style="background:none;border:0;color:#9fc4ff;text-decoration:underline;cursor:pointer;padding:0;">(artist)</button></div>
        </div>
      </div>
      <ul class="albumTracks" id="albumTracks"></ul>
      <div class="albumBtns">
        <button id="albumAppendBtn" type="button">Append album</button>
        <button id="albumCropBtn" type="button">Add album (crop)</button>
        <button id="albumReplaceBtn" type="button">Replace with album</button>
        
      </div>
    </div>
  </div>

  <div class="artistModal" id="artistModal" aria-hidden="true">
    <div class="artistCard" role="dialog" aria-modal="true" aria-label="Artist details">
      <button id="artistCloseBtn" class="modalX" type="button" aria-label="Close">✕</button>
      <div class="albumHead">
        <img id="artistArt" src="" alt="" />
        <div>
          <div class="albumTitle" id="artistTitle">Artist</div>
          <div class="albumMeta" id="artistMeta"></div>
        </div>
      </div>
      <div class="artistControls">
        <button id="artistPlayAllBtn" type="button">Play all</button>
        <button id="artistShuffleAllBtn" type="button">Shuffle all</button>
        <label class="albumMeta">min rating
          <select id="artistMinRating"><option value="0">Any</option><option value="1">1★+</option><option value="2" selected>2★+</option><option value="3">3★+</option><option value="4">4★+</option><option value="5">5★</option></select>
        </label>
        <label class="albumMeta"><input type="checkbox" id="artistExcludeOn" checked> exclude genre</label>
        <input type="text" id="artistExcludeText" value="Christmas" />
      </div>
      <div class="artistGrid" id="artistAlbumsGrid"></div>
      <div class="albumBtns">
        
      </div>
    </div>
  </div>

  <script>

    // Server-backed controller palette / API base
    function __npResolveApiBase(){
      try {
        const u = new URL(location.href);
        const q = String(u.searchParams.get('apiBase') || '').trim();
        if (q) return q.replace(/\/$/, '');
      } catch {}
      try {
        const ls = String(localStorage.getItem('nowplaying.apiBase') || '').trim();
        if (ls) return ls.replace(/\/$/, '');
      } catch {}
      return `${location.protocol}//${location.hostname||'nowplaying.local'}:3101`;
    }
    const __npBase = __npResolveApiBase();
    function __npApplyPalette(name, themeMode, customColors){
      const p = String(name||'ocean').toLowerCase();
      const modeRaw = String(themeMode||'auto').toLowerCase();
      const forceLightPreset = p === 'cloud' || p === 'sand' || p === 'blush' || p === 'ivoryred';
      const isLight = forceLightPreset;
            const map = {
        ocean:    { accent:'#4aa8ff', bg:'#0b111c', line:'#1f2a3d' },
        violet:   { accent:'#a78bfa', bg:'#120f1f', line:'#32284a' },
        mint:     { accent:'#34d399', bg:'#0b1514', line:'#21423f' },
        amber:    { accent:'#fbbf24', bg:'#171208', line:'#4a3720' },
        black:    { accent:'#f5f5f5', bg:'#050505', line:'#222222' },
        blackred: { accent:'#ff3b47', bg:'#000000', line:'#2b0f13' },
        blackblue: { accent:'#3f68c9', bg:'#000000', line:'#141a2a' },
        blackpurple: { accent:'#8b5ed4', bg:'#000000', line:'#23172f' },
        blackgold: { accent:'#d9a441', bg:'#000000', line:'#2a2314' },
        cloud:    { accent:'#5f8fd9', bg:'#eef4ff', line:'#c8d6ef' },
        sand:     { accent:'#b8863b', bg:'#fff7e8', line:'#ead9b8' },
        blush:    { accent:'#c85c78', bg:'#fff1f5', line:'#f2d0da' },
        ivoryred: { accent:'#c23b45', bg:'#ffffff', line:'#e9e9e9' },
        orange:   { accent:'#ff7a1a', bg:'#16100a', line:'#4a2f1c' },
        midnight: { accent:'#7aa2ff', bg:'#070b14', line:'#202a3f' },
        slate:    { accent:'#93a4bd', bg:'#0e131b', line:'#2f3c4d' },
        mono:     { accent:'#d8d8d8', bg:'#0b0b0b', line:'#2d2d2d' },
        sunset:   { accent:'#ff8f4d', bg:'#1b110d', line:'#5b3a2d' },
        sunrise:  { accent:'#ffbf47', bg:'#1a130a', line:'#5a4523' },
        rose:     { accent:'#fb7185', bg:'#1a0d14', line:'#5b2b3f' },
        lavender: { accent:'#c4b5fd', bg:'#120d1e', line:'#3d3158' },
        emerald:  { accent:'#34d399', bg:'#081511', line:'#1f4a3e' },
        forest:   { accent:'#4ade80', bg:'#0a150d', line:'#2d4f36' },
      };
      const d = map[p] || map.ocean;
            const lightMap = {
        ocean:    { bg:'#eef5ff', line:'#c8d7ee', text:'#0b0f17', muted:'#3f5673' },
        violet:   { bg:'#f5f0ff', line:'#d9cdf1', text:'#0b0f17', muted:'#52436e' },
        mint:     { bg:'#eefcf7', line:'#c7e8dd', text:'#0b0f17', muted:'#3d5f58' },
        amber:    { bg:'#fff8ea', line:'#ead8b0', text:'#0b0f17', muted:'#65532e' },
        black:    { bg:'#f2f4f8', line:'#d4dae4', text:'#0b0f17', muted:'#4b5567', accent:'#111111' },
        blackred: { bg:'#ffeef0', line:'#f0c7cd', text:'#2a090d', muted:'#7a3b43' },
        blackblue: { bg:'#eef2ff', line:'#cfd8f5', text:'#101735', muted:'#3f4f86' },
        blackpurple: { bg:'#f4efff', line:'#ddd1f6', text:'#201233', muted:'#5b3d85' },
        blackgold: { bg:'#fff7e8', line:'#ead9b8', text:'#2a2012', muted:'#6f5737' },
        cloud:    { bg:'#eef4ff', line:'#c8d6ef', text:'#132238', muted:'#425b7f', accent:'#5f8fd9' },
        sand:     { bg:'#fff7e8', line:'#ead9b8', text:'#2a2012', muted:'#6f5737', accent:'#b8863b' },
        blush:    { bg:'#fff1f5', line:'#f2d0da', text:'#2b1119', muted:'#7a4454', accent:'#c85c78' },
        ivoryred: { bg:'#ffffff', line:'#e9e9e9', text:'#111111', muted:'#c23b45', accent:'#c23b45' },
        orange:   { bg:'#fff3ea', line:'#ebcfbe', text:'#0b0f17', muted:'#684937' },
        midnight: { bg:'#edf2ff', line:'#cbd5f1', text:'#0b0f17', muted:'#415172' },
        slate:    { bg:'#f1f5f9', line:'#d0d8e2', text:'#0b0f17', muted:'#4a5567' },
        mono:     { bg:'#f4f4f5', line:'#dadade', text:'#0b0f17', muted:'#52525b' },
        sunset:   { bg:'#fff4ee', line:'#efd0c2', text:'#0b0f17', muted:'#6b4d3e' },
        sunrise:  { bg:'#fff7ea', line:'#ecd7b0', text:'#0b0f17', muted:'#6a572f' },
        rose:     { bg:'#fff1f5', line:'#f2cdd8', text:'#0b0f17', muted:'#6f4454' },
        lavender: { bg:'#f6f3ff', line:'#ddd3fb', text:'#0b0f17', muted:'#534675' },
        emerald:  { bg:'#ecfdf5', line:'#c7e9d8', text:'#0b0f17', muted:'#3f6257' },
        forest:   { bg:'#eef9f0', line:'#cde3d0', text:'#0b0f17', muted:'#44614a' },
      };
            const l = lightMap[p] || lightMap.ocean;
      const accent = (l.accent || d.accent);
      const t = isLight
        ? { accent, ...l, bg: l.bg }
        : { ...d, text: p === 'blackred' ? '#ff4d57' : p === 'blackblue' ? '#5f86e6' : p === 'blackpurple' ? '#b084f5' : p === 'blackgold' ? '#e0b24d' : '#f3f6ff', muted: p === 'blackred' ? '#b33a42' : p === 'blackblue' ? '#3f5ea8' : p === 'blackpurple' ? '#7a56ba' : p === 'blackgold' ? '#a67c2b' : '#9eb3d6' };

      const r = document.documentElement;
      r.style.setProperty('--accent', t.accent);
      r.style.setProperty('--bg', t.bg);
      r.style.setProperty('--line', t.line);
      r.style.setProperty('--text', t.text || '#f3f6ff');
      r.style.setProperty('--muted', t.muted || '#9eb3d6');
      const __bg = t.bg;
      const __line = t.line;
      const __accent = (t.accent || '#4aa8ff');
      r.style.setProperty('--surface', blendHex(__bg, __line, isLight ? 0.10 : 0.28));
      r.style.setProperty('--surface-border', blendHex(__line, __accent, isLight ? 0.16 : 0.22));
      r.style.setProperty('--row-head', isLight
        ? `color-mix(in oklab, ${__accent} 22%, ${__bg})`
        : `color-mix(in oklab, ${__accent} 18%, ${__bg})`);
    }
    (async ()=>{
      const __u = new URL(location.href);
      const qColor = String(__u.searchParams.get('colorPreset') || '').trim().toLowerCase();
      const qTheme = String(__u.searchParams.get('theme') || '').trim().toLowerCase();
      const qPrimary = String(__u.searchParams.get('primaryThemeColor') || '').trim();
      const qSecondary = String(__u.searchParams.get('secondaryThemeColor') || '').trim();
      const qText = String(__u.searchParams.get('primaryTextColor') || '').trim();
      const qText2 = String(__u.searchParams.get('secondaryTextColor') || '').trim();
      let lsColor = '';
      let lsTheme = '';
      const qCustom = (qPrimary || qSecondary || qText || qText2) ? {
        ...(qPrimary ? { primaryThemeColor:qPrimary } : {}),
        ...(qSecondary ? { secondaryThemeColor:qSecondary } : {}),
        ...(qText ? { primaryTextColor:qText } : {}),
        ...(qText2 ? { secondaryTextColor:qText2 } : {}),
      } : null;
      __npApplyPalette(qColor || 'ocean', qTheme || 'dark', qCustom || null);
      try {
        const r = await fetch(`${__npBase}/config/controller-profile`, { cache:'no-store' });
        const j = await r.json().catch(()=>({}));
        const sColor = String(j?.profile?.colorPreset || 'ocean').trim().toLowerCase();
        const sTheme = String(j?.profile?.theme || 'dark').trim().toLowerCase();
        __npApplyPalette(qColor || sColor || 'ocean', qTheme || sTheme || 'dark', qCustom || null);
      } catch {}
    })();

    window.addEventListener('message', (ev) => {
      const d = ev?.data || {};
      if (!d || typeof d !== 'object') return;
      if (d.type !== 'np-live-theme-update') return;
      try {
        const p = d.customColors || {};
        __npApplyPalette('', '', {
          primaryThemeColor: String(p.primaryThemeColor || '').trim(),
          secondaryThemeColor: String(p.secondaryThemeColor || '').trim(),
          primaryTextColor: String(p.primaryTextColor || '').trim(),
          secondaryTextColor: String(p.secondaryTextColor || '').trim(),
        });
      } catch {}
    });

    const EMBEDDED = new URL(location.href).searchParams.get('embedded') === '1';
    if (EMBEDDED) document.body.classList.add('embedded');

    const base = __npResolveApiBase();
    let runtimeTrackKey = '';
    let pollTimer = null;
    let longPressTimer = null;
    let dragState = null;
    let lastBaseSig = '';
    let lastHeadPos = -1;
    let lastUserScrollAt = 0;
    let radioStationByKey = new Map();
    let radioStationByHost = new Map();
    let radioLogoByKey = new Map();
    let radioLogoByHost = new Map();
    let radioHostAmbiguous = new Set();
    let radioHostMapTs = 0;
    let vibeBusyJobId = '';
    let queueLoadingDepth = 0;
    let queueFailStreak = 0;
    let queueAutoRetryTimer = null;
    let queueLoadPromise = null;
    let queueLoadQueued = false;
    const thumbCacheByFile = new Map();

    function setQueueLoading(on=false){
      const meta = document.getElementById('meta');
      if (on) queueLoadingDepth += 1;
      else queueLoadingDepth = Math.max(0, queueLoadingDepth - 1);
      const active = queueLoadingDepth > 0;
      document.body.classList.toggle('queueLoading', active);
      if (meta && active) {
        meta.innerHTML = `<span class="miniSpin" aria-label="Loading"></span> Reloading…`;
      }
    }

    function setVibeBusy(on=false, text='Building vibe queue…'){
      const box = document.getElementById('vibeBusy');
      const txt = document.getElementById('vibeBusyText');
      if (txt) txt.textContent = String(text || 'Building vibe queue…');
      if (box) box.classList.toggle('show', !!on);
    }

    async function monitorVibeJob(jobId=''){
      const id = String(jobId || '').trim();
      if (!id) return;
      vibeBusyJobId = id;
      setVibeBusy(true, 'Building vibe queue…');
      const started = Date.now();
      try {
        while (Date.now() - started < 180000) {
          await ensureKey();
          const r = await fetch(`${base}/config/queue-wizard/vibe-status/${encodeURIComponent(id)}`, {
            cache:'no-store',
            headers:{ ...(runtimeTrackKey ? {'x-track-key': runtimeTrackKey} : {}) }
          });
          const j = await r.json().catch(()=>({}));
          const done = !!j?.done;
          setVibeBusy(true, done ? 'Finalizing vibe queue…' : 'Building vibe queue…');
          if (done) break;
          await new Promise((res)=>setTimeout(res, 900));
        }
      } catch {}
      if (vibeBusyJobId === id) {
        setVibeBusy(false);
        vibeBusyJobId = '';
      }
    }

    function maybeScrollToHead(force=false){
      const now = Date.now();
      if (!force && (now - lastUserScrollAt) < 3500) return;
      const headRow = document.querySelector('.row.head[data-pos]');
      if (!headRow) return;
      try { headRow.scrollIntoView({ block:'center', inline:'nearest', behavior: force ? 'auto' : 'smooth' }); } catch {}
    }

    async function fetchJsonWithTimeout(url, opts = {}, timeoutMs = 6500){
      const ac = new AbortController();
      const t = setTimeout(() => { try { ac.abort(); } catch {} }, Math.max(500, Number(timeoutMs) || 6500));
      try {
        const r = await fetch(url, { ...(opts || {}), signal: ac.signal });
        const j = await r.json().catch(()=>({}));
        return { r, j };
      } finally {
        clearTimeout(t);
      }
    }

    async function ensureKey(){
      if (runtimeTrackKey) return runtimeTrackKey;
      const { r, j } = await fetchJsonWithTimeout(`${base}/config/runtime`, { cache:'no-store' }, 4500);
      if (!r.ok) return '';
      runtimeTrackKey = String(j?.config?.trackKey || '').trim();
      return runtimeTrackKey;
    }

    async function sendPlayback(action, extra={}){
      await ensureKey();
      const payload = Object.assign({ action }, extra || {});
      const r = await fetch(`${base}/config/diagnostics/playback`, {
        method:'POST',
        headers:{'Content-Type':'application/json', ...(runtimeTrackKey ? {'x-track-key': runtimeTrackKey} : {})},
        body: JSON.stringify(payload)
      });
      const j = await r.json().catch(()=>({}));
      if (!r.ok || !j?.ok) throw new Error(j?.error || `HTTP ${r.status}`);
      return j;
    }

    async function startSeedVibeFromRowWrap(wrap){
      const dec = (s)=>{ try{return decodeURIComponent(String(s||''));}catch{return String(s||'');} };
      const seedArtist = String(dec(wrap?.getAttribute('data-artist')) || '').trim();
      const seedTitle = String(dec(wrap?.getAttribute('data-title')) || '').trim();
      if (!seedArtist || !seedTitle) throw new Error('Need artist and title for Vibe seed');
      await ensureKey();
      const r = await fetch(`${base}/config/queue-wizard/vibe-seed-start`, {
        method:'POST',
        headers:{'Content-Type':'application/json', ...(runtimeTrackKey ? {'x-track-key': runtimeTrackKey} : {})},
        body: JSON.stringify({ seedArtist, seedTitle, targetQueue: 25, playNow: true })
      });
      const j = await r.json().catch(()=>({}));
      if (!r.ok || !j?.ok) throw new Error(j?.error || `HTTP ${r.status}`);
      return j;
    }

    function streamKey(u){
      try {
        const x = new URL(String(u || ''));
        const hp = `${String(x.hostname||'').toLowerCase()}${x.port ? `:${x.port}` : ''}`;
        return `${hp}${String(x.pathname||'')}`.replace(/\/+$/, '');
      } catch { return ''; }
    }

    async function loadRadioHostNameMap(headers = {}) {
      const now = Date.now();
      if (radioStationByKey.size && (now - radioHostMapTs) < (5 * 60 * 1000)) {
        return { byKey: radioStationByKey, byHost: radioStationByHost, logoByKey: radioLogoByKey, logoByHost: radioLogoByHost, ambHosts: radioHostAmbiguous };
      }
      try {
        const { r, j } = await fetchJsonWithTimeout(`${base}/config/queue-wizard/radio-preview`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...(headers || {}) },
          body: JSON.stringify({ genres: [], favoritesOnly: false, hqOnly: false, favoriteStations: [], maxStations: 1000 }),
        }, 2200);
        if (r.ok && j?.ok) {
          const byKey = new Map();
          const byHost = new Map();
          const logoByKey = new Map();
          const logoByHost = new Map();
          const ambHosts = new Set();
          for (const t of (Array.isArray(j.tracks) ? j.tracks : [])) {
            const file = String(t?.file || '').trim();
            const st = String(t?.stationName || t?.artist || '').trim();
            const logoRaw = String(t?.stationLogoUrl || t?.thumbUrl || t?.artUrl || '').trim();
            const logo = logoRaw ? (logoRaw.startsWith('http') ? logoRaw : `${base}${logoRaw}`) : '';
            if (!file || !st) continue;
            const k = streamKey(file);
            if (k) {
              byKey.set(k, st);
              if (logo) logoByKey.set(k, logo);
            }
            try {
              const h = String(new URL(file).hostname || '').toLowerCase();
              if (h) {
                if (!byHost.has(h)) byHost.set(h, st);
                else if (byHost.get(h) !== st) ambHosts.add(h);
                if (logo && !logoByHost.has(h)) logoByHost.set(h, logo);
              }
            } catch {}
          }
          radioStationByKey = byKey;
          radioStationByHost = byHost;
          radioLogoByKey = logoByKey;
          radioLogoByHost = logoByHost;
          radioHostAmbiguous = ambHosts;
          radioHostMapTs = now;
        }
      } catch {}
      return { byKey: radioStationByKey, byHost: radioStationByHost, logoByKey: radioLogoByKey, logoByHost: radioLogoByHost, ambHosts: radioHostAmbiguous };
    }

    function requestQueueLoad(delayMs=0){
      const run = ()=>{ loadQueue().catch(()=>null); };
      if (delayMs > 0) return setTimeout(run, delayMs);
      run();
      return null;
    }

    function scheduleQueueRetry(delayMs=1200){
      try { clearTimeout(queueAutoRetryTimer); } catch {}
      queueAutoRetryTimer = setTimeout(()=>{ requestQueueLoad(); }, Math.max(250, Number(delayMs)||1200));
    }

    async function loadQueue(){
      if (dragState) return;
      if (queueLoadPromise) {
        queueLoadQueued = true;
        return queueLoadPromise;
      }
      queueLoadPromise = (async () => {
      const list = document.getElementById('list');
      const meta = document.getElementById('meta');
      setQueueLoading(true);
      try {
        let headers = runtimeTrackKey ? {'x-track-key': runtimeTrackKey} : {};
        let q0 = await fetchJsonWithTimeout(`${base}/config/diagnostics/queue`, { cache:'no-store', headers }, 5000);
        let r = q0.r;
        let j = q0.j;

        // Fast-path first; if auth is required, fetch key and retry once.
        if ((!r.ok || !j?.ok) && !runtimeTrackKey) {
          try {
            await ensureKey();
            headers = runtimeTrackKey ? {'x-track-key': runtimeTrackKey} : {};
            const q1 = await fetchJsonWithTimeout(`${base}/config/diagnostics/queue`, { cache:'no-store', headers }, 5000);
            r = q1.r;
            j = q1.j;
          } catch {}
        }

        // If key is stale/expired, force refresh key and retry once.
        if ((!r.ok || !j?.ok) && (r.status === 401 || r.status === 403)) {
          try {
            runtimeTrackKey = '';
            await ensureKey();
            headers = runtimeTrackKey ? {'x-track-key': runtimeTrackKey} : {};
            const q2 = await fetchJsonWithTimeout(`${base}/config/diagnostics/queue`, { cache:'no-store', headers }, 5000);
            r = q2.r;
            j = q2.j;
          } catch {}
        }

        if (!r.ok || !j?.ok) {
          queueFailStreak += 1;
          const hasRows = !!(list && list.querySelector('.rowWrap'));
          if (meta) meta.textContent = hasRows ? `Queue update failed (${queueFailStreak}) — retrying…` : 'Pull to refresh queue';
          // Reset signatures so a later successful poll always repaints rows.
          lastBaseSig = '';
          lastHeadPos = -1;
          // Auto-recover without requiring manual pull-to-refresh.
          scheduleQueueRetry(Math.min(5000, 900 + (queueFailStreak * 450)));
          return;
        }
        queueFailStreak = 0;
        try { clearTimeout(queueAutoRetryTimer); } catch {}
        const items = Array.isArray(j.items) ? j.items : [];
        const headPos = Number(j.headPos || -1);
        if (meta) meta.textContent = `${items.length} tracks`;
        const radioMap = {
          byKey: radioStationByKey,
          byHost: radioStationByHost,
          logoByKey: radioLogoByKey,
          logoByHost: radioLogoByHost,
          ambHosts: radioHostAmbiguous,
        };
        // Warm/refresh radio mapping in background; never block queue paint.
        loadRadioHostNameMap(headers).catch(() => null);

      const baseSig = JSON.stringify(items.map((x, idx) => [
        Number(x?._posDisplay || x?.pos || (idx + 1)),
        String(x?.file || ''),
        String(x?.title || x?.name || ''),
        String(x?.artist || ''),
        String(x?.album || ''),
        String(x?.thumbUrl || ''),
      ]));

      // If only currently-playing row changed, update highlight only.
      if (lastBaseSig === baseSig && lastHeadPos !== headPos) {
        list.querySelectorAll('.row[data-pos]').forEach((row) => {
          const pos = Number(row.getAttribute('data-pos') || 0);
          row.classList.toggle('head', pos === headPos);
        });
        lastHeadPos = headPos;
        maybeScrollToHead(false);
        return;
      }

      if (lastBaseSig === baseSig && lastHeadPos === headPos) return;

      const existingImgByFile = new Map();
      try {
        list.querySelectorAll('.rowWrap[data-file] .thumb').forEach((img) => {
          const wrap = img.closest('.rowWrap[data-file]');
          const f = String(wrap?.getAttribute('data-file') || '').trim();
          const src = String(img.getAttribute('src') || '').trim();
          if (f && src) existingImgByFile.set(f, img);
        });
      } catch {}

      const rowsHtml = items.map((x, idx)=>{
        const pos = Number(x?._posDisplay || x?.pos || (idx + 1));
        const isStream = !!x?.isStream;
        const artist = String(x?.artist || '').trim();
        const stationName = String(x?.stationName || x?.name || '').trim();
        const file = String(x?.file || '').trim();
        const hostFallback = (()=>{ try { return (new URL(file).hostname || '').replace(/^www\./i,''); } catch { return ''; } })();
        const skey = streamKey(file);
        const mappedByKey = String(radioMap?.byKey?.get?.(skey) || '').trim();
        const mappedByHost = String(radioMap?.byHost?.get?.(String(hostFallback || '').toLowerCase()) || '').trim();
        const mappedLogoByKey = String(radioMap?.logoByKey?.get?.(skey) || '').trim();
        const mappedLogoByHost = String(radioMap?.logoByHost?.get?.(String(hostFallback || '').toLowerCase()) || '').trim();
        const rawTitle = String(x?.title || '').trim();
        const titleLooksUrl = /^https?:\/\//i.test(rawTitle) || (/\./.test(rawTitle) && !/\s/.test(rawTitle) && /^[-a-z0-9.]+$/i.test(rawTitle));
        const streamTitle = stationName || mappedByKey || mappedByHost || (titleLooksUrl ? hostFallback : '') || rawTitle || hostFallback || '(station)';
        const title = isStream ? streamTitle : (rawTitle || String(x?.name || '').trim() || '(untitled)');
        const album = String(x?.album || '').trim();
        const ratingsEnabled = !!j?.ratingsEnabled;
        const ratingNumRaw = Number(x?.rating || 0);
        const rating = Number.isFinite(ratingNumRaw) ? Math.max(0, Math.min(5, Math.round(ratingNumRaw))) : 0;
        const stars = ratingsEnabled ? ('★'.repeat(rating) + '☆'.repeat(Math.max(0, 5 - rating))) : '';
        const starsHtml = stars ? ('<span class="stars">' + stars + '</span> ') : '';
        const thumbRaw = String(x?.thumbUrl || '').trim();
        const cachedThumb = file ? String(thumbCacheByFile.get(file) || '').trim() : '';
        const stationLogoByName = (stationName || mappedByKey || mappedByHost) ? `${base}/art/radio-logo.jpg?name=${encodeURIComponent(stationName || mappedByKey || mappedByHost)}` : '';
        const stationLogoByFile = file ? `${base}/art/radio-logo.jpg?file=${encodeURIComponent(file)}` : '';
        const hostFavicon = hostFallback ? `https://icons.duckduckgo.com/ip3/${encodeURIComponent(hostFallback)}.ico` : '';
        const thumbFromApi = thumbRaw ? (thumbRaw.startsWith('http') ? thumbRaw : `${base}${thumbRaw}`) : '';
        const thumb = thumbFromApi || cachedThumb || (isStream ? (mappedLogoByKey || mappedLogoByHost || stationLogoByFile || stationLogoByName || hostFavicon || `${base}/art/current.jpg`) : `${base}/art/current.jpg`);
        if (file && thumb) thumbCacheByFile.set(file, thumb);
        const head = pos === headPos;
        return `<li class="rowWrap ${isStream?'onlyDelete':''}" data-pos="${pos}" data-file="${encodeURIComponent(file)}" data-album="${encodeURIComponent(album)}" data-artist="${encodeURIComponent(artist)}" data-title="${encodeURIComponent(title)}" data-is-stream="${isStream?'1':'0'}">
          <div class="row ${head?'head':''}" data-pos="${pos}">
            <div class="num">${pos}</div>
            <div class="coverWrap" style="width:34px;height:34px"><img class="thumb" src="${thumb}" alt="" loading="lazy" decoding="async" /></div>
            <div><div class="title">${title}</div><div class="sub">${starsHtml}${artist}${album ? ' • ' + album : ''}</div></div>
          </div>
          <button type="button" class="vibeBtn" data-a="vibe" data-pos="${pos}">Vibe</button>
          <button type="button" class="deleteBtn" data-a="rm" data-pos="${pos}">Delete</button>
        </li>`;
      }).join('');
      list.innerHTML = `<li id="dropLine" aria-hidden="true"></li>${rowsHtml}`;

      // Reuse existing thumb DOM nodes where same file/src persists.
      try {
        list.querySelectorAll('.rowWrap[data-file]').forEach((wrapEl) => {
          const fEnc = String(wrapEl.getAttribute('data-file') || '');
          let f = '';
          try { f = decodeURIComponent(fEnc); } catch { f = fEnc; }
          if (!f) return;
          const oldImg = existingImgByFile.get(f);
          const newImg = wrapEl.querySelector('.thumb');
          if (!(oldImg instanceof HTMLImageElement) || !(newImg instanceof HTMLImageElement)) return;
          if (String(oldImg.src || '') !== String(newImg.src || '')) return;
          newImg.replaceWith(oldImg);
        });
      } catch {}

        lastBaseSig = baseSig;
        lastHeadPos = headPos;
        maybeScrollToHead(false);
      } catch (e) {
        queueFailStreak += 1;
        if (meta) meta.textContent = `Queue request timeout/error (${queueFailStreak}) — retrying…`;
        scheduleQueueRetry(Math.min(5000, 900 + (queueFailStreak * 450)));
      } finally {
        setQueueLoading(false);
      }
      })();
      try {
        return await queueLoadPromise;
      } finally {
        queueLoadPromise = null;
        if (queueLoadQueued) {
          queueLoadQueued = false;
          requestQueueLoad(120);
        }
      }
    }

    function clearSwipes(exceptRow=null){
      document.querySelectorAll('.row.swiped').forEach(r=>{ if (r!==exceptRow) r.classList.remove('swiped'); });
    }

    function markOptimisticPlay(row){
      if (!(row instanceof HTMLElement)) return;
      document.querySelectorAll('.row.optimisticPlay').forEach((r)=>r.classList.remove('optimisticPlay'));
      row.classList.add('optimisticPlay');
      setTimeout(()=>{ try{ row.classList.remove('optimisticPlay'); }catch{} }, 2400);
    }

    let __backNavBusy=false;
    const clearBackNavState = ()=>{
      __backNavBusy = false;
      try { document.body.classList.remove('nav-backwarding'); } catch {}
      try { document.body.style.transform = ''; document.body.style.opacity = ''; } catch {}
    };
    const backBtn = document.getElementById('backBtn');
    const pageTitle = document.querySelector('.top h1');
    if (pageTitle) { pageTitle.style.cursor='pointer'; pageTitle.addEventListener('click', ()=> backBtn?.click()); }
    backBtn?.addEventListener('click', ()=>{
      if (__backNavBusy) return;
      __backNavBusy = true;
      document.body.classList.add('nav-backwarding');
      setTimeout(()=>{ const embedded = new URL(location.href).searchParams.get('embedded') === '1'; if (embedded) { try { window.parent?.postMessage({ type:'np-kiosk-hide-pane' }, '*'); } catch {} return; } if (history.length > 1) history.back(); else location.href='controller.html'; }, 170);
    });

    // In embedded pane mode this document can be reused; ensure we never stay dim/non-interactive.
    window.addEventListener('pageshow', ()=>{ clearBackNavState(); requestQueueLoad(); });
    window.addEventListener('focus', ()=>{ clearBackNavState(); requestQueueLoad(); });
    document.addEventListener('visibilitychange', ()=>{ if (!document.hidden) { clearBackNavState(); requestQueueLoad(); } });
    window.addEventListener('message', async (ev)=>{
      const d = ev?.data || {};
      if (!d || typeof d !== 'object') return;
      const t = String(d.type || '');
      if (t === 'np-queue-refresh') {
        requestQueueLoad();
        return;
      }
      if (t === 'np-queue-vibe-head') {
        try {
          await loadQueue();
          const wrap = document.querySelector('.row.head[data-pos]')?.closest('.rowWrap');
          if (!wrap) return;
          const jr = await startSeedVibeFromRowWrap(wrap);
          clearSwipes();
          setTimeout(()=>{ loadQueue().catch(()=>null); }, 1200);
          monitorVibeJob(String(jr?.jobId || '')).catch(()=>null);
        } catch (e) {
          console.warn(e);
        }
      }
    });
    setTimeout(()=>{ clearBackNavState(); requestQueueLoad(); }, 260);

    document.getElementById('routeAlexaBtn')?.addEventListener('click', async (ev)=>{
      const btn = ev.currentTarget;
      if (!(btn instanceof HTMLButtonElement)) return;
      const prev = btn.textContent || 'Route to Alexa';
      btn.disabled = true;
      btn.textContent = 'Routing…';
      try {
        await sendPlayback('routealexa');
      } catch (e) {
        console.warn(e);
        try { alert(String(e?.message || e || 'Route to Alexa failed')); } catch {}
      } finally {
        btn.disabled = false;
        btn.textContent = prev;
      }
    });

    document.getElementById('shuffleQueueBtn')?.addEventListener('click', async (ev)=>{
      const btn = ev.currentTarget;
      if (!(btn instanceof HTMLButtonElement)) return;
      const prev = btn.textContent || 'Shuffle';
      btn.disabled = true;
      btn.textContent = 'Shuffling…';
      try {
        await sendPlayback('shufflequeue');
        await loadQueue();
      } finally {
        btn.disabled = false;
        btn.textContent = prev;
      }
    });

    document.getElementById('cropQueueBtn')?.addEventListener('click', async (ev)=>{
      const btn = ev.currentTarget;
      if (btn) btn.disabled = true;
      try {
        await sendPlayback('crop');
        await loadQueue();
      } catch (e) {
        console.warn(e);
      } finally {
        if (btn) btn.disabled = false;
      }
    });

    document.getElementById('clearQueueBtn')?.addEventListener('click', async (ev)=>{
      const ok = window.confirm('Clear entire queue?');
      if (!ok) return;
      const btn = ev.currentTarget;
      if (btn) btn.disabled = true;
      try {
        await sendPlayback('clear');
        await loadQueue();
      } catch (e) {
        console.warn(e);
      } finally {
        if (btn) btn.disabled = false;
      }
    });

    let modalCtx = { album:'', artist:'', title:'', art:'', tracks:[], artistTracks:[] };
    const trackMenu = document.getElementById('trackMenu');
    const albumModal = document.getElementById('albumModal');
    const artistModal = document.getElementById('artistModal');

    function closeTrackMenu(){
      trackMenu.classList.remove('open');
      trackMenu.setAttribute('aria-hidden','true');
    }
    function openTrackMenu(anchorBtn, ctx){
      modalCtx = { ...modalCtx, ...(ctx||{}) };
      const r = anchorBtn.getBoundingClientRect();
      const menuW = 230;
      const left = Math.min(window.innerWidth - menuW - 8, Math.max(8, Math.round(r.right - menuW + 12)));
      const top = Math.min(window.innerHeight - 120, Math.round(r.bottom + 6));
      trackMenu.style.left = `${left}px`;
      trackMenu.style.top = `${top}px`;
      trackMenu.classList.add('open');
      trackMenu.setAttribute('aria-hidden','false');
    }

    function openAlbumModal(){
      document.getElementById('albumTitle').textContent = modalCtx.album || '(album)';
      document.getElementById('albumMeta').textContent = `${(modalCtx.tracks || []).length} track(s)`;
      document.getElementById('albumArt').src = modalCtx.art || `${base}/art/current.jpg`;
      document.getElementById('albumArtistLink').textContent = modalCtx.artist || '(unknown artist)';
      const tracksEl = document.getElementById('albumTracks');
      tracksEl.innerHTML = (modalCtx.tracks || []).map((t,i)=>{
        const name = String(t.title || t.file || '').trim() || '(track)';
        const file = encodeURIComponent(String(t.file || '').trim());
        return `<li><span>${i+1}. ${name}</span><span class="trackBtns"><button title="Play now" aria-label="Play now" data-track-action="play" data-track-file="${file}">▶</button><button title="Add to queue" aria-label="Add to queue" data-track-action="add" data-track-file="${file}">＋</button></span></li>`;
      }).join('') || '<li>No tracks found</li>';
      albumModal.classList.add('open');
      albumModal.setAttribute('aria-hidden','false');
    }
    function closeAlbumModal(){
      albumModal.classList.remove('open');
      albumModal.setAttribute('aria-hidden','true');
    }

    function renderArtistAlbumsGrid(){
      const exOn = !!document.getElementById('artistExcludeOn')?.checked;
      const exTxt = String(document.getElementById('artistExcludeText')?.value || '').trim().toLowerCase();
      const all = Array.isArray(modalCtx.artistAlbums) ? modalCtx.artistAlbums : [];
      const filtered = all.filter((a)=>{
        if (!exOn || !exTxt) return true;
        const g = String(a?.genre || '').trim().toLowerCase();
        const alb = String(a?.album || '').trim().toLowerCase();
        return !(g.includes(exTxt) || alb.includes(exTxt));
      });
      const grid = document.getElementById('artistAlbumsGrid');
      grid.innerHTML = filtered.map((a)=>{
        const alb = String(a?.album || '').trim();
        const sf = String(a?.sampleFile || '').trim();
        const art = sf ? `${base}/art/track_640.jpg?file=${encodeURIComponent(sf)}` : (modalCtx.art || `${base}/art/current.jpg`);
        return `<button type="button" class="artistAlbumBtn" data-album="${encodeURIComponent(alb)}" data-art="${encodeURIComponent(art)}">`
          + `<img src="${art}" alt="" loading="lazy" decoding="async">`
          + `<div class="artistAlbumName">${alb || '(unknown album)'}</div>`
          + `</button>`;
      }).join('') || `<div class='loadingRow'><span class='spin'></span><span>Loading albums…</span></div>`;
      document.getElementById('artistMeta').textContent = filtered.length ? `${filtered.length} album(s)` : 'Loading albums…';
    }

    async function openArtistModal(){
      document.getElementById('artistTitle').textContent = modalCtx.artist || '(artist)';
      document.getElementById('artistArt').src = modalCtx.art || `${base}/art/current.jpg`;
      document.getElementById('artistMeta').textContent = 'Loading albums…';
      artistModal.classList.add('open');
      artistModal.setAttribute('aria-hidden','false');
      try {
        modalCtx.artistAlbums = await fetchArtistAlbums(modalCtx.artist);
      } catch { modalCtx.artistAlbums = []; }
      renderArtistAlbumsGrid();
    }
    function closeArtistModal(){
      artistModal.classList.remove('open');
      artistModal.setAttribute('aria-hidden','true');
    }

    document.getElementById('albumCloseBtn').addEventListener('click', closeAlbumModal);
    albumModal.addEventListener('click', (ev)=>{ if (ev.target === albumModal) closeAlbumModal(); });
    document.getElementById('artistCloseBtn').addEventListener('click', closeArtistModal);
    artistModal.addEventListener('click', (ev)=>{ if (ev.target === artistModal) closeArtistModal(); });

    async function fetchAlbumTracks(album, artist){
      try {
        await ensureKey();
        const headers = {'Content-Type':'application/json', ...(runtimeTrackKey ? {'x-track-key': runtimeTrackKey} : {})};
        const body = { genres:[], artists: artist ? [artist] : [], albums: album ? [album] : [], excludeGenres:[], minRating:0, maxTracks:500 };
        const r = await fetch(`${base}/config/queue-wizard/preview`, { method:'POST', headers, body: JSON.stringify(body) });
        const j = await r.json().catch(()=>({}));
        if (!r.ok || !j?.ok) return [];
        return Array.isArray(j.tracks) ? j.tracks : [];
      } catch { return []; }
    }

    async function fetchArtistAlbums(artist){
      try {
        await ensureKey();
        const q = new URLSearchParams({ artist: String(artist || '').trim() });
        const r = await fetch(`${base}/config/browse/artist-albums?${q.toString()}`, { cache:'no-store', headers: { ...(runtimeTrackKey ? { 'x-track-key': runtimeTrackKey } : {}) } });
        const j = await r.json().catch(()=>({}));
        if (!r.ok || !j?.ok) return [];
        return Array.isArray(j.albums) ? j.albums : [];
      } catch { return []; }
    }

    document.getElementById('goAlbumBtn').addEventListener('click', async ()=>{
      closeTrackMenu();
      modalCtx.tracks = await fetchAlbumTracks(modalCtx.album, modalCtx.artist);
      openAlbumModal();
    });

    document.getElementById('goArtistBtn').addEventListener('click', async ()=>{
      closeTrackMenu();
      await openArtistModal();
    });

    async function withButtonFeedback(btn, work){
      if (!(btn instanceof HTMLElement)) return await work();
      btn.classList.remove('is-done');
      btn.classList.add('is-busy');
      btn.setAttribute('aria-busy','true');
      if ('disabled' in btn) btn.disabled = true;
      try {
        const out = await work();
        btn.classList.remove('is-busy');
        btn.classList.add('is-done');
        setTimeout(()=>{ try{ btn.classList.remove('is-done'); }catch{} }, 500);
        return out;
      } finally {
        btn.classList.remove('is-busy');
        btn.removeAttribute('aria-busy');
        if ('disabled' in btn) btn.disabled = false;
      }
    }

    async function runAlbumAction(mode){
      if (!modalCtx.album) return;
      try { await sendPlayback('addalbum', { mode, album: modalCtx.album, artist: modalCtx.artist || '' }); } catch(e){ console.warn(e); }
      closeAlbumModal();
      await loadQueue();
    }

    document.getElementById('albumAppendBtn').addEventListener('click', async (ev)=>{ await withButtonFeedback(ev.currentTarget, async ()=> runAlbumAction('append')); });
    document.getElementById('albumCropBtn').addEventListener('click', async (ev)=>{ await withButtonFeedback(ev.currentTarget, async ()=> runAlbumAction('crop')); });
    document.getElementById('albumReplaceBtn').addEventListener('click', async (ev)=>{ await withButtonFeedback(ev.currentTarget, async ()=> runAlbumAction('replace')); });

    document.getElementById('albumArtistLink').addEventListener('click', async ()=>{
      modalCtx.artistAlbums = await fetchArtistAlbums(modalCtx.artist);
      closeAlbumModal();
      openArtistModal();
    });

    document.getElementById('albumTracks').addEventListener('click', async (ev)=>{
      const b = ev.target.closest('button[data-track-action][data-track-file]');
      if (!b) return;
      await withButtonFeedback(b, async ()=>{
        const action = String(b.getAttribute('data-track-action') || '');
        let file = '';
        try { file = decodeURIComponent(String(b.getAttribute('data-track-file') || '')); } catch { file = String(b.getAttribute('data-track-file') || ''); }
        if (!file) return;
        if (action === 'play') {
          try { await sendPlayback('playfile', { file }); } catch(e){ console.warn(e); }
          closeAlbumModal();
        } else {
          try { await sendPlayback('addfile', { file }); } catch(e){ console.warn(e); }
        }
        await loadQueue();
      });
    });

    async function previewArtistTracks(shuffle=false){
      await ensureKey();
      const headers = {'Content-Type':'application/json', ...(runtimeTrackKey ? {'x-track-key': runtimeTrackKey} : {})};
      const minRating = Number(document.getElementById('artistMinRating')?.value || 0) || 0;
      const exOn = !!document.getElementById('artistExcludeOn')?.checked;
      const exTxt = String(document.getElementById('artistExcludeText')?.value || '').trim();
      const body = {
        genres: [],
        artists: modalCtx.artist ? [modalCtx.artist] : [],
        albums: [],
        excludeGenres: (exOn && exTxt) ? [exTxt] : [],
        minRating,
        maxTracks: 600,
      };
      const r = await fetch(`${base}/config/queue-wizard/preview`, { method:'POST', headers, body: JSON.stringify(body) });
      const j = await r.json().catch(()=>({}));
      const files = (Array.isArray(j?.tracks) ? j.tracks : []).map(t => String(t?.file || '').trim()).filter(Boolean);
      return { files, shuffle };
    }

    async function applyTracks(files, mode='replace', shuffle=false){
      if (!files.length) return;
      await ensureKey();
      const headers = {'Content-Type':'application/json', ...(runtimeTrackKey ? {'x-track-key': runtimeTrackKey} : {})};
      await fetch(`${base}/config/queue-wizard/apply`, { method:'POST', headers, body: JSON.stringify({ mode, keepNowPlaying:false, tracks:files, shuffle: !!shuffle, forceRandomOff: !shuffle, fastStart: mode==='replace' }) }).catch(()=>null);
      await loadQueue();
    }

    document.getElementById('artistPlayAllBtn').addEventListener('click', async ()=>{
      const { files } = await previewArtistTracks(false);
      closeArtistModal();
      await applyTracks(files, 'replace', false);
    });
    document.getElementById('artistShuffleAllBtn').addEventListener('click', async ()=>{
      const { files } = await previewArtistTracks(true);
      closeArtistModal();
      await applyTracks(files, 'replace', true);
    });

    document.getElementById('artistExcludeOn').addEventListener('change', renderArtistAlbumsGrid);
    document.getElementById('artistExcludeText').addEventListener('input', renderArtistAlbumsGrid);

    document.getElementById('artistAlbumsGrid').addEventListener('click', async (ev)=>{
      const btn = ev.target.closest('.artistAlbumBtn[data-album]');
      if (!btn) return;
      const dec = (s)=>{ try{return decodeURIComponent(String(s||''));}catch{return String(s||'');} };
      const album = dec(btn.getAttribute('data-album'));
      const art = dec(btn.getAttribute('data-art'));
      modalCtx.album = album;
      modalCtx.art = art || modalCtx.art;
      modalCtx.tracks = await fetchAlbumTracks(album, modalCtx.artist);
      closeArtistModal();
      openAlbumModal();
    });

    document.addEventListener('click', (ev)=>{
      const t = ev.target;
      if (trackMenu.classList.contains('open')) {
        if (!(t instanceof Element) || (!t.closest('#trackMenu') && !t.closest('.more'))) closeTrackMenu();
      }
    });

    document.getElementById('list').addEventListener('click', async (ev)=>{
      const more = ev.target.closest('button.more[data-a="more"][data-pos]');
      if (more) {
        ev.stopPropagation();
        const wrap = more.closest('.rowWrap');
        const dec = (s)=>{ try{return decodeURIComponent(String(s||''));}catch{return String(s||'');} };
        const art = String(wrap?.querySelector('.thumb')?.getAttribute('src') || '').trim();
        openTrackMenu(more, {
          title: dec(wrap?.getAttribute('data-title')),
          artist: dec(wrap?.getAttribute('data-artist')),
          album: dec(wrap?.getAttribute('data-album')),
          art,
        });
        return;
      }

      const vibe = ev.target.closest('button.vibeBtn[data-a="vibe"]');
      if (vibe) {
        const wrap = vibe.closest('.rowWrap');
        if (!wrap) return;
        const prev = vibe.textContent || 'Vibe';
        vibe.disabled = true;
        vibe.textContent = 'Vibing…';
        try {
          const jr = await startSeedVibeFromRowWrap(wrap);
          clearSwipes();
          setTimeout(()=>{ loadQueue().catch(()=>null); }, 1200);
          monitorVibeJob(String(jr?.jobId || '')).catch(()=>null);
        } catch(e){
          console.warn(e);
          setVibeBusy(false);
          try { alert(String(e?.message || e || 'Vibe build failed')); } catch {}
        } finally {
          vibe.disabled = false;
          vibe.textContent = prev;
        }
        return;
      }

      const del = ev.target.closest('button.deleteBtn[data-a="rm"]');
      if (del) {
        const pos = Number(del.getAttribute('data-pos')||0);
        if (!pos) return;
        del.disabled = true;

        // Optimistic local removal to avoid full thumbnail churn on swipe-delete.
        const didOptimistic = optimisticRemoveDom(pos);
        try {
          await sendPlayback('remove', { position: pos });
          // Keep optimistic DOM; background poll will reconcile.
          setTimeout(()=>{ loadQueue().catch(()=>null); }, 900);
        } catch(e){
          console.warn(e);
          if (didOptimistic) await loadQueue();
        }
        return;
      }
      const row = ev.target.closest('.row[data-pos]');
      if (!row || dragState) return;
      if (row.classList.contains('swiped')) { row.classList.remove('swiped'); return; }
      const pos = Number(row.getAttribute('data-pos')||0);
      if (!pos) return;
      markOptimisticPlay(row);
      try { await sendPlayback('playpos', { position: pos }); } catch(e){ console.warn(e); }
      setTimeout(()=>{ loadQueue().catch(()=>null); }, 280);
    });

    const listEl = document.getElementById('list');
    const dropLineEl = () => document.getElementById('dropLine');
    let touchStartX = 0, touchStartY = 0, activeRow = null, moved = false;
    const LONG_PRESS_MS = 650;
    const PRESS_SLOP = 10;
    const VERTICAL_SCROLL_CANCEL = 14;
    let lastDropWrap = null;

    listEl.addEventListener('touchstart', (ev)=>{
      closeTrackMenu();
      const row = ev.target.closest('.row[data-pos]');
      if (!row) return;
      activeRow = row; moved = false;
      touchStartX = ev.touches[0].clientX; touchStartY = ev.touches[0].clientY;

      clearTimeout(longPressTimer);
      longPressTimer = setTimeout(()=>{
        // Only arm drag if finger has stayed mostly still (not scrolling/swiping)
        if (!activeRow || moved || dragState) return;
        const wrap = row.closest('.rowWrap');
        dragState = {
          row,
          wrap,
          fromPos: Number(row.getAttribute('data-pos')||0),
          startY: touchStartY,
        };
        row.classList.add('dragging');
        row.style.willChange = 'transform';
        row.style.position = 'relative';
        row.style.zIndex = '9999';
        if (wrap) {
          wrap.classList.add('dragActive');
          wrap.style.position = 'relative';
          wrap.style.zIndex = '9998';
        }
      }, LONG_PRESS_MS);
    }, { passive:true });

    listEl.addEventListener('touchmove', (ev)=>{
      if (!activeRow) return;
      const t = ev.touches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;
      if (Math.abs(dx) > PRESS_SLOP || Math.abs(dy) > PRESS_SLOP) moved = true;

      // If user is vertically scrolling, never start drag.
      if (!dragState && Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > VERTICAL_SCROLL_CANCEL) {
        clearTimeout(longPressTimer);
      }

      if (dragState && dragState.row === activeRow) {
        ev.preventDefault();
        const dyDrag = t.clientY - Number(dragState.startY || touchStartY || 0);
        activeRow.style.transform = `translateY(${dyDrag}px)`;
        const allWraps = Array.from(listEl.querySelectorAll('.rowWrap[data-pos]'));
        if (!allWraps.length) return;

        // Stable nearest-wrap targeting from pointer Y; avoids jitter from elementFromPoint on moving layers.
        let best = null;
        let bestDist = Infinity;
        for (const w of allWraps) {
          if (w === dragState.wrap) continue;
          const r = w.getBoundingClientRect();
          const mid = r.top + r.height * 0.5;
          const d = Math.abs(t.clientY - mid);
          if (d < bestDist) { bestDist = d; best = w; }
        }
        if (!best) return;

        const br = best.getBoundingClientRect();
        let candidate = best;
        if (t.clientY > (br.top + br.height * 0.6) && best.nextElementSibling?.classList?.contains('rowWrap')) {
          candidate = best.nextElementSibling;
        }

        // Hysteresis: don't flip targets unless pointer moved enough.
        if (lastDropWrap && candidate !== lastDropWrap) {
          const cr = candidate.getBoundingClientRect();
          const lr = lastDropWrap.getBoundingClientRect();
          const threshold = Math.max(10, Math.min(26, br.height * 0.25));
          if (Math.abs(t.clientY - (cr.top + cr.height * 0.5)) > Math.abs(t.clientY - (lr.top + lr.height * 0.5)) - threshold) {
            candidate = lastDropWrap;
          }
        }

        const candidatePos = Number(candidate.getAttribute('data-pos') || 0);
        const fromPos = Number(dragState?.fromPos || 0);
        const dropBelow = candidatePos > fromPos;
        if (lastDropWrap !== candidate) {
          lastDropWrap = candidate;
        }

        const dl = dropLineEl();
        if (dl) {
          const listRect = listEl.getBoundingClientRect();
          const cr = candidate.getBoundingClientRect();
          const y = dropBelow ? (cr.bottom - listRect.top - 1) : (cr.top - listRect.top - 1);
          dl.style.top = `${Math.max(0, Math.round(y))}px`;
          dl.style.display = 'block';
        }
        return;
      }

      if (Math.abs(dx) > Math.abs(dy) && dx < -16) {
        clearTimeout(longPressTimer);
        activeRow.classList.add('swiped');
        clearSwipes(activeRow);
      } else if (dx > 16) {
        clearTimeout(longPressTimer);
        activeRow.classList.remove('swiped');
      }
    }, { passive:false });

    function renumberVisibleRows(){
      Array.from(listEl.querySelectorAll('.rowWrap')).forEach((w, idx)=>{
        const pos = idx + 1;
        w.setAttribute('data-pos', String(pos));
        const row = w.querySelector('.row');
        if (row) row.setAttribute('data-pos', String(pos));
        const num = w.querySelector('.num');
        if (num) num.textContent = String(pos);
        const vibe = w.querySelector('.vibeBtn[data-a="vibe"]');
        if (vibe) vibe.setAttribute('data-pos', String(pos));
        const del = w.querySelector('.deleteBtn[data-a="rm"]');
        if (del) del.setAttribute('data-pos', String(pos));
      });
      const meta = document.getElementById('meta');
      if (meta) {
        const n = listEl.querySelectorAll('.rowWrap').length;
        meta.textContent = `${n} tracks`;
      }
    }

    function optimisticReorderDom(fromPos, toPos){
      const wraps = Array.from(listEl.querySelectorAll('.rowWrap[data-pos]'));
      const fromIdx = wraps.findIndex((w)=>Number(w.getAttribute('data-pos')||0) === Number(fromPos));
      const toIdx = wraps.findIndex((w)=>Number(w.getAttribute('data-pos')||0) === Number(toPos));
      if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) return false;

      const moving = wraps[fromIdx];
      const target = wraps[toIdx];
      if (!moving || !target) return false;

      if (toIdx > fromIdx) listEl.insertBefore(moving, target.nextSibling);
      else listEl.insertBefore(moving, target);

      // Renumber visible order immediately so UI matches gesture outcome.
      renumberVisibleRows();
      return true;
    }

    function optimisticRemoveDom(pos){
      const wrap = listEl.querySelector(`.rowWrap[data-pos="${Number(pos)}"]`);
      if (!wrap) return false;
      wrap.remove();
      renumberVisibleRows();
      return true;
    }

    async function finishDrag(ev){
      clearTimeout(longPressTimer);
      if (dragState && dragState.row) {
        const row = dragState.row;
        row.classList.remove('dragging');
        row.style.transform = '';
        row.style.willChange = '';
        row.style.zIndex = '';
        row.style.position = '';
        if (dragState.wrap) {
          dragState.wrap.classList.remove('dragActive');
          dragState.wrap.style.zIndex = '';
          dragState.wrap.style.position = '';
        }
        const changed = lastDropWrap;
        const fromPos = Number(dragState.fromPos || 0);
        const toPos = Number(changed?.getAttribute('data-pos') || 0);
        lastDropWrap = null;
        const dl = dropLineEl();
        if (dl) dl.style.display = 'none';
        dragState = null;
        if (fromPos > 0 && toPos > 0 && fromPos !== toPos) {
          const didOptimistic = optimisticReorderDom(fromPos, toPos);
          try {
            await sendPlayback('move', { fromPosition: fromPos, toPosition: toPos });
          } catch(e){
            console.warn(e);
            await loadQueue();
            return;
          }
          // Keep optimistic DOM (including thumbs) to avoid full-image churn.
          // If backend move fails, catch-path above falls back to full reload.
          if (!didOptimistic) await loadQueue();
          return;
        }
      }
      activeRow = null;
      const dl = dropLineEl();
      if (dl) dl.style.display = 'none';
    }

    listEl.addEventListener('touchend', finishDrag, { passive:true });
    listEl.addEventListener('touchcancel', finishDrag, { passive:true });

    const markUserScroll = ()=>{ lastUserScrollAt = Date.now(); };
    window.addEventListener('wheel', markUserScroll, { passive:true });
    window.addEventListener('touchmove', markUserScroll, { passive:true });
    window.addEventListener('scroll', markUserScroll, { passive:true });

    ensureKey().catch(()=>null); // warm auth key in background; do not block first queue paint
    requestQueueLoad();
    setTimeout(()=>{ maybeScrollToHead(true); }, 450);
    // Light-touch background sync (avoid constant thumbnail churn).
    pollTimer = setInterval(()=>{ requestQueueLoad(); }, 15000);
  
    // Pull-to-refresh (controller pages)
    (function enablePullToRefresh(){
      if (window.__npPullRefreshBound) return;
      window.__npPullRefreshBound = true;
      let startY = 0;
      let tracking = false;
      let armed = false;
      const THRESH = 80;

      const topScrollable = () => {
        const el = document.scrollingElement || document.documentElement || document.body;
        return (el?.scrollTop || window.pageYOffset || 0) <= 0;
      };

      window.addEventListener('touchstart', (e) => {
        if (!e.touches || e.touches.length !== 1) return;
        if (!topScrollable()) return;
        startY = e.touches[0].clientY;
        tracking = true;
        armed = false;
      }, { passive: true });

      window.addEventListener('touchmove', (e) => {
        if (!tracking || !e.touches || e.touches.length !== 1) return;
        const dy = e.touches[0].clientY - startY;
        if (dy > THRESH && topScrollable()) armed = true;
      }, { passive: true });

      window.addEventListener('touchend', () => {
        if (tracking && armed) location.reload();
        tracking = false;
        armed = false;
      }, { passive: true });
    })();
</script>
</body>
</html>
